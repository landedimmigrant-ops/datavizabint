<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Abundant Intelligences — Phase 2 Polarity Landscape</title><script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/d3-cloud/1.2.5/d3.layout.cloud.min.js"></script><style>
:root{
  --bg:#0c0e17;--surface:#161926;--surface2:#1e2235;
  --border:#272d48;--text:#dde1f0;--muted:#7880a0;
  --accent:#7c9eff;--pos:#4ade80;--neg:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.htitle h1{font-size:.95rem;font-weight:700;letter-spacing:.04em;}
.htitle p{font-size:.68rem;color:var(--muted);margin-top:2px;}
.hbadges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:.62rem;color:var(--muted);}
nav{display:flex;gap:2px;padding:10px 28px 0;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
nav button{background:none;border:none;color:var(--muted);font-size:.75rem;padding:7px 16px;cursor:pointer;border-bottom:2px solid transparent;border-radius:6px 6px 0 0;transition:all .2s;letter-spacing:.03em;}
nav button.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(124,158,255,.07);}
nav button:hover:not(.active){color:var(--text);background:var(--surface2);}
.view{display:none;flex:1;overflow:hidden;}
.view.active{display:flex;flex-direction:column;}
/* ── LANDSCAPE ── */
#view-landscape{flex-direction:row !important;height:calc(100vh - 108px);}
#land-left{flex:1;position:relative;overflow:hidden;min-width:0;}
#land-svg{width:100%;height:100%;display:block;}
#land-right{width:320px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;}
#land-detail{padding:18px 16px;}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--muted);text-align:center;gap:8px;}
.detail-empty svg{opacity:.3;}
.detail-empty p{font-size:.75rem;line-height:1.5;}
.detail-header{border-left:4px solid var(--accent);padding:10px 12px;background:var(--surface2);border-radius:0 6px 6px 0;margin-bottom:14px;}
.detail-title{font-size:.85rem;font-weight:700;margin-bottom:4px;line-height:1.3;}
.detail-desc{font-size:.68rem;color:var(--muted);line-height:1.5;margin-bottom:8px;}
.detail-scores{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.score-chip{font-size:.62rem;padding:2px 7px;border-radius:10px;background:rgba(74,222,128,.12);color:var(--pos);border:1px solid rgba(74,222,128,.25);}
.score-chip.conc{background:rgba(248,113,113,.12);color:var(--neg);border-color:rgba(248,113,113,.25);}
.score-chip.neu{background:var(--surface);color:var(--muted);border-color:var(--border);}
.proj-list{display:flex;gap:4px;flex-wrap:wrap;}
.proj-chip{font-size:.6rem;padding:2px 6px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--muted);}
.detail-section{margin-bottom:14px;}
.detail-section-label{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.pos-label{color:var(--pos);}
.neg-label{color:var(--neg);}
.quote{border-radius:6px;padding:8px 10px;margin-bottom:6px;position:relative;}
.quote.pos{background:rgba(74,222,128,.06);border-left:3px solid rgba(74,222,128,.5);}
.quote.neg{background:rgba(248,113,113,.06);border-left:3px solid rgba(248,113,113,.5);}
.quote-text{font-size:.7rem;line-height:1.55;color:var(--text);display:block;margin-bottom:6px;}
.quote-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.quote-rev{font-size:.6rem;font-weight:600;padding:1px 6px;border-radius:8px;}
.pos-rev{background:rgba(74,222,128,.15);color:var(--pos);}
.neg-rev{background:rgba(248,113,113,.15);color:var(--neg);}
.quote-proj{font-size:.6rem;padding:1px 6px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.quote-src{font-size:.58rem;padding:1px 5px;border-radius:8px;background:rgba(124,158,255,.1);color:var(--accent);border:1px solid rgba(124,158,255,.2);}
/* ── CARDS ── */
#view-cards{overflow-y:auto;padding:24px 28px;height:calc(100vh - 108px);}
#cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:16px;}
.theme-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.card-header{padding:12px 16px;display:flex;align-items:center;gap:10px;}
.card-color-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0;}
.card-title{font-size:.82rem;font-weight:700;margin-bottom:2px;}
.card-desc{font-size:.65rem;color:var(--muted);line-height:1.4;}
.card-meta{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.card-scores{display:flex;gap:5px;}
.card-body{padding:0 14px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.card-col-label{font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:6px 0 5px;}
/* ── LANGUAGE ── */
#view-language{overflow-y:auto;padding:24px 28px;height:calc(100vh - 108px);}
#lang-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.rev-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.rev-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.rev-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0;}
.rev-name{font-size:.82rem;font-weight:700;}
.rev-meta{font-size:.65rem;color:var(--muted);margin-top:2px;}
.rev-indicators{margin-left:auto;display:flex;gap:8px;}
.rev-ind{text-align:center;}
.rev-ind .val{font-size:.9rem;font-weight:700;}
.rev-ind .lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.rev-body{padding:16px 18px;}
.rev-section-title{font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:14px;}
.rev-section-title:first-child{margin-top:0;}
.word-cloud-wrap{height:180px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:8px;overflow:hidden;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.bar-label{font-size:.68rem;color:var(--text);min-width:120px;flex-shrink:0;}
.bar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.bar-val{font-size:.62rem;color:var(--muted);min-width:24px;text-align:right;}
/* ── TOOLTIP ── */
#tooltip{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:.72rem;pointer-events:none;display:none;z-index:999;max-width:220px;line-height:1.5;}
/* ── LEGEND ── */
#land-legend{position:absolute;bottom:16px;left:70px;display:flex;gap:16px;font-size:.62rem;color:var(--muted);}
.leg-item{display:flex;align-items:center;gap:5px;}
.leg-dot{width:8px;height:8px;border-radius:50%;}
</style></head><body><header><div class="htitle"><h1>Abundant Intelligences &mdash; Phase 2 Research Landscape</h1><p>Polarity analysis of reviewer signals across 6 research themes &bull; 10 projects &bull; 2 reviewers</p></div><div class="hbadges"><span class="badge">Potential vs. Concern</span><span class="badge">Reviewer Language</span><span class="badge">Strategic Sensemaking</span></div></header><nav><button class="active" data-view="view-landscape">Polarity Landscape</button><button data-view="view-cards">Signal Cards</button><button data-view="view-language">Leadership Language</button></nav><div id="view-landscape" class="view active"><div id="land-left"><svg id="land-svg"></svg></div><div id="land-right"><div id="land-detail"></div></div></div><div id="view-cards" class="view"><div id="cards-grid"></div></div><div id="view-language" class="view"><div id="lang-wrap"></div></div><div id="tooltip"></div><script>const DATA = {"themes": [{"id": "ik_governance", "title": "Indigenous Knowledge & AI Governance", "short": "IK & Governance", "color": "#a78bfa", "description": "How Indigenous knowledge systems can reshape AI governance, data sovereignty, and community-defined ethical frameworks for AI development.", "potential": 0.706, "concern": 0.229, "collaboration": 0.82, "conviction": 0.568, "concern_lang": 0.241, "alignment_avg": 8.75, "risk_score": 0.181, "transform_phrases": ["ik-ai governance", "governance community-defined", "sovereignty builds", "builds capacity", "ethical", "engagement", "methodologies", "relational indigenous-centred"], "n_projects": 3, "projects": [{"id": "Ashley Cordes - CfP01-01", "short": "Ashley Cordes", "code": "CfP01-01", "weight": 0.9}, {"id": "Jackie Rice - CfP01-07", "short": "Jackie Rice", "code": "CfP01-07", "weight": 0.8}, {"id": "Sara Diamond & Archer Pechawis - CfP01-08", "short": "Sara Diamond & Archer Pechawis", "code": "CfP01-08", "weight": 0.7}], "positive_sentences": [{"text": "This project contributes strongly to AbInt\u2019s Transformation Statement through its relational, Indigenous-centred approach to AI research grounded in Blackfoot knowledge, Elder guidance, and land-based dialogue.", "reviewer": "Jackson", "project": "Jackie Rice", "project_code": "CfP01-07", "source": "transform", "weight": 0.8}, {"text": "By supporting artist residencies, community conversations, and the creation of digital and performative works, the project shifts AI inquiry away from purely technical development toward culturally grounded, community-led processes.", "reviewer": "Jackson", "project": "Jackie Rice", "project_code": "CfP01-07", "source": "transform", "weight": 0.8}, {"text": "The project is well positioned to advance into the Imaginaries phase by further developing its dialogue-based and land-based methodologies as frameworks for imagining Indigenous-centred approaches to AI, particularly through language, storytelling, and relational understandings of knowledge and memory.", "reviewer": "Jackson", "project": "Jackie Rice", "project_code": "CfP01-07", "source": "advance", "weight": 0.8}, {"text": "Risk appears relatively low, as the project is grounded in research-creation, dialogue, and community-led processes rather than high-risk technical deployment.", "reviewer": "Jackson", "project": "Jackie Rice", "project_code": "CfP01-07", "source": "risk", "weight": 0.8}, {"text": "The risk of not pursuing the project would be significant, as it supports the relational and community-driven foundations necessary for Indigenous-centred AI, while also building capacity through residencies, mentorship, and shared learning across the AbInt network.", "reviewer": "Jackson", "project": "Jackie Rice", "project_code": "CfP01-07", "source": "risk", "weight": 0.8}], "concern_sentences": [{"text": "This project is challenging, because so much of what was reported is not tied to the CfP project.", "reviewer": "Jason", "project": "Ashley Cordes", "project_code": "CfP01-01", "source": "risk", "weight": 0.9}]}, {"id": "language_ai", "title": "Language Revitalization & AI", "short": "Language & AI", "color": "#34d399", "description": "Indigenous language revitalization through AI tools, digital territories, and community-led linguistic preservation.", "potential": 0.715, "concern": 0.226, "collaboration": 0.821, "conviction": 0.604, "concern_lang": 0.228, "alignment_avg": 8.5, "risk_score": 0.05, "transform_phrases": ["ethical", "engagement", "methodologies", "relational indigenous-centred"], "n_projects": 1, "projects": [{"id": "Jackie Rice - CfP01-07", "short": "Jackie Rice", "code": "CfP01-07", "weight": 0.6}], "positive_sentences": [{"text": "This project contributes strongly to AbInt\u2019s Transformation Statement through its relational, Indigenous-centred approach to AI research grounded in Blackfoot knowledge, Elder guidance, and land-based dialogue.", "reviewer": "Jackson", "project": "Jackie Rice", "project_code": "CfP01-07", "source": "transform", "weight": 0.6}, {"text": "By supporting artist residencies, community conversations, and the creation of digital and performative works, the project shifts AI inquiry away from purely technical development toward culturally grounded, community-led processes.", "reviewer": "Jackson", "project": "Jackie Rice", "project_code": "CfP01-07", "source": "transform", "weight": 0.6}, {"text": "The project is well positioned to advance into the Imaginaries phase by further developing its dialogue-based and land-based methodologies as frameworks for imagining Indigenous-centred approaches to AI, particularly through language, storytelling, and relational understandings of knowledge and memory.", "reviewer": "Jackson", "project": "Jackie Rice", "project_code": "CfP01-07", "source": "advance", "weight": 0.6}, {"text": "Risk appears relatively low, as the project is grounded in research-creation, dialogue, and community-led processes rather than high-risk technical deployment.", "reviewer": "Jackson", "project": "Jackie Rice", "project_code": "CfP01-07", "source": "risk", "weight": 0.6}, {"text": "The risk of not pursuing the project would be significant, as it supports the relational and community-driven foundations necessary for Indigenous-centred AI, while also building capacity through residencies, mentorship, and shared learning across the AbInt network.", "reviewer": "Jackson", "project": "Jackie Rice", "project_code": "CfP01-07", "source": "risk", "weight": 0.6}], "concern_sentences": []}, {"id": "creative_speculative", "title": "Creative Research-Creation & Speculative AI", "short": "Creative & Speculative", "color": "#f97316", "description": "Speculative and research-creation approaches to AI, exploring symbolic AI, neuroscience, and Indigenous imaginaries.", "potential": 0.724, "concern": 0.223, "collaboration": 0.833, "conviction": 0.585, "concern_lang": 0.248, "alignment_avg": 8.94, "risk_score": 0.185, "transform_phrases": ["methods", "proposing bringing", "bringing knowledge", "systems dialogue", "governance", "actively reworking", "reworking systems", "systems governance"], "n_projects": 2, "projects": [{"id": "Antoine Bellemare-Pepin - CfP04", "short": "Antoine Bellemare-Pepin", "code": "CfP04", "weight": 0.9}, {"id": "Sara Diamond & Archer Pechawis - CfP01-08", "short": "Sara Diamond & Archer Pechawis", "code": "CfP01-08", "weight": 0.8}], "positive_sentences": [{"text": "Its emphasis on collaboration with Lakota knowledge holders and on grounding technical work in community interpretation reflects the program\u2019s goal of shifting AI research toward relational and culturally informed approaches.", "reviewer": "Jackson", "project": "Antoine Bellemare-Pepin", "project_code": "CfP04", "source": "transform", "weight": 0.9}, {"text": "The project fits naturally within the Imaginaries phase through its speculative exploration of symbolic language, dreaming, and human\u2013AI interaction, and could contribute to that phase by further developing its conceptual and methodological framework for culturally grounded AI design.", "reviewer": "Jackson", "project": "Antoine Bellemare-Pepin", "project_code": "CfP04", "source": "advance", "weight": 0.9}, {"text": "This project contributes strongly to AbInt\u2019s Transformation Statement by actively reworking AI systems through Indigenous governance, methodologies, and relational ethics grounded in the Dish With One Spoon covenant.", "reviewer": "Jackson", "project": "Sara Diamond & Archer Pechawis", "project_code": "CfP01-08", "source": "transform", "weight": 0.8}, {"text": "Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.", "reviewer": "Jackson", "project": "Sara Diamond & Archer Pechawis", "project_code": "CfP01-08", "source": "transform", "weight": 0.8}, {"text": "Its combination of technical prototyping, governance design, and capacity building through workshops, student leadership, and partnerships supports AbInt\u2019s goal of transforming AI by aligning computation with Indigenous knowledge systems, sovereignty, and shared responsibility.", "reviewer": "Jackson", "project": "Sara Diamond & Archer Pechawis", "project_code": "CfP01-08", "source": "transform", "weight": 0.8}], "concern_sentences": [{"text": "One risk is that the project relies on highly experimental methods combining neuroscience, symbolic analysis, and AI, which may make outcomes difficult to realize within the project timeframe or limit their usefulness to the wider network.", "reviewer": "Jackson", "project": "Antoine Bellemare-Pepin", "project_code": "CfP04", "source": "risk", "weight": 0.9}]}, {"id": "community_relational", "title": "Community-Led & Relational Practice", "short": "Community-Led Design", "color": "#60a5fa", "description": "Relational, place-based, and community-led research practices centred in Indigenous ways of knowing and doing.", "potential": 0.679, "concern": 0.223, "collaboration": 0.799, "conviction": 0.55, "concern_lang": 0.195, "alignment_avg": 8.36, "risk_score": 0.221, "transform_phrases": ["ik-ai governance", "governance community-defined", "sovereignty builds", "builds capacity", "interactive", "digital", "demonstrating knowledge", "systems blackfoot"], "n_projects": 3, "projects": [{"id": "Ashley Cordes - CfP01-01", "short": "Ashley Cordes", "code": "CfP01-01", "weight": 0.8}, {"id": "Kaiya Healy - CfP02-10", "short": "Kaiya Healy", "code": "CfP02-10", "weight": 0.9}, {"id": "Christine Clark - CfP04", "short": "Christine Clark", "code": "CfP04", "weight": 0.8}], "positive_sentences": [{"text": "This project contributes strongly to AbInt\u2019s Transformation Statement by demonstrating how Indigenous knowledge systems, particularly Blackfoot metaphysics and teachings, can inform the creation of sovereign digital environments that challenge Western assumptions about space, time, and intelligence.", "reviewer": "Jackson", "project": "Kaiya Healy", "project_code": "CfP02-10", "source": "transform", "weight": 0.9}, {"text": "Through the development of an interactive Unity-based world, the work explores alternative ways of understanding relationality, energy, and place within digital media, while grounding the process in mentorship, community learning, and POD-based practices.", "reviewer": "Jackson", "project": "Kaiya Healy", "project_code": "CfP02-10", "source": "transform", "weight": 0.9}, {"text": "The project has strong potential to advance into the Imaginaries phase through further development of its conceptual framework around Indigenous metaphysics, relational space, and alternative understandings of time, energy, and environment within digital worlds.", "reviewer": "Jackson", "project": "Kaiya Healy", "project_code": "CfP02-10", "source": "advance", "weight": 0.9}, {"text": "Continued collaboration within the network, along with clearer pathways for sharing builds, workflows, and community-informed design methods, would help the project move from a single environment toward a more scalable and relational digital infrastructure aligned with the goals of these later phases.", "reviewer": "Jackson", "project": "Kaiya Healy", "project_code": "CfP02-10", "source": "advance", "weight": 0.9}, {"text": "The risk of not pursuing the project would be the loss of a strong example of Indigenous-centred digital environment design, which contributes to AbInt\u2019s goals by expanding how virtual space, storytelling, and relational worldviews can shape future AI and interactive systems.", "reviewer": "Jackson", "project": "Kaiya Healy", "project_code": "CfP02-10", "source": "risk", "weight": 0.9}], "concern_sentences": [{"text": "Although the project does not focus on core AI model development, it advances the transformation goals by building Indigenous-centred approaches to virtual space, storytelling, and digital world-making that can inform future AI and interactive system design within the network.", "reviewer": "Jackson", "project": "Kaiya Healy", "project_code": "CfP02-10", "source": "transform", "weight": 0.9}, {"text": "Risk appears relatively low, as the project is primarily focused on creative development, learning, and community-informed digital world-building rather than high-risk technical or data-driven AI systems.", "reviewer": "Jackson", "project": "Kaiya Healy", "project_code": "CfP02-10", "source": "risk", "weight": 0.9}, {"text": "This project is challenging, because so much of what was reported is not tied to the CfP project.", "reviewer": "Jason", "project": "Ashley Cordes", "project_code": "CfP01-01", "source": "risk", "weight": 0.8}, {"text": "A risk is that the project remains primarily focused on curriculum development without clearly extending into technical, infrastructural, or network-level outcomes, which could limit its relevance to AbInt\u2019s broader goa let landBuilt = false;

function buildLandscape(){
  if(landBuilt) return;
  landBuilt = true;
  const container = document.getElementById('land-left');
  const W = container.clientWidth || 760;
  const H = container.clientHeight || 560;
  const mg = {top:52,right:48,bottom:68,left:72};
  const iW = W - mg.left - mg.right;
  const iH = H - mg.top - mg.bottom;

  const themes = DATA.themes;

  // ── Spreadsheet-grounded axes ─────────────────────────────────────────
  // Y = Alignment Score (1-10 reviewer rating, from form directly)
  // X = Risk language density (from Risk column text only)
  const alignVals = themes.map(function(t){return t.alignment_avg;});
  const riskVals  = themes.map(function(t){return t.risk_score;});

  const alignMin = Math.max(0,  d3.min(alignVals) - 0.7);
  const alignMax = Math.min(10, d3.max(alignVals) + 0.5);
  const riskMin  = Math.max(0,  d3.min(riskVals)  - 0.02);
  const riskMax  = d3.max(riskVals) + 0.04;

  const xDom = [riskMin, riskMax];
  const yDom = [alignMin, alignMax];
  const xSc = d3.scaleLinear().domain(xDom).range([0, iW]);
  const ySc = d3.scaleLinear().domain(yDom).range([iH, 0]);
  const rSc = d3.scaleLinear().domain([0.55, 0.92]).range([26, 50]);

  // Adaptive dividers at data midpoint
  const CX = (d3.min(riskVals)  + d3.max(riskVals))  / 2;
  const PY = (d3.min(alignVals) + d3.max(alignVals))  / 2;

  const svg = d3.select('#land-svg').attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  const g = svg.append('g').attr('transform','translate('+mg.left+','+mg.top+')');

  // Quadrant zones (now grounded in actual spreadsheet columns)
  const zones = [
    {x1:xDom[0],x2:CX,y1:PY,y2:yDom[1],label:'Ready to Build On',sub:'Strong alignment, lower risk language',pos:'tl',fill:'rgba(74,222,128,0.055)'},
    {x1:CX,x2:xDom[1],y1:PY,y2:yDom[1],label:'High Potential \u2014 Address Concerns',sub:'Strong alignment, risk language to resolve',pos:'tr',fill:'rgba(251,191,36,0.04)'},
    {x1:xDom[0],x2:CX,y1:yDom[0],y2:PY,label:'Reconsider Fit',sub:'Lower alignment score, manageable risk',pos:'bl',fill:'rgba(148,163,184,0.025)'},
    {x1:CX,x2:xDom[1],y1:yDom[0],y2:PY,label:'Significant Concerns',sub:'Lower alignment and higher risk flags',pos:'br',fill:'rgba(248,113,113,0.04)'}
  ];

  zones.forEach(function(q){
    g.append('rect')
      .attr('x',xSc(q.x1)).attr('y',ySc(q.y2))
      .attr('width',xSc(q.x2)-xSc(q.x1))
      .attr('height',ySc(q.y1)-ySc(q.y2))
      .attr('fill',q.fill);

    var lx = q.pos.endsWith('l') ? xSc(q.x1)+10 : xSc(q.x2)-10;
    var ly = q.pos.startsWith('t') ? ySc(q.y2)+18 : ySc(q.y1)-22;
    var an = q.pos.endsWith('l') ? 'start' : 'end';

      .attr('fill','rgba(221,225,240,0.28)').attr('font-size','11px').attr('font-weight','600')
      .attr('letter-spacing','0.05em').text(q.label);
    g.append('text').attr('x',lx).attr('y',ly+13).attr('text-anchor',an)

  });

  // Divider lines

  themes.forEach(function(t){
    var cx = xSc(t.risk_score);
    var cy = ySc(t.alignment_avg);
    var r  = rSc(t.collaboration);

    // Glow ring
    g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',r+10)
      .attr('fill',t.color).attr('fill-opacity',0.05).attr('pointer-events','none');

    // Main bubble
    var circle = g.append('circle')
      .attr('cx',cx).attr('cy',cy).attr('r',r)
      .attr('fill',t.color).attr('fill-opacity',0.20)
      .attr('stroke',t.color).attr('stroke-width',2)
      .attr('cursor','pointer').attr('data-id',t.id);

    // Conviction indicator dot
    var convColor = t.conviction > 0.56 ? '#4ade80' : '#fbbf24';
    g.append('circle').attr('cx',cx+r-9).attr('cy',cy-r+9).attr('r',5)
      .attr('fill',convColor).attr('stroke','#0c0e17').attr('stroke-width',1.5)
      .attr('pointer-events','none')
      .attr('title','conviction');

    // Theme short label
    g.append('text').attr('x',cx).attr('y',cy+4)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('fill','rgba(255,255,255,0.85)').attr('font-size','10px').attr('font-weight','600')
      .attr('pointer-events','none').text(t.short);

    // Events
    circle.on('click',function(){
      d3.selectAll('circle[data-id]').attr('stroke-width',2).attr('fill-opacity',0.20);
      d3.select(this).attr('stroke-width',3.5).attr('fill-opacity',0.40);
      selectedTheme = t.id;
      showThemeDetail(t.id);
    });

    circle.on('mouseover',function(){
      if(selectedTheme !== t.id) d3.select(this).attr('fill-opacity',0.35).attr('stroke-width',2.8);
      var el = document.getElementById('land-left');
      var rect = el.getBoundingClientRect();
      showTooltip(t, rect.left + mg.left + cx, rect.top + mg.top + cy);
    });

    circle.on('mouseout',function(){
      if(selectedTheme !== t.id) d3.select(this).attr('fill-opacity',0.20).attr('stroke-width',2);
      hideTooltip();
    });
  });
}

function showTooltip(t, x, y){
  var tt = document.getElementById('tooltip');
  tt.style.display = 'block';
  tt.style.left = (x+18)+'px';
  tt.style.top  = (y-12)+'px';
  tt.innerHTML = '<strong>'+esc(t.title)+'</strong><br>'
    +'<span style="font-size:0.65rem;opacity:0.7">'
    +t.n_projects+' project(s) &nbsp;|&nbsp; '
    +'Alignment: <span style="color:#4ade80">'+t.alignment_avg.toFixed(1)+'/10</span>'
    +' &nbsp; Risk level: <span style="color:#f87171">'+t.risk_score.toFixed(2)+'</span>'
    +'</span>';
}

function hideTooltip(){
  document.getElementById('tooltip').style.display = 'none';
}

// ── LEADERSHIP LANGUAGE ───────────────────────────────────────────────────
var langBuilt = false;
function buildLanguage(){
  if(langBuilt) return;
  langBuilt = true;
  var wrap = document.getElementById('lang-wrap');
  var revColors = ['#7c9eff','#f97316'];

  var panels = '';
  DATA.reviewers.forEach(function(r, ri){
    var col = revColors[ri % revColors.length];
    var initials = r.name.split(' ').map(function(w){return w[0];}).join('').substring(0,2);
    var convPct = Math.round(r.conviction*100);
    var concPct = Math.round(r.concern*100);
    var svgId = 'wcloud-'+r.name.replace(/\s/g,'_');

    // Build bigrams bar chart
    var bigrams = r.themes.bigrams.filter(function(b){
      return b[1] >= 2;
    }).slice(0,10);
    var maxBig = bigrams.length ? bigrams[0][1] : 1;

    var bigBarHtml = '';
    bigrams.forEach(function(b){
      var pct = Math.round(b[1]/maxBig*100);
      bigBarHtml += '<div class="bar-row">'
        + '<span class="bar-label">'+esc(b[0])+'</span>'
        + '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+esc(col)+'"></div></div>'
        + '<span class="bar-val">'+b[1]+'</span>'
        + '</div>';
    });

    panels += '<div class="rev-panel">'
      + '<div class="rev-header">'
      + '<div class="rev-avatar" style="background:'+esc(col)+'22;color:'+esc(col)+';border:2px solid '+esc(col)+'44">'+esc(initials)+'</div>'
      + '<div>'
      + '<div class="rev-name">'+esc(r.name)+'</div>'
      + '<div class="rev-meta">'+r.n_projects+' projects reviewed</div>'
      + '</div>'
      + '<div class="rev-indicators">'
      + '<div class="rev-ind"><div class="val" style="color:#4ade80">'+convPct+'%</div><div class="lbl">Conviction</div></div>'
      + '<div class="rev-ind"><div class="val" style="color:#f87171">'+concPct+'%</div><div class="lbl">Concern</div></div>'
      + '</div>'
      + '</div>'
      + '<div class="rev-body">'
      + '<div class="rev-section-title">Recurring Language Themes</div>'
      + '<div id="'+esc(svgId)+'-wrap" class="word-cloud-wrap"><svg id="'+esc(svgId)+'"></svg></div>'
      + '<div class="rev-section-title" style="margin-top:14px">Key Phrases (bigrams)</div>'
      + bigBarHtml
      + '</div>'
      + '</div>';
  });

  wrap.innerHTML = panels;

  // Render word clouds after DOM update
  setTimeout(function(){
    DATA.reviewers.forEach(function(r, ri){
      var col = revColors[ri % revColors.length];
      var svgId = 'wcloud-'+r.name.replace(/\s/g,'_');
      var words = r.themes.words.filter(function(w){return !STOPWORDS.has(w[0]) && w[0].length > 2;}).slice(0,50);
      renderWordCloud(words, svgId, col);
    });
  }, 80);
}

function renderWordCloud(words, svgId, baseColor){
  var el = document.getElementById(svgId);
  if(!el) return;
  var wrap = el.parentElement;
  var W = wrap.clientWidth || 380;
  var H = 180;

  var maxV = d3.max(words, function(w){return w[1];}) || 1;
  var szSc = d3.scaleLog().domain([1, maxV]).range([12, 44]).clamp(true);

  var COLORS = [baseColor, '#dde1f0', '#a78bfa', '#34d399', '#fbbf24', '#60a5fa', '#f97316'];

  d3.layout.cloud()
    .size([W, H])
    .words(words.map(function(w){return {text:w[0], size:szSc(w[1]), count:w[1]};}))
    .padding(4)
    .rotate(function(){return (Math.random()>0.75 ? 90 : 0);})
    .font('Segoe UI')
    .fontSize(function(d){return d.size;})
    .on('end', function(placed){
      d3.select('#'+svgId)
        .attr('width',W).attr('height',H)
        .append('g').attr('transform','translate('+(W/2)+','+(H/2)+')')
        .selectAll('text').data(placed).enter()
        .append('text')
        .style('font-size',function(d){return d.size+'px';})
        .style('font-family','Segoe UI, system-ui, sans-serif')
        .style('fill',function(d,i){return COLORS[i%COLORS.length];})
        .attr('text-anchor','middle')
        .attr('transform',function(d){return 'translate('+d.x+','+d.y+')rotate('+d.rotate+')';})
        .text(function(d){return d.text;});
    }).start();
}
