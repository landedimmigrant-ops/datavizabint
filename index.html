function buildPRView() {
  var canvas = document.getElementById('pr-canvas');
  if (!canvas) return;
  canvas.innerHTML = '';
  if (podRelView === 'force') {
    document.getElementById('pr-hint').textContent = 'Pods \u25CF Themes \u25CB Projects. Click any node to highlight connections. Drag to rearrange. Scroll to zoom.';
    buildForceView(canvas);
  } else {
    document.getElementById('pr-hint').textContent = 'Flow: Pod \u2192 Research Area \u2192 AI Depth \u2192 Theme \u2014 click any block or label to trace its full path. Toggle \u201cView from\u201d to flip perspective.';
    buildFlowView(canvas, 'pod');
  }
}

// ── Force-directed network ─────────────────────────────────────────────────
function buildForceView(canvas) {
  var W = (canvas.parentElement ? canvas.parentElement.clientWidth : 900) - 48;
  var H = Math.max(560, Math.min(680, window.innerHeight - 200));
  var cx = W / 2, cy = H / 2;
  var outerR = Math.min(W, H) * 0.42;

  // ── Build nodes ────────────────────────────────────────────────────────
  var nodes = [];
  var nodeById = {};

  var podSet = {};
  DATA.projects.forEach(function(p){ podSet[p.pod||'Podless'] = true; });
  Object.keys(podSet).forEach(function(pod){
    var nd = {id:'pod|'+pod, type:'pod', label:pod.replace(/ Pod$/,''), fullLabel:pod, color:podColor(pod), r:18};
    nodes.push(nd); nodeById[nd.id] = nd;
  });

  // Theme nodes — radius is PURELY data-driven now; identity lives in the pill label
  var validThemes = (DATA.research_themes||[]).filter(function(t){ return t.projects && t.projects.length>0; });
  validThemes.forEach(function(t){
    var r = Math.max(8, Math.min(18, 5 + (t.projects||[]).length * 0.75));
    // Pill label: full theme name, truncated to 18 chars
    var pill = t.label.length > 18 ? t.label.slice(0, 17) + '\u2026' : t.label;
    var nd = {id:'theme|'+t.id, type:'theme', label:t.label, pillLabel:pill,
              color:t.color||'#99ee81', r:r,
              _pw: pill.length * 5.5 + 18,  // pill width pre-computed
              _ph: 18};                       // pill height
    nodes.push(nd); nodeById[nd.id] = nd;
  });

  DATA.projects.forEach(function(p){
    var nd = {id:'proj|'+p.id, type:'project', label:p.short||p.code, fullId:p.id,
              color:podColor(p.pod||'Podless'), pod:p.pod||'Podless',
              area:p.primary_area||'', align:p.alignment_avg, r:5};
    nodes.push(nd); nodeById[nd.id] = nd;
  });

  // ── Build links ─────────────────────────────────────────────────────────
  var links = [];
  DATA.projects.forEach(function(p){
    var src = 'proj|'+p.id, tgt = 'pod|'+(p.pod||'Podless');
    if (nodeById[tgt]) links.push({source:src, target:tgt, ltype:'pod'});
  });
  validThemes.forEach(function(t){
    (t.projects||[]).forEach(function(pid){
      var src = 'proj|'+pid, tgt = 'theme|'+t.id;
      if (nodeById[src]) links.push({source:src, target:tgt, ltype:'theme',
                                     themeColor: t.color||'#99ee81'});
    });
  });

  // ── SVG + zoom ───────────────────────────────────────────────────────────
  var svg = d3.select(canvas).append('svg')
    .attr('width', W).attr('height', H)
    .style('background','#110820').style('border-radius','10px');

  var gridG = svg.append('g');
  [outerR * 0.38, outerR * 0.72, outerR].forEach(function(r){
    gridG.append('circle').attr('cx',cx).attr('cy',cy).attr('r',r)
      .attr('fill','none').attr('stroke','#1e293b').attr('stroke-width',1)
      .attr('stroke-dasharray','3 5').attr('opacity',0.5);
  });

  var g = svg.append('g');

  var zoomBeh = d3.zoom().scaleExtent([0.2, 5]).on('zoom', function(event){
    g.attr('transform', event.transform);
  });
  svg.call(zoomBeh);

  // ── Zoom control buttons (top-right corner) ──────────────────────────────
  var zBtns = [{sym:'+', fn:function(){ svg.transition().duration(300).call(zoomBeh.scaleBy, 1.45); }},
               {sym:'\u2212', fn:function(){ svg.transition().duration(300).call(zoomBeh.scaleBy, 1/1.45); }},
               {sym:'\u25a1', fn:function(){ svg.transition().duration(400).call(zoomBeh.transform, d3.zoomIdentity); }}];
  var zCtrl = svg.append('g').attr('transform','translate('+(W-42)+',14)');
  zBtns.forEach(function(b, i){
    var bg = zCtrl.append('rect').attr('x',0).attr('y',i*26)
      .attr('width',26).attr('height',22).attr('rx',5)
      .attr('fill','#141c2e').attr('stroke','#2d3f5a').attr('stroke-width',1)
      .style('cursor','pointer');
    zCtrl.append('text').attr('x',13).attr('y',i*26+15)
      .attr('text-anchor','middle').attr('font-size',13).attr('fill','#7c96b8')
      .attr('pointer-events','none').text(b.sym);
    bg.on('click', function(ev){ ev.stopPropagation(); b.fn(); });
  });

  // ── Force simulation ─────────────────────────────────────────────────────
  var sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(function(d){ return d.id; })
      .distance(function(l){ return l.ltype==='pod' ? 58 : 85; })
      .strength(function(l){ return l.ltype==='pod' ? 0.6 : 0.13; }))
    .force('charge', d3.forceManyBody().strength(function(d){
      return d.type==='pod' ? -280 : d.type==='theme' ? -260 : -28;
    }))
    .force('themeGravity', d3.forceRadial(0, cx, cy).strength(function(d){
      return d.type==='theme' ? 0.6 : 0;
    }))
    .force('podOrbit', d3.forceRadial(outerR, cx, cy).strength(function(d){
      return d.type==='pod' ? 0.55 : 0;
    }))
    .force('center', d3.forceCenter(cx, cy).strength(0.04))
    .force('collide', d3.forceCollide().radius(function(d){ return d.r + 4; }));

  // ── Links — theme links coloured by TARGET theme colour ───────────────────
  // This lets you visually trace which projects connect to which themes:
  // each coloured thread leads back to its same-coloured theme node + pill.
  var linkSel = g.append('g').selectAll('line').data(links).enter().append('line')
    .attr('stroke', function(d){
      if (d.ltype === 'theme') return d.themeColor;
      var s = typeof d.source==='object' ? d.source : nodeById[d.source];
      return s ? s.color : '#334155';
    })
    .attr('stroke-width', function(d){ return d.ltype==='pod' ? 1.4 : 0.9; })
    .attr('stroke-opacity', function(d){ return d.ltype==='pod' ? 0.38 : 0.20; });

  // ── Nodes ────────────────────────────────────────────────────────────────
  var nodeSel = g.append('g').selectAll('circle').data(nodes).enter().append('circle')
    .attr('r', function(d){ return d.r; })
    .attr('fill', function(d){ return d.color; })
    .attr('fill-opacity', function(d){ return d.type==='project' ? 0.65 : d.type==='theme' ? 0.80 : 1; })
    .attr('stroke', function(d){
      if (d.type==='pod')   return '#110820';
      if (d.type==='theme') return d.color;
      return 'none';
    })
    .attr('stroke-width', function(d){ return d.type==='pod' ? 2.5 : d.type==='theme' ? 2 : 0; })
    .attr('stroke-opacity', function(d){ return d.type==='theme' ? 0.50 : 1; })
    .style('cursor','pointer')
    .call(d3.drag()
      .on('start', function(ev,d){ if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  function(ev,d){ d.fx=ev.x; d.fy=ev.y; })
      .on('end',   function(ev,d){ if (!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  // ── Pod labels (below circle) ─────────────────────────────────────────────
  var podLabelSel = g.append('g').selectAll('text')
    .data(nodes.filter(function(d){ return d.type==='pod'; }))
    .enter().append('text')
    .text(function(d){ return d.label; })
    .attr('font-size', 11).attr('font-weight','700')
    .attr('fill', function(d){ return d.color; })
    .attr('text-anchor','middle').attr('pointer-events','none')
    .attr('dy', function(d){ return d.r + 12; });

  // ── Theme pill labels ─────────────────────────────────────────────────────
  // Each theme gets: a rounded-rect pill (dark bg + coloured border) floating
  // above its circle, connected by a thin hairline.
  // Pill size fits the text; circle size stays purely data-driven.
  var themeNodes = nodes.filter(function(d){ return d.type==='theme'; });
  var pillG = g.append('g');
  var pills = pillG.selectAll('g.pill').data(themeNodes).enter().append('g').attr('class','pill');

  // Connector hairline: pill bottom → circle top
  var pillConn = pills.append('line')
    .attr('stroke', function(d){ return d.color; })
    .attr('stroke-width', 1).attr('stroke-opacity', 0.50)
    .attr('pointer-events','none');

  // Pill background rect
  var pillRect = pills.append('rect')
    .attr('width', function(d){ return d._pw; })
    .attr('height', function(d){ return d._ph; })
    .attr('rx', 5).attr('ry', 5)
    .attr('fill', '#1c1030')
    .attr('stroke', function(d){ return d.color; })
    .attr('stroke-width', 1.5).attr('stroke-opacity', 0.80)
    .style('cursor','pointer');

  // Pill text
  var pillText = pills.append('text')
    .text(function(d){ return d.pillLabel; })
    .attr('font-size', 9).attr('font-weight','700')
    .attr('fill', function(d){ return d.color; })
    .attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('pointer-events','none');

  // Pills are also clickable (same as clicking the circle)
  pills.style('cursor','pointer').on('click', function(ev, d){
    ev.stopPropagation();
    if (highlighted === d.id) resetHL();
    else { highlighted = d.id; pulseRing.interrupt(); highlightNode(d); }
  });

  // ── Glow ring + pulse ────────────────────────────────────────────────────
  var glowRing = g.append('circle')
    .attr('fill','none').attr('stroke','#ffffff')
    .attr('stroke-width', 2.5).attr('stroke-opacity', 0)
    .attr('r', 0).attr('pointer-events','none');

  var pulseRing = g.append('circle')
    .attr('fill','none').attr('stroke','#ffffff')
    .attr('stroke-width', 1.2).attr('stroke-opacity', 0)
    .attr('r', 0).attr('pointer-events','none');

  var highlighted = null;
  var pulseColor  = '#ffffff';

  function runPulse() {
    if (!highlighted) return;
    var hd = nodeById[highlighted];
    if (!hd || hd.x == null) return;
    pulseRing
      .attr('cx', hd.x).attr('cy', hd.y)
      .attr('stroke', pulseColor)
      .attr('r', hd.r + 3).attr('stroke-opacity', 0.75)
      .transition().duration(1400).ease(d3.easeQuadOut)
      .attr('r', hd.r + 32).attr('stroke-opacity', 0)
      .on('end', runPulse);
  }

  function getNeighbors(d) {
    var ids = new Set([d.id]);
    links.forEach(function(l){
      var s = typeof l.source==='object' ? l.source.id : l.source;
      var t = typeof l.target==='object' ? l.target.id : l.target;
      if (s===d.id) ids.add(t);
      if (t===d.id) ids.add(s);
    });
    return ids;
  }

  function highlightNode(d) {
    var nb = getNeighbors(d);
    pulseColor = d.color;

    nodeSel.attr('fill-opacity', function(n){
      if (n.id === d.id)   return 1;
      if (nb.has(n.id))    return n.type==='project' ? 0.85 : n.type==='theme' ? 0.88 : 0.92;
      return n.type==='project' ? 0.45 : n.type==='theme' ? 0.40 : 0.45;
    });

    linkSel
      .attr('stroke-opacity', function(l){
        var s = typeof l.source==='object' ? l.source.id : l.source;
        var t = typeof l.target==='object' ? l.target.id : l.target;
        return (nb.has(s) && nb.has(t)) ? (l.ltype==='pod' ? 0.85 : 0.65) : 0.08;
      })
      .attr('stroke-width', function(l){
        var s = typeof l.source==='object' ? l.source.id : l.source;
        var t = typeof l.target==='object' ? l.target.id : l.target;
        var active = nb.has(s) && nb.has(t);
        return active ? (l.ltype==='pod' ? 2.5 : 1.8) : (l.ltype==='pod' ? 1.4 : 0.9);
      });

    podLabelSel.attr('fill-opacity', function(n){ return nb.has(n.id) ? 1 : 0.35; });
    // Pills: connected ones stay full; background ones dim
    pills.attr('opacity', function(n){ return nb.has(n.id) ? 1 : 0.30; });
    pillConn.attr('stroke-opacity', function(n){ return nb.has(n.id) ? 0.55 : 0.15; });

    glowRing.attr('stroke', d.color).attr('r', d.r + 7).attr('stroke-opacity', 0.65);
    runPulse();
  }

  function resetHL() {
    highlighted = null;
    nodeSel.attr('fill-opacity', function(d){
      return d.type==='project' ? 0.65 : d.type==='theme' ? 0.80 : 1;
    });
    linkSel
      .attr('stroke-opacity', function(d){ return d.ltype==='pod' ? 0.38 : 0.20; })
      .attr('stroke-width',   function(d){ return d.ltype==='pod' ? 1.4 : 0.9; });
    podLabelSel.attr('fill-opacity', 1);
    pills.attr('opacity', 1);
    pillConn.attr('stroke-opacity', 0.50);
    glowRing.attr('stroke-opacity', 0).attr('r', 0);
    pulseRing.attr('stroke-opacity', 0).attr('r', 0).interrupt();
  }

  // Click handlers on circles
  nodeSel.on('click', function(ev, d){
    ev.stopPropagation();
    if (highlighted === d.id) resetHL();
    else { highlighted = d.id; pulseRing.interrupt(); highlightNode(d); }
  });
  svg.on('click', function(){ resetHL(); });

  // ── Tooltip ───────────────────────────────────────────────────────────────
  var ttTarget = nodeSel.merge ? nodeSel.merge(pills) : nodeSel;
  nodeSel.on('mouseover', function(ev, d){
    var deg = links.filter(function(l){
      var s = typeof l.source==='object' ? l.source.id : l.source;
      var t = typeof l.target==='object' ? l.target.id : l.target;
      return s===d.id || t===d.id;
    }).length;
    var lines = ['<strong style="color:'+d.color+'">'+d.label+'</strong>'];
    if (d.type==='pod')     lines.push(deg+' project connections');
    if (d.type==='theme')   lines.push(deg+' projects in this theme');
    if (d.type==='project') {
      lines.push('Pod: '+(d.pod||'Podless'));
      lines.push('Area: '+d.area);
      lines.push('Alignment: '+d.align);
      lines.push(deg+' theme connections');
    }
    showTT(lines.join('<br>'), ev.clientX, ev.clientY);
  }).on('mousemove', function(ev){ showTT(null, ev.clientX, ev.clientY); })
    .on('mouseout', hideTT);

  // Pills also show tooltip (full name, not truncated pillLabel)
  pillRect.on('mouseover', function(ev, d){
    showTT('<strong style="color:'+d.color+'">'+d.label+'</strong><br>'+
      links.filter(function(l){
        var t = typeof l.target==='object' ? l.target.id : l.target;
        return t === d.id;
      }).length+' projects in this theme', ev.clientX, ev.clientY);
  }).on('mousemove', function(ev){ showTT(null, ev.clientX, ev.clientY); })
    .on('mouseout', hideTT);

  // ── Tick ──────────────────────────────────────────────────────────────────
  sim.on('tick', function(){
    linkSel.attr('x1',function(d){return d.source.x;}).attr('y1',function(d){return d.source.y;})
           .attr('x2',function(d){return d.target.x;}).attr('y2',function(d){return d.target.y;});
    nodeSel.attr('cx',function(d){return d.x;}).attr('cy',function(d){return d.y;});
    podLabelSel.attr('x',function(d){return d.x;}).attr('y',function(d){return d.y;});

    // Reposition each pill above its theme node
    pills.each(function(d){
      if (d.x == null) return;
      var px = d.x - d._pw / 2;
      var py = d.y - d.r - 8 - d._ph;
      d3.select(this).select('line')
        .attr('x1', d.x).attr('y1', py + d._ph)
        .attr('x2', d.x).attr('y2', d.y - d.r);
      d3.select(this).select('rect').attr('x', px).attr('y', py);
      d3.select(this).select('text').attr('x', d.x).attr('y', py + d._ph / 2);
    });

    if (highlighted) {
      var hd = nodeById[highlighted];
      if (hd) glowRing.attr('cx', hd.x).attr('cy', hd.y);
    }
  });

  // ── Legend ────────────────────────────────────────────────────────────────
  var legG = svg.append('g').attr('transform','translate(14,14)');
  [
    {label:'Theme (centre)',  r:6,  op:0.80, stroke:'#99ee81', sw:2},
    {label:'Pod (outer ring)',r:8,  op:1,    stroke:'#110820', sw:2.5},
    {label:'Project',         r:3,  op:0.65, stroke:'none',    sw:0}
  ].forEach(function(item, i){
    legG.append('circle').attr('cx',9).attr('cy',i*20+1).attr('r',item.r)
      .attr('fill','#a898c0').attr('fill-opacity',item.op)
      .attr('stroke',item.stroke).attr('stroke-width',item.sw);
    legG.append('text').attr('x',22).attr('y',i*20+5)
      .attr('font-size',9).attr('fill','#a898c0').text(item.label);
  });

  svg.append('text')
    .attr('x', W - 52).attr('y', H - 10)
    .attr('text-anchor','end').attr('font-size',8).attr('fill','#334155')
    .text('Click to highlight · +/\u2212 zoom · drag to pan');
}

// ── Parallel sets / flow ───────────────────────────────────────────────────
function buildFlowView(canvas, mode) {
  mode = mode || 'pod';

  // Clear any previous render of this view
  d3.select(canvas).selectAll('svg').remove();
  var oldToggle = canvas.querySelector('.flow-toggle-bar');
  if (oldToggle) oldToggle.parentNode.removeChild(oldToggle);

  var W = Math.max(700, (canvas.parentElement ? canvas.parentElement.clientWidth : 960) - 32);
  var H = Math.max(530, Math.min(680, window.innerHeight - 210));
  var PAD_L=152, PAD_R=162, PAD_T=52, PAD_B=28;
  var AX_W=16, BLOCK_GAP=6, BAND_OP=0.36;
  var BAND_HI=0.82, BAND_DIM=0.04;
  var plotH = H - PAD_T - PAD_B;

  // ── Toggle bar (HTML above SVG) ─────────────────────────────────────────
  var toggleBar = document.createElement('div');
  toggleBar.className = 'flow-toggle-bar';
  toggleBar.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px;';
  var tLabel = document.createElement('span');
  tLabel.style.cssText = 'font-size:10px;font-weight:700;color:#475569;letter-spacing:.06em;margin-right:2px;';
  tLabel.textContent = 'VIEW FROM';
  toggleBar.appendChild(tLabel);
  [{m:'pod',icon:'\u25cf',text:'Pod'},{m:'theme',icon:'\u25c6',text:'Theme'}].forEach(function(opt){
    var btn = document.createElement('button');
    btn.textContent = opt.icon + '  ' + opt.text;
    var active = mode === opt.m;
    btn.style.cssText = 'font-size:10px;font-weight:700;padding:4px 14px;border-radius:20px;cursor:pointer;border:1.5px solid;transition:all .15s;outline:none;'
      + (active ? 'background:#1e3a5f;border-color:#3b82f6;color:#93c5fd;'
                : 'background:transparent;border-color:#2d3f5a;color:#4a6080;');
    if (!active) btn.addEventListener('click', function(){
      buildFlowView(canvas, opt.m);
      var hint = document.getElementById('pr-hint');
      if (hint) hint.textContent = opt.m==='pod'
        ? 'Flow: Pod \u2192 Research Area \u2192 AI Depth \u2192 Theme \u2014 click any block to trace its full path'
        : 'Flow: Theme \u2192 Research Area \u2192 AI Depth \u2192 Pod \u2014 click any block to trace its full path';
    });
    toggleBar.appendChild(btn);
  });
  canvas.insertBefore(toggleBar, canvas.firstChild);

  // ── Records ────────────────────────────────────────────────────────────
  var projThemeMap = {};
  (DATA.research_themes||[]).forEach(function(t){
    if (!t.projects||!t.projects.length) return;
    t.projects.forEach(function(pid){
      if (!projThemeMap[pid]) projThemeMap[pid]=[];
      projThemeMap[pid].push({label:t.label, color:t.color||'#99ee81'});
    });
  });
  var records = [];
  DATA.projects.forEach(function(p){
    var pod   = p.pod||'Podless';
    var area  = p.primary_area||'Other';
    var depth = p.ai_depth||'None';
    var themes = projThemeMap[p.id] || [{label:'Unthemed',color:'#475569'}];
    var w = 1/themes.length;
    themes.forEach(function(t){
      records.push({pod:pod, area:area, depth:depth, theme:t.label,
                    weight:w, podColor:podColor(pod), themeColor:t.color,
                    projShort: p.short||p.code||p.id});
    });
  });

  // Axis order driven by mode
  var AXES = mode==='pod'
    ? ['pod','area','depth','theme']
    : ['theme','area','depth','pod'];
  var AXIS_LABELS = mode==='pod'
    ? ['Pod','Research Area','AI Depth','Theme']
    : ['Theme','Research Area','AI Depth','Pod'];

  // Compute category totals per axis
  function axisCategories(key) {
    var cats = {};
    records.forEach(function(r){ cats[r[key]]=(cats[r[key]]||0)+r.weight; });
    return Object.entries(cats).sort(function(a,b){ return b[1]-a[1]; });
  }
  var axisCats = AXES.map(axisCategories);

  // Layout: compute y position and height for each category block
  var totalWeight = records.reduce(function(s,r){return s+r.weight;},0);
  var unitH = plotH / totalWeight;  // px per project unit

  function layoutAxis(cats) {
    var layoutMap = {};
    var y = PAD_T;
    // Recompute accounting for gaps
    var usableH = plotH - (cats.length-1)*BLOCK_GAP;
    var uH = usableH / totalWeight;
    cats.forEach(function(c){
      var h = Math.max(2, c[1]*uH);
      layoutMap[c[0]] = {y:y, h:h, total:c[1], filled:0};
      y += h + BLOCK_GAP;
    });
    return layoutMap;
  }

  var layouts = axisCats.map(layoutAxis);

  // Axis x positions: spread evenly within the inner band area
  var innerW = W - PAD_L - PAD_R;
  var axStep = (innerW - AXES.length * AX_W) / (AXES.length - 1);
  var axX = AXES.map(function(_,i){ return PAD_L + i*(axStep + AX_W); });

  // Build SVG — overflow:visible so labels beyond edges are never clipped
  var svg = d3.select(canvas).append('svg')
    .attr('viewBox', '0 0 ' + W + ' ' + H)
    .attr('width', '100%').attr('height', H)
    .style('background','#110820').style('border-radius','10px')
    .style('overflow','visible').style('display','block');

  // ── Compute band data with originSet (for click tracing) ───────────────
  // originSet = set of AXES[0] values (pods or themes) that flow through each band.
  // When a block is clicked, we highlight every band whose originSet overlaps the
  // clicked category — this traces the FULL path through all four axes.
  var allBands = [];

  for (var ai=0; ai<AXES.length-1; ai++) {
    (function(ai){
      var leftKey  = AXES[ai];
      var rightKey = AXES[ai+1];
      var leftLay  = layouts[ai];
      var rightLay = layouts[ai+1];
      var x1 = axX[ai]+AX_W, x2 = axX[ai+1];

      // Reset fill tracker for this axis pair
      Object.keys(leftLay).forEach(function(k){ leftLay[k].filled = 0; });

      var flows = {};
      var originSets = {};  // [lk][rk] → Set of AXES[0] values
      var projMap    = {};  // [lk][rk] → Set of project short names

      records.forEach(function(r){
        var lk=r[leftKey], rk=r[rightKey], orig=r[AXES[0]];
        if (!flows[lk]) flows[lk]={};
        flows[lk][rk] = (flows[lk][rk]||0) + r.weight;
        if (!originSets[lk]) originSets[lk]={};
        if (!originSets[lk][rk]) originSets[lk][rk]=new Set();
        originSets[lk][rk].add(orig);
        if (!projMap[lk]) projMap[lk]={};
        if (!projMap[lk][rk]) projMap[lk][rk]=new Set();
        if (r.projShort) projMap[lk][rk].add(r.projShort);
      });

      var rightFillByLeft = {};
      var leftCatsSorted = axisCats[ai].map(function(c){ return c[0]; })
        .sort(function(a,b){ return leftLay[a].y - leftLay[b].y; });

      leftCatsSorted.forEach(function(lk){
        if (!flows[lk]) return;
        var lBlock = leftLay[lk];
        if (!lBlock) return;
        var lUnit = lBlock.h / lBlock.total;

        var rightCatsSorted = Object.keys(flows[lk])
          .sort(function(a,b){ return (rightLay[a]?rightLay[a].y:0)-(rightLay[b]?rightLay[b].y:0); });

        rightCatsSorted.forEach(function(rk){
          var rBlock = rightLay[rk];
          if (!rBlock) return;
          var w = flows[lk][rk];
          var rUnit = rBlock.h / rBlock.total;

          if (!rightFillByLeft[rk]) rightFillByLeft[rk]={};
          if (!rightFillByLeft[rk][lk]) rightFillByLeft[rk][lk]=0;

          var bandH_l = w * lUnit;
          var bandH_r = w * rUnit;
          var ly0 = lBlock.y + lBlock.filled;
          var ly1 = ly0 + bandH_l;
          var ry0 = rBlock.y + rightFillByLeft[rk][lk];
          var ry1 = ry0 + bandH_r;

          // Colour: use pod colour wherever possible (visual consistency)
          var bandColor = '#99ee81';
          if (leftKey==='pod') {
            bandColor = podColor(lk);
          } else if (leftKey==='theme') {
            var tmL = (DATA.research_themes||[]).find(function(t){ return t.label===lk; });
            if (tmL) bandColor = tmL.color || '#99ee81';
          } else {
            var podCounts = {};
            records.forEach(function(r){
              if (r[leftKey]===lk && r[rightKey]===rk) podCounts[r.pod]=(podCounts[r.pod]||0)+r.weight;
            });
            var topPod = Object.entries(podCounts).sort(function(a,b){return b[1]-a[1];})[0];
            if (topPod) bandColor = podColor(topPod[0]);
          }

          var midX = (x1+x2)/2;
          var pathStr = 'M '+x1+' '+ly0
            +' C '+midX+' '+ly0+' '+midX+' '+ry0+' '+x2+' '+ry0
            +' L '+x2+' '+ry1
            +' C '+midX+' '+ry1+' '+midX+' '+ly1+' '+x1+' '+ly1
            +' Z';

          allBands.push({
            ai:ai, leftKey:leftKey, lk:lk, rightKey:rightKey, rk:rk,
            path:pathStr, color:bandColor,
            originSet: originSets[lk][rk] || new Set(),
            projects: projMap[lk] && projMap[lk][rk] ? Array.from(projMap[lk][rk]).sort() : []
          });

          lBlock.filled += bandH_l;
          rightFillByLeft[rk][lk] += bandH_r;
        });
      });
    })(ai);
  }

  // ── Render bands via D3 data binding (enables transition on click) ──────
  var bandSel = svg.selectAll('path.fband')
    .data(allBands).enter().append('path').attr('class','fband')
    .attr('d', function(d){ return d.path; })
    .attr('fill', function(d){ return d.color; })
    .attr('fill-opacity', BAND_OP)
    .attr('stroke', 'none');

  // ── Colour helper — returns the display colour for a given axis block ────
  var DEPTH_COL = {'High':'#f87171','Mid':'#fbbf24','Low':'#a3e635','None':'#475569'};
  function nodeColor(key, cat) {
    if (key==='pod')   return podColor(cat);
    if (key==='depth') return DEPTH_COL[cat]||'#a898c0';
    if (key==='area')  return AREA_COLOR[AREA_NAME_TO_ID[cat]]||'#a898c0';
    if (key==='theme') {
      var tm=(DATA.research_themes||[]).find(function(t){ return t.label===cat; });
      return tm ? tm.color||'#99ee81' : '#99ee81';
    }
    return '#99ee81';
  }

  // ── Click state + highlight logic ────────────────────────────────────────
  var activeFilter = null;   // {key, cat, color}

  function applyFilter(key, cat) {
    var clickColor = nodeColor(key, cat);
    activeFilter = {key:key, cat:cat, color:clickColor};

    // All records whose axis[key] === cat → gather their start-axis values
    var startVals = new Set();
    if (key === AXES[0]) {
      startVals.add(cat);
    } else {
      records.forEach(function(r){ if (r[key]===cat) startVals.add(r[AXES[0]]); });
    }

    // Bands on the traced path: recolour to clicked node's colour so the thread
    // stays visually consistent all the way through all four axes
    bandSel.transition().duration(200)
      .attr('fill', function(d){
        var hit=false;
        startVals.forEach(function(v){ if (d.originSet.has(v)) hit=true; });
        return hit ? clickColor : d.color;
      })
      .attr('fill-opacity', function(d){
        var hit=false;
        startVals.forEach(function(v){ if (d.originSet.has(v)) hit=true; });
        return hit ? BAND_HI : BAND_DIM;
      });

    // Block rects + labels: highlight related, dim unrelated
    blockRects.transition().duration(200)
      .attr('fill-opacity', function(d){
        if (d.key===key && d.cat===cat) return 1;
        var rel=false;
        startVals.forEach(function(v){ if (records.some(function(r){ return r[AXES[0]]===v && r[d.key]===d.cat; })) rel=true; });
        return rel ? 0.90 : 0.22;
      });
    blockLabels.transition().duration(200)
      .attr('fill-opacity', function(d){
        if (d.key===key && d.cat===cat) return 1;
        var rel=false;
        startVals.forEach(function(v){ if (records.some(function(r){ return r[AXES[0]]===v && r[d.key]===d.cat; })) rel=true; });
        return rel ? 1 : 0.18;
      })
      .attr('fill', function(d){
        if (d.key===key && d.cat===cat) return clickColor;
        return d.col;
      });
  }

  function clearFilter() {
    activeFilter = null;
    bandSel.transition().duration(200)
      .attr('fill', function(d){ return d.color; })
      .attr('fill-opacity', BAND_OP);
    blockRects.transition().duration(200).attr('fill-opacity', 1);
    blockLabels.transition().duration(200)
      .attr('fill-opacity', 1)
      .attr('fill', function(d){ return d.col; });
  }

  // ── Band hover → project popup ────────────────────────────────────────────
  bandSel
    .style('cursor', 'pointer')
    .on('mouseover', function(ev, d){
      var projs = d.projects || [];
      var lLabel = d.lk.length>20 ? d.lk.slice(0,19)+'\u2026' : d.lk;
      var rLabel = d.rk.length>20 ? d.rk.slice(0,19)+'\u2026' : d.rk;
      var col = (activeFilter && activeFilter.color) ? activeFilter.color : d.color;
      var html = '<div style="min-width:180px;max-width:260px">'
        + '<div style="font-weight:700;color:'+col+';margin-bottom:3px">'
        +   lLabel+' <span style="color:#475569">\u2192</span> '+rLabel+'</div>'
        + '<div style="font-size:8px;color:#475569;margin-bottom:6px;letter-spacing:.04em">'
        +   d.leftKey.toUpperCase()+' \u2192 '+d.rightKey.toUpperCase()+'</div>';
      if (projs.length) {
        html += '<div style="font-size:9px;color:#a898c0;margin-bottom:4px;font-weight:600">'
          +projs.length+' project'+(projs.length!==1?'s':'')+'</div>'
          +'<div style="max-height:130px;overflow-y:auto">';
        projs.forEach(function(p){
          html += '<div style="font-size:9px;color:#cbd5e1;padding:2px 0;border-bottom:1px solid #1e293b">'
            +'\u2022 '+p+'</div>';
        });
        html += '</div>';
      }
      html += '</div>';
      showTT(html, ev.clientX, ev.clientY);
    })
    .on('mousemove', function(ev){ showTT(null, ev.clientX, ev.clientY); })
    .on('mouseout', hideTT)
    .on('click', function(ev){ ev.stopPropagation(); });

  svg.on('click', clearFilter);

  // ── Draw axis blocks with click handlers ───────────────────────────────
  var blockData = [];   // accumulate for D3 selections below
  var labelData = [];

  AXES.forEach(function(key, ai){
    var lay = layouts[ai];
    var cats = axisCats[ai];
    var x = axX[ai];

    svg.append('text').attr('x', x + AX_W/2).attr('y', PAD_T - 22)
      .attr('text-anchor','middle').attr('font-size',10).attr('font-weight','700')
      .attr('fill','#a898c0').attr('letter-spacing',1)
      .text(AXIS_LABELS[ai].toUpperCase());

    cats.forEach(function(c){
      var block = lay[c[0]];
      if (!block) return;

      var col = key==='pod'   ? podColor(c[0]) :
                key==='depth' ? ({'High':'#f87171','Mid':'#fbbf24','Low':'#a3e635','None':'#475569'}[c[0]]||'#a898c0') :
                key==='area'  ? (AREA_COLOR[AREA_NAME_TO_ID[c[0]]]||'#a898c0') : '#99ee81';
      if (key==='theme'){
        var tm = (DATA.research_themes||[]).find(function(t){ return t.label===c[0]; });
        if (tm) col = tm.color||'#99ee81';
      }

      blockData.push({key:key, cat:c[0], ai:ai, x:x, y:block.y,
                      h:Math.max(block.h,2), col:col});

      var isFirst = ai===0;
      var labelX  = isFirst ? x-6 : x+AX_W+6;
      var anchor  = isFirst ? 'end' : 'start';
      var maxLen  = (isFirst||ai===AXES.length-1) ? 22 : 14;
      var name    = c[0].length>maxLen ? c[0].slice(0,maxLen-1)+'\u2026' : c[0];
      var fullLbl = name+' \u00b7 '+Math.round(c[1]);
      if (block.h>=7) {
        labelData.push({key:key, cat:c[0], ai:ai, x:labelX,
                        y:block.y+block.h/2, anchor:anchor, col:col, text:fullLbl});
      }
    });
  });

  // Block rects — clickable
  var blockRects = svg.selectAll('rect.fblock').data(blockData).enter().append('rect')
    .attr('class','fblock')
    .attr('x', function(d){ return d.x; }).attr('y', function(d){ return d.y; })
    .attr('width', AX_W).attr('height', function(d){ return d.h; })
    .attr('fill', function(d){ return d.col; }).attr('rx', 2)
    .style('cursor', 'pointer')
    .on('click', function(ev, d){
      ev.stopPropagation();
      if (activeFilter && activeFilter.key===d.key && activeFilter.cat===d.cat) {
        clearFilter();
      } else {
        activeFilter = {key:d.key, cat:d.cat};
        applyFilter(d.key, d.cat);
      }
    });

  // Block labels — also clickable for larger hit target
  var blockLabels = svg.selectAll('text.fblabel').data(labelData).enter().append('text')
    .attr('class','fblabel')
    .attr('x', function(d){ return d.x; }).attr('y', function(d){ return d.y; })
    .attr('text-anchor', function(d){ return d.anchor; })
    .attr('dominant-baseline','middle')
    .attr('font-size', 9).attr('fill', function(d){ return d.col; })
    .attr('font-weight','600').attr('pointer-events','all')
    .style('cursor','pointer')
    .text(function(d){ return d.text; })
    .on('click', function(ev, d){
      ev.stopPropagation();
      if (activeFilter && activeFilter.key===d.key && activeFilter.cat===d.cat) {
        clearFilter();
      } else {
        activeFilter = {key:d.key, cat:d.cat};
        applyFilter(d.key, d.cat);
      }
    });
}

// ── VIEW 8: Network Transformation Map ───────────────────────────────────
var TS_DIM_COLORS = {
  ts_ik:          '#4ade80',
  ts_relational:  '#22d3ee',
  ts_community:   '#f59e0b',
  ts_technical:   '#f87171',
  ts_governance:  '#a066cc',
  ts_network:     '#60a5fa',
  ts_imaginaries: '#c084fc'
};

function renderTransform() {
  var el = document.getElementById('view-transform');
  var dims    = DATA.ts_dimensions || [];
  var scores  = DATA.ts_project_scores || {};
  var projects = DATA.projects;

  // ── Compute network aggregate per dimension ──────────────────────
  // Average score across all projects for each dim (only projects with score > 0)
  var netAvg = {};
  dims.forEach(function(dim) {
    var vals = projects.map(function(p) {
      return (scores[p.id] || {})[dim.id] || 0;
    }).filter(function(v) { return v > 0; });
    netAvg[dim.id] = vals.length ? vals.reduce(function(a,b){return a+b;},0) / vals.length : 0;
  });

  // ── Summary strip — 7 dimension pills at top ─────────────────────
  var summaryHTML = '<div style="padding:20px 24px 0">'
    + '<h2 style="font-size:15px;font-weight:800;color:#f0ecf8;margin-bottom:4px">Network Transformation Map</h2>'
    + '<p style="font-size:12px;color:#a898c0;margin-bottom:16px">How strongly does the AbInt network advance each dimension of the transformation statement? Each section shows every project\'s contribution, ranked by signal strength.</p>'
    + '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px">';

  // Sort dims by network average descending for the summary pills
  var dimsSorted = dims.slice().sort(function(a,b){ return netAvg[b.id] - netAvg[a.id]; });
  dimsSorted.forEach(function(dim) {
    var col  = TS_DIM_COLORS[dim.id] || '#99ee81';
    var avg  = netAvg[dim.id];
    var pct  = Math.round(avg * 100);
    var rank = avg > 0.5 ? 'Strong' : avg > 0.25 ? 'Moderate' : 'Emerging';
    summaryHTML += '<div style="padding:10px 16px;border-radius:10px;background:' + col + '15;border:1.5px solid ' + col + '44;min-width:160px;flex:1">'
      + '<div style="font-size:11px;font-weight:800;color:' + col + ';margin-bottom:4px">' + dim.label + '</div>'
      + '<div style="background:#1c1030;border-radius:4px;height:6px;margin-bottom:6px">'
      + '<div style="background:' + col + ';height:6px;border-radius:4px;width:' + Math.round(avg * 200) + 'px;max-width:100%"></div>'
      + '</div>'
      + '<div style="display:flex;justify-content:space-between;align-items:center">'
      + '<span style="font-size:10px;color:#a898c0">' + rank + '</span>'
      + '<span style="font-size:11px;font-weight:700;color:' + col + '">' + pct + '%</span>'
      + '</div>'
      + '</div>';
  });
  summaryHTML += '</div></div>';

  // ── One full section per dimension ───────────────────────────────
  var sectionsHTML = '<div style="padding:0 24px 40px">';

  dims.forEach(function(dim) {
    var col = TS_DIM_COLORS[dim.id] || '#99ee81';
    var avg = netAvg[dim.id];

    // Projects with score > 0.04, sorted desc
    var dimProjects = projects.map(function(p) {
      return { proj: p, score: (scores[p.id] || {})[dim.id] || 0 };
    }).filter(function(x) { return x.score > 0.04; })
      .sort(function(a,b) { return b.score - a.score; });

    // Count projects with meaningful signal (>0.2)
    var strongCount = dimProjects.filter(function(x){ return x.score >= 0.2; }).length;
    var totalCount  = dimProjects.length;

    sectionsHTML += '<div style="margin-bottom:36px;padding:20px;border-radius:12px;background:#1c1030;border:1px solid ' + col + '33">';

    // Section header
    sectionsHTML += '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">'
      + '<div>'
      + '<div style="font-size:14px;font-weight:800;color:' + col + ';margin-bottom:2px">' + dim.label + '</div>'
      + '<div style="font-size:11px;color:#a898c0">' + dim.desc + '</div>'
      + '</div>'
      + '<div style="display:flex;gap:8px;align-items:center">'
      + '<span style="font-size:10px;padding:3px 10px;border-radius:99px;background:' + col + '22;color:' + col + '">'
      + strongCount + ' strong signal' + (strongCount !== 1 ? 's' : '') + '</span>'
      + '<span style="font-size:10px;padding:3px 10px;border-radius:99px;background:#1c1030;color:#a898c0">'
      + totalCount + ' projects contributing</span>'
      + '</div>'
      + '</div>';

    // Network aggregate bar
    sectionsHTML += '<div style="margin-bottom:16px">'
      + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">'
      + '<span style="font-size:10px;font-weight:700;color:#a898c0;text-transform:uppercase;letter-spacing:.06em;min-width:120px">Network Average</span>'
      + '<div style="flex:1;background:#0a0f1a;border-radius:4px;height:10px">'
      + '<div style="background:' + col + ';height:10px;border-radius:4px;width:' + Math.min(100, Math.round(avg * 200)) + '%;opacity:0.85"></div>'
      + '</div>'
      + '<span style="font-size:12px;font-weight:800;color:' + col + ';min-width:36px;text-align:right">' + Math.round(avg*100) + '%</span>'
      + '</div>'
      + '</div>';

    if (dimProjects.length === 0) {
      sectionsHTML += '<div style="font-size:12px;color:#475569;padding:12px 0">No significant signal detected across the network for this dimension.</div>';
    } else {
      // Max score for relative bar scaling
      var maxScore = dimProjects[0].score;

      dimProjects.forEach(function(x) {
        var p   = x.proj;
        var sc  = x.score;
        var pc  = podColor(p.pod || 'Podless');
        var area = AREA_NAME_TO_ID[p.primary_area] || 'other';
        var ac  = AREA_COLOR[area] || '#475569';
        var barPct = Math.min(100, Math.round((sc / Math.max(maxScore, 0.01)) * 100));
        var sigLevel = sc >= 0.5 ? 'high' : sc >= 0.25 ? 'mid' : 'low';
        var sigCol   = sigLevel === 'high' ? col : sigLevel === 'mid' ? col + 'aa' : '#334155';
        var singleRev = (p.reviewers||[]).length < 2;

        sectionsHTML += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">'
          // Pod strip
          + '<div style="width:4px;height:32px;border-radius:2px;background:' + pc + ';flex-shrink:0"></div>'
          // Project name
          + '<div style="min-width:140px;max-width:140px">'
          + '<div style="font-size:11px;font-weight:600;color:#cbd5e1;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + displayName(p) + '</div>'
          + '<div style="display:flex;align-items:center;gap:4px;margin-top:1px">'
          + '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:' + ac + '"></span>'
          + '<span style="font-size:9px;color:#475569">' + (p.primary_area||'Other') + '</span>'
          + (singleRev ? '<span style="font-size:9px;color:#f59e0b;margin-left:2px">⚠</span>' : '')
          + '</div>'
          + '</div>'
          // Bar
          + '<div style="flex:1;background:#0a0f1a;border-radius:4px;height:10px">'
          + '<div style="background:' + col + ';height:10px;border-radius:4px;width:' + barPct + '%;opacity:' + (0.4 + sc * 0.8).toFixed(2) + '"></div>'
          + '</div>'
          // Score label
          + '<div style="min-width:36px;text-align:right;font-size:11px;font-weight:700;color:' + (sc >= 0.25 ? col : '#475569') + '">'
          + Math.round(sc * 100) + '%</div>'
          // Reviewer chips
          + '<div style="min-width:80px">'
          + (p.reviewers||[]).map(function(r){
              return '<span style="font-size:9px;padding:1px 5px;border-radius:99px;background:#1c1030;color:#a898c0;margin:1px;display:inline-block">' + r + '</span>';
            }).join('')
          + '</div>'
          + '</div>';
      });
    }

    sectionsHTML += '</div>';
  });

  sectionsHTML += '</div>';

  el.innerHTML = summaryHTML + sectionsHTML;
}

    // ── Left column: analytical read ──────────────────────────────
    html += '<div style="flex:1;min-width:360px;padding:18px 20px;border-right:1px solid #1c1030">';

      + '<div style="font-size:10px;font-weight:700;color:' + col + ';text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Network Read</div>'

    html += '<div style="margin-bottom:16px">'

    var POD_ORDER = ['Niitsitapi Pod',"Ka Hawai\u2019i Pae \u2018\u0100ina Pod","T'karonto Pod","Wih\u00e1\u014bble S\u2019a Pod",'Hiringa Te Mara','Haudenosaunee Pod','Podless'];
    POD_ORDER.forEach(function(pod) {

      var sc = (podScores[pod]||{})[dim.id]||0;

        + '<div style="width:28px;font-size:10px;font-weight:700;color:' + (sc >= 0.4 ? pc : '#334155') + ';text-align:right">' + Math.round(sc*100) + '</div>'

    });
    html += '</div>';

    // Top projects list
    html += '<div style="margin-bottom:12px">'
      + '<div style="font-size:10px;font-weight:700;color:#a898c0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Strongest Projects</div>';

    topProjects.slice(0, 6).forEach(function(p) {

      var pc = podColor(p.pod||'Podless');

      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'

  html += '</div>';

  // ── Method note ─────────────────────────────────────────────────
  html += '<div style="padding:0 24px 32px">'
    + '<div style="font-size:10px;color:#475569;padding:10px 14px;background:#1c1030;border-radius:8px;border-left:3px solid #99ee8144;max-width:700px">'
    + '<strong style="color:#a898c0">Method:</strong> Each dimension summary is based on LLM semantic analysis of all reviewer text across all projects. '
    + 'Scores blend 70% LLM reading (what reviewers actually mean) with 30% keyword-hybrid analysis (density + sentence peaks + phrase matching). '
    + 'Summaries, gaps, and Phase 2 questions are written by the LLM after reading every reviewer sentence organised by dimension.'
    + '</div></div>';

  el.innerHTML = html;
}

// ── VIEW: Living Ecosystem (Forest Model) ─────────────────────────────────
// Trees = Projects | Community = Soil/roots | Branches = TS dimensions
// Fruits = Technical outputs | Seeds = Imaginaries | Pods = Forest groves
function renderEcosystem() {
  var el = document.getElementById('view-ecosystem');
  var projects = DATA.projects;
  var scores = DATA.ts_project_scores || {};

  // ── Group projects by pod ──────────────────────────────────────────
  var podMap = {};
  var podOrder = [];
  projects.forEach(function(p) {
    var pod = p.pod || 'Podless';
    if (!podMap[pod]) { podMap[pod] = []; podOrder.push(pod); }
    podMap[pod].push(p);
  });
  // Sort pods by project count desc, Podless last
  podOrder.sort(function(a, b) {
    if (a === 'Podless') return 1;
    if (b === 'Podless') return -1;
    return podMap[b].length - podMap[a].length;
  });

  // ── Layout constants ───────────────────────────────────────────────
  var TREE_W   = 110;
  var POD_GAP  = 60;
  var H        = 520;
  var GROUND_Y = 370;
  var LEFT_PAD = 24;

  var svgW = LEFT_PAD;
  podOrder.forEach(function(pod) { svgW += podMap[pod].length * TREE_W + POD_GAP; });

  // ── Build SVG ─────────────────────────────────────────────────────
  var s = '<svg xmlns="http://www.w3.org/2000/svg" width="' + svgW + '" height="' + H + '" style="display:block">';

  // Gradients + filters
  s += '<defs>'
    + '<linearGradient id="eco-sky" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0%" stop-color="#060215"/>'
    + '<stop offset="70%" stop-color="#110820"/>'
    + '<stop offset="100%" stop-color="#1a1030"/>'
    + '</linearGradient>'
    + '<linearGradient id="eco-ground" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0%" stop-color="#0e1f06"/>'
    + '<stop offset="100%" stop-color="#060d02"/>'
    + '</linearGradient>'
    + '<radialGradient id="eco-star-glow" cx="50%" cy="50%" r="50%">'
    + '<stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>'
    + '<stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>'
    + '</radialGradient>'
    + '<filter id="eco-blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="10"/></filter>'
    + '<filter id="eco-glow-sm" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
    + '</defs>';

  // Sky + ground
  s += '<rect x="0" y="0" width="' + svgW + '" height="' + GROUND_Y + '" fill="url(#eco-sky)"/>';
  s += '<rect x="0" y="' + GROUND_Y + '" width="' + svgW + '" height="' + (H - GROUND_Y) + '" fill="url(#eco-ground)"/>';

  // Ground line with grass texture
  s += '<path d="M0 ' + GROUND_Y + ' L' + svgW + ' ' + GROUND_Y + '" stroke="#1f4010" stroke-width="2.5"/>';
  // Subtle grass tufts along ground
  for (var gi = 0; gi < Math.floor(svgW / 18); gi++) {
    var gx = gi * 18 + 5;
    var gh = 3 + (Math.sin(gi * 2.7) + 1) * 3;
    s += '<path d="M' + gx + ' ' + GROUND_Y + ' Q' + (gx+2) + ' ' + (GROUND_Y-gh) + ' ' + (gx+4) + ' ' + GROUND_Y + '" stroke="#2a5c15" stroke-width="1" fill="none" opacity="0.4"/>';
  }

  // Stars (pseudo-random via sine, stable across renders)
  for (var si2 = 0; si2 < 60; si2++) {
    var starX = ((Math.sin(si2 * 137.508 * 0.017453) + 1) * 0.5 * svgW * 0.96 + svgW * 0.02);
    var starY = ((Math.cos(si2 * 97.3 * 0.017453) + 1) * 0.5 * (GROUND_Y - 30) * 0.7 + 10);
    var starR  = 0.7 + (Math.sin(si2 * 0.5) + 1) * 0.5;
    var starOp = (0.15 + (Math.cos(si2 * 0.9) + 1) * 0.2).toFixed(2);
    s += '<circle cx="' + starX.toFixed(1) + '" cy="' + starY.toFixed(1) + '" r="' + starR.toFixed(1) + '" fill="#ffffff" opacity="' + starOp + '"/>';
  }

  // ── Draw pods + trees ──────────────────────────────────────────────
  var xOff = LEFT_PAD;
  podOrder.forEach(function(pod) {
    var podProjects = podMap[pod];
    var podW = podProjects.length * TREE_W;
    var col  = podColor(pod);

    // Pod grove glow on ground
    s += '<ellipse cx="' + (xOff + podW/2) + '" cy="' + (GROUND_Y + 2) + '"'
      + ' rx="' + (podW * 0.55) + '" ry="18"'
      + ' fill="' + col + '" opacity="0.10" filter="url(#eco-blur)"/>';

    // Pod label below trees
    var podLabel = pod.replace(' Pod', '').replace(' pod', '');
    if (podLabel.length > 22) podLabel = podLabel.substring(0, 20) + '…';
    s += '<text x="' + (xOff + podW/2) + '" y="' + (H - 10) + '"'
      + ' text-anchor="middle" fill="' + col + '" font-size="9" font-family="system-ui,sans-serif"'
      + ' font-weight="700" letter-spacing=".08em" opacity="0.75">'
      + podLabel.toUpperCase() + '</text>';
    // Pod separator line
    if (podOrder.indexOf(pod) > 0) {
      s += '<line x1="' + (xOff - POD_GAP/2) + '" y1="' + (GROUND_Y - 60) + '"'
        + ' x2="' + (xOff - POD_GAP/2) + '" y2="' + (GROUND_Y + 20) + '"'
        + ' stroke="#261540" stroke-width="1" stroke-dasharray="3,5" opacity="0.5"/>';
    }

    // ── Individual trees ───────────────────────────────────────────
    podProjects.forEach(function(p, i) {
      var cx   = xOff + i * TREE_W + TREE_W / 2;
      var sc   = scores[p.id] || {};
      var aln  = (p.alignment_avg || 5) / 10;         // 0–1 (alignment drives height)
      var tsIK  = sc.ts_ik          || 0;              // roots
      var tsCom = sc.ts_community   || 0;              // trunk width / soil
      var tsRel = sc.ts_relational  || 0;              // branch left-mid
      var tsTech= sc.ts_technical   || 0;              // branch right-mid + fruits
      var tsGov = sc.ts_governance  || 0;              // branch right-low
      var tsNet = sc.ts_network     || 0;              // canopy width
      var tsImag= sc.ts_imaginaries || 0;              // branch left-high + seeds

      // Tree geometry
      var trunkH  = 55  + aln  * 140;                 // 55–195 px
      var trunkW  = 4.5 + tsCom * 9;                  // 4.5–13.5 px
      var canopyR = 20  + tsNet * 38;                  // 20–58 px
      var trunkTopY = GROUND_Y - trunkH;
      var canopyCY  = trunkTopY + 6;
      // Unique lean per tree (subtle, organic)
      var lean  = Math.sin(cx * 0.031 + i) * 5;

      // ── Soil richness (ts_community) ──
      s += '<ellipse cx="' + cx + '" cy="' + (GROUND_Y + 5) + '"'
        + ' rx="' + (trunkW * 4.5) + '" ry="7"'
        + ' fill="' + col + '" opacity="' + (0.08 + tsCom * 0.32).toFixed(2) + '"/>';

      // ── Roots (ts_ik) ──
      var rsp = 8 + tsIK * 30;
      var rOp = (0.25 + tsIK * 0.55).toFixed(2);
      var rW  = (1 + tsIK * 2).toFixed(1);
      s += '<path d="M' + cx + ' ' + (GROUND_Y-3) + ' Q' + (cx-rsp*0.7) + ' ' + (GROUND_Y+9) + ' ' + (cx-rsp*1.5) + ' ' + (GROUND_Y+5) + '" stroke="' + col + '" stroke-width="' + rW + '" fill="none" opacity="' + rOp + '"/>';
      s += '<path d="M' + cx + ' ' + (GROUND_Y-3) + ' Q' + (cx+rsp*0.7) + ' ' + (GROUND_Y+9) + ' ' + (cx+rsp*1.5) + ' ' + (GROUND_Y+5) + '" stroke="' + col + '" stroke-width="' + rW + '" fill="none" opacity="' + rOp + '"/>';
      if (tsIK > 0.35) {
        s += '<path d="M' + cx + ' ' + (GROUND_Y-2) + ' Q' + (cx+rsp*0.2) + ' ' + (GROUND_Y+12) + ' ' + (cx+rsp*0.6) + ' ' + (GROUND_Y+9) + '" stroke="' + col + '" stroke-width="1" fill="none" opacity="' + (rOp * 0.6).toFixed(2) + '"/>';
      }

      // ── Trunk (bezier with lean) ──
      var t1x = cx - trunkW/2 + lean*0.2;
      var t2x = cx + lean*0.7;
      var t3x = cx + lean;
      s += '<path d="M' + t1x.toFixed(1) + ' ' + GROUND_Y
        + ' C ' + (t2x - trunkW/4).toFixed(1) + ' ' + (GROUND_Y - trunkH * 0.45).toFixed(1)
        + ' ' + (t3x + trunkW/4).toFixed(1) + ' ' + (trunkTopY + trunkH * 0.3).toFixed(1)
        + ' ' + (t3x).toFixed(1) + ' ' + trunkTopY.toFixed(1) + '"'
        + ' stroke="' + col + '" stroke-width="' + trunkW.toFixed(1) + '"'
        + ' fill="none" stroke-linecap="round" opacity="0.88"/>';

      // ── Branches (4 TS dimensions) ──
      // Each branch grows from a different height on the trunk
      var branchDefs = [
        { score: tsRel,  col: '#22d3ee', side: -1, hFrac: 0.32, baseAngle: 52 }, // Relational — left
        { score: tsGov,  col: '#a066cc', side:  1, hFrac: 0.38, baseAngle: 48 }, // Governance — right
        { score: tsImag, col: '#c084fc', side: -1, hFrac: 0.18, baseAngle: 40 }, // Imaginaries — left upper
        { score: tsTech, col: '#f87171', side:  1, hFrac: 0.22, baseAngle: 38 }, // Technical — right upper
      ];
      branchDefs.forEach(function(b) {
        if (b.score < 0.12) return;
        var bOriginY = trunkTopY + trunkH * b.hFrac;
        var bOriginX = cx + lean * b.hFrac;
        var bLen     = 12 + b.score * 42;
        var bAngleRad = (b.baseAngle + (1-b.score) * 15) * Math.PI / 180 * b.side;
        var endX = bOriginX + Math.sin(bAngleRad) * bLen;
        var endY = bOriginY - Math.cos(bAngleRad) * bLen * 0.7;
        var bW   = (0.8 + b.score * 3.2).toFixed(1);
        var cpX  = (bOriginX + endX) / 2 - Math.cos(bAngleRad) * bLen * 0.25;
        var cpY  = (bOriginY + endY) / 2 - 4;
        s += '<path d="M' + bOriginX.toFixed(1) + ' ' + bOriginY.toFixed(1)
          + ' Q' + cpX.toFixed(1) + ' ' + cpY.toFixed(1)
          + ' ' + endX.toFixed(1) + ' ' + endY.toFixed(1) + '"'
          + ' stroke="' + b.col + '" stroke-width="' + bW + '"'
          + ' fill="none" stroke-linecap="round" opacity="0.82"/>';
        // Leaf cluster at branch tip (high scores)
        if (b.score > 0.45) {
          var leafR = (2.5 + b.score * 4).toFixed(1);
          s += '<circle cx="' + endX.toFixed(1) + '" cy="' + endY.toFixed(1) + '"'
            + ' r="' + leafR + '" fill="' + b.col + '" opacity="0.4"/>';
        }
      });

      // ── Canopy (layered organic circles, width = ts_network) ──
      s += '<circle cx="' + (cx + lean * 0.2).toFixed(1) + '" cy="' + canopyCY.toFixed(1) + '"'
        + ' r="' + canopyR + '" fill="' + col + '" opacity="0.14"/>';
      s += '<circle cx="' + (cx - canopyR * 0.28 + lean*0.1).toFixed(1) + '" cy="' + (canopyCY + canopyR * 0.12).toFixed(1) + '"'
        + ' r="' + (canopyR * 0.72).toFixed(1) + '" fill="' + col + '" opacity="0.14"/>';
      s += '<circle cx="' + (cx + canopyR * 0.30 + lean*0.1).toFixed(1) + '" cy="' + (canopyCY - canopyR * 0.06).toFixed(1) + '"'
        + ' r="' + (canopyR * 0.68).toFixed(1) + '" fill="' + col + '" opacity="0.12"/>';
      // Canopy edge
      s += '<circle cx="' + (cx + lean * 0.2).toFixed(1) + '" cy="' + canopyCY.toFixed(1) + '"'
        + ' r="' + canopyR + '" fill="none" stroke="' + col + '" stroke-width="1" opacity="0.35"/>';

      // ── Fruits (ts_technical outputs) — lime green dots in canopy ──
      var fruitN = Math.round(tsTech * 7);
      for (var fi = 0; fi < fruitN; fi++) {
        var fAngle = (fi / Math.max(fruitN, 1)) * Math.PI * 2;
        var fRad   = canopyR * (0.28 + Math.abs(Math.sin(fi * 1.9)) * 0.38);
        var fX = (cx + lean * 0.2 + Math.cos(fAngle) * fRad).toFixed(1);
        var fY = (canopyCY + Math.sin(fAngle) * fRad * 0.65).toFixed(1);
        s += '<circle cx="' + fX + '" cy="' + fY + '" r="3.2" fill="#99ee81" opacity="0.88"/>';
      }

      // ── Seeds / pollination (ts_imaginaries) — purple wisps above canopy ──
      var seedN = Math.round(tsImag * 6);
      for (var sj = 0; sj < seedN; sj++) {
        var sAngle = ((sj / Math.max(seedN, 1)) - 0.5) * Math.PI * 0.9;
        var sDist  = canopyR + 5 + sj * 9;
        var sX = (cx + lean * 0.2 + Math.sin(sAngle) * sDist * 0.7).toFixed(1);
        var sY = (canopyCY - Math.cos(sAngle) * sDist * 0.4 - 8).toFixed(1);
        var sOp = (0.75 - sj * 0.1).toFixed(2);
        s += '<circle cx="' + sX + '" cy="' + sY + '" r="1.8" fill="#c084fc" opacity="' + sOp + '"/>';
        // Stem connecting seed to canopy
        s += '<line x1="' + (cx + lean*0.2).toFixed(1) + '" y1="' + (canopyCY - canopyR + 4).toFixed(1)
          + '" x2="' + sX + '" y2="' + sY
          + '" stroke="#c084fc" stroke-width="0.5" opacity="' + (parseFloat(sOp) * 0.5).toFixed(2) + '"/>';
      }

      // ── Alignment score badge above tree ──
      var badgeCol = aln > 0.85 ? '#4ade80' : (aln > 0.65 ? '#fbbf24' : '#f87171');
      s += '<text x="' + (cx + lean*0.2).toFixed(1) + '" y="' + (canopyCY - canopyR - 6).toFixed(1) + '"'
        + ' text-anchor="middle" fill="' + badgeCol + '"'
        + ' font-size="9" font-family="system-ui,sans-serif" font-weight="700" opacity="0.8">'
        + (p.alignment_avg || '?') + '</text>';

      // ── Project name below ground ──
      var nameStr = p.short || p.id || '';
      nameStr = nameStr.split(' — ')[0].split(' - ')[0];
      if (nameStr.length > 13) nameStr = nameStr.substring(0, 12) + '…';
      s += '<text x="' + cx + '" y="' + (GROUND_Y + 18) + '"'
        + ' text-anchor="middle" fill="#a898c0"'
        + ' font-size="8" font-family="system-ui,sans-serif" opacity="0.85">'
        + nameStr + '</text>';

      // ── Invisible hover target + tooltip ──
      var ttLines = [
        p.short || p.id,
        'Alignment: ' + (p.alignment_avg || '?') + '/10',
        'Community: ' + Math.round((sc.ts_community||0)*100) + '%',
        'IK Integration: ' + Math.round((sc.ts_ik||0)*100) + '%',
        'Relational: ' + Math.round((sc.ts_relational||0)*100) + '%',
        'Technical: ' + Math.round((sc.ts_technical||0)*100) + '%',
        'Governance: ' + Math.round((sc.ts_governance||0)*100) + '%',
        'Network: ' + Math.round((sc.ts_network||0)*100) + '%',
        'Imaginaries: ' + Math.round((sc.ts_imaginaries||0)*100) + '%',
      ];
      s += '<rect x="' + (cx - TREE_W/2 + 6) + '" y="' + (canopyCY - canopyR - 14) + '"'
        + ' width="' + (TREE_W - 12) + '" height="' + (GROUND_Y - (canopyCY - canopyR - 14) + 10) + '"'
        + ' fill="transparent" style="cursor:pointer">'
        + '<title>' + ttLines.join('\n') + '</title>'
        + '</rect>';
    });

    xOff += podW + POD_GAP;
  });

  // ── Legend (top-left floating) ────────────────────────────────────
  var LX = 16, LY = 12;
  s += '<rect x="' + LX + '" y="' + LY + '" width="198" height="130" rx="8"'
    + ' fill="#110820" opacity="0.88" stroke="#3a2060" stroke-width="1"/>';
  s += '<text x="' + (LX+10) + '" y="' + (LY+15) + '"'
    + ' fill="#a898c0" font-size="8.5" font-family="system-ui,sans-serif"'
    + ' font-weight="700" letter-spacing=".07em">TREE ANATOMY</text>';

  var legItems = [
    { sym: '▊', col: '#f0ecf8',  label: 'Height  =  Alignment score' },
    { sym: '▊', col: '#f0ecf8',  label: 'Width   =  Community-centred' },
    { sym: '↙', col: '#4ade80',  label: 'Roots   =  IK Integration' },
    { sym: '━', col: '#22d3ee',  label: 'Branch  =  Relational practice' },
    { sym: '━', col: '#a066cc',  label: 'Branch  =  Governance' },
    { sym: '━', col: '#c084fc',  label: 'Branch  =  Imaginaries' },
    { sym: '━', col: '#f87171',  label: 'Branch  =  Technical' },
    { sym: '●', col: '#99ee81',  label: 'Fruits  =  Technical outputs' },
    { sym: '·', col: '#c084fc',  label: 'Seeds   =  Imaginaries spread' },
    { sym: '○', col: '#60a5fa',  label: 'Canopy  =  Network reach' },
  ];
  legItems.forEach(function(item, idx) {
    var liy = LY + 27 + idx * 10.5;
    s += '<text x="' + (LX+10) + '" y="' + liy + '"'
      + ' fill="' + item.col + '" font-size="10" font-family="monospace">' + item.sym + '</text>';
    s += '<text x="' + (LX+24) + '" y="' + liy + '"'
      + ' fill="#a898c0" font-size="8" font-family="system-ui,sans-serif">' + item.label + '</text>';
  });

  s += '</svg>';

  // ── Wrap SVG in scrollable container ─────────────────────────────
  el.innerHTML = '<div style="padding:20px 0 8px 24px">'
    + '<h2 style="font-size:15px;font-weight:800;color:#f0ecf8;margin-bottom:2px">Living Ecosystem</h2>'
    + '<p style="font-size:12px;color:#a898c0;margin-bottom:14px">'
    + 'Each tree is a research project. Height = alignment strength. Branches = active TS dimensions. '
    + 'Lime fruits = technical outputs. Purple seeds = imaginaries spreading outward. '
    + 'Trees group into pod groves. Canopy width = network connectivity. Hover any tree for full detail.'
    + '</p></div>'
    + '<div style="overflow-x:auto;overflow-y:hidden;cursor:grab;padding-bottom:12px">'
    + s
    + '</div>';

  // ── Drag-to-scroll on the container ──────────────────────────────
  var scroller = el.querySelector('div > div[style*="overflow-x"]');
  if (scroller) {
    var isDragging = false, startX = 0, startScroll = 0;
    scroller.addEventListener('mousedown', function(e) {
      isDragging = true; startX = e.pageX; startScroll = scroller.scrollLeft;
      scroller.style.cursor = 'grabbing';
    });
    document.addEventListener('mouseup', function() {
      isDragging = false; if (scroller) scroller.style.cursor = 'grab';
    });
    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      scroller.scrollLeft = startScroll - (e.pageX - startX);
    });
  }
}

// ── VIEW: Signal Lab ──────────────────────────────────────────────────────
// Researchers → Signal generators | Community → Noise + context
// TS dimensions → Filter harmonics | Alignment → Amplitude
// Outputs → Fruits (lime) | Imagination → Spectral spread
//
// Each project rendered as an oscilloscope trace.
// Waveform shape = composite of 7 TS harmonics.
// Amplitude = alignment score. Noise floor = 1 − community-centred score.

// ── Waveform synthesiser ─────────────────────────────────────────────
// Returns an SVG string (128×68px) of an oscilloscope screen
function waveformSVG(sc, alignScale, col) {
  var W = 128, H = 68, midY = H / 2;
  // Each TS dimension contributes a harmonic at a unique frequency + phase
  var HARMONICS = [
    { key: 'ts_ik',         freq: 1.0,  ph: 0.0  },   // fundamental — grounded tone
    { key: 'ts_relational', freq: 2.3,  ph: 0.40 },   // warm harmonic
    { key: 'ts_community',  freq: 0.55, ph: 1.00 },   // sub-harmonic — slow pulse
    { key: 'ts_technical',  freq: 3.70, ph: 1.50 },   // high-freq precision
    { key: 'ts_governance', freq: 1.80, ph: 2.10 },   // sesqui-harmonic — structure
    { key: 'ts_network',    freq: 4.20, ph: 0.80 },   // overtone — network reach
    { key: 'ts_imaginaries',freq: 2.90, ph: 1.90 },   // rich mid-spectrum
  ];
  var N = 96;
  var raw = [];
  for (var i = 0; i <= N; i++) {
    var t = (i / N) * Math.PI * 4;
    var y = HARMONICS.reduce(function(sum, h) {
      return sum + (sc[h.key] || 0) * Math.sin(h.freq * t + h.ph);
    }, 0);
    // Community as noise floor: lower community = more signal interference
    var tsCom = sc.ts_community || 0;
    var noise = (1 - tsCom) * 0.30 * Math.sin(i * 7.31 + 0.9) * Math.sin(i * 13.7 + 0.3);
    raw.push(y + noise);
  }
  // Normalise to [-1,1] then scale by alignment amplitude
  var maxAbs = raw.reduce(function(mx, v) { return Math.max(mx, Math.abs(v)); }, 0.001);
  var amp = alignScale * (midY - 5);
  var pts = raw.map(function(v, j) {
    return [(j / N * W), midY - (v / maxAbs) * amp];
  });
  var d = 'M' + pts[0][0].toFixed(1) + ',' + pts[0][1].toFixed(1);
  for (var k = 1; k <= N; k++) d += 'L' + pts[k][0].toFixed(1) + ',' + pts[k][1].toFixed(1);

  var s = '<svg width="' + W + '" height="' + H + '" style="display:block">';
  // CRT phosphor grid
  for (var gy = 0; gy < 5; gy++) {
    var gY = (H / 4 * gy).toFixed(1);
    s += '<line x1="0" y1="' + gY + '" x2="' + W + '" y2="' + gY + '" stroke="' + col + '" stroke-width="0.3" opacity="0.13"/>';
  }
  for (var gx = 0; gx < 9; gx++) {
    var gX = (W / 8 * gx).toFixed(1);
    s += '<line x1="' + gX + '" y1="0" x2="' + gX + '" y2="' + H + '" stroke="' + col + '" stroke-width="0.3" opacity="0.13"/>';
  }
  // Zero crossing line
  s += '<line x1="0" y1="' + midY + '" x2="' + W + '" y2="' + midY + '" stroke="' + col + '" stroke-width="0.5" opacity="0.22"/>';
  // Glow (blurred wider stroke) + sharp trace
  s += '<path d="' + d + '" fill="none" stroke="' + col + '" stroke-width="4.5" opacity="0.12"/>';
  s += '<path d="' + d + '" fill="none" stroke="' + col + '" stroke-width="1.2" opacity="0.92" stroke-linejoin="round"/>';
  s += '</svg>';
  return s;
}

function renderSignalLab() {
  var el = document.getElementById('view-signallab');
  var projects = DATA.projects;
  var scores   = DATA.ts_project_scores || {};
  var dims     = DATA.ts_dimensions || [];

  // ── Network spectrum (EQ master) ──────────────────────────────────
  var netAvg = {};
  dims.forEach(function(dim) {
    var vals = projects.map(function(p) { return (scores[p.id] || {})[dim.id] || 0; });
    netAvg[dim.id] = vals.reduce(function(a, b) { return a + b; }, 0) / (vals.length || 1);
  });
  // Sort dims by average (desc) for visual richness
  var dimsSorted = dims.slice().sort(function(a, b) { return netAvg[b.id] - netAvg[a.id]; });

  var EQ_W = 52, EQ_H = 80, EQ_GAP = 8;
  var eqTotalW = dimsSorted.length * (EQ_W + EQ_GAP);
  var eqSVG = '<svg width="' + eqTotalW + '" height="' + EQ_H + '" style="display:block">';
  dimsSorted.forEach(function(dim, di) {
    var bx   = di * (EQ_W + EQ_GAP);
    var col  = TS_DIM_COLORS[dim.id] || '#99ee81';
    var avg  = netAvg[dim.id];
    var barH = Math.round(avg * (EQ_H - 22));
    var barY = EQ_H - 14 - barH;
    // Bar bg track
    eqSVG += '<rect x="' + (bx+6) + '" y="' + (EQ_H-14-(EQ_H-22)) + '" width="' + (EQ_W-12) + '" height="' + (EQ_H-22) + '" fill="' + col + '" opacity="0.07" rx="2"/>';
    // Bar fill (segmented like an EQ)
    var segCount = Math.ceil(barH / 6);
    for (var sg = 0; sg < segCount; sg++) {
      var segY = barY + barH - (sg+1)*6;
      var segOp = 0.65 + (sg / segCount) * 0.3;
      eqSVG += '<rect x="' + (bx+7) + '" y="' + segY + '" width="' + (EQ_W-14) + '" height="5" fill="' + col + '" opacity="' + segOp.toFixed(2) + '" rx="1"/>';
    }
    // Peak indicator
    if (barH > 0) {
      eqSVG += '<rect x="' + (bx+7) + '" y="' + (barY-3) + '" width="' + (EQ_W-14) + '" height="2" fill="' + col + '" opacity="0.95" rx="1"/>';
    }
    // Label
    var shortLabel = dim.label.replace('IK/TK','IK').replace(' Practice','').replace('Tech. ','');
    if (shortLabel.length > 7) shortLabel = shortLabel.substring(0,6) + '…';
    eqSVG += '<text x="' + (bx + EQ_W/2) + '" y="' + (EQ_H - 3) + '"'
      + ' text-anchor="middle" fill="' + col + '" font-size="7" font-family="system-ui,sans-serif"'
      + ' font-weight="600">' + shortLabel + '</text>';
    // % value
    eqSVG += '<text x="' + (bx + EQ_W/2) + '" y="' + (barY - 6) + '"'
      + ' text-anchor="middle" fill="' + col + '" font-size="8" font-family="monospace"'
      + ' opacity="0.8">' + Math.round(avg * 100) + '</text>';
  });
  eqSVG += '</svg>';

  var specPanel = '<div style="display:inline-block;background:#050a02;border:1px solid #1a3a10;border-radius:8px;padding:10px 14px">'
    + '<div style="font-size:8px;font-weight:700;color:#4ade80;letter-spacing:.1em;margin-bottom:8px;font-family:monospace">NETWORK SIGNAL SPECTRUM  ●  ' + projects.length + ' SOURCES</div>'
    + eqSVG
    + '</div>';

  // ── Pod-grouped oscilloscope grid ─────────────────────────────────
  var podMap = {}, podOrder = [];
  projects.forEach(function(p) {
    var pod = p.pod || 'Podless';
    if (!podMap[pod]) { podMap[pod] = []; podOrder.push(pod); }
    podMap[pod].push(p);
  });
  podOrder.sort(function(a, b) {
    if (a === 'Podless') return 1; if (b === 'Podless') return -1;
    return podMap[b].length - podMap[a].length;
  });

  var gridHTML = '';
  podOrder.forEach(function(pod) {
    var col = podColor(pod);
    gridHTML += '<div style="margin-bottom:22px">'
      + '<div style="font-size:9px;font-weight:700;color:' + col + ';letter-spacing:.09em;text-transform:uppercase;'
      + 'padding:3px 8px;margin-bottom:10px;border-left:3px solid ' + col + ';display:inline-block">'
      + pod.replace(' Pod','').replace(' pod','')
      + '  <span style="color:#a898c0;font-weight:400">(' + podMap[pod].length + ')</span></div>'
      + '<div style="display:flex;flex-wrap:wrap;gap:10px">';

    podMap[pod].forEach(function(p) {
      var sc  = scores[p.id] || {};
      var aln = (p.alignment_avg || 5) / 10;
      var wvHTML = waveformSVG(sc, aln, col);
      var nameStr = (p.short || p.id || '').split(' \u2014')[0].split(' - ')[0];
      if (nameStr.length > 12) nameStr = nameStr.substring(0, 11) + '\u2026';
      var alignStr = p.alignment_avg || '?';
      var alignCol = aln > 0.85 ? '#4ade80' : (aln > 0.65 ? '#fbbf24' : '#f87171');
      // TS active count (dims with score >= 0.3)
      var activeTS = [
        sc.ts_ik||0, sc.ts_relational||0, sc.ts_community||0,
        sc.ts_technical||0, sc.ts_governance||0, sc.ts_network||0, sc.ts_imaginaries||0
      ].filter(function(v){ return v >= 0.3; }).length;
      // AI depth badge
      var depth = p.ai_depth || '';
      var depthCol = depth === 'High' ? '#f87171' : (depth === 'Mid' ? '#fbbf24' : (depth === 'Low' ? '#a3e635' : '#475569'));

      gridHTML += '<div style="width:128px;border-radius:6px;overflow:hidden;border:1px solid ' + col + '38;background:#040a02">'
        // Oscilloscope screen
        + '<div style="background:#000d00;position:relative">'
        + wvHTML
        // Corner badge: AI depth
        + '<div style="position:absolute;top:3px;right:4px;font-size:7px;color:' + depthCol + ';font-family:monospace;opacity:0.8">' + (depth||'–') + '</div>'
        // Active TS indicator (bottom-right)
        + '<div style="position:absolute;bottom:3px;right:4px;font-size:7px;color:#a898c0;font-family:monospace">' + activeTS + '/7</div>'
        + '</div>'
        // Label bar
        + '<div style="padding:3px 6px 4px;display:flex;align-items:center;justify-content:space-between;background:#060d02;border-top:1px solid ' + col + '22">'
        + '<span style="font-size:8px;color:#a898c0;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:88px">'
        + nameStr + '</span>'
        + '<span style="font-size:9px;font-weight:700;color:' + alignCol + ';font-family:monospace;flex-shrink:0">' + alignStr + '</span>'
        + '</div>'
        + '</div>';
    });
    gridHTML += '</div></div>';
  });

  // ── Encoding key ─────────────────────────────────────────────────
  var keyDims = [
    { col: '#4ade80',  label: 'Fundamental (IK): 1.0×' },
    { col: '#22d3ee',  label: 'Relational: 2.3×' },
    { col: '#f59e0b',  label: 'Community (sub): 0.55×' },
    { col: '#f87171',  label: 'Technical: 3.7× (sharp)' },
    { col: '#a066cc',  label: 'Governance: 1.8×' },
    { col: '#60a5fa',  label: 'Network: 4.2× (overtone)' },
    { col: '#c084fc',  label: 'Imaginaries: 2.9×' },
  ];
  var keyHTML = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px">'
    + '<div style="font-size:9px;color:#a898c0;width:100%;font-family:monospace;letter-spacing:.06em;margin-bottom:2px">WAVEFORM ENCODING — each dimension contributes a harmonic. Amplitude = alignment score. Noise floor = 1 − community-centred.</div>'
    + keyDims.map(function(k) {
        return '<div style="display:flex;align-items:center;gap:5px;font-size:8px;color:#a898c0;font-family:monospace">'
          + '<div style="width:18px;height:2px;background:' + k.col + ';opacity:0.85;border-radius:1px"></div>'
          + k.label + '</div>';
      }).join('')
    + '<div style="display:flex;align-items:center;gap:5px;font-size:8px;color:#a898c0;font-family:monospace"><span style="color:#f87171">·/7</span>= active TS dimensions ≥ 30%</div>'

  el.innerHTML = '<div style="padding:20px 24px 0">'

    + 'Each project rendered as an oscilloscope trace. Waveform shape = composite of 7 TS harmonics. '
    + 'A flat line = weak signal. A complex, tall wave = strong, multi-dimensional project. '
    + 'Noise in the trace = lower community-centred score (more interference). Top panel = network master spectrum.'
    + '</p>'
    + specPanel
    + '<div style="margin:24px 0 8px;font-size:9px;font-weight:700;color:#4ade80;letter-spacing:.09em;font-family:monospace">PROJECT CHANNELS</div>'
