function _buildVoronoiInner(el) {
  try {

  // ── Colour maps
  var AREA_COL = {};
  (DATA.research_areas || []).forEach(function(a) { AREA_COL[a.title] = a.color; });

  // TS dimension order + labels
  var DIM_ORDER = ['ts_community','ts_technical','ts_imaginaries','ts_network',
                   'ts_relational','ts_ik','ts_governance'];
  var DIM_LABEL = {
    ts_ik:          'IK / TK',
    ts_relational:  'Relational',
    ts_community:   'Community-\nCentred',
    ts_technical:   'Technical AI',
    ts_governance:  'Governance',
    ts_network:     'Network',
    ts_imaginaries: 'Imaginaries'
  };
  var DIM_SHORT = {
    ts_ik:          'IK/TK',
    ts_relational:  'Relational',
    ts_community:   'Community',
    ts_technical:   'Technical',
    ts_governance:  'Governance',
    ts_network:     'Network',
    ts_imaginaries: 'Imaginaries'
  };

  var scores = DATA.ts_project_scores || {};

  // ── Assign each project to its highest-scoring TS dimension
  var dimBuckets = {};
  DIM_ORDER.forEach(function(d) { dimBuckets[d] = []; });

  var unscored = [];
  DATA.projects.forEach(function(p) {
    var sc = scores[p.id] || {};
    var keys = DIM_ORDER.filter(function(k) { return (sc[k] || 0) > 0; });
    if (!keys.length) { unscored.push(p); return; }
    var topDim = keys.reduce(function(best, k) { return sc[k] > sc[best] ? k : best; });
    dimBuckets[topDim].push({ project: p, tsScore: sc[topDim] || 0 });
  });

  // ── Build legend
  var legEl = document.getElementById('vnoi-legend');
  if (legEl) {
    var legHTML = DIM_ORDER.map(function(d) {
      var col = TS_DIM_COLORS[d] || '#99ee81';
      var cnt = dimBuckets[d].length;
      return '<div style="display:flex;align-items:center;gap:5px">'
        + '<div style="width:11px;height:11px;border-radius:50%;background:' + col + ';opacity:0.7"></div>'
        + '<span style="color:' + col + ';font-weight:600">' + DIM_SHORT[d] + '</span>'
        + '<span style="color:#5040a0">(' + cnt + ')</span></div>';
    }).join('');
    legHTML += unscored.length ? '<span style="color:#5040a0;font-size:10px">' + unscored.length + ' projects unscored</span>' : '';
    legEl.innerHTML = legHTML;
  }

  // ── D3 hierarchy: TS Dimension → Projects
  var rootData = {
    name: 'AbInt',
    children: DIM_ORDER.map(function(dimId) {
      var children = dimBuckets[dimId].map(function(item) {
        var p   = item.project;
        var aln = p.alignment_avg || 5;
        // Value = ts score × alignment composite (rewards both depth and quality)
        return {
          name:     p.short || p.id,
          value:    Math.max(0.05, item.tsScore * (aln / 10)),
          tsScore:  item.tsScore,
          project:  p,
          dimId:    dimId
        };
      });
      // Add a ghost node if empty so dim still shows as a circle
      if (!children.length) {
        children = [{ name: '', value: 0.04, tsScore: 0, project: null, dimId: dimId, ghost: true }];
      }
      return { name: dimId, children: children };
    })
  };

  var hierarchy = d3.hierarchy(rootData)
    .sum(function(d) { return d.value || 0; })
    .sort(function(a, b) { return b.value - a.value; });

  // ── Pack layout
  var R = 360, DIAM = R * 2;
  var pack = d3.pack().size([DIAM, DIAM]).padding(6);
  pack(hierarchy);

  // ── SVG
  var svg = d3.create('svg')
    .attr('width', DIAM).attr('height', DIAM)
    .style('display', 'block').style('overflow', 'visible');

  svg.append('circle').attr('cx', R).attr('cy', R).attr('r', R).attr('fill', '#0a0518');

  var tip = document.getElementById('tooltip');

  // ── TS Dimension circles (depth=1)
  hierarchy.descendants().filter(function(d) { return d.depth === 1; }).forEach(function(dim) {
    var col     = TS_DIM_COLORS[dim.data.name] || '#99ee81';
    var isEmpty = dimBuckets[dim.data.name].length === 0;
    var label   = DIM_SHORT[dim.data.name] || dim.data.name;

    // Background fill
    svg.append('circle')
      .attr('cx', dim.x).attr('cy', dim.y).attr('r', dim.r)
      .attr('fill', col)
      .attr('fill-opacity', isEmpty ? 0.04 : 0.08)
      .attr('stroke', col)
      .attr('stroke-width', isEmpty ? 1.2 : 2.4)
      .attr('stroke-opacity', isEmpty ? 0.3 : 0.88)
      .attr('stroke-dasharray', isEmpty ? '4,4' : 'none')
      .attr('pointer-events', 'none');

    // Dimension label — inside top of circle
    if (dim.r > 24) {
      var fs = Math.max(8, Math.min(13, dim.r / 5.5));
      svg.append('text')
        .attr('x', dim.x)
        .attr('y', isEmpty ? dim.y + fs * 0.4 : dim.y - dim.r + fs * 1.8)
        .attr('text-anchor', 'middle').attr('pointer-events', 'none')
        .attr('fill', col)
        .attr('font-size', fs)
        .attr('font-family', 'system-ui,sans-serif')
        .attr('font-weight', '800')
        .attr('letter-spacing', '0.04em')
        .attr('opacity', isEmpty ? 0.45 : 0.95)
        .text(isEmpty ? label + ' — none' : label);
    }

    // Project count badge
    var cnt = dimBuckets[dim.data.name].length;
    if (cnt > 0 && dim.r > 30) {
      svg.append('text')
        .attr('x', dim.x)
        .attr('y', dim.y - dim.r + fs * 3.2)
        .attr('text-anchor', 'middle').attr('pointer-events', 'none')
        .attr('fill', col).attr('font-size', fs * 0.78)
        .attr('font-family', 'monospace').attr('opacity', 0.6)
        .text(cnt + ' project' + (cnt > 1 ? 's' : ''));
    }
  });

  // ── Project circles (depth=2, leaves)
  hierarchy.leaves().forEach(function(leaf) {
    if (leaf.data.ghost) return; // skip placeholder nodes

    var p      = leaf.data.project;
    var dimId  = leaf.data.dimId;
    var tsScore = leaf.data.tsScore;
    var aln    = p.alignment_avg || 5;
    var area   = p.primary_area || '';
    var fillC  = AREA_COL[area] || TS_DIM_COLORS[dimId] || '#99ee81';
    var dimCol = TS_DIM_COLORS[dimId] || '#99ee81';
    var opacity = 0.28 + (aln / 10) * 0.58;
    var alnCol  = aln >= 8 ? '#4ade80' : (aln >= 6 ? '#fbbf24' : '#f87171');

    var circle = svg.append('circle')
      .attr('cx', leaf.x).attr('cy', leaf.y)
      .attr('r', Math.max(0, leaf.r - 1))
      .attr('fill', fillC).attr('fill-opacity', opacity)
      .attr('stroke', dimCol).attr('stroke-width', 0.9).attr('stroke-opacity', 0.5)
      .style('cursor', 'pointer');

    // Label
    if (leaf.r > 16) {
      var nameStr = (p.short || '').split(' \u2014')[0].split(' - ')[0];
      var words   = nameStr.split(' ');
      var fs3     = Math.max(6, Math.min(10, leaf.r / 3.5));

      if (leaf.r > 28 && words.length > 1) {
        svg.append('text')
          .attr('x', leaf.x).attr('y', leaf.y - fs3 * 0.6)
          .attr('text-anchor', 'middle').attr('pointer-events', 'none')
          .attr('fill', '#f0ecf8').attr('font-size', fs3)
          .attr('font-family', 'system-ui,sans-serif').attr('font-weight', '600')
          .text(words.slice(0,2).join(' '));
        if (words.length > 2) {
          svg.append('text')
            .attr('x', leaf.x).attr('y', leaf.y + fs3 * 0.7)
            .attr('text-anchor', 'middle').attr('pointer-events', 'none')
            .attr('fill', '#f0ecf8').attr('font-size', fs3)
            .attr('font-family', 'system-ui,sans-serif').attr('font-weight', '600')
            .text(words.slice(2,4).join(' '));
        }
        if (leaf.r > 36) {
          svg.append('text')
            .attr('x', leaf.x).attr('y', leaf.y + fs3 * 2.1)
            .attr('text-anchor', 'middle').attr('pointer-events', 'none')
            .attr('fill', alnCol).attr('font-size', fs3 * 0.8)
            .attr('font-family', 'monospace').attr('font-weight', '700')
            .text(aln.toFixed(1));
        }
      } else {
        var short = words[0].length > 10 ? words[0].substring(0, 9) + '\u2026' : words[0];
        svg.append('text')
          .attr('x', leaf.x).attr('y', leaf.y + fs3 * 0.38)
          .attr('text-anchor', 'middle').attr('pointer-events', 'none')
          .attr('fill', '#f0ecf8').attr('font-size', fs3)
          .attr('font-family', 'system-ui,sans-serif').attr('font-weight', '600')
          .text(short);
      }
    }

    // Tooltip
    circle.on('mouseover', function(event) {
      d3.select(this).attr('fill-opacity', Math.min(0.95, opacity + 0.3));
      var depth  = p.ai_depth || '\u2014';
      var depthC = depth === 'High' ? '#f87171' : (depth === 'Mid' ? '#fbbf24' : (depth === 'Low' ? '#a3e635' : '#475569'));
      var tsLabel = DIM_SHORT[dimId] || dimId;
      tip.innerHTML = '<h4>' + (p.short || p.id) + '</h4>'
        + '<div style="font-size:10px;color:#a898c0;margin-bottom:8px">' + (p.pod || '') + '</div>'
        + '<div class="tt-row"><span class="tt-label">Top TS dim</span>'
        + '<span style="color:' + dimCol + ';font-weight:700">' + tsLabel + '</span></div>'
        + '<div class="tt-row"><span class="tt-label">TS score</span>'
        + '<span style="font-weight:600">' + Math.round(tsScore * 100) + '%</span></div>'
        + '<div class="tt-row"><span class="tt-label">Research area</span>'
        + '<span style="color:' + fillC + '">' + (area || '\u2014') + '</span></div>'
        + '<div class="tt-row"><span class="tt-label">AI Depth</span>'
        + '<span style="color:' + depthC + '">' + depth + '</span></div>'
        + '<div class="tt-row" style="margin-top:6px"><span class="tt-label">Alignment</span>'
        + '<span style="font-size:14px;font-weight:700;color:' + alnCol + '">' + aln.toFixed(1) + '</span></div>';
      tip.style.display = 'block';
      tip.style.left = (event.clientX + 18) + 'px';
      tip.style.top  = (event.clientY - 24) + 'px';
    })
    .on('mousemove', function(event) {
      tip.style.left = (event.clientX + 18) + 'px';
      tip.style.top  = (event.clientY - 24) + 'px';
    })
    .on('mouseout', function() {
      d3.select(this).attr('fill-opacity', opacity);
      tip.style.display = 'none';
    });
  });

  // Outer border
  svg.append('circle').attr('cx', R).attr('cy', R).attr('r', R)
    .attr('fill', 'none').attr('stroke', '#3a2060').attr('stroke-width', 3);

  // Inject
  var canvas = document.getElementById('vnoi-canvas');
  if (canvas) canvas.appendChild(svg.node());

  } catch(e) {
    var c = document.getElementById('vnoi-canvas');
    if (c) c.innerHTML = '<div style="color:#f87171;font-family:monospace;font-size:12px;padding:20px">TS Landscape error: ' + e.message + '</div>';
    console.error('TS Landscape error:', e);
  }
}


// ── VIEW: Ridge Profiles ──────────────────────────────────────────────────
function buildRidgePath(xPts, vals, baseline, ridgeH) {
  var n = xPts.length;
  if (n === 0) return 'M 0 0 Z';
  var lx = xPts[0] - 28;
  var rx = xPts[n - 1] + 28;
  var xs = [lx].concat(xPts).concat([rx]);
  var vs = [0].concat(vals).concat([0]);
  var m = xs.length;
  var d = 'M ' + lx + ' ' + baseline;
  for (var i = 0; i < m - 1; i++) {
    var i0 = Math.max(0, i - 1);
    var i3 = Math.min(m - 1, i + 2);
    var p0x = xs[i0], p0y = vs[i0];
    var p1x = xs[i],  p1y = vs[i];
    var p2x = xs[i + 1], p2y = vs[i + 1];
    var p3x = xs[i3], p3y = vs[i3];
    var t = 0.42;
    var cp1x = p1x + t * (p2x - p0x) / 2;
    var cp1y = Math.max(0, p1y + t * (p2y - p0y) / 2);
    var cp2x = p2x - t * (p3x - p1x) / 2;
    var cp2y = Math.max(0, p2y - t * (p3y - p1y) / 2);
    d += ' C ' + cp1x.toFixed(1) + ' ' + (baseline - cp1y * ridgeH).toFixed(1)
      + ',' + cp2x.toFixed(1) + ' ' + (baseline - cp2y * ridgeH).toFixed(1)
      + ',' + p2x.toFixed(1) + ' ' + (baseline - Math.max(0, p2y) * ridgeH).toFixed(1);
  }
  d += ' Z';
  return d;
}

function renderRidgeline() {
  var el = document.getElementById('view-ridgeline');
  var scores = DATA.ts_project_scores || {};

  var DIMS = ['ts_ik','ts_relational','ts_community','ts_technical','ts_governance','ts_network','ts_imaginaries'];
  var DIM_LABEL = {
    ts_ik:          'IK / TK',
    ts_relational:  'Relational',
    ts_community:   'Community',
    ts_technical:   'Technical',
    ts_governance:  'Governance',
    ts_network:     'Network',
    ts_imaginaries: 'Imaginaries'
  };

  // Group by pod, sort pods by avg alignment desc
  var podMap = {};
  DATA.projects.forEach(function(p) {
    var pod = p.pod || 'Other';
    if (!podMap[pod]) podMap[pod] = [];
    podMap[pod].push(p);
  });
  var podOrder = Object.keys(podMap).sort(function(a, b) {
    var avgA = podMap[a].reduce(function(s, p) { return s + (p.alignment_avg || 0); }, 0) / podMap[a].length;
    var avgB = podMap[b].reduce(function(s, p) { return s + (p.alignment_avg || 0); }, 0) / podMap[b].length;
    return avgB - avgA;
  });
  // Sort projects within each pod by alignment desc
  podOrder.forEach(function(pod) {
    podMap[pod].sort(function(a, b) { return (b.alignment_avg || 0) - (a.alignment_avg || 0); });
  });

  // Layout constants
  var PAD_L   = 158;
  var PAD_T   = 52;
  var PAD_R   = 100;
  var COL_W   = 86;
  var ROW_H   = 31;
  var POD_H   = 24;
  var RIDGE_H = 54;
  var NUM_COLS = DIMS.length;
  var totalW = PAD_L + NUM_COLS * COL_W + PAD_R;

  // Calculate positions
  var rows = [];  // {type, pod, project?, y}
  var curY = PAD_T;
  podOrder.forEach(function(pod) {
    rows.push({ type: 'pod', pod: pod, count: podMap[pod].length, y: curY });
    curY += POD_H;
    podMap[pod].forEach(function(p) {
      rows.push({ type: 'proj', project: p, pod: pod, y: curY });
      curY += ROW_H;
    });
  });
  var totalH = curY + RIDGE_H + 20;

  // Build SVG
  var bubX = PAD_L + NUM_COLS * COL_W + 32;
  var svg = '<svg id="svg-ridgeline" width="' + totalW + '" height="' + totalH + '" style="display:block;overflow:visible">';

  // ── Defs: per-pod gradients
  svg += '<defs>';
  podOrder.forEach(function(pod) {
    var col = podColor(pod);
    var gid = 'rg_' + pod.replace(/[^a-z0-9]/gi, '_');
    svg += '<linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1">'
      + '<stop offset="0%" stop-color="' + col + '" stop-opacity="0.92"/>'
      + '<stop offset="60%" stop-color="' + col + '" stop-opacity="0.55"/>'
      + '<stop offset="100%" stop-color="' + col + '" stop-opacity="0.12"/>'
      + '</linearGradient>';
  });
  svg += '</defs>';

  // ── Column guide lines + headers
  DIMS.forEach(function(dim, di) {
    var cx = PAD_L + di * COL_W + COL_W / 2;
    svg += '<line x1="' + cx + '" y1="' + PAD_T + '" x2="' + cx + '" y2="' + (totalH - 16) + '"'
      + ' stroke="#3a2060" stroke-width="1" stroke-dasharray="3,6" opacity="0.55"/>';
    svg += '<text x="' + cx + '" y="' + (PAD_T - 10) + '"'
      + ' text-anchor="middle" fill="#8878a8" font-size="9.5" font-family="system-ui,sans-serif" font-weight="500">'
      + DIM_LABEL[dim] + '</text>';
  });
  svg += '<text x="' + bubX + '" y="' + (PAD_T - 10) + '"'
    + ' text-anchor="middle" fill="#8878a8" font-size="9" font-family="system-ui,sans-serif">Align</text>';

  // ── Collect project rows for z-ordered ridge drawing
  var projRows = rows.filter(function(r) { return r.type === 'proj'; });

  // Draw ridges bottom-to-top for correct overlap
  for (var ri = projRows.length - 1; ri >= 0; ri--) {
    var rowObj = projRows[ri];
    var p      = rowObj.project;
    var pod    = rowObj.pod;
    var bY     = rowObj.y;
    var sc     = scores[p.id] || {};
    var col    = podColor(pod);
    var gid    = 'rg_' + pod.replace(/[^a-z0-9]/gi, '_');
    var aln    = p.alignment_avg || 0;
    var opacity = (0.55 + (aln / 10) * 0.4).toFixed(2);

    var vals = DIMS.map(function(dim) { return Math.min(1, Math.max(0, sc[dim] || 0)); });
    var xPts = DIMS.map(function(dim, di) { return PAD_L + di * COL_W + COL_W / 2; });
    var pathD = buildRidgePath(xPts, vals, bY, RIDGE_H);

    // Filled ridge
    svg += '<path class="ridge-path" data-pid="' + p.id.replace(/"/g, '') + '"'
      + ' d="' + pathD + '"'
      + ' fill="url(#' + gid + ')" stroke="' + col + '" stroke-width="0.9"'
      + ' opacity="' + opacity + '" style="cursor:pointer"/>';

    // White peak dot
    var maxVal = Math.max.apply(null, vals);
    if (maxVal > 0.06) {
      var maxIdx = vals.indexOf(maxVal);
      svg += '<circle cx="' + xPts[maxIdx].toFixed(1) + '" cy="' + (bY - maxVal * RIDGE_H).toFixed(1) + '"'
        + ' r="2.8" fill="white" opacity="0.88" pointer-events="none"/>';
    }

    // Project name
    var nameStr = (p.short || p.id || '').split(' \u2014')[0].split(' - ')[0];
    if (nameStr.length > 18) nameStr = nameStr.substring(0, 17) + '\u2026';
    svg += '<text x="' + (PAD_L - 9) + '" y="' + (bY + 3.5) + '"'
      + ' text-anchor="end" fill="#c0b0d8" font-size="9" font-family="system-ui,sans-serif">'
      + nameStr + '</text>';

    // Alignment bubble
    var alnR  = (3.5 + (aln / 10) * 9).toFixed(1);
    var alnCol = aln >= 8 ? '#4ade80' : (aln >= 6 ? '#fbbf24' : '#f87171');
    svg += '<circle cx="' + bubX + '" cy="' + bY + '" r="' + alnR + '"'
      + ' fill="' + alnCol + '" opacity="0.32" stroke="' + alnCol + '" stroke-width="0.7"/>';
    svg += '<text x="' + (bubX + parseFloat(alnR) + 5) + '" y="' + (bY + 3.5) + '"'
      + ' fill="' + alnCol + '" font-size="8.5" font-family="monospace" font-weight="600">'
      + aln.toFixed(1) + '</text>';
  }

  // ── Pod headers (drawn after ridges so text is on top)
  rows.forEach(function(r) {
    if (r.type !== 'pod') return;
    var col = podColor(r.pod);
    var label = r.pod.replace(/ [Pp]od$/, '').toUpperCase();
    svg += '<text x="2" y="' + (r.y + 15) + '"'
      + ' fill="' + col + '" font-size="8" font-family="system-ui,sans-serif"'
      + ' font-weight="700" letter-spacing="0.09em">'
      + label + ' <tspan fill="#7060a0" font-weight="400">(' + r.count + ')</tspan></text>';
    svg += '<line x1="2" y1="' + (r.y + 19) + '" x2="' + (PAD_L - 14) + '" y2="' + (r.y + 19) + '"'
      + ' stroke="' + col + '" stroke-width="0.5" opacity="0.4"/>';
  });

  svg += '</svg>';

  // ── Legend row
  var legendHTML = '<div style="display:flex;flex-wrap:wrap;gap:18px;margin:10px 0 4px;font-size:10px;color:#8878a8">'
    + '<span>● White dot = peak TS dimension</span>'
    + '<span style="color:#4ade80">● Bubble ≥ 8</span>'
    + '<span style="color:#fbbf24">● Bubble 6–8</span>'
    + '<span style="color:#f87171">● Bubble &lt; 6  (= alignment score)</span>'
    + '<span>Ridge height = TS score (0–1 scale)</span>'
    + '</div>';

  el.innerHTML = '<div style="padding:20px 24px 8px">'
    + '<h2 style="font-size:15px;font-weight:800;color:#f0ecf8;margin-bottom:4px">Ridge Profiles</h2>'
    + '<p style="font-size:12px;color:#a898c0;margin-bottom:6px">'
    + 'Each row is a project. The ridge sweeps across 7 Transformative Systems dimensions — '
    + 'height at each column reflects that project\'s score there. White dot marks the peak dimension. '
    + 'Projects grouped by pod, sorted highest alignment first.'
    + '</p>'
    + legendHTML
    + '</div>'
    + '<div style="overflow-x:auto;padding:4px 24px 40px">' + svg + '</div>';

  // ── Tooltip interaction
  var tip = document.getElementById('tooltip');
  el.querySelectorAll('.ridge-path').forEach(function(path) {
    path.addEventListener('mouseover', function(e) {
      var pid = this.getAttribute('data-pid');
      var p   = DATA.projects.find(function(pr) { return pr.id === pid; });
      if (!p) return;
      var sc  = scores[p.id] || {};
      var aln = p.alignment_avg || 0;
      var alnCol = aln >= 8 ? '#4ade80' : (aln >= 6 ? '#fbbf24' : '#f87171');
      var dimRows = DIMS.map(function(dim) {
        var v = Math.round((sc[dim] || 0) * 100);
        var barCol = v > 60 ? '#99ee81' : (v > 30 ? '#fbbf24' : '#6050a0');
        return '<div class="tt-row"><span class="tt-label">' + DIM_LABEL[dim] + '</span>'
          + '<div style="flex:1;background:#1a0d30;border-radius:2px;height:4px;margin:2px 0">'
          + '<div style="width:' + v + '%;height:4px;background:' + barCol + ';border-radius:2px"></div></div>'
          + '<span style="font-family:monospace;color:' + barCol + ';font-size:10px;margin-left:6px;min-width:26px">' + v + '</span></div>';
      }).join('');
      tip.innerHTML = '<h4>' + (p.short || p.id) + '</h4>'
        + '<div style="font-size:10px;color:#a898c0;margin-bottom:8px">' + (p.pod || '') + '</div>'
        + '<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:10px">'
        + '<span class="tt-label">Alignment</span>'
        + '<span style="font-size:15px;font-weight:700;color:' + alnCol + '">' + aln.toFixed(1) + '</span>'
        + '</div>'
        + dimRows;
      tip.style.display = 'block';
      tip.style.left = (e.clientX + 18) + 'px';
      tip.style.top  = (e.clientY - 20) + 'px';
      this.style.opacity = '1';
    });
    path.addEventListener('mousemove', function(e) {
      tip.style.left = (e.clientX + 18) + 'px';
      tip.style.top  = (e.clientY - 20) + 'px';
    });
    path.addEventListener('mouseout', function() {
      tip.style.display = 'none';
      this.style.opacity = '';
    });
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
rendered['landscape'] = true;
renderLandscape();
</script>
</body>
</html>
