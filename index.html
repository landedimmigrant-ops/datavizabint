Cochabamba at the mARTadero, a cultural and tech hub in Cochabamba that offers a hacklab, dance collectives, and \"a myriad of artists\".","reviewer":"Sara","project":"Eilif Muller, Mila Quebec AI Institute","code":"CfP04","polarity":"positive"},{"text":"Although there is not a lot of evidence of formal data sovereignty processes or core AI system development, there is a strong emphasis on protocol and relational approaches to AI, advancing relational/educational approaches to AI, co-creating programs (artist fellowship, workshops) and building reusable processes (cookbook), while also cultivating student/community capacity.","reviewer":"Hemi","project":"Brian Kuwada","code":"CfP01-02","polarity":"positive"},{"text":"Continued collaboration within the network, along with clearer pathways for sharing builds, workflows, and community-informed design methods, would help the project move from a single environment toward a more scalable and relational digital infrastructure aligned with the goals of these later phases.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Its focus on relational methodologies and Elder-guided processes also positions it well to contribute to network-wide conversations about ethics, data sovereignty, and Indigenous-centred design, making it a useful hub for collaboration as other projects move further into technical development.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"By supporting artist residencies, community conversations, and the creation of digital and performative works, the project shifts AI inquiry away from purely technical development toward culturally grounded, community-led processes.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"}],"interpretation":"Technical AI development scores highest in the TS dimensions (avg 0.694) but this is partly inflated by generic keywords like \"system\" and \"model.\" The real technical signal is more specific: 5 projects are at High AI depth (Cheung, Leatherby, Bellemare-Pepin, Ubalijoro, Little Bear), and these form the network's technical frontier. Reviewers consistently recommend that these frontier projects document their methods, share their tools, and create reusable components \u2014 the network needs them to be infrastructure providers, not just individual researchers.","network_question":"Are the 5 High AI Depth projects willing and able to serve as technical anchors for the network \u2014 and what support would they need to take on that role?","phase2":"Phase 2 structure: designate frontier projects as \"technical anchor\" nodes and resource them to produce shared tools, documented methods, and reusable components.","tension":"Asking individual researchers to serve the network's infrastructure needs adds labour that may not align with their own research goals or funding structures."},{"id":"emerging_lasting_capacity","label":"Emerging: Lasting Capacity","color":"#94a3b8","desc":"Pattern surfaced automatically from reviewer language \u2014 not yet in a named theme","n_reviewers":5,"reviewers":["Hemi","Jackson","Jason","Sara","Suzanne"],"n_projects":9,"projects":[],"phrases":["lasting capacity","capacity among","builds lasting","towards relational","impact goals","indigenous-led"],"sentences":[{"text":"With continued mentorship, stronger connections to the network, and a shift from planning toward implementation, the project could grow in ways that align well with the goals of these later phases.","reviewer":"Jackson","project":"Darby Herman","code":"CfP02-11","polarity":"neutral"},{"text":"Continued collaboration within the network, along with clearer pathways for sharing builds, workflows, and community-informed design methods, would help the project move from a single environment toward a more scalable and relational digital infrastructure aligned with the goals of these later phases.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Strengthening connections with other AbInt projects and sharing methods, protocols, and technical experiments across PODs would help the work evolve from residency-based exploration into broader network infrastructure aligned with these later phases.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"neutral"},{"text":"Stronger integration with other PODs and shared technical experiments would help move the work from exploratory prototypes toward network-level systems aligned with these later phases.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"neutral"}],"emerging":true,"interpretation":"","network_question":"","phase2":"","tension":""}],"network_signals":{"recommendations":[{"text":"The project also aligns well with network activities focused on relational AI, digital territories, and culturally grounded interface design, and could benefit from further collaboration through shared builds, workshops, and cross-POD development sessions that expand the work beyond its original context.","type":"recommendation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Continued collaboration within the network, along with clearer pathways for sharing builds, workflows, and community-informed design methods, would help the project move from a single environment toward a more scalable and relational digital infrastructure aligned with the goals of these later phases.","type":"recommendation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"However, the documentation suggests that co-design with Knowledge Holders during the development phase has been limited, which may constrain alignment with community-led practices.","type":"recommendation","polarity":"positive","reviewer":"Karim","project":"Jamey Hepi","project_id":"Jamey Hepi - CfP02-02","code":"CfP02-02","area":"Other"},{"text":"For the Indigenous Methodologies book portion of their research, \"The next phase of the project will largely focus on the digital component of the book, making a compelling and useful resource and methods toolbox repository for Indigenous AI scholars and practitioners.\" It is my recommendation that we have an website building intensive for all our related projects, and focus a lot of our RA power over a month period to getting websites up for all these amazing projects, especially one like this.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"There is also risk that the project prioritizes artistic exploration over clearly defined research outputs, which is great, because it is led by an artist, but it will make it difficult to evaluate impact or reuse outcomes beyond the immediate installation, since the proposal does nto suggest they will produce tools or AI besides training their custom AI personality.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, advancement would likely involve deepening the technical side of the work, including more fully developed SLM/LLM adaptations, community-controlled data repositories, and locally governed infrastructure, while maintaining the collective, ceremony-informed, and advisory-guided processes that shape the project.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"To advance into the Intelligences phase, the work would likely need to move beyond curriculum development toward more clearly defined technical experimentation, such as prototyping language-learning tools, working with small language models, or collaborating with other projects building shared infrastructure for language data.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"Greater attention to reproducibility, clearer integration with existing AbInt infrastructure efforts, and more explicit plans for how the neuro-AI and symbolic modeling components could support other Pods would help the research extend beyond a single case study into something that can inform later-phase network development.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"The work in developing future imaginaries and speculative designs of Indigenous AI to guide the conceptualisation of novel AI systems in the future imaginaries are areas that others in the network would benefit from hearing and sharing the various approaches developed in HIFI Lab project to future AI, art and storytelling.","type":"recommendation","polarity":"neutral","reviewer":"Hemi","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"There is also a risk of extractive dynamics, where language knowledge is structured for technical use without sufficient community control or benefit, which could be mitigated through direct evaluation from participating Indigenous community members and clearer documentation of agreements, protocols, and outcomes.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"One potential risk is that the work is closely tied to a specific community context and small working group, which may limit how easily the outcomes extend beyond the immediate collaborators; this can be mitigated through clearer documentation of methods and continued dialogue with other projects in the network.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"Given the goals of Abundant Intelligences, it would be helpful to see more clearly how Indigenous members were involved in shaping the direction of the work, and how responsibility, authorship, and decision-making were shared, rather than the project being led primarily by one non-Indigenous collaborator.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"One potential risk is that the work depends on ongoing relationships with Elders, students, and community partners, so continuity and care are important to maintain as the project develops; this is already being addressed through advisory guidance, mentorship structures, and collective decision-making.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Progress into Imaginaries and Intelligences phases would require integration into an established research structure such as the Cosmologyscape work on Black and Indigenous AI with the University of Manitoba team, along with clearer methodology, defined collaborators, and grounded community engagement.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"A potential risk is that, as a primarily student-led initiative, the work may lack continuity or long-term impact without ongoing mentorship and stronger integration with the POD or broader network; this can be mitigated through continued guidance, collaboration, and clearer next-stage planning.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"To support both phases, the project would benefit from identifying a smaller set of core technical contributions, documenting its processes in a way that others can build from, and clarifying how its systems extend beyond a single installation into transferable approaches within the network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, the work could deepen by moving some of these concepts into more concrete systems, such as language learning tools, local models, or interactive digital environments, while continuing to be guided by Elder advisory processes and community priorities.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"An exciting aspect of this project that needs to be supported separately is the development of a \"deep-learning framework that simultaneously learns a time varying sensor footprint and a pixel level model of carbon flux applicable to biomes measured by the AmeriFlux network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"It may be helpful to clarify the extent of the community engagement described here, and to more explicitly articulate how these relationships and discussions contributed to the development of the project and how they relate to the wider objectives of Abundant Intelligences.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"This could be mitigated by more explicitly linking the pedagogical work to future language technologies, tool development, or collaboration with projects building data or compute infrastructure, and by documenting processes so they can be reused across the network.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"Collaboration could deepen through shared workshops or co-developed case studies, especially with teams working on low-power or localized AI systems, where bio-circular design principles can be tested in parallel at smaller scales within our current network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"If that is the case, it would be helpful to clarify what phase the project is actually in, and whether the intention here is documentation, reflection, or further development, rather than new work that would unfold as part of the Transformations activities.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"The project could move into the Imaginaries phase by further developing its community-driven pedagogical approach as a basis for thinking about how language technologies should be designed in ways that follow local knowledge systems and teaching practices.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"To advance into the Intelligences phase, the work would need to move from exploratory prototypes toward more clearly defined technical outputs, such as stable platforms, documented modeling methods, or tools that can be tested or adapted by other projects.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, advancement would likely require more concrete technical development, such as prototyping language or learning tools, along with clearer articulation of governance, data stewardship, and collaboration with other AbInt projects.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Greater documentation of methods, clearer connections to other network activities, and a more defined technical pathway would help the work extend from its current, locally focused stage into forms that can contribute more directly to the later phases.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"This is one of the most connected projects because of the depth of its engagement through chapters, we should invite each chapter to present on their writing at a filmed, interview each chapter writer for a video, and host a celebration of its launch.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"It would be important to aggregate the researchers across pods who are interested in socio-neuro, including thinking through neuroscience implications, practices that are emerging in other national and linguistic contexts (see note on collaboration).","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"The research needs to deepen into applying AI both in production support but more importantly in graphics development and automation, data analysis and outputs (relevant to graphics) and possible work with body and environmental sensor data.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow","project_id":"Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow","code":"","area":"Storytelling"},{"text":"Stronger documentation, clearer technical goals, and closer integration with other AbInt projects would help the research extend from its current localized focus into forms that contribute more directly to later-phase network development.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"In the Intelligences phase, the work could deepen by adding more interactive or adaptive systems, integrating language, narrative, or agent-based behaviours, and connecting the virtual environment to other AbInt projects or datasets.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Stronger collaboration would likely require clearer alignment with existing technical initiatives in the network and more explicit plans for how the project\u2019s models or platforms could be adapted or used by other teams.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, the project would need to deepen its technical clarity by specifying how movement, plant signals, and interaction data are modeled, learned from, and translated into system behavior.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"This is a starting point toward fine scale monitoring of carbon fluxes on Indigenous Lands beyond Coquille lands.\" This should be proposed in another project and linked with projects using similar technology.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"Imaginaries: deepen through use the book as background reading to prep for the FIIAI Workshops; review book and extract out concrete IIAI that might be found; deepen and support by doing a second volume.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"Builds lasting capacity among researchers, learners, and communities Unfortunately have pivoted away from building a technical prototype (to a proof-of-concept for protocol-driven information access).","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"},{"text":"Stronger connection to the network would likely require more intentional sharing of methods and clearer alignment with projects developing technical frameworks that could support or extend this work.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"The project would benefit greatly by aligning the artistic/ creative component with a technical mentor/advisor/developer to advance and realise the AI conceptualisation and development of a Napi AI.","type":"recommendation","polarity":"neutral","reviewer":"Hemi","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"This risk can be mitigated by requiring clearer alignment between proposed activities and outcomes, along with basic documentation such as workshop materials, recordings, or written reflections.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"In the Imaginaries phase, the work could deepen its conceptual framework by further developing the role of community knowledge, narrative, and language as foundations for alternative AI design.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Furthermore, question 10 of the final report suggests that the following were integrated by Bobi-Rose Leatherby into the project: Classical Machine Learning + Deep Learning & Foundation Models.","type":"recommendation","polarity":"neutral","reviewer":"Karim","project":"Bobi-Rose Leatherby","project_id":"Bobi-Rose Leatherby - CfP02-01","code":"CfP02-01","area":"Socio-Neuro AI"},{"text":"The work already proposes new conceptual models\u2014such as Dish With One Spoon as a protocol for data sharing and reciprocity\u2014that could be expanded into shared frameworks across the network.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"Would need further context but it has the potential to grow and advance the work in visuospatial representations of epistemologies in the Imaginaries and Intelligences Phases of AbInt","type":"recommendation","polarity":"neutral","reviewer":"Hemi","project":"Data Visualizations Catalogue - Orus Mateo Casta\u00f1o-Su\u00e1rez","project_id":"Data Visualizations Catalogue - Orus Mateo Casta\u00f1o-Su\u00e1rez","code":"","area":"Storytelling"},{"text":"It will need to ensure Indigenous co-leadership, create a link to AbInt in the Canadian context, define that AI tools that are being built and how these are driven by Indigenous IKS.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"It has had relatively small audiences and engagement but this is also due to administrative challenges (funding flowing from the centre) but most importantly the need to build trust.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"Imaginaries: need to run a FIIAI workshop using this as a starting point Intelligences: not sure if counts as Transformative but certainly an advancement for Indigenous AI","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Hawaiian Language Physical Reasoning Dataset - Cade Kane","project_id":"Hawaiian Language Physical Reasoning Dataset - Cade Kane","code":"","area":"Language"},{"text":"Any collaboration would need to begin with transparency and alignment on ethics, governance, and community accountability before deeper integration across the network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"It suggests that they will combine XR systems, motion capture, plant sensing, and AI modeling, which may result in integration challenges in terms of system building.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"Imagaries: deepen - use as foundation for well-grounded imaginaries; should bring Solomon in to do work extending out one of his Akua AI scenarios within its context.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Abundant Soils - Mele Moniz","project_id":"Abundant Soils - Mele Moniz","code":"","area":"Env Stewardship"},{"text":"This project should be part of the strategic work on local processing, sovereign stacks which is an emerging direction across AbInt and as part of a larger coalition.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Laurie Lloyd Jones","project_id":"Laurie Lloyd Jones - CfP02-04","code":"CfP02-04","area":"Storytelling"},{"text":"I think all the Hawaiian language projects could be brought together, and a consortium made with the other language projects (Maori, Niitsitapi, maybe Haudenosaunee)","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"},{"text":"To support both phases, the project should narrow its scope, define clear outputs, and strengthen community co-design so the work is both grounded and transferable.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"I have in other places suggested we pull together a research stream on embodied data as this is music based, language based and physical interaction based.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"AI Drum -  Jackson Twobears","project_id":"AI Drum -  Jackson Twobears","code":"","area":"Multi-Agent Systems"},{"text":"Our pod hopes to deepen relationships with Daniels for AbInt as the Visual Analytics Lab (Diamond) has strong collaborations on complete community design.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","project_id":"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","code":"","area":"Storytelling"},{"text":"Risk - need to sustain talent that are associated with this project as it is fundamental to the ongoing development of a fundamental area of research.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"To advance this project through the Imaginaries and Intelligences phases would require the assistance of a technical mentor/advisor/developer.","type":"recommendation","polarity":"neutral","reviewer":"Hemi","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Other: Imaginaries: deepen with case study of how she i ilds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear","project_id":"Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear","code":"","area":"Multi-Agent Systems"},{"text":"AI developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies, infrastructure...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities..","type":"observation","polarity":"positive","reviewer":"Jason","project":"Hawaiian Language Physical Reasoning Dataset - Cade Kane","project_id":"Hawaiian Language Physical Reasoning Dataset - Cade Kane","code":"","area":"Language"},{"text":"Based on the goals of the project, it clearly centres M\u0101ori community priorities and data sovereignty via marae-based engagement, it seeks to advances a community\u2011led stance toward AI use with explicit ethics/governance dialogue, and contributes to co\u2011created processes and a developing neuro\u2011fuzzy AI system in an Indigenous health context; and documents sustained capacity building.","type":"observation","polarity":"positive","reviewer":"Karim","project":"Bobi-Rose Leatherby","project_id":"Bobi-Rose Leatherby - CfP02-01","code":"CfP02-01","area":"Socio-Neuro AI"},{"text":"Although there is not a lot of evidence of formal data sovereignty processes or core AI system development, there is a strong emphasis on protocol and relational approaches to AI, advancing relational/educational approaches to AI, co-creating programs (artist fellowship, workshops) and building reusable processes (cookbook), while also cultivating student/community capacity.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"infrastructure, policy engagement, and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities, Canada","type":"observation","polarity":"positive","reviewer":"Jason","project":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","project_id":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","code":"","area":"Multi-Agent Systems"},{"text":"Having a leading Indigenous thought leaders and scholars is a great strength and we would all benefit from sharing time with leaders such as Leroy and learning from from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"The risk with not pursuing this project lies in the opportunities and benefits that are gained from working closely with and drawing from Leroy Little Bear\u2019s teachings and knowledge to ensure that our work is grounded in Indigenous methodologies, community-informed practices, and the co-creation of a sovereign digital space","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"transforming how artificial intelligence is conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Suzanne Kite","project_id":"Suzanne Kite - CfP01-09","code":"CfP01-09","area":"Other"},{"text":"Its emphasis on collaboration with community partners, development of culturally grounded curriculum materials, and experimentation with technology as a supportive rather than dominant framework aligns with the program\u2019s goal of shifting AI research toward relational, ethical, and locally defined practices.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"The project is well positioned to advance into the Imaginaries phase by further developing its dialogue-based and land-based methodologies as frameworks for imagining Indigenous-centred approaches to AI, particularly through language, storytelling, and relational understandings of knowledge and memory.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement by demonstrating how Indigenous knowledge systems, particularly Blackfoot metaphysics and teachings, can inform the creation of sovereign digital environments that challenge Western assumptions about space, time, and intelligence.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Its focus on relational methodologies and Elder-guided processes also positions it well to contribute to network-wide conversations about ethics, data sovereignty, and Indigenous-centred design, making it a useful hub for collaboration as other projects move further into technical development.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"The strong mentorship structure and focus on learning also make this a good candidate for collaboration through workshops, shared development sessions, or student exchanges, which could help expand the work beyond its current scope while contributing to broader network capacity building.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"The fact that Rick Hill agreed to work with Gary Joseph (TRD) and Jackson Leween to create an archive of Rick\u2019s research is extremely well aligned and the decision to build a new dedicated server for this content is an important contribution, and showcases a great partnership with TRD.","type":"observation","polarity":"positive","reviewer":"Karim","project":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","project_id":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","code":"","area":"Multi-Agent Systems"},{"text":"The project fits naturally within the Imaginaries phase through its speculative exploration of symbolic language, dreaming, and human\u2013AI interaction, and could contribute to that phase by further developing its conceptual and methodological framework for culturally grounded AI design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"Its combination of technical prototyping, governance design, and capacity building through workshops, student leadership, and partnerships supports AbInt\u2019s goal of transforming AI by aligning computation with Indigenous knowledge systems, sovereignty, and shared responsibility.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"The risk of not pursuing the project would be the loss of a strong example of Indigenous-centred digital environment design, which contributes to AbInt\u2019s goals by expanding how virtual space, storytelling, and relational worldviews can shape future AI and interactive systems.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"It prioritizes non-extractive collaboration, supports the integration of diverse knowledge systems for scalable and context-sensitive fire management, and lays the groundwork for governance frameworks that enable locally relevant, equitable, and community-led AI solutions.","type":"observation","polarity":"positive","reviewer":"Karim","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"The risk of not pursuing the project would be significant, as it supports the relational and community-driven foundations necessary for Indigenous-centred AI, while also building capacity through residencies, mentorship, and shared learning across the AbInt network.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"The project has strong potential to advance into the Imaginaries phase through further development of its conceptual framework around Indigenous metaphysics, relational space, and alternative understandings of time, energy, and environment within digital worlds.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Through the development of an interactive Unity-based world, the work explores alternative ways of understanding relationality, energy, and place within digital media, while grounding the process in mentorship, community learning, and POD-based practices.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"The network would greatly benefit from working closer with this Pod and learning from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"It could serve as a point of dialogue with projects focused on Indigenous data sovereignty, relational methodologies, and community-led infrastructure, especially where there is interest in language, pedagogy, or small-data approaches.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"The work demonstrates capacity building, student training, and public knowledge mobilization through exhibition and artist talks, and shows an effort to situate AI development within community relationships and storytelling practices.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"The HIFI Lab project demonstrates strong alignment with AbInt's Transformation statement and strategic direction through its grounding in cultural protocols, Indigenous-centred and community-led imaginaries and educational engagement.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"By supporting artist residencies, community conversations, and the creation of digital and performative works, the project shifts AI inquiry away from purely technical development toward culturally grounded, community-led processes.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"There is very strong potential for collaboration with other projects across the AbInt network, particularly those working with language models, community data governance, virtual environments, and Indigenous-centred AI design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"This project contributes to AbInt\u2019s Transformation Statement through its focus on community-led language work, collaborative curriculum development, and attention to data sovereignty in the context of language revitalization.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"Its emphasis on collaboration with Lakota knowledge holders and on grounding technical work in community interpretation reflects the program\u2019s goal of shifting AI research toward relational and culturally informed approaches.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"At this stage the HIFI Lab project is at its foundational stages and is well positioned as a culturally grounded, capacity-building initiative that advances relational approaches to AI within its community context in Hawai'i.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"There is strong potential for collaboration with other projects in the AbInt network, particularly those working with virtual environments, storytelling, language, and Indigenous-centred approaches to digital and AI systems.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"AI conceived...by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies...towards relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","project_id":"Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","code":"","area":"Storytelling"},{"text":"There is strong potential for collaboration with other projects across the AbInt network, particularly those working with language revitalization, digital storytelling, community-based AI, and Indigenous data governance.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"This research is well positioned to advance into the Imaginaries phase by further developing its governance frameworks, storytelling logics, and treaty-based ethics as foundations for alternative approaches to AI design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"Although not evident in the project description provided the project \"shifts AI from extractive models imposed on Indigenous communities towards relational and accountable approaches co-developed with those communities\".","type":"observation","polarity":"positive","reviewer":"Sara","project":"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","project_id":"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","code":"","area":"Storytelling"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement by actively reworking AI systems through Indigenous governance, methodologies, and relational ethics grounded in the Dish With One Spoon covenant.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement through its relational, Indigenous-centred approach to AI research grounded in Blackfoot knowledge, Elder guidance, and land-based dialogue.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"The project demonstrates strong alignment with marae-based priorities and Indigenous data sovereignty, notably through commitments to keeping data in Aotearoa and ensuring community control over models.","type":"observation","polarity":"positive","reviewer":"Karim","project":"Laurie Lloyd Jones","project_id":"Laurie Lloyd Jones - CfP02-04","code":"CfP02-04","area":"Storytelling"},{"text":"Risk appears relatively low, as the project is exploratory and limited in scope, with most activities focused on mentorship, learning, and early-stage development rather than complex AI deployment.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Risk appears relatively low, as the project focuses primarily on curriculum development, collaboration with language teachers, and exploratory planning rather than complex technical implementation.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"The work demonstrates a relational approach to knowledge creation, with teachers and community members directly shaping the learning materials and guiding how language data are generated and used.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"This project has strong potential to connect with other AbInt projects exploring embodied interaction, performance, and alternative forms of data such as movement, sound, and sensor-based systems.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"There is evidence demonstrating the development of an Indigenous\u2011centred direction and capacity building via mentorship and community\u2011facing dissemination through an exhibition and artist visits.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Through the co-creation of methodologies, infrastructure, policy engagement, and Indigenous-centred AI systems; towards relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"It touches on multiple points in the transformation statement and includes close collaboration with communities - \"relational and accountable approaches co-developed with those communities\".","type":"observation","polarity":"positive","reviewer":"Sara","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"The Digital preservation of Rick Hill's archive of Haudenosaunee cultural knowledge project demonstrates strong alignment with AbInt's Transformation statement and strategic direction.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Digital Archive Project with Rick Hill - Jackson Twobears","project_id":"Digital Archive Project with Rick Hill - Jackson Twobears","code":"","area":"Storytelling"},{"text":"As the project develops its planned AI components, it could connect with other PODs exploring language models, community-based data practices, or culturally grounded interface design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"The co-creation of VR/NeRF reconstructions (grounded in interviews and sustained marae engagement) is a notable strength, as is the documented development of student leadership.","type":"observation","polarity":"positive","reviewer":"Karim","project":"Laurie Lloyd Jones","project_id":"Laurie Lloyd Jones - CfP02-04","code":"CfP02-04","area":"Storytelling"},{"text":"Risk appears relatively low, as the project is grounded in research-creation, dialogue, and community-led processes rather than high-risk technical deployment.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Alignment with an Indigenous\u2011centred, relational AI paradigm is clearly articulated; concrete AI tooling is early\u2011stage with limited technical detail reported.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"This project has strong potential to connect with other AbInt projects focused on infrastructure, Indigenous data sovereignty, and land-based methodologies.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"I agree with the assessment that there is clear articulation of \" an Indigenous\u2011centred, relational AI paradigm\", but there is little technical design.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"It integrates data sovereignty via on\u2011device design, and prototypes multi\u2011agent systems oriented toward relational, culturally sensitive AI practice.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"It has potential to cultivate ground breaking factual AI systems grounded in care, abundance, and cultural relevance for Indigenous communities.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Abundant Soils - Mele Moniz","project_id":"Abundant Soils - Mele Moniz","code":"","area":"Env Stewardship"},{"text":"methodologies, infrastructure, and Indigenous-centred AI systems, trelational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Suzanne Kite","project_id":"Suzanne Kite - CfP01-09","code":"CfP01-09","area":"Other"},{"text":"The Hiringa Te Mahara (DEEP KIN) project demonstrates strong alignment with AbInt's Transformation statement and strategic direction.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Hiringa Te Mahara (DEEP KIN) research platform - Kevin Shedlock","project_id":"Hiringa Te Mahara (DEEP KIN) research platform - Kevin Shedlock","code":"","area":"Multi-Agent Systems"},{"text":"Co-creation of methodologies policy engagement towards relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Fenwick McKelvey","project_id":"Fenwick McKelvey - CfP04","code":"CfP04","area":"Language"},{"text":"Through the co-creation of methodologies towards relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Biskaabiiyaang Video Game - Maya Chacaby","project_id":"Biskaabiiyaang Video Game - Maya Chacaby","code":"","area":"Storytelling"},{"text":"data sovereignty and land- relational learning, the project seeks to enhance adaptation of Blackfoot Indigenous knowledge.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"It aligns with Transformation goals of centering Indigenous knowledge systems, and relational and accountable approaches.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow","project_id":"Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow","code":"","area":"Storytelling"},{"text":"That said, i think there was good capacity building and contributions to a PhD research work involved.","type":"observation","polarity":"positive","reviewer":"Karim","project":"Jamey Hepi","project_id":"Jamey Hepi - CfP02-02","code":"CfP02-02","area":"Other"},{"text":"Strong alignment with storytelling, systems design, and Indigenous computation work.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","project_id":"Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","code":"","area":"Storytelling"},{"text":"towards relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"},{"text":"relational and accountable approaches co-developed with those communities...","type":"observation","polarity":"positive","reviewer":"Jason","project":"Mohawk LLM - Jackson Twobears","project_id":"Mohawk LLM - Jackson Twobears","code":"","area":"Language"},{"text":"They have also a well documented capacity building and community co\u2011design.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"Strong potential to share and collaborate with the AbInt Network.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Melanie Cheung","project_id":"Melanie Cheung - CfP01-06","code":"CfP01-06","area":"Socio-Neuro AI"},{"text":"A key risk lies in the project\u2019s orientation/implementation: It is a technically driven computer-vision effort (centred on MobileNet-based, on-device recognition of M\u0101ori Rongo\u0101-relevant plants) where co-design processes and formal data governance frameworks remain underdeveloped.","type":"observation","polarity":"concern","reviewer":"Karim","project":"Jamey Hepi","project_id":"Jamey Hepi - CfP02-02","code":"CfP02-02","area":"Other"},{"text":"Although the project does not focus on core AI model development, it advances the transformation goals by building Indigenous-centred approaches to virtual space, storytelling, and digital world-making that can inform future AI and interactive system design within the network.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"While the work itself seems thoughtful and well situated in its specific context, the proposal does not clearly indicate how it would move forward in a meaningful way, or what new directions, outcomes, or research questions would emerge through this next phase.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"A risk is that the project remains primarily focused on curriculum development without clearly extending into technical, infrastructural, or network-level outcomes, which could limit its relevance to AbInt\u2019s broader goals around AI and shared research methods.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"One risk is that the project relies on highly experimental methods combining neuroscience, symbolic analysis, and AI, which may make outcomes difficult to realize within the project timeframe or limit their usefulness to the wider network.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In this case, the project seems to have been led primarily by a single non-Indigenous member, and it may have been stronger if the work had been co-led with an Indigenous POD member rather than centered on one individual.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"Risk appears relatively low, as the project is primarily focused on creative development, learning, and community-informed digital world-building rather than high-risk technical or data-driven AI systems.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"The project references Indigenous knowledge systems and data sovereignty, but does not demonstrate meaningful co-creation with Indigenous communities or implementation of Indigenous-led methodologies.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"This project shows a limited contribution to the Transformation Statement, as it centers collaboration and community engagement but does not substantially reshape how AI is developed or governed.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"Risk: That it stays at the data gathering stage and does not evolve into an engagement with AI research in adoption and systems development.","type":"observation","polarity":"concern","reviewer":"Sara","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"I do not see strong potential for this project to advance into the Imaginaries or Intelligences phases in its current form.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"In its current form, this project does not demonstrate advancement into either the Imaginaries or Intelligences phases.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"No significant risks identified at this stage given the limited scope and exploratory nature of the work.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"This project is challenging, because so much of what was reported is not tied to the CfP project.","type":"observation","polarity":"concern","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"I am not entirely certain how this aligns with the AbINT Transformations statement.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"The technical AI implementation component is an important but challenging endeavor.","type":"observation","polarity":"concern","reviewer":"Karim","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"This is an extremely important but highly experimental project.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"I do not see a strong potential for advancement here.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"Hard to asses since so late getting started.","type":"observation","polarity":"concern","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"}]},"network_actions":[{"text":"For the Indigenous Methodologies book portion of their research, \"The next phase of the project will largely focus on the digital component of the book, making a compelling and useful resource and methods toolbox repository for Indigenous AI scholars and practitioners.\" It is my recommendation that we have an website building intensive for all our related projects, and focus a lot of our RA power over a month period to getting websites up for all these amazing projects, especially one like this.","reviewer":"Suzanne","project":"Ashley Cordes","code":"CfP01-01","polarity":"neutral"},{"text":"infrastructure, policy engagement, and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities, Canada Imaginaries: need whole series of FIIAI projects that take a Sovereign Stack as their starting point, and imagine out from there.","reviewer":"Jason","project":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","code":"","polarity":"positive"},{"text":"Huk addresses this transformation goal, \"the Partnership shifts AI from extractive models imposed on Indigenous communities towards relational and accountable approaches co-developed with those communities\" in the context of an international collaboration between MILA researchers and El Martadero, a 3 000 m\u00b2 community lab in Cochabamba at the mARTadero, a cultural and tech hub in Cochabamba that offers a hacklab, dance collectives, and \"a myriad of artists\".","reviewer":"Sara","project":"Eilif Muller, Mila Quebec AI Institute","code":"CfP04","polarity":"positive"},{"text":"conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies, infrastructure...towards relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities.","reviewer":"Jason","project":"Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear","code":"","polarity":"positive"},{"text":"AI developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies, infrastructure...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities..","reviewer":"Jason","project":"Hawaiian Language Physical Reasoning Dataset - Cade Kane","code":"","polarity":"positive"},{"text":"How can this project connect with other environmental projects and how can some of the tool and AI development be shared, \"environmental DNA sampling strategies, as well as lab experience working with geoarchaeological methods like sediment core sampling and XRF analysis, and biological methods including metagenomic analysis and the development of biocomputing skills\".","reviewer":"Sara","project":"Keolu Fox, University of California San Diego","code":"","polarity":"neutral"},{"text":"Strong focus on data sovereignty (keeping data in Aotearoa; community control of models), as summary states, \"moves practice away from third\u2011party/extractive pipelines, co\u2011creates VR/NeRF reconstructions informed by interviews and ongoing marae engagement\", undertakes a shift to \"local processing\" and documents student leadership growth.","reviewer":"Sara","project":"Laurie Lloyd Jones","code":"CfP02-04","polarity":"neutral"},{"text":"To advance into the Intelligences phase, the work would likely need to move beyond curriculum development toward more clearly defined technical experimentation, such as prototyping language-learning tools, working with small language models, or collaborating with other projects building shared infrastructure for language data.","reviewer":"Jackson","project":"Christine Clark","code":"CfP04","polarity":"neutral"},{"text":"transforming how artificial intelligence is conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Suzanne Kite","code":"CfP01-09","polarity":"positive"},{"text":"At the same time, the project\u2019s primary contribution is at the level of experimental methodology and speculative design rather than shared infrastructure or broadly reusable tools, so its transformative impact would depend on how its methods and results are documented and made accessible to the wider network.","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","code":"CfP04","polarity":"neutral"},{"text":"The project also aligns well with network activities focused on relational AI, digital territories, and culturally grounded interface design, and could benefit from further collaboration through shared builds, workshops, and cross-POD development sessions that expand the work beyond its original context.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"In the Intelligences phase, this would likely require moving beyond curriculum development toward more clearly defined technical experiments, such as prototyping language-learning tools, working with small language models, or collaborating with other projects that are building shared infrastructure.","reviewer":"Jackson","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"neutral"},{"text":"The project\u2019s work on LLM guardrails, SLM repositories, and Dish With One Spoon governance protocols could provide shared frameworks that other PODs adapt to their own contexts, while its workshop and \u201ctinker time\u201d model offers a format for cross-POD experimentation.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"neutral"},{"text":"There is potential for this project to connect with other AbInt projects working on language revitalization, small language models, data governance, and community-based AI infrastructure, particularly where pedagogical materials could inform future tool development.","reviewer":"Jackson","project":"Christine Clark","code":"CfP04","polarity":"neutral"},{"text":"This could be mitigated by more explicitly linking the pedagogical work to future language technologies, tool development, or collaboration with projects building data or compute infrastructure, and by documenting processes so they can be reused across the network.","reviewer":"Jackson","project":"Christine Clark","code":"CfP04","polarity":"neutral"},{"text":"Collaboration could deepen through shared workshops or co-developed case studies, especially with teams working on low-power or localized AI systems, where bio-circular design principles can be tested in parallel at smaller scales within our current network.","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","code":"","polarity":"neutral"},{"text":"This is one of the most connected projects because of the depth of its engagement through chapters, we should invite each chapter to present on their writing at a filmed, interview each chapter writer for a video, and host a celebration of its launch.","reviewer":"Suzanne","project":"Ashley Cordes","code":"CfP01-01","polarity":"neutral"},{"text":"The project\u2019s dialogue-based and residency-driven structure creates opportunities to connect with other PODs through shared workshops, student exchanges, and collaborative development of language tools, digital environments, or governance frameworks.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"neutral"},{"text":"Centres indigenous methodologies and governance in their Dish With One Spoon work, adapts and experiments with Indigenous\u2011led AI systems in JSON guardrails and SLMs, and have developed a shareable method/tools that could be used across the network.","reviewer":"Hemi","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"neutral"},{"text":"This is application based AI research and it would be good to test the application across the network - in particular Pechawis consistently updates his work with responsible wearables - could this be an opportunity to work with his Cree repertoire.","reviewer":"Sara","project":"AI Drum -  Jackson Twobears","code":"","polarity":"neutral"},{"text":"It
