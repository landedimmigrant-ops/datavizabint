t, several projects use IK language in their framing but reviewers note the actual integration remains aspirational.","what_reviewers_flag":"Sara questions whether some projects are genuinely Indigenous-led or using IK framing without substantive community partnership. Jason's reviews consistently use the transformation statement language verbatim, making it harder to distinguish genuine IK depth from template responses. Suzanne provides the sharpest project-specific reads \u2014 identifying where IK is structurally embedded vs. mentioned in passing.","strongest_projects":["Digital Archive Project with Rick Hill","Mohawk LLM","Mythos","Sara Diamond & Archer Pechawis","Suzanne Kite"],"gap":"Projects like Maurice Jones and Michelle Sylvestre show minimal IK engagement. The Blackfoot Dictionary \u2014 despite being explicitly about Indigenous language \u2014 received a reviewer comment of 'difficult to assess' suggesting insufficient reporting rather than absence of IK work.","phase2_question":"The network needs to distinguish between IK-as-framing and IK-as-practice. Phase 2 could require projects to document specific IK holders, protocols, and decision-making processes rather than claiming alignment in general terms.","strong_count":14,"moderate_count":15,"weak_count":7,"pod_leaders":["Haudenosaunee Pod","Wih\u00e1nble S'a Pod"]},"ts_relational":{"label":"Relational Practice","signal_strength":"Moderate","summary":"Relational practice shows up in two distinct forms across the network. The first is grounded, place-based relationship work \u2014 Jackie Rice's Blackfoot Elder guidance and land-based dialogue, Copper Bowls' Dish With One Spoon philosophy, Bobi-Rose Leatherby's marae- and w\u0101nanga-based engagement with Huntington's disease families. These are projects where the reviewer language describes specific relational protocols and accountability structures. The second form is more conceptual \u2014 projects that reference 'relational approaches' or 'reciprocity' without describing concrete relational practices.","what_reviewers_flag":"Jackson's reviews of Jackie Rice and Sara Diamond provide the strongest relational evidence \u2014 describing 'relational ethics grounded in the Dish With One Spoon covenant' and 'Elder guidance and land-based dialogue.' Hemi's review of Bobi-Rose names specific M\u0101ori relational forms: marae, w\u0101nanga, face-to-face engagement. The gap is visible when reviewers use the word 'relational' without describing what that looks like in practice.","strongest_projects":["Jackie Rice","Sara Diamond & Archer Pechawis","Bobi-Rose Leatherby","Copper Bowls","Christine Clark"],"gap":"Only about 8 projects demonstrate relational practice as a concrete methodology rather than a descriptor. The Podless projects are notably weaker here \u2014 without pod-level relational infrastructure, individual projects struggle to demonstrate relational accountability.","phase2_question":"Can the network articulate what relational practice looks like structurally \u2014 not just in principle but in documented governance, review, and accountability protocols that projects follow?","strong_count":8,"moderate_count":17,"weak_count":11,"pod_leaders":["Niitsitapi Pod","T'karonto Pod"]},"ts_community":{"label":"Community-Centred","signal_strength":"Strong","summary":"Community-centred work is the second strongest signal across the network after IK. Ashley Cordes and Bobi-Rose Leatherby score highest \u2014 reviewers describe genuine community-defined priorities, not researcher-defined agendas labelled as community work. Sara Diamond's Dish With One Spoon project demonstrates community governance embedded in the AI development process itself. Christine Clark's Niitsi'powahsin Soundscapes shows community engagement through 2,800+ hours of language recordings with community speakers. The Hiringa pod projects (Bobi-Rose, DEEP KIN, Laurie Lloyd Jones) consistently centre M\u0101ori community structures.","what_reviewers_flag":"Suzanne's review of Ashley Cordes emphasises 'groundbreaking' community-centred methodology. Hemi consistently identifies community governance structures in Aotearoa projects \u2014 marae-based engagement, iwi/hap\u016b consultation. Sara flags where community engagement is claimed but evidence is thin: 'it is not clear that the project is Indigenous-led' (used for at least two projects). Jason notes community benefit but sometimes in generic transformation-statement language.","strongest_projects":["Ashley Cordes","Bobi-Rose Leatherby","Sara Diamond & Archer Pechawis","Christine Clark","Jackie Rice","DEEP KIN"],"gap":"Data Visualizations Catalogue, Michelle Sylvestre, and Maurice Jones show minimal community-centred signal. Some technically strong projects (Pit Fire, AI Drum) are weak on community engagement \u2014 reviewer language focuses on the technical experimentation rather than community benefit.","phase2_question":"How does the network measure the difference between community involvement and community governance? Several projects involve community members but the decision-making authority isn't clearly documented.","strong_count":12,"moderate_count":16,"weak_count":8,"pod_leaders":["Niitsitapi Pod","Hiringa Te Mara"]},"ts_technical":{"label":"Technical AI Transformation","signal_strength":"Moderate","summary":"Technical AI transformation is where the network shows its widest spread. A cluster of projects are doing genuine technical work \u2014 AI Server on Six Nations (sovereign infrastructure), Sara Diamond (JSON guardrails and SLMs), Melanie Cheung (neural fuzzy system with community-built AI model), Pit Fire (ML with fire-as-intelligence). But roughly half the network has minimal technical AI output. Reviewers describe many projects in terms of cultural practice, community engagement, or conceptual framing without pointing to specific AI systems, datasets, or architectures being built or modified.","what_reviewers_flag":"Hemi's review of Melanie Cheung notes 'great progress developing their AI model \u2014 they need more compute to run more variables,' indicating real technical depth. Suzanne identifies concrete technical outputs: 'maxMSP patch,' 'self-training systems,' 'JSON guardrails.' Sara flags the gap directly in multiple reviews \u2014 projects that engage the transformation statement's language but haven't produced technical outputs. The Haudenosaunee Pod has the most concentrated technical activity (AI Server, Mohawk LLM, AI Drum, Pit Fire).","strongest_projects":["AI Server on Six Nations","Sara Diamond & Archer Pechawis","Melanie Cheung","Pit Fire AI/ML Project","Suzanne Kite","Antoine Bellemare-Pepin"],"gap":"15 projects score below 0.5 on technical transformation. Michelle Sylvestre, Sacred Code, Ma'ema'eolehua Matsumoto, and Maurice Jones have essentially no technical AI output visible to reviewers. This is the dimension where the network's 'emerging' status is most visible \u2014 many projects are still in conceptual or community-engagement phases rather than building AI systems.","phase2_question":"The network needs to decide whether all projects should be expected to produce technical AI outputs, or whether some projects legitimately contribute through methodology, governance, and community infrastructure that technical projects build on. If the latter, how does Phase 2 structure that interdependence?","strong_count":8,"moderate_count":13,"weak_count":15,"pod_leaders":["Haudenosaunee Pod","Wih\u00e1nble S'a Pod"]},"ts_governance":{"label":"Data Sovereignty & Governance","signal_strength":"Strong","summary":"Governance shows the clearest institutional signal in the network. Sara Diamond's project leads with governance frameworks explicitly embedded in AI development through the Dish With One Spoon covenant. The Haudenosaunee Pod demonstrates sovereignty-in-action: AI Server on Six Nations is building physically sovereign infrastructure, Mohawk LLM centres language sovereignty, and the Digital Archive establishes governance over Haudenosaunee cultural records. The Hiringa pod contributes strongly through M\u0101ori data sovereignty frameworks \u2014 Bobi-Rose Leatherby and DEEP KIN both have explicit tikanga-based governance protocols. Laurie Lloyd Jones' project specifically keeps data in Aotearoa with community-controlled models.","what_reviewers_flag":"Hemi provides the most specific governance reads \u2014 naming marae-based engagement, iwi/hap\u016b structures, and tikanga protocols in Aotearoa projects. Sara identifies governance gaps bluntly: 'it is not clear that the project has established data governance protocols.' Jackson's reviews name the Dish With One Spoon covenant as a living governance framework. Suzanne flags projects where governance is mentioned but not structurally implemented.","strongest_projects":["Sara Diamond & Archer Pechawis","AI Server on Six Nations","Bobi-Rose Leatherby","DEEP KIN","Mohawk LLM","Digital Archive","Laurie Lloyd Jones"],"gap":"Emergence/Non-Linearity, Maurice Jones, and Michelle Sylvestre have almost no governance signal. Some Storytelling-area projects treat data as creative material without addressing sovereignty implications. The Podless projects are notably weaker on governance \u2014 without pod-level governance infrastructure, individual projects default to institutional ethics boards rather than community-controlled frameworks.","phase2_question":"The network has 7 projects with strong governance frameworks \u2014 can these become templates or reference models for the 15+ projects that don't yet have explicit governance? The Dish With One Spoon and tikanga-based models are the most developed; are they transferable across cultural contexts?","strong_count":10,"moderate_count":14,"weak_count":12,"pod_leaders":["Haudenosaunee Pod","Hiringa Te Mara","T'karonto Pod"]},"ts_network":{"label":"Network & Cross-Project","signal_strength":"Moderate","summary":"Network connectivity is concentrated in a few highly connected projects rather than distributed across the network. Sara Diamond's project is the most cited for cross-project potential \u2014 reviewers describe shareable methods, SLM tools that could be used across the network, and explicit collaboration pathways. Peyak (Shankhalika Srikanth) is described by Sara as 'strongly networked.' Ashley Cordes' book project is positioned as a network-level resource. AI Drum and Abundant Soils are mentioned for cross-pod connection potential. But the majority of projects operate within their pod or in isolation.","what_reviewers_flag":"Suzanne consistently identifies connection opportunities: 'should connect with other sensor/performance art projects,' 'could connect with projects on environmental sensing.' Sara identifies structural network roles: Ashley Cordes as 'most connected project.' Hemi describes the AI Glossary as a network-wide resource being developed with blog and sharing mechanisms. But many reviews discuss collaboration as potential rather than existing practice.","strongest_projects":["Sara Diamond & Archer Pechawis","Ashley Cordes","AI Server on Six Nations","Peyak","AI Drum","Abundant Soils"],"gap":"Blackfoot Dictionary, Maurice Jones, and Michelle Sylvestre have almost no network signal. The 'Podless' projects \u2014 which might benefit most from network connections \u2014 are actually the least connected according to reviewer assessments. Cross-pod collaboration is mostly aspirational; reviewers describe it as something that 'should' or 'could' happen rather than something that is happening.","phase2_question":"The network has identified potential connections but hasn't yet built the infrastructure for them. Phase 2 needs to decide: does it fund network-building activities directly (consortium models, shared workshops, cross-pod residencies), or does it rely on organic connections between projects?","strong_count":6,"moderate_count":18,"weak_count":12,"pod_leaders":["T'karonto Pod","Haudenosaunee Pod"]},"ts_imaginaries":{"label":"Imaginaries & Speculative","signal_strength":"Moderate","summary":"The Imaginaries dimension reveals a fascinating split. A cluster of projects are genuinely speculative \u2014 Mythos (ceremony as system logic), Suzanne Kite (Lakota metaphysics informing AI dreaming), Mohawk LLM (sovereign language AI as future vision), Antoine Bellemare-Pepin (neuroscience + Indigenous symbolic language), Brian Kuwada (HIFI Lab convening artists to imagine Indigenous-driven AI). These projects aren't just building for Phase 2 \u2014 they're articulating what Indigenous AI could become. But the majority of projects reference 'future phases' or 'next steps' without genuine speculative work.","what_reviewers_flag":"Suzanne provides the strongest imaginaries reads \u2014 identifying where projects genuinely reimagine AI ('reframes computation through Indigenous story and ceremony as system logic') vs. where they simply mention future plans. Hemi describes Brian Kuwada's work as 'grounded in cultural protocols, Indigenous-centred and community-led imaginaries.' Jackson's reviews of Kaiya Healy describe 'sovereign digital environments that challenge Western assumptions about space, time, and intelligence' \u2014 genuinely speculative framing.","strongest_projects":["Mythos","Suzanne Kite","Mohawk LLM","Antoine Bellemare-Pepin","Brian Kuwada","Kaiya Healy"],"gap":"Michelle Sylvestre, Blackfoot Dictionary, and Maurice Jones score near zero. Many mid-range projects default to 'this could advance in Phase 2' language without articulating a vision for what that advance looks like. The Imaginaries phase is named but not yet collectively defined.","phase2_question":"The 6 strongest Imaginaries projects could form the intellectual core of Phase 2 visioning. But 'Imaginaries' needs clearer definition \u2014 is it speculative design? Futuring? Worldbuilding? Indigenous science fiction? The network has examples of all of these but hasn't named the practice.","strong_count":8,"moderate_count":14,"weak_count":14,"pod_leaders":["Wih\u00e1nble S'a Pod","T'karonto Pod","Ka Hawai'i Pae '\u0100ina Pod"]}},"ts_pod_scores":{"Niitsitapi Pod":{"ts_ik":0.491,"ts_relational":0.495,"ts_community":0.497,"ts_technical":0.402,"ts_governance":0.357,"ts_network":0.429,"ts_imaginaries":0.505},"T'karonto Pod":{"ts_ik":0.592,"ts_relational":0.556,"ts_community":0.541,"ts_technical":0.47,"ts_governance":0.432,"ts_network":0.431,"ts_imaginaries":0.609},"Podless":{"ts_ik":0.491,"ts_relational":0.524,"ts_community":0.535,"ts_technical":0.414,"ts_governance":0.45,"ts_network":0.509,"ts_imaginaries":0.456},"Wih\u00e1\u014bble S\u2019a Pod":{"ts_ik":0.766,"ts_relational":0.69,"ts_community":0.667,"ts_technical":0.743,"ts_governance":0.555,"ts_network":0.526,"ts_imaginaries":0.788},"Ka Hawai\u2019i Pae \u2018\u0100ina Pod":{"ts_ik":0.668,"ts_relational":0.566,"ts_community":0.583,"ts_technical":0.474,"ts_governance":0.508,"ts_network":0.493,"ts_imaginaries":0.598},"Haudenosaunee Pod":{"ts_ik":0.674,"ts_relational":0.621,"ts_community":0.551,"ts_technical":0.697,"ts_governance":0.54,"ts_network":0.593,"ts_imaginaries":0.607},"Hiringa Te Mara":{"ts_ik":0.501,"ts_relational":0.478,"ts_community":0.591,"ts_technical":0.53,"ts_governance":0.616,"ts_network":0.482,"ts_imaginaries":0.503}},"top_global_phrases":["indigenous-centred","data sovereignty","machine learning","language models","difficult assess","language revitalization","cultural knowledge","data governance","capacity building","embodied data","principles data","accountable co-developed","ethical culturally","centring knowledge","lasting capacity","shape futures","futures ethical","community-led","capacity among","among learners","co-developed builds","builds lasting","learners shape","community-driven","community-defined priorities","community-defined","relational accountable","systems community-defined","priorities principles","knowledge systems"]};

var AI_DOMAIN_LIST = [
  {id:'applied',   label:'Applied Systems',        color:'#60a5fa'},

  {id:'rl',        label:'Reinforcement Learning',  color:'#f87171'},

];
function aiDomainId(raw) {
  var s = (raw || '').split(',')[0].trim().toLowerCase();
  if (s.indexOf('applied')       > -1) return 'applied';
  if (s.indexOf('data')          > -1) return 'data';
  if (s.indexOf('model')         > -1) return 'model';
  if (s.indexOf('symbolic')      > -1) return 'symbolic';
  if (s.indexOf('reinforcement') > -1) return 'rl';
  return 'unknown';
}
function aiDomainColor(raw) {
  var id  = aiDomainId(raw);
  var dom = AI_DOMAIN_LIST.find(function(d) { return d.id === id; });
  return dom ? dom.color : '#475569';
}

// ── Display name: last name for people, short title for projects ──────────
function displayName(p) {
  var s = (p.short || '').trim();
  // "Title: subtitle..." → first 1-2 words before colon
  if (s.indexOf(':') > -1) {
    return s.split(':')[0].trim().split(' ').slice(0, 2).join(' ');
  }
  // "Project Name - Person Name" (space-dash-space = separator) → first 2 words
  if (s.indexOf(' - ') > -1) {
    return s.split(' - ')[0].trim().split(' ').slice(0, 2).join(' ');
  }
  // "Name, Institution" → last name from name segment
  if (s.indexOf(',') > -1) {
    var np = s.split(',')[0].trim().split(' ');
    return np[np.length - 1];
  }
  // "Name1 and Name2" → last names joined
  if (s.toLowerCase().indexOf(' and ') > -1) {
    return s.split(/\s+and\s+/i).map(function(n) {
      var parts = n.trim().split(' ');
      return parts[parts.length - 1];
    }).join(' & ');
  }
  // Simple person name → last word (handles hyphenated: Bellemare-Pepin)
  var parts = s.split(' ');
  return parts[parts.length - 1];
}

// ── Radar chart utility ────────────────────────────────────────────────────
function drawRadar(opts) {
  var s = opts.size || 160;
  var cx = s / 2, cy = s / 2;
  var r = s / 2 - 32;
  var n = opts.axes.length;
  var color = opts.color || '#99ee81';
  var svg = '<svg width="' + s + '" height="' + s + '" style="display:block;margin:0 auto">';

  // Grid rings
  [0.25, 0.5, 0.75, 1.0].forEach(function(pct) {
    var pr = r * pct;
    var pts = [];
    for (var i = 0; i < n; i++) {
      var angle = (Math.PI * 2 / n) * i - Math.PI / 2;
      pts.push((cx + pr * Math.cos(angle)).toFixed(1) + ',' + (cy + pr * Math.sin(angle)).toFixed(1));
    }
    svg += '<polygon points="' + pts.join(' ') + '" fill="none" stroke="#3a2060" stroke-width="0.5"/>';
  });

  // Axis lines
  for (var i = 0; i < n; i++) {
    var angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    var x2 = cx + r * Math.cos(angle);
    var y2 = cy + r * Math.sin(angle);
    svg += '<line x1="' + cx + '" y1="' + cy + '" x2="' + x2.toFixed(1) + '" y2="' + y2.toFixed(1) + '" stroke="#3a2060" stroke-width="0.5"/>';
  }

  // Data polygon
  var pts = [];
  for (var i = 0; i < n; i++) {
    var angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    var v = Math.max(0, Math.min(1, opts.axes[i].value));
    pts.push((cx + r * v * Math.cos(angle)).toFixed(1) + ',' + (cy + r * v * Math.sin(angle)).toFixed(1));
  }
  svg += '<polygon points="' + pts.join(' ') + '" fill="' + color + '" fill-opacity="0.18" stroke="' + color + '" stroke-width="1.8"/>';

  // Data points
  for (var i = 0; i < n; i++) {
    var angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    var v = Math.max(0, Math.min(1, opts.axes[i].value));
    var px = cx + r * v * Math.cos(angle);
    var py = cy + r * v * Math.sin(angle);
    svg += '<circle cx="' + px.toFixed(1) + '" cy="' + py.toFixed(1) + '" r="3" fill="' + color + '" stroke="#110820" stroke-width="1.2"/>';
  }

  // Labels
  for (var i = 0; i < n; i++) {
    var angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    var lx = cx + (r + 16) * Math.cos(angle);
    var ly = cy + (r + 16) * Math.sin(angle);
    var anchor = lx < cx - 5 ? 'end' : lx > cx + 5 ? 'start' : 'middle';
    var dy = Math.abs(ly - cy) < 5 ? 4 : (ly < cy ? 0 : 8);
    svg += '<text x="' + lx.toFixed(1) + '" y="' + (ly + dy).toFixed(1) + '" text-anchor="' + anchor + '" font-size="8" fill="#a898c0" font-family="Inter,system-ui,sans-serif">' + opts.axes[i].label + '</text>';
  }

  svg += '</svg>';
  return svg;
}

// ── Tooltip helpers ───────────────────────────────────────────────────────
var ttEl = document.getElementById('tooltip');
function showTT(html, x, y) {
  if (html !== null) ttEl.innerHTML = html;
  ttEl.style.display = 'block';
  var bw = document.documentElement.clientWidth;
  var bh = document.documentElement.clientHeight;
  var tw = ttEl.offsetWidth  || 300;
  var th = ttEl.offsetHeight || 180;
  var lx = x + 14;
  var ly = y - 10;
  if (lx + tw > bw - 10) lx = x - tw - 14;
  if (ly + th > bh - 10) ly = bh - th - 10;
  ttEl.style.left = lx + 'px';
  ttEl.style.top  = ly + 'px';
}
function hideTT() { ttEl.style.display = 'none'; }

  var riskVals  = projects.map(function(p) { return p.risk_score; });
  var midAlign  = (Math.min.apply(null,alignVals) + Math.max.apply(null,alignVals)) / 2;
  var midRisk   = (Math.min.apply(null,riskVals)  + Math.max.apply(null,riskVals))  / 2;

  var W = el.clientWidth || 860;
  var H = 500;
  var margin = { top: 40, right: 180, bottom: 60, left: 55 };
  var iw = W - margin.left - margin.right;
  var ih = H - margin.top  - margin.bottom;

  var xScale = d3.scaleLinear().domain([0, Math.max.apply(null,riskVals) * 1.15 + 0.02]).range([0, iw]);
  var yScale = d3.scaleLinear().domain([Math.min.apply(null,alignVals) - 0.5, 10.5]).range([ih, 0]);

  // ── Colour-by toggle ────────────────────────────────────────────────────
  var ctrl = document.createElement('div');
  ctrl.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:#a898c0';
  ctrl.innerHTML = '<span>Colour by</span>'
    + '<button id="ls-btn-area"   style="padding:3px 10px;border-radius:6px;border:1px solid #3a2060;background:#261540;color:#f0ecf8;cursor:pointer;font-size:11px">Research Area</button>'
    + '<button id="ls-btn-domain" style="padding:3px 10px;border-radius:6px;border:1px solid #3a2060;background:transparent;color:#a898c0;cursor:pointer;font-size:11px">AI Domain</button>';
  el.appendChild(ctrl);

  function setActiveBtn(mode) {
    document.getElementById('ls-btn-area').style.background   = mode === 'area'   ? '#261540' : 'transparent';
    document.getElementById('ls-btn-area').style.color        = mode === 'area'   ? '#f0ecf8' : '#a898c0';
    document.getElementById('ls-btn-domain').style.background = mode === 'domain' ? '#261540' : 'transparent';
    document.getElementById('ls-btn-domain').style.color      = mode === 'domain' ? '#f0ecf8' : '#a898c0';
  }

  var svg = d3.select(el).append('svg')
    .attr('id', 'landscape-svg')
    .attr('viewBox', [0, 0, W, H].join(' '))
    .attr('preserveAspectRatio', 'xMidYMid meet');

  var g = svg.append('g').attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

  // Quadrant backgrounds
  var cx = xScale(midRisk);
  var cy = yScale(midAlign);
  var quads = [
    {x:0,    y:0,    w:cx,    h:cy,    label:'Ready to Build On',       color:'rgba(74,222,128,.04)'},
    {x:cx,   y:0,    w:iw-cx, h:cy,    label:'High Potential\u2014Address Concerns',color:'rgba(251,191,36,.04)'},
    {x:0,    y:cy,   w:cx,    h:ih-cy, label:'Monitor Closely',         color:'rgba(103,48,145,.05)'},
    {x:cx,   y:cy,   w:iw-cx, h:ih-cy, label:'Significant Concerns',    color:'rgba(248,113,113,.04)'},
  ];
  quads.forEach(function(q) {
    g.append('rect').attr('x',q.x).attr('y',q.y).attr('width',q.w).attr('height',q.h)
      .attr('fill',q.color);
    g.append('text').attr('class','quadrant-label')
      .attr('x', q.x + q.w/2).attr('y', q.y + q.h/2)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .text(q.label);
  });

  // Divider lines
  g.append('line').attr('x1',cx).attr('x2',cx).attr('y1',0).attr('y2',ih)
    .attr('stroke','rgba(255,255,255,.08)').attr('stroke-dasharray','4,4');
  g.append('line').attr('x1',0).attr('x2',iw).attr('y1',cy).attr('y2',cy)
    .attr('stroke','rgba(255,255,255,.08)').attr('stroke-dasharray','4,4');

  // Axes
  g.append('g').attr('transform','translate(0,' + ih + ')')
    .call(d3.axisBottom(xScale).ticks(5).tickFormat(d3.format('.2f')))
    .call(function(a) {
      a.selectAll('path,line').attr('stroke','#3a2060');
      a.selectAll('text').attr('fill','#a898c0').attr('font-size','11');
    });
  g.append('g')
    .call(d3.axisLeft(yScale).ticks(5))
    .call(function(a) {
      a.selectAll('path,line').attr('stroke','#3a2060');
      a.selectAll('text').attr('fill','#a898c0').attr('font-size','11');
    });

  // Axis labels
  g.append('text').attr('class','axis-label')
    .attr('x', iw/2).attr('y', ih + 46).attr('text-anchor','middle')
    .text('Risk Signal \u2192 (from Risk column language)');
  g.append('text').attr('class','axis-label')
    .attr('transform','rotate(-90)').attr('x',-ih/2).attr('y',-42)
    .attr('text-anchor','middle').text('Alignment Score (1\u201310)');

  // AI depth radius scale
  var rScale = d3.scaleOrdinal()
    .domain(['None','Low','Mid','High'])
    .range([9, 12, 16, 20]);

  // Build node objects with target positions for force de-overlap
  var nodeData = projects.map(function(d) {
    return Object.assign({}, d, {
      tx: xScale(d.risk_score),
      ty: yScale(d.alignment_avg),
      x:  xScale(d.risk_score),
      y:  yScale(d.alignment_avg),
      r:  rScale(d.ai_depth),
    });
  });

  // Run force simulation synchronously to resolve overlaps
  var sim = d3.forceSimulation(nodeData)
    .force('x', d3.forceX(function(d) { return d.tx; }).strength(0.85))
    .force('y', d3.forceY(function(d) { return d.ty; }).strength(0.85))
    .force('collision', d3.forceCollide(function(d) { return d.r + 6; }).strength(1.0))
    .stop();
  for (var i = 0; i < 400; i++) sim.tick();

  var nodes = g.selectAll('.bubble')
    .data(nodeData).enter().append('g').attr('class','bubble')
    .attr('transform', function(d) {
      return 'translate(' + d.x + ',' + d.y + ')';
    });

  function nodeColor(d) {
    return landscapeColorMode === 'domain'
      ? aiDomainColor(d.ai_domain)
      : areaColor(d.primary_area);
  }

  nodes.append('circle')
    .attr('r', function(d) { return d.r; })
    .attr('fill',   function(d) { return nodeColor(d); })
    .attr('fill-opacity', .75)
    .attr('stroke', function(d) { return nodeColor(d); })
    .attr('stroke-width', function(d) { return (d.reviewers||[]).length < 2 ? 1.5 : 1.5; })
    .attr('stroke-dasharray', function(d) { return (d.reviewers||[]).length < 2 ? '3,2' : 'none'; });

  nodes.append('text').attr('class','node-label')
    .attr('y', function(d) { return -(d.r + 4); })
    .attr('text-anchor','middle')
    .text(function(d) { return displayName(d); });

  nodes.on('mousemove', function(event, d) {
    var phrases = (d.top_phrases || []).slice(0,5)
      .map(function(p) { return '<span class="ph-chip">' + p + '</span>'; }).join('');
    var pos0 = d.positives && d.positives[0]
      ? '<div style="margin-top:6px;font-size:11px;color:#4ade80">\u2713 ' + d.positives[0].text.slice(0,90) + '\u2026</div>'
      : '';
    var neg0 = d.concerns && d.concerns[0]
      ? '<div style="font-size:11px;color:#f87171">\u25B3 ' + d.concerns[0].text.slice(0,90) + '\u2026</div>'
      : '';
    var html = '<h4>' + d.short + (d.code ? ' <span style="color:#a898c0;font-weight:400;font-size:11px">' + d.code + '</span>' : '') + '</h4>'
      + '<div style="font-size:11px;color:#a78bfa;margin-bottom:4px">' + d.title.slice(0,80) + '</div>'
      + '<div class="tt-row"><span class="tt-label">Area</span> <span>' + d.primary_area + '</span></div>'
      + '<div class="tt-row"><span class="tt-label">Status</span> <span>' + d.status + '</span></div>'
      + '<div class="tt-row"><span class="tt-label">AI Depth</span> <span>' + d.ai_depth + '</span></div>'
      + '<div class="tt-row"><span class="tt-label">Alignment</span> <strong style="color:#4ade80">' + d.alignment_avg + '/10</strong></div>'
      + '<div class="tt-row"><span class="tt-label">Risk</span> <strong style="color:#fbbf24">' + d.risk_score + '</strong></div>'
      + (phrases ? '<div class="phrases">' + phrases + '</div>' : '')
      + pos0 + neg0;
    showTT(html, event.clientX, event.clientY);
  }).on('mouseleave', hideTT);

  // ── Legend panel ─────────────────────────────────────────────────────────
  var legX = W - margin.right + 14;
  var legG  = svg.append('g').attr('transform','translate(' + legX + ',' + margin.top + ')');

  // — Research Area legend —
  var legArea = legG.append('g').attr('id','leg-area');
  legArea.append('text').attr('y',-4).attr('fill','#a898c0').attr('font-size','11').text('Research Area');
  var legData = DATA.research_areas.concat(
    ALL_AREAS.filter(function(a) {
      return !DATA.research_areas.find(function(ra) { return ra.id === a.id; });
    }).map(function(a) { return {id: a.id, title: a.title, color: a.color, _gap: true}; })
  );
  legData.forEach(function(a, i) {
    var ly = 12 + i * 22;
    legArea.append('circle').attr('cx', 7).attr('cy', ly).attr('r', 7)
      .attr('fill', a.color).attr('fill-opacity', a._gap ? 0.2 : 0.75);
    legArea.append('text').attr('x', 18).attr('y', ly + 4)
      .attr('fill', a._gap ? '#f87171' : '#f0ecf8').attr('font-size', '11')
      .text(a.title + (a._gap ? ' (not reviewed)' : ''));
  });

  // — AI Domain legend —
  var legDomain = legG.append('g').attr('id','leg-domain').attr('display','none');
  legDomain.append('text').attr('y',-4).attr('fill','#a898c0').attr('font-size','11').text('AI Domain');
  AI_DOMAIN_LIST.forEach(function(d, i) {
    var ly = 12 + i * 22;
    legDomain.append('circle').attr('cx', 7).attr('cy', ly).attr('r', 7)
      .attr('fill', d.color).attr('fill-opacity', d.id === 'unknown' ? 0.25 : 0.75);
    legDomain.append('text').attr('x', 18).attr('y', ly + 4)
      .attr('fill', d.id === 'unknown' ? '#a898c0' : '#f0ecf8').attr('font-size', '11')
      .text(d.label);
  });

  // — AI Depth size legend (shared) —
  var depthY = 12 + Math.max(legData.length, AI_DOMAIN_LIST.length) * 22 + 14;
  legG.append('text').attr('y', depthY - 4).attr('fill','#a898c0').attr('font-size','11').text('AI Depth');
  [['None',9],['Low',12],['Mid',16],['High',20]].forEach(function(pair, i) {
    var lly = depthY + 12 + i * 22;
    legG.append('circle').attr('cx', pair[1]).attr('cy', lly).attr('r', pair[1])
      .attr('fill','#a898c0').attr('fill-opacity', .4);
    legG.append('text').attr('x', 26).attr('y', lly + 4)
      .attr('fill','#a898c0').attr('font-size','11').text(pair[0]);
  });

  // — Review depth indicator —
  var revY = depthY + 12 + 4 * 22 + 14;
  legG.append('text').attr('y', revY - 4).attr('fill','#a898c0').attr('font-size','11').text('Review Depth');
  var revLeg = [
    {label: 'Multi-reviewer', dash: 'none'},
    {label: 'Single reviewer', dash: '3,2'},
  ];
  revLeg.forEach(function(rl, i) {
    var rly = revY + 12 + i * 22;
    legG.append('circle').attr('cx', 10).attr('cy', rly).attr('r', 9)
      .attr('fill','none').attr('stroke','#a898c0').attr('stroke-width',1.5)
      .attr('stroke-dasharray', rl.dash);
    legG.append('text').attr('x', 26).attr('y', rly + 4)
      .attr('fill','#a898c0').attr('font-size','11').text(rl.label);
  });

  // ── Toggle button handlers ────────────────────────────────────────────────
  function applyColorMode(mode) {
    landscapeColorMode = mode;
    setActiveBtn(mode);
    svg.selectAll('.bubble circle')
      .attr('fill',   function(d) { return nodeColor(d); })
      .attr('stroke', function(d) { return nodeColor(d); });
    legArea.attr('display',   mode === 'area'   ? null : 'none');
    legDomain.attr('display', mode === 'domain' ? null : 'none');
  }

  document.getElementById('ls-btn-area').addEventListener('click',   function() { applyColorMode('area'); });
  document.getElementById('ls-btn-domain').addEventListener('click', function() { applyColorMode('domain'); });
  setActiveBtn(landscapeColorMode);
}

// ── Pod & infra constants ─────────────────────────────────────────────────
var POD_COLORS = {
  'Niitsitapi Pod':                    '#fbbf24',  // amber/gold
  "Ka Hawai\u2019i Pae \u2018\u0100ina Pod": '#38bdf8',  // sky blue
  "T'karonto Pod":                     '#34d399',  // emerald
  "Wih\u00e1\u014bble S\u2019a Pod":   '#c084fc',  // purple
  'Hiringa Te Mara':                   '#fb7185',  // rose/pink
  'Haudenosaunee Pod':                 '#f97316',  // orange
  'Podless':                           '#475569',  // slate grey
};
function podColor(pod) { return POD_COLORS[pod] || '#475569'; }

var INFRA_COLORS = {
  'Public':       '#4ade80',
  'AbInt Network':'#99ee81',
  'Pod':          '#fbbf24',
  'None':         '#1e293b',
};
var INFRA_DESC = {
  'Public':       'Shareable publicly',
  'AbInt Network':'Shareable across AbInt Network',
  'Pod':          'Shareable within pod',
  'None':         'Not yet designated',
};
function infraColor(v) { return INFRA_COLORS[v] || '#1e293b'; }

// ── VIEW 2: Coverage Map ──────────────────────────────────────────────────
function renderCoverage() {
  var el = document.getElementById('view-coverage');
  var projects = DATA.projects.slice().sort(function(a,b) { return b.alignment_avg - a.alignment_avg; });

  var areaDataMap = {};
  DATA.research_areas.forEach(function(a) { areaDataMap[a.id] = a; });

  function projectAreaType(proj, areaId) {
    if (areaId === AREA_NAME_TO_ID[proj.primary_area])   return 'primary';
    if (areaId === AREA_NAME_TO_ID[proj.secondary_area]) return 'secondary';
    return 'none';
  }

  // ── Legend row 1: Coverage symbols ────────────────────────────
  var legendHTML = '<div style="display:flex;flex-wrap:wrap;gap:24px;margin-bottom:14px;align-items:flex-start">';

  // Coverage circles
  legendHTML += '<div><div style="font-size:11px;font-weight:700;color:#a898c0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Circle type</div>'
    + '<div style="display:flex;flex-direction:column;gap:6px">'
    + '<span style="display:flex;align-items:center;gap:7px;font-size:12px">'
    + '<svg width="22" height="22"><circle cx="11" cy="11" r="9" fill="#a78bfa" fill-opacity=".7"/><text x="11" y="15" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">9</text></svg>'
    + 'Primary research area (score inside)</span>'
    + '<span style="display:flex;align-items:center;gap:7px;font-size:12px">'
    + '<svg width="22" height="22"><circle cx="11" cy="11" r="8" fill="none" stroke="#a78bfa" stroke-width="2" stroke-opacity=".7"/><text x="11" y="15" text-anchor="middle" fill="#a78bfa" font-size="9">9</text></svg>'
    + 'Secondary area</span>'
    + '<span style="display:flex;align-items:center;gap:7px;font-size:12px">'
    + '<svg width="22" height="22"><circle cx="11" cy="11" r="4" fill="#3a2060"/></svg>'
    + 'Not in area</span>'
    + '</div></div>';

  // Pod legend
  var usedPods = [];
  var seenPods = {};
  projects.forEach(function(p) {
    var pod = p.pod || 'Podless';
    if (!seenPods[pod]) { seenPods[pod] = true; usedPods.push(pod); }
  });

  legendHTML += '<div><div style="font-size:11px;font-weight:700;color:#a898c0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Pod (column top strip)</div>'
    + '<div style="display:flex;flex-direction:column;gap:5px">';
  usedPods.forEach(function(pod) {
    var count = projects.filter(function(p) { return p.pod === pod; }).length;
    if (!count) return;
    legendHTML += '<span style="display:flex;align-items:center;gap:7px;font-size:12px">'
      + '<span style="display:inline-block;width:28px;height:6px;background:' + podColor(pod) + ';border-radius:3px"></span>'
      + pod + ' <span style="color:#a898c0">(' + count + ')</span></span>';
  });
  legendHTML += '</div></div>';

  // Infra sharability legend
  legendHTML += '<div><div style="font-size:11px;font-weight:700;color:#a898c0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Infrastructure sharability (coloured dot)</div>'
    + '<div style="display:flex;flex-direction:column;gap:5px">';
  ['Public','AbInt Network','Pod','None'].forEach(function(v) {
    var border = v === 'None' ? 'border:1.5px solid #334155;' : '';
    legendHTML += '<span style="display:flex;align-items:center;gap:7px;font-size:12px">'
      + '<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:' + infraColor(v) + ';' + border + '"></span>'
      + '<strong>' + v + '</strong> \u2014 ' + INFRA_DESC[v] + '</span>';
  });
  legendHTML += '</div></div>';

  legendHTML += '</div>';

  // ── Column headers: pod strip + infra dot + code + name ───────
  var tableHTML = '<div id="coverage-wrap" style="overflow-x:auto"><table class="coverage-table"><thead><tr>'
    + '<th class="ct-row-header" style="border:none;min-width:160px"></th>';

  projects.forEach(function(p) {
    var pc = podColor(p.pod || 'Podless');
    var ic = infraColor(p.infra_share || 'None');
    var infraBorder = (p.infra_share === 'None') ? 'border:1.5px solid #334155;' : '';
    tableHTML += '<th class="ct-col-header" data-pid="' + p.id.replace(/"/g, '') + '" style="cursor:pointer;vertical-align:bottom;padding:0 2px 6px;width:72px">'
      // Pod strip — full width coloured bar
      + '<div style="height:6px;background:' + pc + ';border-radius:3px 3px 0 0;margin-bottom:5px;opacity:.9"></div>'
      // Infra dot
      + '<div style="display:flex;justify-content:center;margin-bottom:4px">'
      + '<span title="' + (p.infra_share || 'None') + '" style="display:inline-block;width:11px;height:11px;border-radius:50%;background:' + ic + ';' + infraBorder + '"></span>'
      + '</div>'
      // Code + first name (not rotated — compact)
      + '<div style="font-size:10px;font-weight:700;text-align:center;color:#f0ecf8;line-height:1.2">' + displayName(p) + '</div>'
      + '</th>';
  });

  tableHTML += '<th style="width:36px;font-size:11px;color:#a898c0;padding:4px 6px;text-align:left;vertical-align:bottom">n</th>'
    + '<th style="width:76px;font-size:11px;color:#a898c0;padding:4px 6px;text-align:left;vertical-align:bottom">Avg&nbsp;Align</th>'
    + '</tr></thead><tbody>';

  // ── Area rows ──────────────────────────────────────────────────
  ALL_AREAS.forEach(function(area) {
    var hasData = !!areaDataMap[area.id];
    var rowClass = hasData ? '' : ' ct-gap-row';
    tableHTML += '<tr class="' + rowClass + '">';
    tableHTML += '<td class="ct-row-header" style="color:' + area.color + '">' + area.title + '</td>';

    projects.forEach(function(proj) {
      var type = projectAreaType(proj, area.id);
      var alignOpacity = (proj.alignment_avg - 4) / 6;
      var cellBg = type !== 'none'
        ? 'background:rgba(' + hexToRgb(area.color) + ',' + (alignOpacity * 0.18).toFixed(2) + ')'
        : '';

      tableHTML += '<td class="ct-cell' + (type === 'none' ? ' ct-no-data' : '') + '" style="' + cellBg + '">';
      if (type === 'primary') {
        tableHTML += '<svg width="46" height="50">'
          + '<circle cx="23" cy="26" r="17" fill="' + area.color + '" fill-opacity=".7"/>'
          + '<text x="23" y="30" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">'
          + proj.alignment_avg + '</text>'
          + '</svg>';
      } else if (type === 'secondary') {
        tableHTML += '<svg width="46" height="50">'
          + '<circle cx="23" cy="26" r="13" fill="none" stroke="' + area.color + '" stroke-width="2" stroke-opacity=".7"/>'
          + '<text x="23" y="30" text-anchor="middle" fill="' + area.color + '" font-size="10" fill-opacity=".8">'
          + proj.alignment_avg + '</text>'
          + '</svg>';
      } else {
        tableHTML += '<svg width="46" height="50">'
          + '<circle cx="23" cy="26" r="4" fill="#3a2060"/>'
          + '</svg>';
      }
      tableHTML += '</td>';
    });

    var aData = areaDataMap[area.id];
    if (aData) {
      var barW = Math.round((aData.alignment_avg / 10) * 60);
      tableHTML += '<td style="padding:4px 6px;font-size:12px;color:#a898c0">' + aData.n_projects + '</td>'
        + '<td style="padding:4px 6px"><div style="font-size:13px;font-weight:700;color:' + area.color + '">'
        + aData.alignment_avg + '</div>'
        + '<div style="width:' + barW + 'px;height:3px;background:' + area.color + ';border-radius:2px;opacity:.5;margin-top:3px"></div>'
        + '</td>';
    } else {
      tableHTML += '<td colspan="2" style="padding:4px 8px;font-size:11px;color:#f87171">Not yet reviewed</td>';
    }
    tableHTML += '</tr>';
  });

  // Alignment score footer row
  tableHTML += '<tr><td class="ct-row-header" style="color:#a898c0;font-size:11px">Alignment</td>';
  projects.forEach(function(p) {
    var sc = p.alignment_avg >= 8.5 ? '#4ade80' : (p.alignment_avg >= 7 ? '#fbbf24' : '#f87171');
    tableHTML += '<td style="text-align:center;padding:5px 0">'
      + '<span style="font-size:13px;font-weight:800;color:' + sc + '">' + p.alignment_avg + '</span>'
      + '</td>';
  });
  tableHTML += '<td></td><td></td></tr>';
  tableHTML += '</tbody></table></div>';

  // ── TS Dimensions table ────────────────────────────────────────
  var dimHTML = '<div style="margin-top:28px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px;color:#99ee81">'
    + 'Transformation Statement Coverage</h3>'
    + '<p style="font-size:11px;color:#a898c0;margin-bottom:12px">Bar width = how strongly reviewer language maps onto each TS dimension.</p>'
    + '<div style="overflow-x:auto"><table class="coverage-table"><thead><tr>'
    + '<th class="ct-row-header" style="border:none;min-width:160px"></th>';

  projects.forEach(function(p) {
    dimHTML += '<th style="font-size:10px;color:#a898c0;padding:4px 2px;text-align:center;width:72px">' + displayName(p) + '</th>';
  });
  dimHTML += '</tr></thead><tbody>';

  DATA.ts_dimensions.forEach(function(dim) {
    dimHTML += '<tr><td class="ct-row-header" style="font-size:11px;color:#a898c0">' + dim.label + '</td>';
    projects.forEach(function(p) {
      var score = (DATA.ts_project_scores[p.id] || {})[dim.id] || 0;
      var opacity = Math.max(0.07, score * 2);
      var barW = Math.round(score * 52);
      dimHTML += '<td style="padding:6px 2px;text-align:center">';
      if (score > 0.05) {
        dimHTML += '<div style="background:#99ee81;opacity:' + opacity.toFixed(2)
          + ';height:7px;border-radius:4px;width:' + barW + 'px;margin:0 auto"></div>';
      } else {
        dimHTML += '<div style="background:#261540;height:7px;border-radius:4px;width:22px;margin:0 auto"></div>';
      }
      dimHTML += '</td>';
    });
    dimHTML += '</tr>';
  });
  dimHTML += '</tbody></table></div></div>';

  // ── Area vitality radar: compute per-area metrics ──────────────
  var projLookup = {};
  DATA.projects.forEach(function(p) { projLookup[p.id] = p; });
  var tsDimsC = DATA.ts_dimensions || [];
  var tsScoresC = DATA.ts_project_scores || {};
  var allPodNames = {};
  DATA.projects.forEach(function(p) { if (p.pod) allPodNames[p.pod] = 1; });
  var totalPodsC = Object.keys(allPodNames).length || 1;

  var areaVitality = {};
  var maxAreaProj = 1;
  DATA.research_areas.forEach(function(a) {
    if (!a.projects || !a.projects.length) return;
    var n = a.projects.length;
    if (n > maxAreaProj) maxAreaProj = n;

    // Pod diversity
    var podSet = {};
    a.projects.forEach(function(ap) {
      var fp = projLookup[ap.id];
      if (fp && fp.pod) podSet[fp.pod] = 1;
    });

    // AI depth mix
    var depthSet = {};
    a.projects.forEach(function(ap) {
      var fp = projLookup[ap.id];
      if (fp && fp.ai_depth) depthSet[fp.ai_depth] = 1;
    });

    // TS breadth: avg TS score across all projects in this area
    var tsSum = 0, tsCount = 0;
    a.projects.forEach(function(ap) {
      var scores = tsScoresC[ap.id];
      if (!scores) return;
      tsDimsC.forEach(function(d) {
        if (scores[d.id]) { tsSum += scores[d.id]; tsCount++; }
      });
    });

    areaVitality[a.id] = {
      projects:  n,
      podDiv:    Object.keys(podSet).length,
      depthMix:  Object.keys(depthSet).length,
      align:     a.alignment_avg || 0,
      tsBreadth: tsCount > 0 ? tsSum / tsCount : 0
    };
  });
  var maxTsB = 0.01;
  Object.values(areaVitality).forEach(function(v) {
    if (v.tsBreadth > maxTsB) maxTsB = v.tsBreadth;
  });

  // ── Area summary cards (sorted: most projects first) ───────────
  var cardHTML = '<div class="area-summary-bar" style="margin-top:24px">';
  var sortedAreas = ALL_AREAS.slice().sort(function(a, b) {
    var na = areaDataMap[a.id] ? areaDataMap[a.id].n_projects : 0;
    var nb = areaDataMap[b.id] ? areaDataMap[b.id].n_projects : 0;
    return nb - na;
  });
  sortedAreas.forEach(function(area) {
    var aData = areaDataMap[area.id];
    var isGap = !aData;
    if (isGap) {
      cardHTML += '<div class="area-summary-card asc-gap" style="border-color:' + area.color + '40">'
        + '<div class="asc-name" style="color:' + area.color + '">' + area.title + '</div>'
        + '<div class="asc-count" style="color:#334155">0</div>'
        + '<div class="asc-split" style="color:#475569">Not yet reviewed</div>'
        + '</div>';
      return;
    }

    var projects  = aData.projects || [];
    var total     = projects.length;
    var primary   = projects.filter(function(p){ return p.is_primary; });
    var secondary = projects.filter(function(p){ return !p.is_primary; });
    var alignSc   = aData.alignment_avg;
    var alignCol  = alignSc >= 8.5 ? '#4ade80' : (alignSc >= 7 ? '#fbbf24' : '#f87171');

    // Build lookup: project id → alignment_avg from full project list
    var alignLookup = {};
    DATA.projects.forEach(function(fp) { alignLookup[fp.id] = fp.alignment_avg; });

    // Attach alignment score to each area project entry, then sort high→low
    var rankedProjects = projects.map(function(p) {
      return Object.assign({}, p, { alignment_avg: alignLookup[p.id] || 0 });
    }).sort(function(a, b) { return b.alignment_avg - a.alignment_avg; });

    // Split pills
    var splitHTML = '';
    if (primary.length)
      splitHTML += '<span class="asc-split-pill" style="background:' + area.color + '25;color:' + area.color + '">'
        + primary.length + ' primary</span>';
    if (secondary.length)
      splitHTML += '<span class="asc-split-pill" style="background:#1c1030;color:#a898c0">'
        + secondary.length + ' secondary</span>';

    // Project list: sorted by alignment, cap at 6, show score + 1°/2° badge
    var projRows = '';
    var shown = rankedProjects.slice(0, 6);
    shown.forEach(function(p) {
      var badgeColor = p.is_primary ? area.color : '#475569';
      var badgeBg    = p.is_primary ? area.color + '22' : '#1c1030';
      var sc = p.alignment_avg;
      var scCol = sc >= 8.5 ? '#4ade80' : (sc >= 7 ? '#fbbf24' : '#f87171');
      projRows += '<div class="asc-proj-row" style="justify-content:space-between">'
        + '<div style="display:flex;align-items:center;gap:5px;min-width:0">'
        + '<span class="asc-proj-badge" style="background:' + badgeBg + ';color:' + badgeColor + '">'
        + (p.is_primary ? '1°' : '2°') + '</span>'
        + '<span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (p.short || p.id.split(' - ')[0]) + '</span>'
        + '</div>'
        + '<span style="font-size:10px;font-weight:700;color:' + scCol + ';flex-shrink:0;margin-left:4px">' + sc + '</span>'
        + '</div>';
    });
    if (projects.length > 6) {
      projRows += '<div style="font-size:9px;color:#475569;margin-top:1px">+' + (projects.length - 6) + ' more</div>';
    }

    // Area vitality radar
    var vit = areaVitality[area.id];
    var radarHTML = '';
    if (vit) {
      radarHTML = '<div style="margin-top:10px;padding-top:8px;border-top:1px solid ' + area.color + '22">'
        + '<div style="font-size:8px;font-weight:700;color:#a898c0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;text-align:center">Area Vitality</div>'
        + drawRadar({
            size: 170,
            color: area.color,
            axes: [
              { label: 'Projects',    value: vit.projects / maxAreaProj },
              { label: 'Pod Diversity', value: vit.podDiv / totalPodsC },
              { label: 'AI Mix',       value: vit.depthMix / 4 },
              { label: 'Alignment',    value: vit.align / 10 },
              { label: 'TS Breadth',   value: vit.tsBreadth / maxTsB }
            ]
          })
        + '</div>';
    }

    cardHTML += '<div class="area-summary-card" style="border-color:' + area.color + '40">'
      + '<div class="asc-name" style="color:' + area.color + '">' + area.title + '</div>'
      + '<div class="asc-count" style="color:' + area.color + '">' + total + '</div>'
      + '<div class="asc-split">' + splitHTML + '</div>'
      + '<div class="asc-proj-list">' + projRows + '</div>'
      + '<div class="asc-align-row">'
      + '<span class="asc-align-num" style="color:' + alignCol + '">' + alignSc + '</span>'
      + '<span class="asc-align-label">/ 10 avg alignment</span>'
      + '</div>'
      + radarHTML
      + '</div>';
  });
  cardHTML += '</div>';

  el.innerHTML = legendHTML + tableHTML + dimHTML + cardHTML;

  // ── Attach hover tooltips to column headers (after innerHTML set) ──
  el.querySelectorAll('[data-pid]').forEach(function(th) {
    var pid = th.dataset.pid;
    // Match pid loosely (the id has special chars that may be partially trimmed)
    var proj = DATA.projects.find(function(p) {
      return p.id.replace(/"/g,'') === pid || p.code === pid;
    });
    if (!proj) return;

    th.addEventListener('mouseenter', function(event) {
      var pc = podColor(proj.pod);
      var ic = infraColor(proj.infra_share || 'None');
      var infraBorder = (proj.infra_share === 'None') ? 'border:1.5px solid #334155;' : '';
      var phraseChips = (proj.top_phrases || []).slice(0,4)
        .map(function(ph) { return '<span class="ph-chip">' + ph + '</span>'; }).join('');

      var html = '<h4 style="line-height:1.35">' + proj.title + '</h4>'
        + '<div style="font-size:11px;color:#a898c0;margin-bottom:8px">' + proj.short + ' &middot; ' + proj.code + '</div>'
        + '<div class="tt-row"><span class="tt-label">Pod</span>'
        + '<span style="display:inline-flex;align-items:center;gap:5px">'
        + '<span style="width:10px;height:10px;border-radius:50%;background:' + pc + ';display:inline-block"></span>'
        + proj.pod + '</span></div>'
        + '<div class="tt-row"><span class="tt-label">Type</span><span>' + (proj.type || 'CfP') + '</span></div>'
        + '<div class="tt-row"><span class="tt-label">Status</span><span>' + proj.status + '</span></div>'
        + '<div class="tt-row"><span class="tt-label">AI Depth</span><span>' + proj.ai_depth + '</span></div>'
        + '<div class="tt-row"><span class="tt-label">Infra share</span>'
        + '<span style="display:inline-flex;align-items:center;gap:5px">'
        + '<span style="width:10px;height:10px;border-radius:50%;background:' + ic + ';' + infraBorder + ';display:inline-block"></span>'
        + (proj.infra_share || 'None') + '</span></div>';
      if (proj.sharable_method && proj.sharable_method !== 'None') {
        html += '<div class="tt-row"><span class="tt-label">Meth. share</span><span>' + proj.sharable_method + '</span></div>';
      }
      html += '<div class="tt-row"><span class="tt-label">Alignment</span>'
        + '<strong style="color:#4ade80">' + proj.alignment_avg + '/10</strong></div>';
      if (phraseChips) html += '<div class="phrases" style="margin-top:7px">' + phraseChips + '</div>';

      showTT(html, event.clientX, event.clientY);
    });
    th.addEventListener('mousemove', function(event) {
      showTT(null, event.clientX, event.clientY);
    });
    th.addEventListener('mouseleave', hideTT);
  });

  // Update showTT to support position-only calls
  var _origShowTT = showTT;
  showTT = function(html, x, y) {
    if (html !== null) ttEl.innerHTML = html;
    ttEl.style.display = 'block';
    var bw = document.documentElement.clientWidth;
    var bh = document.documentElement.clientHeight;
    var tw = ttEl.offsetWidth  || 300;
    var th2 = ttEl.offsetHeight || 180;
    var lx = x + 14;
    var ly = y - 10;
    if (lx + tw > bw - 10) lx = x - tw - 14;
    if (ly + th2 > bh - 10) ly = bh - th2 - 10;
    ttEl.style.left = lx + 'px';
    ttEl.style.top  = ly + 'px';
  };
}

// ── VIEW 3: Emergent Voice ────────────────────────────────────────────────
function renderVoice() {
  var el = document.getElementById('view-voice');
  var themes = DATA.research_themes || [];
  var actions = DATA.network_actions || [];

  el.innerHTML =
    '<div style="margin-bottom:10px">'
    + '<h3 style="font-size:13px;font-weight:700;color:#a898c0;margin-bottom:3px">'
    + 'Emergent Voice &mdash; what the network is saying, interpreted for Phase 2 strategy'
    + '</h3>'
    + '<p style="font-size:11px;color:#475569;line-height:1.5">'
    + 'Themes interpreted from reviewer language across all projects. Each bubble includes an analytical read, '
    + 'a strategic question for planning, and Phase 2 implications. Bubble size = unique reviewers. Click to explore.'
    + '</p></div>'
    + '<div id="voice-wrap">'
    + '<div id="voice-svg-wrap"></div>'
    + '<div id="voice-detail">'
    + '<div style="font-size:12px;color:#a898c0;line-height:1.7;padding-top:8px">'
    + 'Select a theme to see the full analytical read, network question, Phase 2 implications, and evidence.'
    + '</div></div></div>'
    + '<div id="voice-actions" style="margin-top:18px"></div>';

  var svgWrap = document.getElementById('voice-svg-wrap');
  var W = svgWrap.clientWidth || 560;
  var H = 460;

  var maxRev = d3.max(themes, function(t) { return t.n_reviewers; }) || 1;
  var minRev = d3.min(themes, function(t) { return t.n_reviewers; }) || 1;
  var rScale = d3.scaleSqrt().domain([minRev, maxRev]).range([32, 72]);

  var nodes = themes.map(function(t, i) {
    var angle = (i / themes.length) * 2 * Math.PI;
    return Object.assign({}, t, {
      r: rScale(t.n_reviewers),
      x: W/2 + Math.cos(angle) * 120,
      y: H/2 + Math.sin(angle) * 120,
    });
  });

  var svg = d3.select(svgWrap).append('svg').attr('width', W).attr('height', H);

  var sim = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(6))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide(function(d) { return d.r + 8; }).strength(0.92))
    .force('x', d3.forceX(W/2).strength(0.03))
    .force('y', d3.forceY(H/2).strength(0.04));

  var bubb = svg.selectAll('.voice-bubble')
    .data(nodes).enter().append('g').attr('class','voice-bubble')
    .style('cursor','pointer');

  bubb.append('circle')
    .attr('r', function(d) { return d.r; })
    .attr('fill', function(d) { return d.color; })
    .attr('fill-opacity', .15)
    .attr('stroke', function(d) { return d.color; })
    .attr('stroke-width', function(d) { return d.emerging ? 1.5 : 2; })
    .attr('stroke-dasharray', function(d) { return d.emerging ? '5,3' : 'none'; })
    .attr('stroke-opacity', .8);

  bubb.each(function(d) {
    var g = d3.select(this);
    var words = d.label.split(' ');
    var mid = Math.ceil(words.length / 2);
    var line1 = words.slice(0, mid).join(' ');
    var line2 = words.slice(mid).join(' ');
    var fs = Math.max(8, Math.min(12, d.r * 0.28));
    if (line2) {
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y', -fs * 0.7).attr('fill', d.color).attr('font-size', fs)
        .attr('font-weight','700').attr('pointer-events','none').text(line1);
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y', fs * 0.7).attr('fill', d.color).attr('font-size', fs)
        .attr('font-weight','700').attr('pointer-events','none').text(line2);
    } else {
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('fill', d.color).attr('font-size', fs)
        .attr('font-weight','700').attr('pointer-events','none').text(line1);
    }
    g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('y', d.r - 13).attr('fill', d.color).attr('font-size', 9)
      .attr('opacity', .75).attr('pointer-events','none')
      .text(d.n_reviewers + (d.n_reviewers === 1 ? ' reviewer' : ' reviewers'));
  });

  sim.on('tick', function() {
    bubb.attr('transform', function(d) {
      d.x = Math.max(d.r + 6, Math.min(W - d.r - 6, d.x));
      d.y = Math.max(d.r + 6, Math.min(H - d.r - 6, d.y));
      return 'translate(' + d.x + ',' + d.y + ')';
    });
  });

  bubb.on('click', function(event, d) {
    bubb.selectAll('circle').attr('fill-opacity', .07).attr('stroke-opacity', .3);
    d3.select(this).select('circle').attr('fill-opacity', .28).attr('stroke-opacity', 1);

    var detail = document.getElementById('voice-detail');

    var phraseTags = (d.phrases || []).map(function(ph) {
      return '<span style="display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;'
        + 'background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);'
        + 'margin:2px;color:#a898c0">' + ph + '</span>';
    }).join('');

    var revList = (d.reviewers || []).map(function(rv) {
      return '<span style="display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;'
        + 'background:' + d.color + '22;color:' + d.color + ';margin:2px">' + rv + '</span>';
    }).join('');

    var sentHTML = (d.sentences || []).slice(0, 4).map(function(s) {
      var polColor = s.polarity === 'positive' ? '#4ade80' : s.polarity === 'concern' ? '#f87171' : '#a898c0';
      var polIcon  = s.polarity === 'positive' ? '\u25B2' : s.polarity === 'concern' ? '\u25BC' : '\u25CF';
      return '<div style="padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.04);'
        + 'border-left:3px solid ' + d.color + ';margin-bottom:6px;font-size:11px;line-height:1.5;">'
        + '<div style="color:var(--text)">' + s.text + '</div>'
        + '<div style="font-size:10px;color:#a898c0;margin-top:4px">'
        + '<span style="color:' + polColor + '">' + polIcon + '</span> '
        + s.reviewer + ' &middot; <strong style="color:#a898c0">' + s.code + '</strong>'
        + '</div></div>';
    }).join('');

    var emBadge = d.emerging
      ? '<span style="font-size:10px;padding:2px 8px;border-radius:99px;border:1px dashed #a898c0;color:#a898c0;margin-left:6px">auto-detected</span>'
      : '';

    // ── Build the rich detail panel ──
    var html = '<div style="border-left:3px solid ' + d.color + ';padding-left:10px;margin-bottom:12px">'
      + '<div style="font-size:15px;font-weight:700;color:' + d.color + '">' + d.label + emBadge + '</div>'
      + '<div style="font-size:11px;color:#a898c0;margin-top:3px">'
      + d.n_reviewers + ' reviewers &middot; ' + d.n_projects + ' projects'
      + '</div></div>';

    // ── Interpretation (the LLM read) ──
    if (d.interpretation) {
      html += '<div style="background:rgba(153,238,129,.06);border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid rgba(153,238,129,.15)">'
        + '<div style="font-size:10px;font-weight:700;color:#99ee81;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Analytical Read</div>'
        + '<div style="font-size:12px;color:#f0ecf8;line-height:1.6">' + d.interpretation + '</div>'
        + '</div>';
    }

    // ── Network Question ──
    if (d.network_question) {
      html += '<div style="background:rgba(251,191,36,.06);border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid rgba(251,191,36,.12)">'
        + '<div style="font-size:10px;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Strategic Question for Phase 2</div>'
        + '<div style="font-size:12px;color:#f0ecf8;line-height:1.6;font-style:italic">' + d.network_question + '</div>'
        + '</div>';
    }

    // ── Phase 2 Implication ──
    if (d.phase2) {
      html += '<div style="background:rgba(74,222,128,.06);border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid rgba(74,222,128,.12)">'
        + '<div style="font-size:10px;font-weight:700;color:#4ade80;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Phase 2 Implication</div>'
        + '<div style="font-size:12px;color:#f0ecf8;line-height:1.6">' + d.phase2 + '</div>'
        + '</div>';
    }

    // ── Tension ──
    if (d.tension) {
      html += '<div style="background:rgba(248,113,113,.05);border-radius:10px;padding:10px 14px;margin-bottom:12px;border:1px solid rgba(248,113,113,.1)">'
        + '<div style="font-size:10px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Tension to Hold</div>'
        + '<div style="font-size:11px;color:#cbd5e1;line-height:1.5">' + d.tension + '</div>'
        + '</div>';
    }

    // ── Reviewers + Phrases ──
    html += '<div style="font-size:10px;color:#a898c0;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Reviewers</div>'
      + '<div style="margin-bottom:10px">' + revList + '</div>';
    if (phraseTags) {
      html += '<div style="font-size:10px;color:#a898c0;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Key Phrases</div>'
        + '<div style="margin-bottom:10px">' + phraseTags + '</div>';
    }

    // ── Evidence: reviewer sentences ──
    if (sentHTML) {
      html += '<div style="font-size:10px;color:#a898c0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Evidence from Reviewer Sentences</div>'
        + sentHTML;
    }

    detail.innerHTML = html;
  });

  // ── Network Actions Panel ──────────────────────────────────────────────
  if (actions.length > 0) {
    var actDiv = document.getElementById('voice-actions');
    var actHTML = '<div style="border-top:1px solid #3a2060;padding-top:16px">'
      + '<h3 style="font-size:13px;font-weight:700;color:#fbbf24;margin-bottom:3px">'
      + 'Network Actions &mdash; structural proposals from reviewers</h3>'
      + '<p style="font-size:11px;color:#475569;line-height:1.5;margin-bottom:12px">'
      + 'These are not recommendations about individual projects &mdash; they are proposals for network-level moves: '
      + 'consortium formation, shared builds, new streams, infrastructure investments. '
      + actions.length + ' proposals extracted from reviewer sentences.</p>';
    actHTML += '<div style="display:grid;gap:8px">';
    actions.slice(0, 15).forEach(function(a) {
      var polColor = a.polarity === 'positive' ? '#4ade80' : a.polarity === 'concern' ? '#f87171' : '#fbbf24';
      actHTML += '<div style="padding:10px 12px;border-radius:8px;background:rgba(251,191,36,.04);'
        + 'border-left:3px solid #fbbf24;font-size:11px;line-height:1.5">'
        + '<div style="color:#f0ecf8">' + a.text + '</div>'
        + '<div style="font-size:10px;color:#a898c0;margin-top:4px">'
        + a.reviewer + ' &middot; ' + (a.project || '') + (a.code ? ' <strong style="color:#a898c0">' + a.code + '</strong>' : '')
        + '</div></div>';
    });
    actHTML += '</div></div>';
    actDiv.innerHTML = actHTML;
  }
}

// ── VIEW 4: Signal Cards ──────────────────────────────────────────────────
function renderCards() {
  var el = document.getElementById('view-cards');
  var projects = DATA.projects.slice().sort(function(a,b) { return b.alignment_avg - a.alignment_avg; });

  var html = '<div id="cards-grid">';
  projects.forEach(function(p) {
    var acolor = areaColor(p.primary_area);
    var alignColor = p.alignment_avg >= 8.5 ? '#4ade80' : (p.alignment_avg >= 7 ? '#fbbf24' : '#f87171');
    var riskColor  = p.risk_score < 0.1 ? '#4ade80' : (p.risk_score < 0.25 ? '#fbbf24' : '#f87171');

    var statusChip = '';
    if (p.status === 'Completed')  statusChip = '<span class="chip chip-pos">Completed</span>';
    else if (p.status === 'Mid-Point') statusChip = '<span class="chip chip-warn">Mid-Point</span>';
    else if (p.status === 'Beginning') statusChip = '<span class="chip chip-blue">Beginning</span>';

    var aiChip = p.ai_depth !== 'None'
      ? '<span class="chip chip-muted">AI: ' + p.ai_depth + '</span>' : '';
    var ikChip = p.ik_methods && p.ik_methods !== 'None'
      ? '<span class="chip chip-blue">IK: ' + p.ik_methods + '</span>' : '';
    var areaChip = '<span class="chip" style="background:rgba(' + hexToRgb(acolor) + ',.15);color:' + acolor + '">'
      + p.primary_area + '</span>';

    var phrases = (p.top_phrases || []).slice(0, 4).map(function(ph) {
      return '<span class="sc-phrase">' + ph + '</span>';
    }).join('');

    var pos0 = p.positives && p.positives[0]
      ? '<div class="sc-signal pos"><div class="src-tag">'
        + p.positives[0].reviewer + ' &middot; ' + p.positives[0].source + '</div>'
        + p.positives[0].text.slice(0, 100) + '\u2026</div>'
      : '';
    var neg0 = p.concerns && p.concerns[0]
      ? '<div class="sc-signal neg"><div class="src-tag">'
        + p.concerns[0].reviewer + ' &middot; ' + p.concerns[0].source + '</div>'
        + p.concerns[0].text.slice(0, 100) + '\u2026</div>'
      : '';

    var reviewers = (p.reviewers || []).join(', ');

    var singleRev = (p.reviewers || []).length < 2;
    var singleStyle = singleRev ? ';border-style:dashed;border-width:1px;border-color:#3a2060' : '';
    var singleBadge = singleRev ? '<span style="font-size:9px;color:#a898c0;background:#261540;padding:1px 6px;border-radius:4px;margin-left:6px">single reviewer</span>' : '';

    html += '<div class="signal-card" style="border-top:3px solid ' + acolor + singleStyle + '">'
      + '<div class="sc-header">'
      + '<div><div class="sc-name">' + p.short + singleBadge + '</div>'
      + '<div class="sc-code">' + p.code + '</div></div>'
      + '<div class="sc-scores">'
      + '<div class="sc-score-block"><div class="sc-score-num" style="color:' + alignColor + '">'
      + p.alignment_avg + '</div><div class="sc-score-label">Align</div></div>'
      + '<div class="sc-score-block"><div class="sc-score-num" style="color:' + riskColor + ';font-size:15px">'
      + p.risk_score.toFixed(2) + '</div><div class="sc-score-label">Risk</div></div>'
      + '</div></div>'
      + '<div class="sc-title" title="' + p.title + '">' + p.title.slice(0, 65) + (p.title.length > 65 ? '\u2026' : '') + '</div>'
      + '<div class="sc-meta">' + areaChip + statusChip + aiChip + ikChip + '</div>'
      + (phrases ? '<div class="sc-phrases">' + phrases + '</div>' : '')
      + '<div style="font-size:10px;color:#a898c0;margin-bottom:6px">Reviewed by: ' + reviewers + '</div>'
      + pos0 + neg0
      + '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

// ── Util: hex color to RGB string ─────────────────────────────────────────
function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r = parseInt(hex.substring(0,2),16);
  var g = parseInt(hex.substring(2,4),16);
  var b = parseInt(hex.substring(4,6),16);
  return r + ',' + g + ',' + b;
}

// ── VIEW 5: Reviewer Intelligence ─────────────────────────────────────────
var intelState = { reviewer: 'all', bucket: 'all', groupBy: 'type' };

function renderIntelligence() {
  var el = document.getElementById('view-intel');
  var sig = DATA.network_signals;
  var phrases = DATA.emergent_phrases.filter(function(p) {
    return (p.phrase.indexOf(' ') > -1 || p.phrase.indexOf('-') > -1) && p.n_projects >= 2;
  }).slice(0, 30);

  // Area colour lookup
  var AREA_COL = {
    'Language': '#facc15', 'Storytelling': '#a78bfa',
    'Environmental Stewardship': '#4ade80', 'Env Stewardship': '#4ade80',
    'Socio-Neuro AI': '#f97316', 'Multi-Agent Systems': '#60a5fa',
    'Other': '#a898c0'
  };

  var TYPE_COLOR = {recommendation:'#f59e0b', question:'#22d3ee', action:'#4ade80', observation:'#a78bfa'};
  var TYPE_LABEL = {recommendation:'Recommendations', question:'Questions', action:'Actions', observation:'Observations'};
  var TYPE_KEYS  = ['recommendation','question','action','observation'];

  // ── Gather all sentences + compute per-reviewer stats ──
  var allSents = [];
  ['recommendations','questions','actions','observations'].forEach(function(k) {
    (sig[k] || []).forEach(function(s) { allSents.push(s); });
  });

  var reviewerNames = [];
  var seen = {};
  allSents.forEach(function(s) { if (!seen[s.reviewer]) { seen[s.reviewer]=1; reviewerNames.push(s.reviewer); }});
  reviewerNames.sort();

  // Global average alignment
  var globalAligns = DATA.projects.map(function(p) { return p.alignment_avg; });
  var globalAvg = globalAligns.reduce(function(a,b){return a+b;},0) / globalAligns.length;

  // Per-reviewer stats
  var revStats = {};
  reviewerNames.forEach(function(rev) {
    var sents = allSents.filter(function(s) { return s.reviewer === rev; });
    var typeCounts = {};
    TYPE_KEYS.forEach(function(t) { typeCounts[t] = 0; });
    sents.forEach(function(s) { typeCounts[s.type] = (typeCounts[s.type]||0) + 1; });
    var projects = DATA.projects.filter(function(p) { return (p.reviewers||[]).indexOf(rev) > -1; });
    var aligns = projects.map(function(p) { return p.alignment_avg; });
    var avgAlign = aligns.length ? aligns.reduce(function(a,b){return a+b;},0)/aligns.length : 0;
    // Polarity lean
    var posCount = sents.filter(function(s){ return s.polarity==='positive'; }).length;
    var negCount = sents.filter(function(s){ return s.polarity==='concern'; }).length;
    revStats[rev] = {
      total: sents.length, typeCounts: typeCounts,
      nProjects: projects.length, avgAlign: avgAlign,
      posCount: posCount, negCount: negCount, neutralCount: sents.length - posCount - negCount,
    };
  });

  // ── Reviewer profile chart (SVG) ──
  function buildProfileChart(rev) {
    if (!rev || rev === 'all') return buildOverviewChart();
    var st = revStats[rev];
    if (!st) return '';
    var cW = 560, cH = 160;
    var svg = '<svg width="' + cW + '" height="' + cH + '" style="display:block;margin-bottom:12px">';

    // ── Stacked bar: sentence type distribution ──
    var barY = 14, barH = 22, barX = 140, barW = 280;
    svg += '<text x="8" y="' + (barY+15) + '" fill="#a898c0" font-size="10" font-weight="700">REVIEW STYLE</text>';
    var bx = barX;
    TYPE_KEYS.forEach(function(t) {
      var w = st.total > 0 ? (st.typeCounts[t] / st.total) * barW : 0;
      if (w > 0) {
        svg += '<rect x="' + bx + '" y="' + barY + '" width="' + w + '" height="' + barH + '" rx="3" fill="' + TYPE_COLOR[t] + '" fill-opacity=".75"/>';
        if (w > 28) {
          svg += '<text x="' + (bx + w/2) + '" y="' + (barY + barH/2 + 4) + '" text-anchor="middle" fill="#2A1040" font-size="10" font-weight="600">' + st.typeCounts[t] + '</text>';
        }
        bx += w;
      }
    });
    // Legend dots next to bar
    var legX = barX + barW + 14;
    TYPE_KEYS.forEach(function(t, i) {
      var ly = barY + i * 14;
      svg += '<circle cx="' + (legX+5) + '" cy="' + (ly+5) + '" r="4" fill="' + TYPE_COLOR[t] + '" fill-opacity=".75"/>';
      svg += '<text x="' + (legX+14) + '" y="' + (ly+9) + '" fill="#a898c0" font-size="9">' + TYPE_LABEL[t] + '</text>';
    });

    // ── Alignment dot vs global average ──
    var dotY = 62, dotBarX = barX, dotBarW = barW;
    svg += '<text x="8" y="' + (dotY+12) + '" fill="#a898c0" font-size="10" font-weight="700">ALIGNMENT</text>';
    var alignMin = 4, alignMax = 10;
    var scaleX = function(v) { return dotBarX + ((v - alignMin) / (alignMax - alignMin)) * dotBarW; };
    // track line
    svg += '<line x1="' + dotBarX + '" x2="' + (dotBarX+dotBarW) + '" y1="' + (dotY+8) + '" y2="' + (dotY+8) + '" stroke="#3a2060" stroke-width="2"/>';
    // global avg marker
    var gx = scaleX(globalAvg);
    svg += '<line x1="' + gx + '" x2="' + gx + '" y1="' + (dotY) + '" y2="' + (dotY+16) + '" stroke="#a898c0" stroke-width="1.5" stroke-dasharray="3,2"/>';
    svg += '<text x="' + gx + '" y="' + (dotY+28) + '" text-anchor="middle" fill="#a898c0" font-size="9">avg ' + globalAvg.toFixed(1) + '</text>';
    // reviewer dot
    var rx = scaleX(st.avgAlign);
    var dotCol = st.avgAlign >= globalAvg ? '#4ade80' : '#fbbf24';
    svg += '<circle cx="' + rx + '" cy="' + (dotY+8) + '" r="7" fill="' + dotCol + '" stroke="#2A1040" stroke-width="2"/>';
    svg += '<text x="' + rx + '" y="' + (dotY-4) + '" text-anchor="middle" fill="' + dotCol + '" font-size="11" font-weight="700">' + st.avgAlign.toFixed(1) + '</text>';
    // scale labels
    svg += '<text x="' + dotBarX + '" y="' + (dotY+28) + '" fill="#475569" font-size="9">' + alignMin + '</text>';
    svg += '<text x="' + (dotBarX+dotBarW) + '" y="' + (dotY+28) + '" text-anchor="end" fill="#475569" font-size="9">' + alignMax + '</text>';

    // ── Polarity lean: pos / neutral / concern ──
    var polY = 100, polBarW = barW;
    svg += '<text x="8" y="' + (polY+12) + '" fill="#a898c0" font-size="10" font-weight="700">POLARITY LEAN</text>';
    var px = barX;
    var polData = [
      {label:'Positive', count:st.posCount, color:'#4ade80'},
      {label:'Neutral',  count:st.neutralCount, color:'#a898c0'},
      {label:'Concern',  count:st.negCount, color:'#f87171'},
    ];
    polData.forEach(function(pd) {
      var w = st.total > 0 ? (pd.count / st.total) * polBarW : 0;
      if (w > 0) {
        svg += '<rect x="' + px + '" y="' + polY + '" width="' + w + '" height="' + barH + '" rx="3" fill="' + pd.color + '" fill-opacity=".6"/>';
        if (w > 28) {
          svg += '<text x="' + (px + w/2) + '" y="' + (polY + barH/2 + 4) + '" text-anchor="middle" fill="#2A1040" font-size="10" font-weight="600">' + pd.count + '</text>';
        }
        px += w;
      }
    });
    // Polarity legend
    polData.forEach(function(pd, i) {
      var ly = polY + i * 14;
      svg += '<circle cx="' + (legX+5) + '" cy="' + (ly+5) + '" r="4" fill="' + pd.color + '" fill-opacity=".6"/>';
      svg += '<text x="' + (legX+14) + '" y="' + (ly+9) + '" fill="#a898c0" font-size="9">' + pd.label + '</text>';
    });

    // ── Summary stats ──
    svg += '<text x="8" y="' + (polY+barH+18) + '" fill="#475569" font-size="10">'
      + st.nProjects + ' projects reviewed &middot; ' + st.total + ' sentences</text>';

    svg += '</svg>';
    return svg;
  }

  // ── Overview comparison chart: all reviewers side by side ──
  function buildOverviewChart() {
    var cW = 560, rowH = 36, headH = 30;
    var cH = headH + reviewerNames.length * rowH + 40;
    var barX = 120, barW = 200, dotX = 360, dotW = 160;
    var svg = '<svg width="' + cW + '" height="' + cH + '" style="display:block;margin-bottom:12px">';

    // Headers
    svg += '<text x="' + barX + '" y="16" fill="#a898c0" font-size="10" font-weight="700">SENTENCE TYPE MIX</text>';
    svg += '<text x="' + dotX + '" y="16" fill="#a898c0" font-size="10" font-weight="700">ALIGNMENT TENDENCY</text>';

    reviewerNames.forEach(function(rev, i) {
      var st = revStats[rev];
      var ry = headH + i * rowH + 12;
      // Reviewer name
      svg += '<text x="8" y="' + (ry+14) + '" fill="#f0ecf8" font-size="12" font-weight="600">' + rev + '</text>';
      svg += '<text x="8" y="' + (ry+26) + '" fill="#475569" font-size="9">' + st.nProjects + ' projects · ' + st.total + ' sents</text>';

      // Stacked bar
      var bx = barX;
      TYPE_KEYS.forEach(function(t) {
        var w = st.total > 0 ? (st.typeCounts[t] / st.total) * barW : 0;
        if (w > 0) {
          svg += '<rect x="' + bx + '" y="' + (ry+2) + '" width="' + w + '" height="' + 18 + '" rx="2" fill="' + TYPE_COLOR[t] + '" fill-opacity=".7"/>';
          if (w > 22) {
            svg += '<text x="' + (bx+w/2) + '" y="' + (ry+14) + '" text-anchor="middle" fill="#2A1040" font-size="9" font-weight="600">' + st.typeCounts[t] + '</text>';
          }
          bx += w;
        }
      });

      // Alignment dot
      var alignMin = 4, alignMax = 10;
      var scaleA = function(v) { return dotX + ((v - alignMin) / (alignMax - alignMin)) * dotW; };
      svg += '<line x1="' + dotX + '" x2="' + (dotX+dotW) + '" y1="' + (ry+11) + '" y2="' + (ry+11) + '" stroke="#3a2060" stroke-width="1.5"/>';
      // global avg
      var gx = scaleA(globalAvg);
      svg += '<line x1="' + gx + '" x2="' + gx + '" y1="' + (ry+3) + '" y2="' + (ry+19) + '" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>';
      // reviewer dot
      var ax = scaleA(st.avgAlign);
      var dc = st.avgAlign >= globalAvg ? '#4ade80' : '#fbbf24';
      svg += '<circle cx="' + ax + '" cy="' + (ry+11) + '" r="6" fill="' + dc + '" stroke="#2A1040" stroke-width="1.5"/>';
      svg += '<text x="' + (ax) + '" y="' + (ry-1) + '" text-anchor="middle" fill="' + dc + '" font-size="9" font-weight="700">' + st.avgAlign.toFixed(1) + '</text>';
    });

    // Legend row at bottom
    var ly = headH + reviewerNames.length * rowH + 8;
    var lx = barX;
    TYPE_KEYS.forEach(function(t) {
      svg += '<circle cx="' + (lx+4) + '" cy="' + (ly+4) + '" r="4" fill="' + TYPE_COLOR[t] + '" fill-opacity=".7"/>';
      svg += '<text x="' + (lx+12) + '" y="' + (ly+8) + '" fill="#a898c0" font-size="9">' + TYPE_LABEL[t] + '</text>';
      lx += 82;
    });
    svg += '<text x="' + dotX + '" y="' + (ly+8) + '" fill="#475569" font-size="9">Dashed line = global avg (' + globalAvg.toFixed(1) + ')</text>';

    svg += '</svg>';
    return svg;
  }

  // ── Cross-project phrase tags panel ──
  var tagHTML = phrases.map(function(p) {
    var pol = p.polarity > 0 ? 'rgba(74,222,128,.15)' : p.polarity < 0 ? 'rgba(248,113,113,.15)' : 'rgba(103,48,145,.18)';
    var polBorder = p.polarity > 0 ? 'rgba(74,222,128,.3)' : p.polarity < 0 ? 'rgba(248,113,113,.3)' : 'rgba(103,48,145,.35)';
    var polText = p.polarity > 0 ? '#4ade80' : p.polarity < 0 ? '#f87171' : '#99ee81';
    return '<span class="intel-phrase-tag" style="background:' + pol + ';border-color:' + polBorder + ';color:' + polText + '" title="' + p.n_projects + ' projects">'
      + p.phrase
      + '<span class="itag-count" style="background:' + polBorder + '">' + p.n_projects + '</span>'
      + '</span>';
  }).join('');

  // ── Build a sentence card ──
  function makeCard(s) {
    var aColor = AREA_COL[s.area] || '#a898c0';
    var polIcon = s.polarity === 'positive' ? '\u25B2' : s.polarity === 'concern' ? '\u25BC' : '\u25CF';
    var polColor = s.polarity === 'positive' ? '#4ade80' : s.polarity === 'concern' ? '#f87171' : '#a898c0';
    return '<div class="intel-card ' + s.type + '" data-reviewer="' + s.reviewer + '" data-project="' + (s.project||'') + '" data-type="' + s.type + '" data-polarity="' + (s.polarity||'neutral') + '">'
      + '<div class="intel-card-text">' + s.text + '</div>'
      + '<div class="intel-card-meta">'
      + '<span class="intel-area-dot" style="background:' + aColor + '"></span>'
      + '<span class="intel-code">' + s.code + '</span>'
      + '<span style="color:#a898c0">' + s.reviewer + '</span>'
      + '<span class="intel-card-type-chip" style="background:' + (TYPE_COLOR[s.type]||'#a898c0') + ';color:#2A1040;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:600;margin-left:6px">' + s.type + '</span>'
      + '<span style="color:' + polColor + ';margin-left:auto">' + polIcon + ' ' + s.polarity + '</span>'
      + '</div></div>';
  }

  // ── Bucket sections ──
  var buckets = [
    { key: 'recommendations', label: 'Recommendations', icon: '\uD83D\uDCA1', cls: 'f-rec',
      desc: 'What reviewers think should happen — suggestions, pivots, improvements' },
    { key: 'questions',       label: 'Open Questions',   icon: '\u2753',      cls: 'f-qst',
      desc: 'What remains unclear, hard to assess, or unresolved across the network' },
