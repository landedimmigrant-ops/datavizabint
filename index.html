<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AbInt Phase 2 · Research Intelligence Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
:root {
  --bg:      #110820;
  --surface: #1c1030;
  --surface2:#261540;
  --border:  #3a2060;
  --text:    #f0ecf8;
  --muted:   #a898c0;
  --pos:     #4ade80;
  --neg:     #f87171;
  --warn:    #fbbf24;
  --accent:  #99ee81;
  --lang:    #facc15;
  --story:   #a78bfa;
  --env:     #4ade80;
  --socio:   #f97316;
  --multi:   #60a5fa;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif;
             background: var(--bg); color: var(--text); font-size: 14px; }
/* ── Header ── */
.app-header {
  padding: 14px 24px 10px;
  border-top: 4px solid #99ee81;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: baseline; gap: 12px;
}
.app-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
.app-header .sub { font-size: 12px; color: var(--muted); }
/* ── Nav tabs ── */
.nav-tabs {
  display: flex; gap: 4px; padding: 10px 24px 0;
  border-bottom: 1px solid var(--border);
}
.nav-tab {
  padding: 8px 18px; border: none; background: transparent;
  color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent;
  font-size: 13px; font-weight: 500; transition: all .15s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--text); border-bottom-color: var(--accent); }
/* ── View containers ── */
.view { display: none; padding: 20px 24px; }
.view.active { display: block; }
/* ── Shared util ── */
.chip {
  display: inline-block; padding: 2px 8px; border-radius: 99px;
  font-size: 11px; font-weight: 600; letter-spacing: .3px;
}
.chip-pos  { background: rgba(74,222,128,.15); color: var(--pos); }
.chip-neg  { background: rgba(248,113,113,.15); color: var(--neg); }
.chip-warn { background: rgba(251,191,36,.15);  color: var(--warn); }
.chip-blue { background: rgba(153,238,129,.15); color: var(--accent); }
.chip-muted{ background: rgba(100,116,139,.15); color: var(--muted); }

/* ── Legend ── */
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.legend-dot  { width: 11px; height: 11px; border-radius: 50%; }

/* ── Tooltip ── */
#tooltip {
  position: fixed; pointer-events: none; z-index: 999;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; max-width: 320px;
  font-size: 12px; line-height: 1.5; display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
#tooltip h4 { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
#tooltip .tt-row { display: flex; gap: 6px; align-items: baseline; margin: 2px 0; }
#tooltip .tt-label { color: var(--muted); min-width: 70px; }
#tooltip .phrases { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
#tooltip .ph-chip {
  font-size: 10px; padding: 2px 7px; border-radius: 99px;
  background: rgba(153,238,129,.2); color: var(--accent);
}

/* ── Landscape View ── */
#landscape-svg { width: 100%; }
.quadrant-label { font-size: 11px; fill: #3d2060; font-weight: 600; pointer-events: none; }
.axis-label     { font-size: 11px; fill: var(--muted); }
.node-label     { font-size: 10px; fill: var(--text); pointer-events: none; }
.bubble         { cursor: pointer; transition: opacity .15s; }
.bubble:hover   { opacity: .85; }

/* ── Coverage Map ── */
#coverage-wrap { overflow-x: auto; }
.coverage-table { border-collapse: separate; border-spacing: 0; min-width: 900px; }
.coverage-table th, .coverage-table td {
  padding: 0; text-align: center;
}
.ct-row-header {
  text-align: right; padding-right: 14px; font-size: 12px; font-weight: 600;
  white-space: nowrap; padding-left: 8px;
  border-right: 1px solid var(--border);
}
.ct-col-header {
  font-size: 10px; color: var(--muted);
  white-space: nowrap; vertical-align: bottom;
  cursor: pointer;
}
.ct-col-header:hover { background: rgba(153,238,129,.06); }
.ct-cell {
  width: 68px; height: 56px;
  border: 1px solid rgba(42,48,80,.4);
  position: relative; cursor: default;
  transition: background .1s;
}
.ct-cell:hover { background: rgba(153,238,129,.06); }
.ct-cell svg { display: block; margin: auto; }
.ct-no-data {
  background: repeating-linear-gradient(
    135deg, rgba(255,255,255,.01), rgba(255,255,255,.01) 4px,
    transparent 4px, transparent 10px
  );
}
.ct-gap-row .ct-row-header { color: var(--neg); }
.ct-score-bar { height: 4px; border-radius: 2px; margin: 2px auto 0; }
.coverage-legend { display: flex; gap: 20px; margin: 12px 0 16px; font-size: 12px; align-items: center; }
.coverage-legend-item { display: flex; align-items: center; gap: 6px; }

/* ── Emergent Voice ── */
#voice-wrap { display: flex; gap: 24px; }
#voice-svg-wrap { flex: 1; min-height: 480px; }
#voice-detail {
  width: 280px; flex-shrink: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
}
#voice-detail h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--accent); }
#voice-detail .vd-phrase { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
#voice-detail .vd-projects { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
#voice-detail .vd-proj {
  background: var(--surface2); border-radius: 8px; padding: 8px 10px;
  font-size: 11px;
}
#voice-detail .vd-proj strong { font-size: 12px; display: block; margin-bottom: 2px; }
.voice-bubble { cursor: pointer; }
.voice-bubble text { pointer-events: none; font-weight: 600; }

/* ── Signal Cards ── */
#cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.signal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px; cursor: default;
  transition: border-color .15s;
}
.signal-card:hover { border-color: var(--accent); }
.sc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.sc-name { font-size: 13px; font-weight: 700; }
.sc-code { font-size: 11px; color: var(--muted); }
.sc-title { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
.sc-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.sc-scores { display: flex; gap: 12px; margin-bottom: 10px; }
.sc-score-block { text-align: center; }
.sc-score-num { font-size: 20px; font-weight: 800; line-height: 1; }
.sc-score-label { font-size: 10px; color: var(--muted); }
.sc-phrases { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.sc-phrase {
  font-size: 10px; padding: 2px 7px; border-radius: 99px;
  background: rgba(153,238,129,.15); color: #2A1040;
}
.sc-signal { margin-bottom: 6px; padding: 7px 9px; border-radius: 7px; font-size: 11px; line-height: 1.4; }
.sc-signal.pos { background: rgba(74,222,128,.07); border-left: 3px solid var(--pos); }
.sc-signal.neg { background: rgba(248,113,113,.07); border-left: 3px solid var(--neg); }
.sc-signal .src-tag { font-size: 10px; color: var(--muted); margin-bottom: 3px; }

/* ── Area summaries in Coverage tab ── */
.area-summary-bar {
  display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;
}
.area-summary-card {
  flex: 1; min-width: 160px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
}
.asc-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
.asc-count { font-size: 36px; font-weight: 900; line-height: 1; margin-bottom: 2px; }
.asc-split { font-size: 10px; color: var(--muted); margin-bottom: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
.asc-split-pill { padding: 2px 7px; border-radius: 99px; font-weight: 600; }
.asc-proj-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
.asc-proj-row { font-size: 10px; display: flex; align-items: center; gap: 5px; color: var(--muted); }
.asc-proj-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; flex-shrink: 0; }
.asc-align-row { display: flex; align-items: baseline; gap: 4px; margin-top: 6px; border-top: 1px solid var(--border); padding-top: 6px; }
.asc-align-num { font-size: 13px; font-weight: 800; }
.asc-align-label { font-size: 10px; color: var(--muted); }
.asc-gap { opacity: .5; border-style: dashed; }

/* ── Pod Intelligence tab ── */
.pod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; padding: 20px 24px; }
.pod-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.pod-card-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
.pod-card-name { font-size: 13px; font-weight: 800; letter-spacing: .02em; margin-bottom: 2px; }
.pod-card-meta { font-size: 10px; color: var(--muted); display: flex; gap: 10px; }
.pod-section { padding: 10px 14px; border-bottom: 1px solid #1e0e38; }
.pod-section-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 7px; }
.pod-depth-bar { height: 8px; border-radius: 4px; overflow: hidden; display: flex; gap: 1px; margin-bottom: 4px; }
.pod-depth-seg { height: 100%; border-radius: 2px; }
.pod-depth-legend { display: flex; flex-wrap: wrap; gap: 6px; }
.pod-depth-key { font-size: 9px; display: flex; align-items: center; gap: 3px; color: var(--muted); }
.pod-domain-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.pod-domain-tag { font-size: 9px; padding: 2px 7px; border-radius: 99px; font-weight: 600; }
.pod-area-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.pod-area-name { font-size: 9.5px; color: var(--muted); width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pod-area-bar-wrap { flex: 1; height: 6px; background: #1e0e38; border-radius: 3px; }
.pod-area-bar { height: 100%; border-radius: 3px; }
.pod-area-count { font-size: 9px; color: var(--muted); flex-shrink: 0; width: 14px; text-align: right; }
.pod-ts-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.pod-ts-label { font-size: 9px; color: var(--muted); width: 82px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pod-ts-bar-wrap { flex: 1; height: 5px; background: #1e0e38; border-radius: 3px; }
.pod-ts-bar { height: 100%; border-radius: 3px; }
.pod-ts-score { font-size: 9px; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }
.pod-theme-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.pod-theme-tag { font-size: 9px; padding: 2px 8px; border-radius: 99px; }
.pod-align-footer { padding: 8px 14px; display: flex; align-items: baseline; gap: 5px; }

/* ── Reviewer Intelligence ── */
#intel-layout { display: flex; gap: 20px; align-items: flex-start; }
#intel-phrases-panel {
  width: 220px; flex-shrink: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
  position: sticky; top: 0;
}
#intel-phrases-panel h4 { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.intel-phrase-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; padding: 4px 9px; border-radius: 99px;
  margin: 3px 2px; cursor: default;
  background: rgba(153,238,129,.12); color: #99ee81;
  border: 1px solid rgba(153,238,129,.25);
}
.intel-phrase-tag .itag-count {
  background: rgba(153,238,129,.25); border-radius: 99px;
  padding: 1px 5px; font-size: 10px; font-weight: 700;
}
#intel-main { flex: 1; min-width: 0; }
.intel-bucket { margin-bottom: 28px; }
.intel-bucket-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.intel-bucket-icon { font-size: 18px; }
.intel-bucket-title { font-size: 14px; font-weight: 700; }
.intel-bucket-count { font-size: 11px; color: var(--muted); margin-left: auto; }
.intel-cards { display: flex; flex-direction: column; gap: 8px; }
.intel-card {
  border-radius: 10px; padding: 12px 14px;
  border-left: 4px solid transparent;
  font-size: 12px; line-height: 1.6;
  position: relative;
}
/* Colour per type */
.intel-card.recommendation {
  background: rgba(245,158,11,.08);
  border-left-color: #f59e0b;
}
.intel-card.question {
  background: rgba(34,211,238,.07);
  border-left-color: #22d3ee;
}
.intel-card.action {
  background: rgba(74,222,128,.07);
  border-left-color: #4ade80;
}
.intel-card.observation {
  background: rgba(167,139,250,.07);
  border-left-color: #a78bfa;
}
.intel-card-text { margin-bottom: 6px; color: var(--text); }
.intel-card-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--muted); flex-wrap: wrap;
}
.intel-area-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.intel-code {
  font-weight: 700; font-size: 10px;
  padding: 1px 6px; border-radius: 4px;
  background: var(--border);
}
.intel-filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px;
}
.intel-filter-btn {
  font-size: 11px; padding: 5px 12px; border-radius: 99px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.intel-filter-btn:hover { border-color: var(--accent); color: var(--text); }
.intel-filter-btn.active { color: var(--bg); }
.intel-filter-btn.f-all.active    { background: var(--accent); border-color: var(--accent); }
.intel-filter-btn.f-rec.active    { background: #f59e0b; border-color: #f59e0b; }
.intel-filter-btn.f-qst.active    { background: #22d3ee; border-color: #22d3ee; }
.intel-filter-btn.f-act.active    { background: #4ade80; border-color: #4ade80; }
.intel-filter-btn.f-obs.active    { background: #a78bfa; border-color: #a78bfa; }

/* ── Pod Relations tab ── */
.pr-header { padding: 18px 24px 0; }
.pr-view-toggle { display:flex; gap:6px; margin:10px 0 6px; }
.pr-toggle-btn { padding:5px 16px; border-radius:99px; border:1.5px solid #1c1030; background:transparent; color:#a898c0; font-size:12px; cursor:pointer; transition:all .15s; }
.pr-toggle-btn.active { border-color:#99ee81; background:#99ee8122; color:#99ee81; font-weight:700; }
.pr-canvas { padding:0 24px 24px; }
.pr-legend { display:flex; gap:14px; flex-wrap:wrap; padding:8px 24px 0; }
.pr-legend-item { font-size:10px; display:flex; align-items:center; gap:5px; color:#a898c0; }
/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

based","score":12.825,"polarity":1,"n_projects":3,"projects":["Jackie Rice - CfP01-07","Christine Clark - CfP04","Keolu Fox, University of California San Diego"],"doc_freq":3},{"phrase":"governed centring","score":12.673,"polarity":1,"n_projects":8,"projects":["Jackie Rice - CfP01-07","Suzanne Kite - CfP01-09","Abundant Soils - Mele Moniz","Fenwick McKelvey - CfP04","Mohawk LLM - Jackson Twobears","AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","Hawaiian Language Physical Reasoning Dataset - Cade Kane","Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear"],"doc_freq":8},{"phrase":"co-creation methodologies","score":12.673,"polarity":1,"n_projects":8,"projects":["Jackie Rice - CfP01-07","Antoine Bellemare-Pepin - CfP04","Ashley Cordes - CfP01-01","Ma'ema'eolehua Matsumoto - CfP02-05","Digital Archive Project with Rick Hill - Jackson Twobears","Abundant Soils - Mele Moniz","Fenwick McKelvey - CfP04","Biskaabiiyaang Video Game - Maya Chacaby"],"doc_freq":8},{"phrase":"developed governed","score":12.673,"polarity":1,"n_projects":8,"projects":["Shankhalika Srikanth - CfP02-16","Brian Kuwada - CfP01-02","Suzanne Kite - CfP01-09","Fenwick McKelvey - CfP04","Mohawk LLM - Jackson Twobears","AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","Hawaiian Language Physical Reasoning Dataset - Cade Kane","Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear"],"doc_freq":8}],"research_themes":[{"id":"language_ai","label":"Language Consortium","color":"#facc15","desc":"A cluster of language projects across 4 pods \u2014 Hawaiian, M\u0101ori, Niitsitapi, Haudenosaunee \u2014 that reviewers explicitly propose bringing together as a consortium","n_reviewers":3,"reviewers":["Jackson","Sara","Suzanne"],"n_projects":8,"projects":["Antoine Bellemare-Pepin - CfP04","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Darby Herman - CfP02-11","Jackie Rice - CfP01-07","Laurie Lloyd Jones - CfP02-04","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16"],"phrases":["language models","language revitalization","small language"],"sentences":[{"text":"There is very strong potential for collaboration with other projects across the AbInt network, particularly those working with language models, community data governance, virtual environments, and Indigenous-centred AI design.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"This project contributes to AbInt\u2019s Transformation Statement through its focus on community-led language work, collaborative curriculum development, and attention to data sovereignty in the context of language revitalization.","reviewer":"Jackson","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"positive"},{"text":"There is strong potential for collaboration with other projects across the AbInt network, particularly those working with language revitalization, digital storytelling, community-based AI, and Indigenous data governance.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"The work demonstrates a relational approach to knowledge creation, with teachers and community members directly shaping the learning materials and guiding how language data are generated and used.","reviewer":"Jackson","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"positive"},{"text":"As the project develops its planned AI components, it could connect with other PODs exploring language models, community-based data practices, or culturally grounded interface design.","reviewer":"Jackson","project":"Darby Herman","code":"CfP02-11","polarity":"positive"},{"text":"While the AI component is still at an early, exploratory stage, the project reflects the broader transformation goals by emphasizing community control, culturally grounded pedagogy, and careful consideration of how future language-learning tools could be developed in ways that align with local priorities rather than external technical models The project could advance into the Imaginaries phase by further developing its approach to community-driven language pedagogy as a framework for thinking about how AI tools might be designed in ways that follow local knowledge systems rather than external models.","reviewer":"Jackson","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"neutral"}],"interpretation":"Reviewers across 3 pods independently point to language revitalisation as a site where AI can serve Indigenous communities directly \u2014 not as an abstract research question but as tools for teaching, learning, and preserving endangered languages. The cluster includes both low-tech pedagogical projects (Clark, Matsumoto) and high-tech model-building (Bellemare-Pepin, Muller). One reviewer explicitly proposes a language consortium connecting Hawaiian, M\u0101ori, Niitsitapi, and potentially Haudenosaunee projects.","network_question":"Should AbInt formalise a cross-pod Language AI consortium, and if so, should it be organised around shared datasets, shared models, or shared pedagogical methods?","phase2":"Phase 2 opportunity: a shared small language model infrastructure that multiple language projects can fine-tune locally. This avoids each project building from scratch while preserving community data sovereignty.","tension":"The gap between pedagogical projects (low AI depth) and technical projects (high AI depth) is wide \u2014 the consortium would need to bridge both."},{"id":"data_governance","label":"Sovereign Infrastructure","color":"#818cf8","desc":"More than data governance \u2014 reviewers describe the outline of a sovereign technology stack: community-controlled data, locally governed infrastructure, and culturally grounded interfaces forming across pods","n_reviewers":6,"reviewers":["Hemi","Jackson","Jason","Karim","Sara","Suzanne"],"n_projects":30,"projects":["AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","Abundant Soils - Mele Moniz","Antoine Bellemare-Pepin - CfP04","Ashley Cordes - CfP01-01","Biskaabiiyaang Video Game - Maya Chacaby","Bobi-Rose Leatherby - CfP02-01","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Copper Bowls: Gift-Giving and AI - Ostoro Petahtegoose","Darby Herman - CfP02-11","Digital Archive Project with Rick Hill - Jackson Twobears","Eilif Muller, Mila Quebec AI Institute - CfP04","Eliane Ubalijoro - CfP01-03","Fenwick McKelvey - CfP04","Hawaiian Language Physical Reasoning Dataset - Cade Kane","Jackie Rice - CfP01-07","Jamey Hepi - CfP02-02","Kaiya Healy - CfP02-10","Keolu Fox, University of California San Diego","Laurie Lloyd Jones - CfP02-04","Ma'ema'eolehua Matsumoto - CfP02-05","Maurice Jones - CfP01-06","Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear","Melanie Cheung - CfP01-06","Mohawk LLM - Jackson Twobears","Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","Sacred Code: Indigenous Protocols and the Future of Artificial Intelligence (book chapter) - Petera Hudson","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16","Suzanne Kite - CfP01-09"],"phrases":["data sovereignty","data governance","governance frameworks","sovereignty methodologies","sovereign stack","community-based"],"sentences":[{"text":"Having a leading Indigenous thought leaders and scholars is a great strength and we would all benefit from sharing time with leaders such as Leroy and learning from from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space The network would greatly benefit from working closer with this Pod and learning from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space I see no identifiable risks with this project.","reviewer":"Hemi","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"infrastructure, policy engagement, and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities, Canada Imaginaries: need whole series of FIIAI projects that take a Sovereign Stack as their starting point, and imagine out from there.","reviewer":"Jason","project":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","code":"","polarity":"positive"},{"text":"conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies, infrastructure...towards relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities.","reviewer":"Jason","project":"Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear","code":"","polarity":"positive"},{"text":"Based on the goals of the project, it clearly centres M\u0101ori community priorities and data sovereignty via marae-based engagement, it seeks to advances a community\u2011led stance toward AI use with explicit ethics/governance dialogue, and contributes to co\u2011created processes and a developing neuro\u2011fuzzy AI system in an Indigenous health context; and documents sustained capacity building.","reviewer":"Karim","project":"Bobi-Rose Leatherby","code":"CfP02-01","polarity":"positive"},{"text":"Although there is not a lot of evidence of formal data sovereignty processes or core AI system development, there is a strong emphasis on protocol and relational approaches to AI, advancing relational/educational approaches to AI, co-creating programs (artist fellowship, workshops) and building reusable processes (cookbook), while also cultivating student/community capacity.","reviewer":"Hemi","project":"Brian Kuwada","code":"CfP01-02","polarity":"positive"},{"text":"The risk with not pursuing this project lies in the opportunities and benefits that are gained from working closely with and drawing from Leroy Little Bear\u2019s teachings and knowledge to ensure that our work is grounded in Indigenous methodologies, community-informed practices, and the co-creation of a sovereign digital space","reviewer":"Hemi","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"}],"interpretation":"This is the single most cross-cutting theme in the network: 5 reviewers, 16 projects, 11 independent mentions of \"data sovereignty.\" But the underlying conversation is bigger than governance protocols. What reviewers describe \u2014 community-controlled data repositories, locally governed infrastructure, culturally grounded interfaces \u2014 is the outline of a sovereign technology stack. Sara explicitly calls for \"local processing, sovereign stacks\" as an emerging direction. This is not one project's goal; it is a network-level architecture forming across pods.","network_question":"Is AbInt ready to invest in shared data governance frameworks and sovereign infrastructure before deepening individual AI development \u2014 or should these develop in parallel?","phase2":"Phase 2 priority: define a shared data governance protocol that all projects can adopt, and pilot at least one sovereign data repository that multiple projects can contribute to and draw from.","tension":"Suzanne flags that some projects claim data sovereignty without demonstrating community control. The standard needs teeth, not just language."},{"id":"community_led","label":"Community Accountability","color":"#f59e0b","desc":"Community-led practice as an accountability standard \u2014 reviewers affirm it where genuine and question it where the evidence is thin. The gap between stated and demonstrated community leadership is a live tension.","n_reviewers":6,"reviewers":["Hemi","Jackson","Jason","Karim","Sara","Suzanne"],"n_projects":20,"projects":["AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","Abundant Soils - Mele Moniz","Antoine Bellemare-Pepin - CfP04","Ashley Cordes - CfP01-01","Biskaabiiyaang Video Game - Maya Chacaby","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Darby Herman - CfP02-11","Eliane Ubalijoro - CfP01-03","Fenwick McKelvey - CfP04","Hawaiian Language Physical Reasoning Dataset - Cade Kane","Jackie Rice - CfP01-07","Jamey Hepi - CfP02-02","Ma'ema'eolehua Matsumoto - CfP02-05","Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear","Mohawk LLM - Jackson Twobears","Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16","Suzanne Kite - CfP01-09"],"phrases":["community-led","community-driven","community-defined priorities","community-defined","systems community-defined","decision-making","community-based"],"sentences":[{"text":"conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies, infrastructure...towards relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities.","reviewer":"Jason","project":"Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear","code":"","polarity":"positive"},{"text":"transforming how artificial intelligence is conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Suzanne Kite","code":"CfP01-09","polarity":"positive"},{"text":"Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"It prioritizes non-extractive collaboration, supports the integration of diverse knowledge systems for scalable and context-sensitive fire management, and lays the groundwork for governance frameworks that enable locally relevant, equitable, and community-led AI solutions.","reviewer":"Karim","project":"Eliane Ubalijoro","code":"CfP01-03","polarity":"positive"},{"text":"The risk of not pursuing the project would be significant, as it supports the relational and community-driven foundations necessary for Indigenous-centred AI, while also building capacity through residencies, mentorship, and shared learning across the AbInt network.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"It could serve as a point of dialogue with projects focused on Indigenous data sovereignty, relational methodologies, and community-led infrastructure, especially where there is interest in language, pedagogy, or small-data approaches.","reviewer":"Suzanne","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"positive"}],"interpretation":"Community-led practice appears in 11 projects across all 5 reviewers, but the depth varies. Some projects demonstrate genuine community co-design (Cordes, Diamond & Pechawis, Rice); others use community-led language without evidence of community decision-making in practice. Reviewers are increasingly applying this as an accountability standard, not just a descriptor. Suzanne's questions about FLAIR (Srikanth) and Sara's about Ubalijoro reveal the gap between stated and demonstrated community leadership.","network_question":"How does AbInt distinguish between projects that are community-led in practice versus in rhetoric \u2014 and what support structures help projects deepen genuine community engagement?","phase2":"Phase 2 action: develop an internal rubric or shared reflection tool for community-led practice that projects can use for self-assessment, with examples drawn from the strongest projects in Phase 1.","tension":"Holding projects accountable to community-led standards without creating extractive evaluation processes is itself a community-centred design challenge."},{"id":"relational","label":"Relational Practices","color":"#22d3ee","desc":"Ubiquitous in AbInt vocabulary but diagnostically flat \u2014 the word \"relational\" appears everywhere. The real signal is in specific practices: ceremony-informed design, Elder advisory, place-based partnerships, reciprocal governance.","n_reviewers":6,"reviewers":["Hemi","Jackson","Jason","Karim","Sara","Suzanne"],"n_projects":23,"projects":["Abundant Soils - Mele Moniz","Antoine Bellemare-Pepin - CfP04","Ashley Cordes - CfP01-01","Biskaabiiyaang Video Game - Maya Chacaby","Bobi-Rose Leatherby - CfP02-01","Brian Kuwada - CfP01-02","Darby Herman - CfP02-11","Digital Archive Project with Rick Hill - Jackson Twobears","Eilif Muller, Mila Quebec AI Institute - CfP04","Fenwick McKelvey - CfP04","Jackie Rice - CfP01-07","Jamey Hepi - CfP02-02","Kaiya Healy - CfP02-10","Keolu Fox, University of California San Diego","Laurie Lloyd Jones - CfP02-04","Ma'ema'eolehua Matsumoto - CfP02-05","Maurice Jones - CfP01-06","Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear","Melanie Cheung - CfP01-06","Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","Sacred Code: Indigenous Protocols and the Future of Artificial Intelligence (book chapter) - Petera Hudson","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16"],"phrases":["co-creation methodologies"],"sentences":[{"text":"Although there is not a lot of evidence of formal data sovereignty processes or core AI system development, there is a strong emphasis on protocol and relational approaches to AI, advancing relational/educational approaches to AI, co-creating programs (artist fellowship, workshops) and building reusable processes (cookbook), while also cultivating student/community capacity.","reviewer":"Hemi","project":"Brian Kuwada","code":"CfP01-02","polarity":"positive"},{"text":"The risk with not pursuing this project lies in the opportunities and benefits that are gained from working closely with and drawing from Leroy Little Bear\u2019s teachings and knowledge to ensure that our work is grounded in Indigenous methodologies, community-informed practices, and the co-creation of a sovereign digital space","reviewer":"Hemi","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"The HIFI Lab project demonstrates strong alignment with AbInt's Transformation statement and strategic direction through its grounding in cultural protocols, Indigenous-centred and community-led imaginaries and educational engagement.","reviewer":"Hemi","project":"Brian Kuwada","code":"CfP01-02","polarity":"positive"},{"text":"Through the co-creation of methodologies, infrastructure, policy engagement, and Indigenous-centred AI systems; towards relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"The co-creation of VR/NeRF reconstructions (grounded in interviews and sustained marae engagement) is a notable strength, as is the documented development of student leadership.","reviewer":"Karim","project":"Laurie Lloyd Jones","code":"CfP02-04","polarity":"positive"}],"interpretation":"\"Relational\" appears across 18 projects and 5 reviewers, but produces zero specific cross-project phrases. This signals that relational language has become ubiquitous in AbInt's vocabulary \u2014 a shared value rather than a diagnostic indicator. Everyone is relational; the word no longer differentiates. The real relational signal lives in specific practices: ceremony-informed design (Diamond & Pechawis), Elder advisory processes (Rice), place-based partnerships (Cordes), and reciprocal governance (Fox).","network_question":"Can AbInt move beyond \"relational\" as a general descriptor and name the specific relational practices that distinguish its approach \u2014 ceremony-informed, Elder-guided, reciprocal, place-based?","phase2":"Phase 2 reframe: retire \"Relational Approaches\" as a standalone theme and instead embed specific relational practices as quality indicators within other themes.","tension":"Removing a valued term from the framework may feel like devaluing it. The alternative framing needs to honour the concept while making it more analytically useful."},{"id":"capacity","label":"Technical Translation Gap","color":"#fb923c","desc":"The network has visionary PIs and community partners at one end, and technical ambitions at the other. The connective tissue \u2014 people who can translate between IK holders and AI system builders \u2014 is thin. Reviewers explicitly call for technical mentors.","n_reviewers":5,"reviewers":["Hemi","Jackson","Karim","Sara","Suzanne"],"n_projects":17,"projects":["AI Drum -  Jackson Twobears","Bobi-Rose Leatherby - CfP02-01","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Darby Herman - CfP02-11","Digital Archive Project with Rick Hill - Jackson Twobears","Eilif Muller, Mila Quebec AI Institute - CfP04","Eliane Ubalijoro - CfP01-03","Jackie Rice - CfP01-07","Jamey Hepi - CfP02-02","Kaiya Healy - CfP02-10","Maurice Jones - CfP01-06","Melanie Cheung - CfP01-06","Michelle Sylvestre - CfP02-13","Mohawk LLM - Jackson Twobears","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16"],"phrases":["capacity building"],"sentences":[{"text":"Based on the goals of the project, it clearly centres M\u0101ori community priorities and data sovereignty via marae-based engagement, it seeks to advances a community\u2011led stance toward AI use with explicit ethics/governance dialogue, and contributes to co\u2011created processes and a developing neuro\u2011fuzzy AI system in an Indigenous health context; and documents sustained capacity building.","reviewer":"Karim","project":"Bobi-Rose Leatherby","code":"CfP02-01","polarity":"positive"},{"text":"Its emphasis on collaboration with community partners, development of culturally grounded curriculum materials, and experimentation with technology as a supportive rather than dominant framework aligns with the program\u2019s goal of shifting AI research toward relational, ethical, and locally defined practices.","reviewer":"Jackson","project":"Christine Clark","code":"CfP04","polarity":"positive"},{"text":"The strong mentorship structure and focus on learning also make this a good candidate for collaboration through workshops, shared development sessions, or student exchanges, which could help expand the work beyond its current scope while contributing to broader network capacity building.","reviewer":"Jackson","project":"Darby Herman","code":"CfP02-11","polarity":"positive"},{"text":"Its combination of technical prototyping, governance design, and capacity building through workshops, student leadership, and partnerships supports AbInt\u2019s goal of transforming AI by aligning computation with Indigenous knowledge systems, sovereignty, and shared responsibility.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"The risk of not pursuing the project would be significant, as it supports the relational and community-driven foundations necessary for Indigenous-centred AI, while also building capacity through residencies, mentorship, and shared learning across the AbInt network.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"Through the development of an interactive Unity-based world, the work explores alternative ways of understanding relationality, energy, and place within digital media, while grounding the process in mentorship, community learning, and POD-based practices.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"}],"interpretation":"The capacity theme reveals a specific structural gap in the network. Hemi uses the exact phrase \"technical mentor/advisor/developer\" three times across different projects. Jackson flags that student-led projects risk losing continuity. Sara points to the need for AI researchers who can prototype. The network has visionary PIs and community partners at one end, and ambitious technical goals at the other, but the connective tissue \u2014 people who can translate between Indigenous knowledge holders and AI system builders \u2014 is thin.","network_question":"Does AbInt need a dedicated technical translation layer \u2014 embedded technologists who work across projects, not within them \u2014 to bridge the IK-to-AI gap?","phase2":"Phase 2 investment: recruit 2-3 rotating technical mentors who are shared across pods, not assigned to individual projects. Their role: help projects move from concept to prototype.","tension":"External technical mentors risk introducing non-Indigenous design assumptions. They would need to work within the relational and governance frameworks already established."},{"id":"ik_systems","label":"IK-AI Integration Challenge","color":"#4ade80","desc":"IK methods are rated Core in 19/29 projects \u2014 the network is deeply grounded. The open question is how to translate IK into forms that AI can learn from without extracting or flattening. This is the foundational intellectual challenge of AbInt.","n_reviewers":6,"reviewers":["Hemi","Jackson","Jason","Karim","Sara","Suzanne"],"n_projects":30,"projects":["AI Drum -  Jackson Twobears","AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","Abundant Soils - Mele Moniz","Antoine Bellemare-Pepin - CfP04","Biskaabiiyaang Video Game - Maya Chacaby","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Darby Herman - CfP02-11","Data Visualizations Catalogue - Orus Mateo Casta\u00f1o-Su\u00e1rez","Digital Archive Project with Rick Hill - Jackson Twobears","Eilif Muller, Mila Quebec AI Institute - CfP04","Eliane Ubalijoro - CfP01-03","Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow","Fenwick McKelvey - CfP04","Hawaiian Language Physical Reasoning Dataset - Cade Kane","Hiringa Te Mahara (DEEP KIN) research platform - Kevin Shedlock","Jackie Rice - CfP01-07","Jamey Hepi - CfP02-02","Kaiya Healy - CfP02-10","Keolu Fox, University of California San Diego","Ma'ema'eolehua Matsumoto - CfP02-05","Maurice Jones - CfP01-06","Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear","Michelle Sylvestre - CfP02-13","Mohawk LLM - Jackson Twobears","Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16","Suzanne Kite - CfP01-09"],"phrases":["indigenous-centred","cultural knowledge","knowledge systems","indigenous-centred systems","land-based"],"sentences":[{"text":"infrastructure, policy engagement, and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities, Canada Imaginaries: need whole series of FIIAI projects that take a Sovereign Stack as their starting point, and imagine out from there.","reviewer":"Jason","project":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","code":"","polarity":"positive"},{"text":"conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies, infrastructure...towards relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities.","reviewer":"Jason","project":"Media Format Sovereignty: Exercising sovereignty through waveform - Leroy Little Bear","code":"","polarity":"positive"},{"text":"transforming how artificial intelligence is conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Suzanne Kite","code":"CfP01-09","polarity":"positive"},{"text":"The project is well positioned to advance into the Imaginaries phase by further developing its dialogue-based and land-based methodologies as frameworks for imagining Indigenous-centred approaches to AI, particularly through language, storytelling, and relational understandings of knowledge and memory.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement by demonstrating how Indigenous knowledge systems, particularly Blackfoot metaphysics and teachings, can inform the creation of sovereign digital environments that challenge Western assumptions about space, time, and intelligence.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Its focus on relational methodologies and Elder-guided processes also positions it well to contribute to network-wide conversations about ethics, data sovereignty, and Indigenous-centred design, making it a useful hub for collaboration as other projects move further into technical development.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"}],"interpretation":"Indigenous knowledge integration appears across 17 projects and all 5 reviewers. The strongest signal is that IK methods are rated \"Core\" in 19 of 29 projects \u2014 the network is already deeply grounded. What reviewers flag is not a lack of IK integration but the challenge of translating IK into forms that AI systems can learn from without extracting or flattening. The \"indigenous-centred\" phrase (9 projects) signals commitment; the \"knowledge systems\" phrase (13 projects) signals the structural challenge of encoding.","network_question":"What does it mean for an AI system to \"learn from\" Indigenous knowledge without extracting it? Can AbInt articulate a shared position on this that guides technical development across all projects?","phase2":"Phase 2 intellectual contribution: produce a position paper or protocol on IK-AI integration that the network can publish and that becomes a reference point for the broader field.","tension":"The diversity of IK systems across pods (M\u0101ori, Hawaiian, Niitsitapi, Haudenosaunee, etc.) means a single protocol cannot be prescriptive \u2014 it must be a framework for local adaptation."},{"id":"network","label":"Network Architecture","color":"#60a5fa","desc":"Reviewers are not just noting cross-project synergies \u2014 they are proposing specific structural moves: a language consortium, a website-building intensive, an AR/VR stream, sovereign stack pilots. These are bottom-up signals for Phase 2 design.","n_reviewers":6,"reviewers":["Hemi","Jackson","Jason","Karim","Sara","Suzanne"],"n_projects":28,"projects":["AI Drum -  Jackson Twobears","AI Glossary of Terms: Definitions with New Zealand Examples - Petera Hudson","AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","Abundant Soils - Mele Moniz","Antoine Bellemare-Pepin - CfP04","Ashley Cordes - CfP01-01","Bobi-Rose Leatherby - CfP02-01","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Copper Bowls: Gift-Giving and AI - Ostoro Petahtegoose","Darby Herman - CfP02-11","Data Visualizations Catalogue - Orus Mateo Casta\u00f1o-Su\u00e1rez","Digital Archive Project with Rick Hill - Jackson Twobears","Eilif Muller, Mila Quebec AI Institute - CfP04","Eliane Ubalijoro - CfP01-03","Hiringa Te Mahara (DEEP KIN) research platform - Kevin Shedlock","Jackie Rice - CfP01-07","Kaiya Healy - CfP02-10","Keolu Fox, University of California San Diego","Laurie Lloyd Jones - CfP02-04","Maurice Jones - CfP01-06","Melanie Cheung - CfP01-06","Michelle Sylvestre - CfP02-13","Mohawk LLM - Jackson Twobears","Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","Sacred Code: Indigenous Protocols and the Future of Artificial Intelligence (book chapter) - Petera Hudson","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16"],"phrases":["decision-making"],"sentences":[{"text":"Having a leading Indigenous thought leaders and scholars is a great strength and we would all benefit from sharing time with leaders such as Leroy and learning from from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space The network would greatly benefit from working closer with this Pod and learning from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space I see no identifiable risks with this project.","reviewer":"Hemi","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"The project also aligns well with network activities focused on relational AI, digital territories, and culturally grounded interface design, and could benefit from further collaboration through shared builds, workshops, and cross-POD development sessions that expand the work beyond its original context.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Continued collaboration within the network, along with clearer pathways for sharing builds, workflows, and community-informed design methods, would help the project move from a single environment toward a more scalable and relational digital infrastructure aligned with the goals of these later phases.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Its focus on relational methodologies and Elder-guided processes also positions it well to contribute to network-wide conversations about ethics, data sovereignty, and Indigenous-centred design, making it a useful hub for collaboration as other projects move further into technical development.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"The strong mentorship structure and focus on learning also make this a good candidate for collaboration through workshops, shared development sessions, or student exchanges, which could help expand the work beyond its current scope while contributing to broader network capacity building.","reviewer":"Jackson","project":"Darby Herman","code":"CfP02-11","polarity":"positive"}],"interpretation":"Network and cross-project connection is the most active theme by project count (21 projects), reflecting the review framework itself \u2014 reviewers are asked to consider cross-project synergies. The meaningful signal underneath is a set of specific structural proposals: Jason recommends a language consortium, Suzanne proposes a website-building intensive, Sara calls for a focused AR/VR stream, and multiple reviewers identify shared infrastructure needs. These are not vague recommendations \u2014 they are concrete network-architecture proposals.","network_question":"Which of the reviewer-proposed structural actions (language consortium, website intensive, AR/VR stream, sovereign stack pilots) should AbInt prioritise in Phase 2 planning?","phase2":"Phase 2 structural moves: act on the top 3 most-supported cross-project proposals. The reviewer data provides a mandate for these; they are not top-down decisions but bottom-up signals.","tension":"Cross-project activity competes with in-project depth for time and attention. Projects at early stages may not be ready to connect meaningfully."},{"id":"technical_ai","label":"Technical Frontier","color":"#f472b6","desc":"5 projects at High AI Dept
