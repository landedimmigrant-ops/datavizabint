    { key: 'actions',         label: 'Action Signals',   icon: '\uD83D\uDD04', cls: 'f-act',
      desc: 'What is already in motion — active work, partnerships, commitments' },
    { key: 'observations',    label: 'Key Observations', icon: '\uD83D\uDCCC', cls: 'f-obs',
      desc: 'Substantive insights from reviewers — strong reads on projects' },
  ];

  // ── Project lookup helper for displayName ──
  var projLookup = {};
  DATA.projects.forEach(function(p) {
    var key = (p.short || p.id || '').trim();
    projLookup[key] = p;
    // Also index by just the project field value in sentences (first name / lead)
    if (p.code) projLookup[p.code] = p;
  });
  function projDisplayName(projStr) {
    // Try direct match
    if (projLookup[projStr]) return displayName(projLookup[projStr]);
    // Try matching by checking if any project short starts with this string
    for (var k in projLookup) {
      if (k.indexOf(projStr) === 0 || projStr.indexOf(k) === 0) return displayName(projLookup[k]);
    }
    // Fallback: last name logic on raw string
    var parts = projStr.trim().split(' ');
    return parts[parts.length - 1] || projStr;
  }

  // Polarity sort order for within-project grouping
  var POL_ORDER = {positive: 0, neutral: 1, concern: 2};

  // ── Reviewer dropdown + Group-by toggle ──
  var controlHTML = '<div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap">'
    + '<div style="display:flex;align-items:center;gap:8px">'
    + '<label style="font-size:11px;color:#a898c0;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Reviewer</label>'
    + '<select id="intel-rev-select" style="background:#1c1030;color:#f0ecf8;border:1px solid #3a2060;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer">'
    + '<option value="all">All Reviewers</option>';
  reviewerNames.forEach(function(r) {
    var st = revStats[r];
    controlHTML += '<option value="' + r + '">' + r + ' (' + st.nProjects + ' projects, ' + st.total + ' sentences)</option>';
  });
  controlHTML += '</select></div>'
    + '<div style="display:flex;align-items:center;gap:8px">'
    + '<label style="font-size:11px;color:#a898c0;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Group by</label>'
    + '<button id="intel-grp-type" class="intel-filter-btn" style="padding:3px 10px;font-size:11px;background:#261540;color:#f0ecf8;border:1px solid #3a2060;border-radius:6px;cursor:pointer">Type</button>'
    + '<button id="intel-grp-proj" class="intel-filter-btn" style="padding:3px 10px;font-size:11px;background:transparent;color:#a898c0;border:1px solid #3a2060;border-radius:6px;cursor:pointer">Project</button>'
    + '</div>'
    + '</div>';

  // Filter bar
  var filterHTML = '<div class="intel-filter-bar" id="intel-filter-bar">'
    + '<button class="intel-filter-btn f-all active" data-fbucket="all">All</button>';
  buckets.forEach(function(b) {
    var n = (sig[b.key] || []).length;
    filterHTML += '<button class="intel-filter-btn ' + b.cls + '" data-fbucket="' + b.key + '">'
      + b.icon + ' ' + b.label + ' <span class="intel-type-count" style="opacity:.6">(' + n + ')</span></button>';
  });
  filterHTML += '</div>';

  // ── Build bucket HTML for "Group by Type" ──
  function buildTypeGroupHTML() {
    return buckets.map(function(b) {
      var items = sig[b.key] || [];
      if (!items.length) return '';
      var cards = items.map(makeCard).join('');
      return '<div class="intel-bucket" data-bucket="' + b.key + '">'
        + '<div class="intel-bucket-header">'
        + '<span class="intel-bucket-icon">' + b.icon + '</span>'
        + '<div><div class="intel-bucket-title">' + b.label + '</div>'
        + '<div style="font-size:11px;color:#a898c0;margin-top:2px">' + b.desc + '</div></div>'
        + '<span class="intel-bucket-count">' + items.length + ' signals</span>'
        + '</div>'
        + '<div class="intel-cards">' + cards + '</div>'
        + '</div>';
    }).join('');
  }

  // ── Build bucket HTML for "Group by Project" ──
  function buildProjectGroupHTML() {
    // Collect all sentences, group by project
    var projGroups = {};
    var projOrder = [];
    allSents.forEach(function(s) {
      var key = s.project || 'Unknown';
      if (!projGroups[key]) { projGroups[key] = []; projOrder.push(key); }
      projGroups[key].push(s);
    });
    // Sort within each project: positive → neutral → concern
    projOrder.forEach(function(key) {
      projGroups[key].sort(function(a,b) {
        return (POL_ORDER[a.polarity]||1) - (POL_ORDER[b.polarity]||1);
      });
    });
    // Sort projects by name
    projOrder.sort(function(a,b) { return projDisplayName(a).localeCompare(projDisplayName(b)); });

    return projOrder.map(function(projKey) {
      var items = projGroups[projKey];
      var pObj = DATA.projects.find(function(p) { return p.short === projKey || p.id.indexOf(projKey) > -1; });
      var dName = projDisplayName(projKey);
      var aColor = pObj ? areaColor(pObj.primary_area) : '#a898c0';
      var code = pObj ? pObj.code : '';
      var alignStr = pObj ? ' · Align: ' + pObj.alignment_avg.toFixed(1) : '';
      var cards = items.map(makeCard).join('');
      return '<div class="intel-bucket" data-bucket="project" data-project-group="' + projKey + '">'
        + '<div class="intel-bucket-header">'
        + '<span style="width:6px;height:28px;border-radius:3px;background:' + aColor + ';flex-shrink:0"></span>'
        + '<div><div class="intel-bucket-title">' + dName + (code ? ' <span style="font-weight:400;color:#a898c0;font-size:11px">' + code + '</span>' : '') + '</div>'
        + '<div style="font-size:11px;color:#a898c0;margin-top:2px">'
        + items.length + ' sentences' + alignStr
        + '</div></div>'
        + '</div>'
        + '<div class="intel-cards">' + cards + '</div>'
        + '</div>';
    }).join('');
  }

  el.innerHTML =
    '<div style="margin-bottom:16px">'
    + '<h3 style="font-size:13px;font-weight:700;color:#a898c0;margin-bottom:4px">'
    + 'Reviewer Intelligence &mdash; what the reviewers are actually saying, in their own words.'
    + '</h3>'
    + '<p style="font-size:11px;color:#475569;line-height:1.5">'
    + 'Full sentences from evaluation forms, classified by type. Select a reviewer to see their profile and bias lean. Group by project to read per-project, sorted positive to concern.'
    + '</p></div>'
    + controlHTML
    + '<div id="intel-profile-chart">' + buildOverviewChart() + '</div>'
    + filterHTML
    + '<div id="intel-layout">'
    + '<div id="intel-phrases-panel"><h4>Cross-Project Phrases</h4>' + tagHTML + '</div>'
    + '<div id="intel-main">' + buildTypeGroupHTML() + '</div>'
    + '</div>';

  // ── Rebuild main panel based on group mode ──
  function rebuildMain() {
    var mainEl = document.getElementById('intel-main');
    if (intelState.groupBy === 'project') {
      mainEl.innerHTML = buildProjectGroupHTML();
    } else {
      mainEl.innerHTML = buildTypeGroupHTML();
    }
    applyIntelFilters();
  }

  // ── Wire up group-by toggle ──
  function setGroupBtn(mode) {
    document.getElementById('intel-grp-type').style.background = mode === 'type' ? '#261540' : 'transparent';
    document.getElementById('intel-grp-type').style.color      = mode === 'type' ? '#f0ecf8' : '#a898c0';
    document.getElementById('intel-grp-proj').style.background = mode === 'project' ? '#261540' : 'transparent';
    document.getElementById('intel-grp-proj').style.color      = mode === 'project' ? '#f0ecf8' : '#a898c0';
    // In project mode, hide the type filter bar (grouping replaces it), or keep it for sub-filtering
    var filterBar = document.getElementById('intel-filter-bar');
    if (mode === 'project') {
      filterBar.style.opacity = '0.4';
    } else {
      filterBar.style.opacity = '1';
    }
  }
  document.getElementById('intel-grp-type').addEventListener('click', function() {
    intelState.groupBy = 'type';
    intelState.bucket = 'all';
    setGroupBtn('type');
    // Reset type filter buttons
    el.querySelectorAll('.intel-filter-btn').forEach(function(b) { b.classList.remove('active'); });
    el.querySelector('.intel-filter-btn.f-all').classList.add('active');
    rebuildMain();
  });
  document.getElementById('intel-grp-proj').addEventListener('click', function() {
    intelState.groupBy = 'project';
    setGroupBtn('project');
    rebuildMain();
  });

  // ── Wire up dropdown ──
  document.getElementById('intel-rev-select').addEventListener('change', function() {
    var rev = this.value;
    intelState.reviewer = rev;
    document.getElementById('intel-profile-chart').innerHTML = buildProfileChart(rev);
    rebuildMain();
  });

  // ── Wire up filter buttons ──
  el.querySelectorAll('.intel-filter-btn[data-fbucket]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      el.querySelectorAll('.intel-filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      intelState.bucket = btn.dataset.fbucket;
      applyIntelFilters();
    });
  });

  function applyIntelFilters() {
    var rev = intelState.reviewer;
    var bucket = intelState.bucket;
    var groupBy = intelState.groupBy;

    // Show/hide buckets (only applies in type mode)
    el.querySelectorAll('.intel-bucket').forEach(function(b) {
      if (groupBy === 'project' || bucket === 'all' || b.dataset.bucket === bucket) {
        b.style.display = '';
      } else {
        b.style.display = 'none';
      }
    });

    // Show/hide cards by reviewer + type filter
    el.querySelectorAll('.intel-card').forEach(function(card) {
      var revMatch = (rev === 'all' || card.dataset.reviewer === rev);
      var typeMatch = true;
      if (groupBy === 'project' && bucket !== 'all') {
        // In project mode, the type filter acts as a sub-filter
        var singularMap = {recommendations:'recommendation', questions:'question', actions:'action', observations:'observation'};
        typeMatch = card.dataset.type === (singularMap[bucket] || bucket);
      }
      card.style.display = (revMatch && typeMatch) ? '' : 'none';
    });

    // Update bucket signal counts
    el.querySelectorAll('.intel-bucket').forEach(function(b) {
      var allCards = b.querySelectorAll('.intel-card');
      var vis = 0;
      allCards.forEach(function(c) { if (c.style.display !== 'none') vis++; });
      var countEl = b.querySelector('.intel-bucket-count');
      if (countEl) countEl.textContent = vis + ' signals';
      // Hide empty project groups
      if (groupBy === 'project' && vis === 0) b.style.display = 'none';
    });

    // Update type filter counts
    var visibleCounts = {};
    el.querySelectorAll('.intel-card').forEach(function(card) {
      if (card.style.display !== 'none') {
        var t = card.dataset.type + 's'; // recommendation → recommendations
        visibleCounts[t] = (visibleCounts[t]||0) + 1;
      }
    });
    el.querySelectorAll('.intel-filter-btn[data-fbucket]').forEach(function(btn) {
      var bk = btn.dataset.fbucket;
      if (bk && bk !== 'all') {
        var countEl = btn.querySelector('.intel-type-count');
        if (countEl) countEl.textContent = '(' + (visibleCounts[bk]||0) + ')';
      }
    });
  }
}

function intelFilter(bucket, btn) {
  // Legacy compat — now handled by inline event listeners
  document.querySelectorAll('.intel-filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.intel-bucket').forEach(function(b) {
    if (bucket === 'all' || b.dataset.bucket === bucket) {
      b.style.display = '';
    } else {
      b.style.display = 'none';
    }
  });
}

// ── VIEW 6: AI Domain ─────────────────────────────────────────────────────
function renderAIDomain() {
  var el = document.getElementById('view-aidomain');
  el.innerHTML = '';

  var AI_DOMAINS = [
    {id:'applied',   label:'Applied Systems',        color:'#60a5fa'},
    {id:'data',      label:'Data Systems',            color:'#4ade80'},
    {id:'model',     label:'Model Architecture',      color:'#f59e0b'},
    {id:'symbolic',  label:'Symbolic / Hybrid',       color:'#a78bfa'},
    {id:'rl',        label:'Reinforcement Learning',  color:'#f87171'},
    {id:'unknown',   label:'Not Yet Specified',       color:'#475569'},
  ];

  var DEPTH_COLOR = {'None':'#334155','Low':'#facc15','Mid':'#f97316','High':'#ef4444'};
  var DEPTH_ORDER = ['High','Mid','Low','None'];

  function primaryDomain(p) {
    var raw = (p.ai_domain || '').trim();
    if (!raw) return 'unknown';
    var first = raw.split(',')[0].trim().toLowerCase();
    if (first.indexOf('applied')       > -1) return 'applied';
    if (first.indexOf('data')          > -1) return 'data';
    if (first.indexOf('model')         > -1) return 'model';
    if (first.indexOf('symbolic')      > -1) return 'symbolic';
    if (first.indexOf('reinforcement') > -1) return 'rl';
    return 'unknown';
  }

  var W = el.offsetWidth || 960;
  var H = 560;
  var cols = 3, rows = 2;
  var zW = W / cols, zH = (H - 80) / rows;  // 80px reserved for legend

  AI_DOMAINS.forEach(function(d, i) {
    d.cx = (i % cols + 0.5) * zW;
    d.cy = 40 + (Math.floor(i / cols) + 0.5) * zH;
  });

  var nodes = DATA.projects.map(function(p) {
    var domId = primaryDomain(p);
    var zone  = AI_DOMAINS.find(function(d) { return d.id === domId; });
    var r     = 7 + Math.max(0, (p.alignment_avg - 3) / 7) * 12;
    return {
      p: p, domId: domId, zone: zone,
      x: zone.cx + (Math.random() - 0.5) * 30,
      y: zone.cy + (Math.random() - 0.5) * 30,
      r: r,
    };
  });

  // Force to cluster within zones
  var sim = d3.forceSimulation(nodes)
    .force('x', d3.forceX(function(d) { return d.zone.cx; }).strength(0.45))
    .force('y', d3.forceY(function(d) { return d.zone.cy; }).strength(0.45))
    .force('collision', d3.forceCollide(function(d) { return d.r + 4; }).strength(0.95))
    .stop();
  for (var i = 0; i < 400; i++) sim.tick();

  var svg = d3.select(el).append('svg')
    .attr('width', W).attr('height', H)
    .style('display','block');

  // Zone backgrounds
  AI_DOMAINS.forEach(function(d) {
    svg.append('rect')
      .attr('x', d.cx - zW/2 + 6).attr('y', d.cy - zH/2 + 6)
      .attr('width', zW - 12).attr('height', zH - 12)
      .attr('rx', 14)
      .attr('fill', d.color).attr('fill-opacity', 0.04)
      .attr('stroke', d.color)
      .attr('stroke-opacity', d.id === 'unknown' ? 0.15 : 0.25)
      .attr('stroke-dasharray', d.id === 'unknown' ? '5,4' : 'none');
    svg.append('text')
      .attr('x', d.cx - zW/2 + 18).attr('y', d.cy - zH/2 + 26)
      .attr('fill', d.color).attr('font-size', 12).attr('font-weight', 700)
      .attr('opacity', d.id === 'unknown' ? 0.5 : 1)
      .text(d.label);
    // Project count badge
    var cnt = nodes.filter(function(n) { return n.domId === d.id; }).length;
    svg.append('text')
      .attr('x', d.cx - zW/2 + 18).attr('y', d.cy - zH/2 + 42)
      .attr('fill', d.color).attr('font-size', 10).attr('opacity', 0.6)
      .text(cnt + ' project' + (cnt !== 1 ? 's' : ''));
  });

  // Nodes
  var tip = document.getElementById('tooltip');
  nodes.forEach(function(nd) {
    var dc = DEPTH_COLOR[nd.p.ai_depth] || '#475569';
    var allDomains = (nd.p.ai_domain || 'Not specified');
    svg.append('circle')
      .attr('cx', nd.x).attr('cy', nd.y).attr('r', nd.r)
      .attr('fill', dc).attr('fill-opacity', 0.78)
      .attr('stroke', dc).attr('stroke-width', 1.5).attr('stroke-opacity', 0.9)
      .style('cursor', 'pointer')
      .on('mouseover', function(event) {
        tip.style.display = 'block';
        tip.innerHTML = '<div class="tt-title">' + (nd.p.short || nd.p.id) + '</div>'
          + '<div class="tt-row"><span class="tt-label">AI Domain</span><span>' + allDomains + '</span></div>'
          + '<div class="tt-row"><span class="tt-label">AI Depth</span><span>' + nd.p.ai_depth + '</span></div>'
          + '<div class="tt-row"><span class="tt-label">Alignment</span><span>' + nd.p.alignment_avg.toFixed(1) + '/10</span></div>'
          + '<div class="tt-row"><span class="tt-label">Pod</span><span>' + (nd.p.pod || 'Podless') + '</span></div>'
          + '<div class="tt-row"><span class="tt-label">Reviewers</span><span>' + (nd.p.reviewers||[]).length + '</span></div>';
        tip.style.left = (event.pageX + 14) + 'px';
        tip.style.top  = (event.pageY - 10) + 'px';
      })
      .on('mousemove', function(event) {
        tip.style.left = (event.pageX + 14) + 'px';
        tip.style.top  = (event.pageY - 10) + 'px';
      })
      .on('mouseout', function() { tip.style.display = 'none'; });

    // Labels for larger bubbles
    if (nd.r >= 10) {
      svg.append('text')
        .attr('x', nd.x).attr('y', nd.y + nd.r + 11)
        .attr('text-anchor', 'middle').attr('font-size', 9)
        .attr('fill', '#a898c0').attr('pointer-events', 'none')
        .text(displayName(nd.p));
    }
  });

  // ── Legend row: AI Depth ──────────────────────────────────────────────────
  var legendY = H - 32;
  svg.append('text').attr('x', 16).attr('y', legendY - 4)
    .attr('fill','#a898c0').attr('font-size', 10).attr('font-weight', 700)
    .attr('text-transform','uppercase').text('AI Depth →');
  var lx = 90;
  DEPTH_ORDER.forEach(function(dep) {
    svg.append('circle').attr('cx', lx).attr('cy', legendY - 5).attr('r', 7)
      .attr('fill', DEPTH_COLOR[dep]).attr('fill-opacity', 0.78);
    svg.append('text').attr('x', lx + 11).attr('y', legendY - 1)
      .attr('fill','#a898c0').attr('font-size', 11).text(dep);
    lx += 72;
  });
  svg.append('text').attr('x', lx + 12).attr('y', legendY - 1)
    .attr('fill','#a898c0').attr('font-size', 10)
    .text('  Bubble size = reviewer alignment score');
}

// ── VIEW 7: Project Overview ──────────────────────────────────────────────
var overviewState = { reviewer: 'all', sort: 'alignment' };

function renderOverview() {
  var el = document.getElementById('view-overview');
  el.innerHTML = '<div id="ov-root" style="padding:20px 24px"></div>';
  buildOverview();
}

function buildOverview() {
  var el = document.getElementById('ov-root');
  if (!el) return;

  // ── Filter projects by reviewer ──────────────────────────────────
  var allProjects = DATA.projects.slice();
  var projects = overviewState.reviewer === 'all'
    ? allProjects
    : allProjects.filter(function(p) {
        return (p.reviewers || []).indexOf(overviewState.reviewer) >= 0;
      });

  // ── Sort ─────────────────────────────────────────────────────────
  projects = projects.slice().sort(function(a, b) {
    if (overviewState.sort === 'alignment') return b.alignment_avg - a.alignment_avg;
    if (overviewState.sort === 'pod') return (a.pod||'').localeCompare(b.pod||'');
    if (overviewState.sort === 'area') return (a.primary_area||'').localeCompare(b.primary_area||'');
    return 0;
  });

  // ── All unique reviewers ─────────────────────────────────────────
  var allReviewers = [];
  DATA.projects.forEach(function(p) {
    (p.reviewers||[]).forEach(function(r) {
      if (allReviewers.indexOf(r) < 0) allReviewers.push(r);
    });
  });
  allReviewers.sort();

  // ── Stat pills ───────────────────────────────────────────────────
  var visCount  = projects.length;
  var visEvals  = projects.reduce(function(s,p){ return s + (p.reviewers||[]).length; }, 0);
  var visAlign  = projects.length
    ? (projects.reduce(function(s,p){ return s + p.alignment_avg; }, 0) / projects.length).toFixed(1)
    : '—';

  var statsHTML = '<div style="display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap">'
    + pill(visCount + ' projects', '#99ee81')
    + pill(visEvals + ' evaluations', '#38bdf8')
    + pill('avg alignment ' + visAlign, '#4ade80')
    + '</div>';

  function pill(txt, col) {
    return '<span style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;background:' + col + '22;color:' + col + ';letter-spacing:.03em">' + txt + '</span>';
  }

  // ── Reviewer toggle row ──────────────────────────────────────────
  function revBtn(val, label) {
    var active = overviewState.reviewer === val;
    return '<button onclick="overviewState.reviewer=\'' + val + '\';buildOverview()" style="'
      + 'padding:5px 14px;border-radius:6px;border:1.5px solid '
      + (active ? '#99ee81' : '#1c1030') + ';background:'
      + (active ? '#99ee8122' : 'transparent') + ';color:'
      + (active ? '#99ee81' : '#a898c0') + ';font-size:12px;font-weight:' + (active ? '700' : '500') + ';cursor:pointer;margin-right:6px">'
      + label + '</button>';
  }

  function sortBtn(val, label) {
    var active = overviewState.sort === val;
    return '<button onclick="overviewState.sort=\'' + val + '\';buildOverview()" style="'
      + 'padding:4px 11px;border-radius:6px;border:1.5px solid '
      + (active ? '#fbbf24' : '#1c1030') + ';background:'
      + (active ? '#fbbf2422' : 'transparent') + ';color:'
      + (active ? '#fbbf24' : '#a898c0') + ';font-size:11px;cursor:pointer;margin-right:4px">'
      + label + '</button>';
  }

  var controlsHTML = '<div style="display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:18px">'
    + '<div style="font-size:11px;font-weight:700;color:#a898c0;text-transform:uppercase;letter-spacing:.06em;margin-right:4px">Reviewer</div>'
    + revBtn('all', 'All')
    + allReviewers.map(function(r) { return revBtn(r, r); }).join('')
    + '<div style="flex:1"></div>'
    + '<div style="font-size:11px;font-weight:700;color:#a898c0;text-transform:uppercase;letter-spacing:.06em;margin-right:4px">Sort by</div>'
    + sortBtn('alignment', 'Alignment ↓')
    + sortBtn('pod', 'Pod')
    + sortBtn('area', 'Research Area')
    + '</div>';

  // ── TS dimension labels ─────────────────────────────────────────
  var dims = DATA.ts_dimensions || [];

  // ── Main table ──────────────────────────────────────────────────
  var tableHTML = '<div style="overflow-x:auto"><table class="coverage-table"><thead>';

  // Row 1: pod colour strip + project name
  tableHTML += '<tr><th class="ct-row-header" style="border:none;min-width:170px;vertical-align:bottom;padding-bottom:8px">'
    + '<span style="font-size:10px;color:#a898c0;text-transform:uppercase;letter-spacing:.06em">Project</span></th>';

  projects.forEach(function(p) {
    var pc   = podColor(p.pod || 'Podless');
    var area = AREA_NAME_TO_ID[p.primary_area] || 'other';
    var ac   = AREA_COLOR[area] || '#475569';
    var singleRev = (p.reviewers || []).length < 2;
    tableHTML += '<th style="width:76px;padding:0 2px 6px;vertical-align:bottom;text-align:center;cursor:default">'
      + '<div style="height:5px;background:' + pc + ';border-radius:3px 3px 0 0;margin-bottom:4px"></div>'
      + '<div style="font-size:10px;line-height:1.3;color:#cbd5e1;word-break:break-word;padding:0 2px;text-align:center">'
      + displayName(p)
      + '</div>'
      + '<div style="margin-top:3px">'
      + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + ac + '" title="' + (p.primary_area||'') + '"></span>'
      + (singleRev ? '<span style="font-size:9px;color:#f59e0b;margin-left:3px" title="Single reviewer">⚠</span>' : '')
      + '</div>'
      + '</th>';
  });
  tableHTML += '<th style="width:44px;font-size:10px;color:#a898c0;padding:4px 6px;text-align:center;vertical-align:bottom">Align</th>'
    + '</tr></thead><tbody>';

  // Row: Research Area
  tableHTML += '<tr><td class="ct-row-header" style="font-size:11px;color:#a898c0">Research Area</td>';
  projects.forEach(function(p) {
    var area = AREA_NAME_TO_ID[p.primary_area] || 'other';
    var ac   = AREA_COLOR[area] || '#475569';
    tableHTML += '<td style="text-align:center;padding:5px 2px">'
      + '<span style="font-size:10px;padding:2px 6px;border-radius:99px;background:' + ac + '22;color:' + ac + ';white-space:nowrap">'
      + (p.primary_area || 'Other')
      + '</span></td>';
  });
  tableHTML += '<td></td></tr>';

  // Row: Pod
  tableHTML += '<tr><td class="ct-row-header" style="font-size:11px;color:#a898c0">Pod</td>';
  projects.forEach(function(p) {
    var pc = podColor(p.pod || 'Podless');
    tableHTML += '<td style="text-align:center;padding:5px 2px">'
      + '<span style="font-size:10px;padding:2px 6px;border-radius:99px;background:' + pc + '22;color:' + pc + ';white-space:nowrap">'
      + (p.pod || 'Podless')
      + '</span></td>';
  });
  tableHTML += '<td></td></tr>';

  // Row: AI Depth
  tableHTML += '<tr><td class="ct-row-header" style="font-size:11px;color:#a898c0">AI Depth</td>';
  projects.forEach(function(p) {
    var depCol = {'High':'#f87171','Mid':'#fb923c','Low':'#fbbf24','None':'#475569'}[p.ai_depth] || '#475569';
    tableHTML += '<td style="text-align:center;padding:5px 2px">'
      + '<span style="font-size:10px;padding:2px 6px;border-radius:99px;background:' + depCol + '22;color:' + depCol + '">'
      + (p.ai_depth || 'None')
      + '</span></td>';
  });
  tableHTML += '<td></td></tr>';

  // Row: Status
  tableHTML += '<tr><td class="ct-row-header" style="font-size:11px;color:#a898c0">Status</td>';
  projects.forEach(function(p) {
    var stCol = {'Completed':'#4ade80','Mid-Point':'#38bdf8','Beginning':'#99ee81'}[p.status] || '#475569';
    tableHTML += '<td style="text-align:center;padding:5px 2px">'
      + '<span style="font-size:10px;padding:2px 6px;border-radius:99px;background:' + stCol + '22;color:' + stCol + '">'
      + (p.status || '—')
      + '</span></td>';
  });
  tableHTML += '<td></td></tr>';

  // Spacer
  tableHTML += '<tr><td colspan="' + (projects.length + 2) + '" style="height:6px;background:#0d1117"></td></tr>';

  // TS dimension label header
  tableHTML += '<tr><td colspan="' + (projects.length + 2) + '" style="padding:10px 0 4px">'
    + '<span style="font-size:11px;font-weight:700;color:#99ee81;text-transform:uppercase;letter-spacing:.06em">↓ Transformation Statement Coverage</span>'
    + '<span style="font-size:10px;color:#475569;margin-left:10px">Bar width = reviewer language alignment to each TS dimension</span>'
    + '</td></tr>';

  // TS dimension rows
  dims.forEach(function(dim) {
    tableHTML += '<tr><td class="ct-row-header" style="font-size:11px;color:#a898c0">' + dim.label + '</td>';
    projects.forEach(function(p) {
      var score = (DATA.ts_project_scores[p.id] || {})[dim.id] || 0;
      var opacity = Math.max(0.08, score * 2);
      var barW = Math.round(score * 56);
      tableHTML += '<td style="padding:6px 2px;text-align:center">';
      if (score > 0.05) {
        tableHTML += '<div style="background:#99ee81;opacity:' + opacity.toFixed(2)
          + ';height:8px;border-radius:4px;width:' + barW + 'px;margin:0 auto"></div>';
      } else {
        tableHTML += '<div style="background:#261540;height:8px;border-radius:4px;width:20px;margin:0 auto"></div>';
      }
      tableHTML += '</td>';
    });
    tableHTML += '<td></td></tr>';
  });

  // Spacer
  tableHTML += '<tr><td colspan="' + (projects.length + 2) + '" style="height:6px;background:#0d1117"></td></tr>';

  // Alignment footer row
  tableHTML += '<tr><td class="ct-row-header" style="font-size:11px;color:#a898c0;font-weight:700">Alignment Score</td>';
  projects.forEach(function(p) {
    var sc = p.alignment_avg >= 8.5 ? '#4ade80' : (p.alignment_avg >= 7 ? '#fbbf24' : '#f87171');
    tableHTML += '<td style="text-align:center;padding:6px 0">'
      + '<span style="font-size:14px;font-weight:800;color:' + sc + '">' + p.alignment_avg + '</span></td>';
  });
  tableHTML += '<td></td></tr>';

  // Reviewer count row
  tableHTML += '<tr><td class="ct-row-header" style="font-size:11px;color:#a898c0">Reviewers</td>';
  projects.forEach(function(p) {
    var revs = p.reviewers || [];
    var chips = revs.map(function(r) {
      return '<span style="font-size:9px;padding:1px 5px;border-radius:99px;background:#99ee8122;color:#99ee81;margin:1px;display:inline-block">' + r + '</span>';
    }).join('');
    tableHTML += '<td style="text-align:center;padding:4px 2px">' + chips + '</td>';
  });
  tableHTML += '<td></td></tr>';

  tableHTML += '</tbody></table></div>';

  // ── Legend ───────────────────────────────────────────────────────
  var legendHTML = '<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:20px;padding:12px 16px;background:#1c1030;border-radius:10px;border:1px solid #1c1030">';
  legendHTML += '<div><div style="font-size:10px;font-weight:700;color:#a898c0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Pod (top strip colour)</div><div style="display:flex;flex-wrap:wrap;gap:8px">';
  var podsSeen = {};
  DATA.projects.forEach(function(p) {
    var pod = p.pod || 'Podless';
    if (!podsSeen[pod]) {
      podsSeen[pod] = true;
      legendHTML += '<span style="font-size:10px;display:flex;align-items:center;gap:4px;color:#a898c0">'
        + '<span style="display:inline-block;width:20px;height:5px;background:' + podColor(pod) + ';border-radius:3px"></span>'
        + pod.replace(' Pod','') + '</span>';
    }
  });
  legendHTML += '</div></div>';

  legendHTML += '<div><div style="font-size:10px;font-weight:700;color:#a898c0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Research Area (dot)</div><div style="display:flex;flex-wrap:wrap;gap:8px">';
  ALL_AREAS.forEach(function(a) {
    legendHTML += '<span style="font-size:10px;display:flex;align-items:center;gap:4px;color:#a898c0">'
      + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + a.color + '"></span>'
      + a.title + '</span>';
  });
  legendHTML += '</div></div>';

  legendHTML += '<div style="font-size:10px;color:#a898c0;display:flex;align-items:center;gap:6px">'
    + '<span style="font-size:12px;color:#f59e0b">⚠</span> Single reviewer — treat with caution</div>';
  legendHTML += '</div>';

  el.innerHTML = statsHTML + controlsHTML + legendHTML + tableHTML;
}

// ── VIEW 8b: Pod Intelligence ────────────────────────────────────────────
function renderPodProfile() {
  var el = document.getElementById('view-podprofile');

  // ── Build pod map from project data ───────────────────────────────────
  var podMap = {};
  DATA.projects.forEach(function(p) {
    var pod = p.pod || 'Podless';
    if (!podMap[pod]) {
      podMap[pod] = { name: pod, projects: [], aiDepth: {}, aiDomains: {}, areas: {}, alignVals: [] };
    }
    var pm = podMap[pod];
    pm.projects.push(p);
    pm.alignVals.push(p.alignment_avg);

    // AI Depth
    var dep = p.ai_depth || 'None';
    pm.aiDepth[dep] = (pm.aiDepth[dep] || 0) + 1;

    // AI Domains — split comma-separated multi-domain strings
    var rawDomains = (p.ai_domain || '').split(',').map(function(d) { return d.trim(); }).filter(Boolean);
    if (!rawDomains.length) rawDomains = ['No AI'];
    rawDomains.forEach(function(dom) {
      pm.aiDomains[dom] = (pm.aiDomains[dom] || 0) + 1;
    });

    // Primary research area
    var area = p.primary_area || 'Other';
    pm.areas[area] = (pm.areas[area] || 0) + 1;
  });

  // ── Theme membership per pod ───────────────────────────────────────────
  var podThemes = {};
  (DATA.research_themes || []).forEach(function(theme) {
    var podCounts = {};
    (theme.projects || []).forEach(function(pid) {
      var proj = DATA.projects.find(function(p) { return p.id === pid; });
      if (proj) {
        var pod = proj.pod || 'Podless';
        podCounts[pod] = (podCounts[pod] || 0) + 1;
      }
    });
    Object.keys(podCounts).forEach(function(pod) {
      if (!podThemes[pod]) podThemes[pod] = [];
      podThemes[pod].push({ label: theme.label, count: podCounts[pod], color: theme.color || '#99ee81' });
    });
  });

  // ── TS pod scores ─────────────────────────────────────────────────────
  var tsPodScores = DATA.ts_pod_scores || {};
  var tsDims = (DATA.ts_dimensions || []);

  // ── AI Depth colour scheme ─────────────────────────────────────────────
  var depthColors = { 'High': '#f87171', 'Mid': '#fbbf24', 'Low': '#a3e635', 'None': '#475569', 'No AI': '#475569' };
  var depthOrder  = ['High', 'Mid', 'Low', 'None'];

  // Sort pods: Podless last, rest by project count desc
  var pods = Object.values(podMap).sort(function(a, b) {
    if (a.name === 'Podless') return 1;
    if (b.name === 'Podless') return -1;
    return b.projects.length - a.projects.length;
  });

  // ── Pod DNA radar: compute normalised axes ────────────────────────────
  var totalAreas = ALL_AREAS.length || 1;
  var totalDims  = tsDims.length || 1;
  var totalPods  = pods.length || 1;

  // Pre-compute per-pod raw metrics for normalisation
  var podDNA = {};
  pods.forEach(function(pm) {
    var n = pm.projects.length || 1;

    // 1. AI Depth concentration → fraction at High
    var aiHigh = (pm.aiDepth['High'] || 0) / n;

    // 2. Theme breadth → number of distinct themes
    var nThemes = (podThemes[pm.name] || []).length;

    // 3. Avg alignment (0–10 → 0–1)
    var avgA = pm.alignVals.length
      ? pm.alignVals.reduce(function(s,v){return s+v;},0) / pm.alignVals.length / 10
      : 0;

    // 4. Area span → distinct research areas
    var nAreas = Object.keys(pm.areas).length;

    // 5. TS coverage → dims above 0.20 threshold
    var podTS = tsPodScores[pm.name] || {};
    var tsCov = 0;
    tsDims.forEach(function(d) { if ((podTS[d.id]||0) >= 0.20) tsCov++; });

    // 6. Network connectivity → shared themes with other pods
    var myThemes = new Set((podThemes[pm.name]||[]).map(function(t){return t.label;}));
    var sharedPods = 0;
    pods.forEach(function(other) {
      if (other.name === pm.name) return;
      var otherThemes = (podThemes[other.name]||[]).map(function(t){return t.label;});
      var shared = false;
      otherThemes.forEach(function(t){ if(myThemes.has(t)) shared = true; });
      if (shared) sharedPods++;
    });

    podDNA[pm.name] = {
      aiDepth: aiHigh,
      themes:  nThemes,
      align:   avgA,
      areas:   nAreas,
      tsCov:   tsCov,
      connect: sharedPods
    };
  });

  // Find max values for normalisation
  var maxThemes  = 1, maxAreas = 1, maxConnect = 1;
  Object.values(podDNA).forEach(function(d) {
    if (d.themes  > maxThemes)  maxThemes  = d.themes;
    if (d.areas   > maxAreas)   maxAreas   = d.areas;
    if (d.connect > maxConnect) maxConnect = d.connect;
  });

  // ── Render ─────────────────────────────────────────────────────────────
  var html = '<div class="pod-grid">';

  pods.forEach(function(pm) {
    var pc      = podColor(pm.name);
    var n       = pm.projects.length;
    var avgAlign = pm.alignVals.length
      ? (pm.alignVals.reduce(function(s,v){return s+v;},0)/pm.alignVals.length).toFixed(1)
      : '—';
    var alignCol = parseFloat(avgAlign) >= 8.5 ? '#4ade80' : parseFloat(avgAlign) >= 7 ? '#fbbf24' : '#f87171';

    // ── Header ───────────────────────────────────────────────────────────
    var card = '<div class="pod-card">';
    card += '<div style="height:4px;background:' + pc + '"></div>';
    card += '<div class="pod-card-header">'
      + '<div class="pod-card-name" style="color:' + pc + '">' + pm.name + '</div>'
      + '<div class="pod-card-meta">'
      + '<span>' + n + ' project' + (n!==1?'s':'') + '</span>'
      + '<span style="color:' + alignCol + ';font-weight:700">' + avgAlign + ' avg alignment</span>'
      + '</div>'
      + '</div>';

    // ── Pod DNA radar ────────────────────────────────────────────────────
    var dna = podDNA[pm.name];
    if (dna) {
      card += '<div class="pod-section" style="padding:8px 14px;text-align:center">'
        + '<div class="pod-section-label" style="text-align:left">Strategic Profile</div>'
        + drawRadar({
            size: 180,
            color: pc,
            axes: [
              { label: 'AI Depth',      value: dna.aiDepth },
              { label: 'Themes',        value: dna.themes / maxThemes },
              { label: 'Alignment',     value: dna.align },
              { label: 'Area Span',     value: dna.areas / maxAreas },
              { label: 'TS Coverage',   value: dna.tsCov / totalDims },
              { label: 'Connectivity',  value: dna.connect / maxConnect }
            ]
          })
        + '</div>';
    }

    // ── AI Depth bar ─────────────────────────────────────────────────────
    card += '<div class="pod-section">'
      + '<div class="pod-section-label">AI Depth</div>'
      + '<div class="pod-depth-bar">';
    depthOrder.forEach(function(dep) {
      var cnt = pm.aiDepth[dep] || 0;
      if (!cnt) return;
      var pct = Math.round(cnt / n * 100);
      card += '<div class="pod-depth-seg" style="width:' + pct + '%;background:' + depthColors[dep] + ';opacity:.85"></div>';
    });
    card += '</div>';
    card += '<div class="pod-depth-legend">';
    depthOrder.forEach(function(dep) {
      var cnt = pm.aiDepth[dep] || 0;
      if (!cnt) return;
      card += '<span class="pod-depth-key">'
        + '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:' + depthColors[dep] + '"></span>'
        + dep + ' (' + cnt + ')</span>';
    });
    card += '</div></div>';

    // ── AI Domains ────────────────────────────────────────────────────────
    var sortedDomains = Object.entries(pm.aiDomains)
      .sort(function(a,b){return b[1]-a[1];})
      .filter(function(e){ return e[0] !== 'No AI' && e[0] !== 'Other'; })
      .slice(0, 5);
    var noAI = (pm.aiDomains['No AI']||0) + (pm.aiDomains['Other']||0);

    card += '<div class="pod-section">'
      + '<div class="pod-section-label">AI Domains</div>'
      + '<div class="pod-domain-tags">';
    if (sortedDomains.length) {
      sortedDomains.forEach(function(e) {
        card += '<span class="pod-domain-tag" style="background:' + pc + '22;color:' + pc + '">'
          + e[0] + ' <strong>×' + e[1] + '</strong></span>';
      });
    }
    if (noAI > 0) {
      card += '<span class="pod-domain-tag" style="background:#1c1030;color:#a898c0">No specific AI ×' + noAI + '</span>';
    }
    card += '</div></div>';

    // ── Research Areas ────────────────────────────────────────────────────
    var sortedAreas = Object.entries(pm.areas).sort(function(a,b){return b[1]-a[1];});
    var maxAreaCnt  = sortedAreas[0] ? sortedAreas[0][1] : 1;
    card += '<div class="pod-section">'
      + '<div class="pod-section-label">Research Areas (primary)</div>';
    sortedAreas.forEach(function(e) {
      var aId  = AREA_NAME_TO_ID[e[0]] || 'other';
      var aCol = AREA_COLOR[aId] || '#a898c0';
      var barW = Math.round(e[1] / maxAreaCnt * 100);
      card += '<div class="pod-area-row">'
        + '<span class="pod-area-name" style="color:' + aCol + '">' + e[0] + '</span>'
        + '<div class="pod-area-bar-wrap"><div class="pod-area-bar" style="width:' + barW + '%;background:' + aCol + ';opacity:.7"></div></div>'
        + '<span class="pod-area-count">' + e[1] + '</span>'
        + '</div>';
    });
    card += '</div>';

    // ── TS Dimensions ─────────────────────────────────────────────────────
    var podTS = tsPodScores[pm.name];
    if (podTS && tsDims.length) {
      var TS_DIM_COL = {
        ts_ik:'#4ade80', ts_relational:'#22d3ee', ts_community:'#f59e0b',
        ts_technical:'#f87171', ts_governance:'#a066cc', ts_network:'#60a5fa', ts_imaginaries:'#c084fc'
      };
      card += '<div class="pod-section">'
        + '<div class="pod-section-label">Transformation Statement Dimensions</div>';
      // Sort dims by score desc so strongest appear first
      var sortedDims = tsDims.slice().sort(function(a,b){
        return (podTS[b.id]||0)-(podTS[a.id]||0);
      });
      sortedDims.forEach(function(dim) {
        var sc  = podTS[dim.id] || 0;
        var col = TS_DIM_COL[dim.id] || '#99ee81';
        var barW = Math.round(sc * 100);
        var shortLabel = dim.label.replace('Indigenous Knowledge', 'IK')
                                  .replace('Integration', '')
                                  .replace('Community-Centred', 'Community')
                                  .replace('Technical AI Transformation', 'Technical AI')
                                  .replace('Data Sovereignty & Governance', 'Data Sovereignty')
                                  .replace('Network & Cross-Project', 'Network')
                                  .replace('Imaginaries & Speculative', 'Imaginaries')
                                  .trim();
        card += '<div class="pod-ts-row">'
          + '<span class="pod-ts-label" title="' + dim.label + '">' + shortLabel + '</span>'
          + '<div class="pod-ts-bar-wrap"><div class="pod-ts-bar" style="width:' + barW + '%;background:' + col + ';opacity:.8"></div></div>'
          + '<span class="pod-ts-score">' + sc.toFixed(2) + '</span>'
          + '</div>';
      });
      card += '</div>';
    }

    // ── Themes ────────────────────────────────────────────────────────────
    var themes = (podThemes[pm.name] || []).sort(function(a,b){return b.count-a.count;}).slice(0,4);
    if (themes.length) {
      card += '<div class="pod-section">'
        + '<div class="pod-section-label">Theme Presence</div>'
        + '<div class="pod-theme-tags">';
      themes.forEach(function(t) {
        card += '<span class="pod-theme-tag" style="background:' + t.color + '22;color:' + t.color + ';border:1px solid ' + t.color + '44">'
          + t.label + ' <strong>(' + t.count + ')</strong></span>';
      });
      card += '</div></div>';
    }

    card += '</div>'; // close pod-card
    html += card;
  });

  html += '</div>'; // close pod-grid

  // ── Page intro ──────────────────────────────────────────────────────────
  var intro = '<div style="padding:20px 24px 0;border-bottom:1px solid #1c1030;margin-bottom:0">'
    + '<div style="font-size:15px;font-weight:800;color:#f0ecf8;margin-bottom:4px">Pod Intelligence</div>'
    + '<div style="font-size:11px;color:#a898c0">How each pod clusters across AI depth, domains, research areas, transformation statement dimensions, and network themes.'
    + ' Sorted by pod size. TS dimensions ranked by pod strength.</div>'
    + '</div>';

  el.innerHTML = intro + html;
}

// ── VIEW 8c: Pod Relations (Force Network + Parallel Sets) ────────────────
var podRelView = 'force';

function renderPodRelations() {
  var el = document.getElementById('view-podrelations');
  el.innerHTML = ''
    + '<div class="pr-header">'
    + '<div style="font-size:15px;font-weight:800;color:#f0ecf8;margin-bottom:2px">Pod Relations</div>'
    + '<div class="pr-view-toggle">'
    + '<button class="pr-toggle-btn' + (podRelView==='force'?' active':'') + '" id="pr-btn-force" onclick="podRelView=\'force\';document.getElementById(\'pr-btn-force\').className=\'pr-toggle-btn active\';document.getElementById(\'pr-btn-flow\').className=\'pr-toggle-btn\';buildPRView()">Force Network</button>'
    + '<button class="pr-toggle-btn' + (podRelView==='flow'?' active':'') + '" id="pr-btn-flow"  onclick="podRelView=\'flow\'; document.getElementById(\'pr-btn-force\').className=\'pr-toggle-btn\';document.getElementById(\'pr-btn-flow\').className=\'pr-toggle-btn active\';buildPRView()">Parallel Flow</button>'
