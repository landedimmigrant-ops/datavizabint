<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AbInt Phase 2 · Research Intelligence Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
:root {
  --bg:      #0c0e17;
  --surface: #141826;
  --surface2:#1c2235;
  --border:  #2a3050;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --pos:     #4ade80;
  --neg:     #f87171;
  --warn:    #fbbf24;
  --accent:  #818cf8;
  --lang:    #34d399;
  --story:   #a78bfa;
  --env:     #4ade80;
  --socio:   #f97316;
  --multi:   #60a5fa;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif;
             background: var(--bg); color: var(--text); font-size: 14px; }
/* ── Header ── */
.app-header {
  padding: 14px 24px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: baseline; gap: 12px;
}
.app-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
.app-header .sub { font-size: 12px; color: var(--muted); }
/* ── Nav tabs ── */
.nav-tabs {
  display: flex; gap: 4px; padding: 10px 24px 0;
  border-bottom: 1px solid var(--border);
}
.nav-tab {
  padding: 8px 18px; border: none; background: transparent;
  color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent;
  font-size: 13px; font-weight: 500; transition: all .15s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--text); border-bottom-color: var(--accent); }
/* ── View containers ── */
.view { display: none; padding: 20px 24px; }
.view.active { display: block; }
/* ── Shared util ── */
.chip {
  display: inline-block; padding: 2px 8px; border-radius: 99px;
  font-size: 11px; font-weight: 600; letter-spacing: .3px;
}
.chip-pos  { background: rgba(74,222,128,.15); color: var(--pos); }
.chip-neg  { background: rgba(248,113,113,.15); color: var(--neg); }
.chip-warn { background: rgba(251,191,36,.15);  color: var(--warn); }
.chip-blue { background: rgba(129,140,248,.15); color: var(--accent); }
.chip-muted{ background: rgba(100,116,139,.15); color: var(--muted); }

/* ── Legend ── */
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.legend-dot  { width: 11px; height: 11px; border-radius: 50%; }

/* ── Tooltip ── */
#tooltip {
  position: fixed; pointer-events: none; z-index: 999;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; max-width: 320px;
  font-size: 12px; line-height: 1.5; display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
#tooltip h4 { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
#tooltip .tt-row { display: flex; gap: 6px; align-items: baseline; margin: 2px 0; }
#tooltip .tt-label { color: var(--muted); min-width: 70px; }
#tooltip .phrases { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
#tooltip .ph-chip {
  font-size: 10px; padding: 2px 7px; border-radius: 99px;
  background: rgba(129,140,248,.2); color: var(--accent);
}

/* ── Landscape View ── */
#landscape-svg { width: 100%; }
.quadrant-label { font-size: 11px; fill: #3a4460; font-weight: 600; pointer-events: none; }
.axis-label     { font-size: 11px; fill: var(--muted); }
.node-label     { font-size: 10px; fill: var(--text); pointer-events: none; }
.bubble         { cursor: pointer; transition: opacity .15s; }
.bubble:hover   { opacity: .85; }

/* ── Coverage Map ── */
#coverage-wrap { overflow-x: auto; }
.coverage-table { border-collapse: separate; border-spacing: 0; min-width: 900px; }
.coverage-table th, .coverage-table td {
  padding: 0; text-align: center;
}
.ct-row-header {
  text-align: right; padding-right: 14px; font-size: 12px; font-weight: 600;
  white-space: nowrap; padding-left: 8px;
  border-right: 1px solid var(--border);
}
.ct-col-header {
  font-size: 10px; color: var(--muted);
  white-space: nowrap; vertical-align: bottom;
  cursor: pointer;
}
.ct-col-header:hover { background: rgba(129,140,248,.06); }
.ct-cell {
  width: 68px; height: 56px;
  border: 1px solid rgba(42,48,80,.4);
  position: relative; cursor: default;
  transition: background .1s;
}
.ct-cell:hover { background: rgba(129,140,248,.06); }
.ct-cell svg { display: block; margin: auto; }
.ct-no-data {
  background: repeating-linear-gradient(
    135deg, rgba(255,255,255,.01), rgba(255,255,255,.01) 4px,
    transparent 4px, transparent 10px
  );
}
.ct-gap-row .ct-row-header { color: var(--neg); }
.ct-score-bar { height: 4px; border-radius: 2px; margin: 2px auto 0; }
.coverage-legend { display: flex; gap: 20px; margin: 12px 0 16px; font-size: 12px; align-items: center; }
.coverage-legend-item { display: flex; align-items: center; gap: 6px; }

/* ── Emergent Voice ── */
#voice-wrap { display: flex; gap: 24px; }
#voice-svg-wrap { flex: 1; min-height: 480px; }
#voice-detail {
  width: 280px; flex-shrink: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
}
#voice-detail h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--accent); }
#voice-detail .vd-phrase { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
#voice-detail .vd-projects { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
#voice-detail .vd-proj {
  background: var(--surface2); border-radius: 8px; padding: 8px 10px;
  font-size: 11px;
}
#voice-detail .vd-proj strong { font-size: 12px; display: block; margin-bottom: 2px; }
.voice-bubble { cursor: pointer; }
.voice-bubble text { pointer-events: none; font-weight: 600; }

/* ── Signal Cards ── */
#cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.signal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px; cursor: default;
  transition: border-color .15s;
}
.signal-card:hover { border-color: var(--accent); }
.sc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.sc-name { font-size: 13px; font-weight: 700; }
.sc-code { font-size: 11px; color: var(--muted); }
.sc-title { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
.sc-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.sc-scores { display: flex; gap: 12px; margin-bottom: 10px; }
.sc-score-block { text-align: center; }
.sc-score-num { font-size: 20px; font-weight: 800; line-height: 1; }
.sc-score-label { font-size: 10px; color: var(--muted); }
.sc-phrases { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.sc-phrase {
  font-size: 10px; padding: 2px 7px; border-radius: 99px;
  background: rgba(129,140,248,.15); color: var(--accent);
}
.sc-signal { margin-bottom: 6px; padding: 7px 9px; border-radius: 7px; font-size: 11px; line-height: 1.4; }
.sc-signal.pos { background: rgba(74,222,128,.07); border-left: 3px solid var(--pos); }
.sc-signal.neg { background: rgba(248,113,113,.07); border-left: 3px solid var(--neg); }
.sc-signal .src-tag { font-size: 10px; color: var(--muted); margin-bottom: 3px; }

/* ── Area summaries in Coverage tab ── */
.area-summary-bar {
  display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px;
}
.area-summary-card {
  flex: 1; min-width: 150px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; padding: 12px;
}
.asc-name { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.asc-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.asc-align { font-size: 22px; font-weight: 800; }
.asc-phrases { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.asc-gap { opacity: .5; border-style: dashed; }
.asc-gap .asc-align { color: var(--neg); }

/* ── Reviewer Intelligence ── */
#intel-layout { display: flex; gap: 20px; align-items: flex-start; }
#intel-phrases-panel {
  width: 220px; flex-shrink: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
  position: sticky; top: 0;
}
#intel-phrases-panel h4 { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.intel-phrase-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; padding: 4px 9px; border-radius: 99px;
  margin: 3px 2px; cursor: default;
  background: rgba(129,140,248,.12); color: var(--accent);
  border: 1px solid rgba(129,140,248,.2);
}
.intel-phrase-tag .itag-count {
  background: rgba(129,140,248,.25); border-radius: 99px;
  padding: 1px 5px; font-size: 10px; font-weight: 700;
}
#intel-main { flex: 1; min-width: 0; }
.intel-bucket { margin-bottom: 28px; }
.intel-bucket-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.intel-bucket-icon { font-size: 18px; }
.intel-bucket-title { font-size: 14px; font-weight: 700; }
.intel-bucket-count { font-size: 11px; color: var(--muted); margin-left: auto; }
.intel-cards { display: flex; flex-direction: column; gap: 8px; }
.intel-card {
  border-radius: 10px; padding: 12px 14px;
  border-left: 4px solid transparent;
  font-size: 12px; line-height: 1.6;
  position: relative;
}
/* Colour per type */
.intel-card.recommendation {
  background: rgba(245,158,11,.08);
  border-left-color: #f59e0b;
}
.intel-card.question {
  background: rgba(34,211,238,.07);
  border-left-color: #22d3ee;
}
.intel-card.action {
  background: rgba(74,222,128,.07);
  border-left-color: #4ade80;
}
.intel-card.observation {
  background: rgba(167,139,250,.07);
  border-left-color: #a78bfa;
}
.intel-card-text { margin-bottom: 6px; color: var(--text); }
.intel-card-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--muted); flex-wrap: wrap;
}
.intel-area-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.intel-code {
  font-weight: 700; font-size: 10px;
  padding: 1px 6px; border-radius: 4px;
  background: var(--border);
}
.intel-filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px;
}
.intel-filter-btn {
  font-size: 11px; padding: 5px 12px; border-radius: 99px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.intel-filter-btn:hover { border-color: var(--accent); color: var(--text); }
.intel-filter-btn.active { color: var(--bg); }
.intel-filter-btn.f-all.active    { background: var(--accent); border-color: var(--accent); }
.intel-filter-btn.f-rec.active    { background: #f59e0b; border-color: #f59e0b; }
.intel-filter-btn.f-qst.active    { background: #22d3ee; border-color: #22d3ee; }
.intel-filter-btn.f-act.active    { background: #4ade80; border-color: #4ade80; }
.intel-filter-btn.f-obs.active    { background: #a78bfa; border-color: #a78bfa; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

oaches.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"Its combination of technical prototyping, governance design, and capacity building through workshops, student leadership, and partnerships supports AbInt\u2019s goal of transforming AI by aligning computation with Indigenous knowledge systems, sovereignty, and shared responsibility.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"}]},{"id":"emerging_indigenous_led","label":"Emerging: Indigenous-Led","color":"#94a3b8","desc":"Pattern surfaced automatically from reviewer language \u2014 not yet in a named theme","n_reviewers":4,"reviewers":["Jackson","Jason","Sara","Suzanne"],"n_projects":14,"projects":[],"phrases":["indigenous-led","defined technical","later phases","shared learning","case studies","extend beyond"],"sentences":[{"text":"It is somewhat unclear how these interactions extend beyond those internal conversations or how they connect more directly to the broader Transformations framework.","reviewer":"Jackson","project":"Michelle Sylvestre","code":"CfP02-13","polarity":"neutral"},{"text":"As it is currently described, the outcomes seem closely tied to a particular location and set of relationships, and it is not entirely evident how the methods, processes, or results could be extended, shared, or taken up elsewhere in the network.","reviewer":"Jackson","project":"Michelle Sylvestre","code":"CfP02-13","polarity":"neutral"},{"text":"While the AI components are still in an early stage, the project reflects the kind of exploratory, process-based research and learning that supports the broader goal of transforming AI through Indigenous knowledge systems, particularly by focusing on language, story, and culturally grounded approaches to technology.","reviewer":"Jackson","project":"Darby Herman","code":"CfP02-11","polarity":"neutral"},{"text":"In the Intelligences phase, advancement would likely require more concrete technical development, such as prototyping language or learning tools, along with clearer articulation of governance, data stewardship, and collaboration with other AbInt projects.","reviewer":"Jackson","project":"Darby Herman","code":"CfP02-11","polarity":"neutral"}],"emerging":true}],"network_signals":{"recommendations":[{"text":"The project also aligns well with network activities focused on relational AI, digital territories, and culturally grounded interface design, and could benefit from further collaboration through shared builds, workshops, and cross-POD development sessions that expand the work beyond its original context.","type":"recommendation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Continued collaboration within the network, along with clearer pathways for sharing builds, workflows, and community-informed design methods, would help the project move from a single environment toward a more scalable and relational digital infrastructure aligned with the goals of these later phases.","type":"recommendation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"For the Indigenous Methodologies book portion of their research, \"The next phase of the project will largely focus on the digital component of the book, making a compelling and useful resource and methods toolbox repository for Indigenous AI scholars and practitioners.\" It is my recommendation that we have an website building intensive for all our related projects, and focus a lot of our RA power over a month period to getting websites up for all these amazing projects, especially one like this.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"There is also risk that the project prioritizes artistic exploration over clearly defined research outputs, which is great, because it is led by an artist, but it will make it difficult to evaluate impact or reuse outcomes beyond the immediate installation, since the proposal does nto suggest they will produce tools or AI besides training their custom AI personality.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, advancement would likely involve deepening the technical side of the work, including more fully developed SLM/LLM adaptations, community-controlled data repositories, and locally governed infrastructure, while maintaining the collective, ceremony-informed, and advisory-guided processes that shape the project.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"To advance into the Intelligences phase, the work would likely need to move beyond curriculum development toward more clearly defined technical experimentation, such as prototyping language-learning tools, working with small language models, or collaborating with other projects building shared infrastructure for language data.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"Greater attention to reproducibility, clearer integration with existing AbInt infrastructure efforts, and more explicit plans for how the neuro-AI and symbolic modeling components could support other Pods would help the research extend beyond a single case study into something that can inform later-phase network development.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"There is also a risk of extractive dynamics, where language knowledge is structured for technical use without sufficient community control or benefit, which could be mitigated through direct evaluation from participating Indigenous community members and clearer documentation of agreements, protocols, and outcomes.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"One potential risk is that the work is closely tied to a specific community context and small working group, which may limit how easily the outcomes extend beyond the immediate collaborators; this can be mitigated through clearer documentation of methods and continued dialogue with other projects in the network.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"Given the goals of Abundant Intelligences, it would be helpful to see more clearly how Indigenous members were involved in shaping the direction of the work, and how responsibility, authorship, and decision-making were shared, rather than the project being led primarily by one non-Indigenous collaborator.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"One potential risk is that the work depends on ongoing relationships with Elders, students, and community partners, so continuity and care are important to maintain as the project develops; this is already being addressed through advisory guidance, mentorship structures, and collective decision-making.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Progress into Imaginaries and Intelligences phases would require integration into an established research structure such as the Cosmologyscape work on Black and Indigenous AI with the University of Manitoba team, along with clearer methodology, defined collaborators, and grounded community engagement.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"A potential risk is that, as a primarily student-led initiative, the work may lack continuity or long-term impact without ongoing mentorship and stronger integration with the POD or broader network; this can be mitigated through continued guidance, collaboration, and clearer next-stage planning.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"To support both phases, the project would benefit from identifying a smaller set of core technical contributions, documenting its processes in a way that others can build from, and clarifying how its systems extend beyond a single installation into transferable approaches within the network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, the work could deepen by moving some of these concepts into more concrete systems, such as language learning tools, local models, or interactive digital environments, while continuing to be guided by Elder advisory processes and community priorities.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"An exciting aspect of this project that needs to be supported separately is the development of a \"deep-learning framework that simultaneously learns a time varying sensor footprint and a pixel level model of carbon flux applicable to biomes measured by the AmeriFlux network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"It may be helpful to clarify the extent of the community engagement described here, and to more explicitly articulate how these relationships and discussions contributed to the development of the project and how they relate to the wider objectives of Abundant Intelligences.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"This could be mitigated by more explicitly linking the pedagogical work to future language technologies, tool development, or collaboration with projects building data or compute infrastructure, and by documenting processes so they can be reused across the network.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"Collaboration could deepen through shared workshops or co-developed case studies, especially with teams working on low-power or localized AI systems, where bio-circular design principles can be tested in parallel at smaller scales within our current network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"If that is the case, it would be helpful to clarify what phase the project is actually in, and whether the intention here is documentation, reflection, or further development, rather than new work that would unfold as part of the Transformations activities.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"The project could move into the Imaginaries phase by further developing its community-driven pedagogical approach as a basis for thinking about how language technologies should be designed in ways that follow local knowledge systems and teaching practices.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"To advance into the Intelligences phase, the work would need to move from exploratory prototypes toward more clearly defined technical outputs, such as stable platforms, documented modeling methods, or tools that can be tested or adapted by other projects.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, advancement would likely require more concrete technical development, such as prototyping language or learning tools, along with clearer articulation of governance, data stewardship, and collaboration with other AbInt projects.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Greater documentation of methods, clearer connections to other network activities, and a more defined technical pathway would help the work extend from its current, locally focused stage into forms that can contribute more directly to the later phases.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"This is one of the most connected projects because of the depth of its engagement through chapters, we should invite each chapter to present on their writing at a filmed, interview each chapter writer for a video, and host a celebration of its launch.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"Stronger documentation, clearer technical goals, and closer integration with other AbInt projects would help the research extend from its current localized focus into forms that contribute more directly to later-phase network development.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"In the Intelligences phase, the work could deepen by adding more interactive or adaptive systems, integrating language, narrative, or agent-based behaviours, and connecting the virtual environment to other AbInt projects or datasets.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Stronger collaboration would likely require clearer alignment with existing technical initiatives in the network and more explicit plans for how the project\u2019s models or platforms could be adapted or used by other teams.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, the project would need to deepen its technical clarity by specifying how movement, plant signals, and interaction data are modeled, learned from, and translated into system behavior.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"This is a starting point toward fine scale monitoring of carbon fluxes on Indigenous Lands beyond Coquille lands.\" This should be proposed in another project and linked with projects using similar technology.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"Imaginaries: deepen through use the book as background reading to prep for the FIIAI Workshops; review book and extract out concrete IIAI that might be found; deepen and support by doing a second volume.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"Builds lasting capacity among researchers, learners, and communities Unfortunately have pivoted away from building a technical prototype (to a proof-of-concept for protocol-driven information access).","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"},{"text":"Stronger connection to the network would likely require more intentional sharing of methods and clearer alignment with projects developing technical frameworks that could support or extend this work.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"This risk can be mitigated by requiring clearer alignment between proposed activities and outcomes, along with basic documentation such as workshop materials, recordings, or written reflections.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"In the Imaginaries phase, the work could deepen its conceptual framework by further developing the role of community knowledge, narrative, and language as foundations for alternative AI design.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"The work already proposes new conceptual models\u2014such as Dish With One Spoon as a protocol for data sharing and reciprocity\u2014that could be expanded into shared frameworks across the network.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"It has had relatively small audiences and engagement but this is also due to administrative challenges (funding flowing from the centre) but most importantly the need to build trust.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"Any collaboration would need to begin with transparency and alignment on ethics, governance, and community accountability before deeper integration across the network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"It suggests that they will combine XR systems, motion capture, plant sensing, and AI modeling, which may result in integration challenges in terms of system building.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"I think all the Hawaiian language projects could be brought together, and a consortium made with the other language projects (Maori, Niitsitapi, maybe Haudenosaunee)","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"},{"text":"To support both phases, the project should narrow its scope, define clear outputs, and strengthen community co-design so the work is both grounded and transferable.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"Other: Imaginaries: deepen with case study of how she is consulting with her community to help other communities imagine similar engagements.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"There needs to be a strategy to not only imagine Indigenous-led and IKS AI systems but to partner with AI researchers to prototype these.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"Culturally ambitious as well--will they get the community engagement they need to ensure this is community-grounded?","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Suzanne Kite","project_id":"Suzanne Kite - CfP01-09","code":"CfP01-09","area":"Other"},{"text":"RAD offers a strong partnership that could and should be empowered through this research project and process.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"Should connect with other sensor/performance art projects, especially TouchDesigner based projects.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"AI Drum -  Jackson Twobears","project_id":"AI Drum -  Jackson Twobears","code":"","area":"Other"},{"text":"TASK: Ashley need to send us a TOC, and an update on where she is on the publication timeline.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"It would need to provide a means to share algorithms or strategy for technological build.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"Intelligences: Deepen through use as a methdologies guide for technology development.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"All Pods should be sent copies, and encourage local discussion sessions about it.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"Book: Hemi as part of the KMB portfolio should develop a strategy to share it.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"Imaginaries: Deepen the community engagement to develop 2-3 concrete IIAIs.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"}],"questions":[{"text":"The project carries high risk due to unclear ethical grounding and accountability, especially given the shift in partner communities and the absence of documented consent, governance agreements, or evidence of how FLAIR engages with Indigenous data sovereignty in practice.","type":"question","polarity":"neutral","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"The main risk is that the project remains at the level of exploratory research without producing documented activities or deliverables, making it difficult to assess impact or share outcomes across the network.","type":"question","polarity":"neutral","reviewer":"Suzanne","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"These risks can be mitigated by narrowing the project to a single carified site, as that was vague as well as establishing the people who are being consulted which was unclear in the proposal.","type":"question","polarity":"neutral","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"It is somewhat unclear how these interactions extend beyond those internal conversations or how they connect more directly to the broader Transformations framework.","type":"question","polarity":"neutral","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"As described, the project feels fairly contained in scope, and it is not clear what new development would take place beyond what has already been completed.","type":"question","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"The proposed activities were not carried out, and no documented outputs or materials were provided, making it difficult to assess or build upon the work.","type":"question","polarity":"neutral","reviewer":"Suzanne","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"I'd be curious to get an assessment from an Indigenous community member listed in this proposal to give feedback on how the researcher has done.","type":"question","polarity":"neutral","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"Value to Indigenous communities is clearly articulated but it is not clear that the project is Indigenous-led.","type":"question","polarity":"concern","reviewer":"Sara","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"I am very curious if they have case studies on previous projects we can draw on in other research projects.","type":"question","polarity":"neutral","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"Are there adaptive language specific AI values driven tools or a tool set?","type":"question","polarity":"neutral","reviewer":"Sara","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"}],"actions":[{"text":"Cordes' team proposes the following as research advancements possible in the next phase: For their local community engagement they plan to \"strengthen community engagement through our connections with the Oregon Water Futures Collaborative and other water advocates across the state.\" In a related field, Ashely has been developing \"Intro to Indigenous AI\" curricula for years now, and seeks to distrubte this to \"Tribal Colleges and Universities and HBCUs\".","type":"action","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"As the work involves language, cultural knowledge, and digital systems, continued attention to data governance and community consent will remain important as new tools are explored.","type":"action","polarity":"neutral","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Because the work involves Indigenous knowledge and data, maintaining strong community guidance and careful stewardship will remain essential as technical development advances.","type":"action","polarity":"neutral","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"As the project considers future AI language tools, maintaining strong community control over data and decision-making will remain important.","type":"action","polarity":"neutral","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"1) Work with embodied data and datasets which Kite is engaged with, Peter Morin and Archer Pechawis and SJ Okemow (and others) T'karonto.","type":"action","polarity":"neutral","reviewer":"Sara","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"Strengthen collaboration with projects in Hawaii pod - there is already a history of dialogues with University of Hawai\u02bbi.","type":"action","polarity":"neutral","reviewer":"Sara","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"This book will generate lasting capacity by publishing our early research into this field.","type":"action","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"}],"observations":[{"text":"transforming how artificial intelligence is conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Suzanne Kite","project_id":"Suzanne Kite - CfP01-09","code":"CfP01-09","area":"Other"},{"text":"Its emphasis on collaboration with community partners, development of culturally grounded curriculum materials, and experimentation with technology as a supportive rather than dominant framework aligns with the program\u2019s goal of shifting AI research toward relational, ethical, and locally defined practices.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"The project is well positioned to advance into the Imaginaries phase by further developing its dialogue-based and land-based methodologies as frameworks for imagining Indigenous-centred approaches to AI, particularly through language, storytelling, and relational understandings of knowledge and memory.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement by demonstrating how Indigenous knowledge systems, particularly Blackfoot metaphysics and teachings, can inform the creation of sovereign digital environments that challenge Western assumptions about space, time, and intelligence.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Its focus on relational methodologies and Elder-guided processes also positions it well to contribute to network-wide conversations about ethics, data sovereignty, and Indigenous-centred design, making it a useful hub for collaboration as other projects move further into technical development.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"The strong mentorship structure and focus on learning also make this a good candidate for collaboration through workshops, shared development sessions, or student exchanges, which could help expand the work beyond its current scope while contributing to broader network capacity building.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"The project fits naturally within the Imaginaries phase through its speculative exploration of symbolic language, dreaming, and human\u2013AI interaction, and could contribute to that phase by further developing its conceptual and methodological framework for culturally grounded AI design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"Its combination of technical prototyping, governance design, and capacity building through workshops, student leadership, and partnerships supports AbInt\u2019s goal of transforming AI by aligning computation with Indigenous knowledge systems, sovereignty, and shared responsibility.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"The risk of not pursuing the project would be the loss of a strong example of Indigenous-centred digital environment design, which contributes to AbInt\u2019s goals by expanding how virtual space, storytelling, and relational worldviews can shape future AI and interactive systems.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"The risk of not pursuing the project would be significant, as it supports the relational and community-driven foundations necessary for Indigenous-centred AI, while also building capacity through residencies, mentorship, and shared learning across the AbInt network.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"The project has strong potential to advance into the Imaginaries phase through further development of its conceptual framework around Indigenous metaphysics, relational space, and alternative understandings of time, energy, and environment within digital worlds.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Through the development of an interactive Unity-based world, the work explores alternative ways of understanding relationality, energy, and place within digital media, while grounding the process in mentorship, community learning, and POD-based practices.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"It could serve as a point of dialogue with projects focused on Indigenous data sovereignty, relational methodologies, and community-led infrastructure, especially where there is interest in language, pedagogy, or small-data approaches.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"The work demonstrates capacity building, student training, and public knowledge mobilization through exhibition and artist talks, and shows an effort to situate AI development within community relationships and storytelling practices.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"By supporting artist residencies, community conversations, and the creation of digital and performative works, the project shifts AI inquiry away from purely technical development toward culturally grounded, community-led processes.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"There is very strong potential for collaboration with other projects across the AbInt network, particularly those working with language models, community data governance, virtual environments, and Indigenous-centred AI design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"This project contributes to AbInt\u2019s Transformation Statement through its focus on community-led language work, collaborative curriculum development, and attention to data sovereignty in the context of language revitalization.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"Its emphasis on collaboration with Lakota knowledge holders and on grounding technical work in community interpretation reflects the program\u2019s goal of shifting AI research toward relational and culturally informed approaches.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"There is strong potential for collaboration with other projects in the AbInt network, particularly those working with virtual environments, storytelling, language, and Indigenous-centred approaches to digital and AI systems.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"There is strong potential for collaboration with other projects across the AbInt network, particularly those working with language revitalization, digital storytelling, community-based AI, and Indigenous data governance.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"This research is well positioned to advance into the Imaginaries phase by further developing its governance frameworks, storytelling logics, and treaty-based ethics as foundations for alternative approaches to AI design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement by actively reworking AI systems through Indigenous governance, methodologies, and relational ethics grounded in the Dish With One Spoon covenant.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement through its relational, Indigenous-centred approach to AI research grounded in Blackfoot knowledge, Elder guidance, and land-based dialogue.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Risk appears relatively low, as the project is exploratory and limited in scope, with most activities focused on mentorship, learning, and early-stage development rather than complex AI deployment.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Risk appears relatively low, as the project focuses primarily on curriculum development, collaboration with language teachers, and exploratory planning rather than complex technical implementation.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"The work demonstrates a relational approach to knowledge creation, with teachers and community members directly shaping the learning materials and guiding how language data are generated and used.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"This project has strong potential to connect with other AbInt projects exploring embodied interaction, performance, and alternative forms of data such as movement, sound, and sensor-based systems.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"Through the co-creation of methodologies, infrastructure, policy engagement, and Indigenous-centred AI systems; towards relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"As the project develops its planned AI components, it could connect with other PODs exploring language models, community-based data practices, or culturally grounded interface design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Risk appears relatively low, as the project is grounded in research-creation, dialogue, and community-led processes rather than high-risk technical deployment.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Alignment with an Indigenous\u2011centred, relational AI paradigm is clearly articulated; concrete AI tooling is early\u2011stage with limited technical detail reported.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"This project has strong potential to connect with other AbInt projects focused on infrastructure, Indigenous data sovereignty, and land-based methodologies.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"I agree with the assessment that there is clear articulation of \" an Indigenous\u2011centred, relational AI paradigm\", but there is little technical design.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"Strong alignment with storytelling, systems design, and Indigenous computation work.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","project_id":"Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","code":"","area":"Storytelling"},{"text":"towards relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"},{"text":"Although the project does not focus on core AI model development, it advances the transformation goals by building Indigenous-centred approaches to virtual space, storytelling, and digital world-making that can inform future AI and interactive system design within the network.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"While the work itself seems thoughtful and well situated in its specific context, the proposal does not clearly indicate how it would move forward in a meaningful way, or what new directions, outcomes, or research questions would emerge through this next phase.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"A risk is that the project remains primarily focused on curriculum development without clearly extending into technical, infrastructural, or network-level outcomes, which could limit its relevance to AbInt\u2019s broader goals around AI and shared research methods.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"One risk is that the project relies on highly experimental methods combining neuroscience, symbolic analysis, and AI, which may make outcomes difficult to realize within the project timeframe or limit their usefulness to the wider network.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In this case, the project seems to have been led primarily by a single non-Indigenous member, and it may have been stronger if the work had been co-led with an Indigenous POD member rather than centered on one individual.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"Risk appears relatively low, as the project is primarily focused on creative development, learning, and community-informed digital world-building rather than high-risk technical or data-driven AI systems.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"The project references Indigenous knowledge systems and data sovereignty, but does not demonstrate meaningful co-creation with Indigenous communities or implementation of Indigenous-led methodologies.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"This project shows a limited contribution to the Transformation Statement, as it centers collaboration and community engagement but does not substantially reshape how AI is developed or governed.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"I do not see strong potential for this project to advance into the Imaginaries or Intelligences phases in its current form.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"In its current form, this project does not demonstrate advancement into either the Imaginaries or Intelligences phases.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"No significant risks identified at this stage given the limited scope and exploratory nature of the work.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"This project is challenging, because so much of what was reported is not tied to the CfP project.","type":"observation","polarity":"concern","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"I am not entirely certain how this aligns with the AbINT Transformations statement.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"This is an extremely important but highly experimental project.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"I do not see a strong potential for advancement here.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"Hard to asses since so late getting started.","type":"observation","polarity":"concern","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"}]},"ts_dimensions":[{"id":"ts_ik","label":"Indigenous Knowledge Integration","desc":"IK holders, knowledge systems, and ways of knowing brought into AI"},{"id":"ts_relational","label":"Relational Practice","desc":"Relational approaches to knowledge creation and collaboration"},{"id":"ts_community","label":"Community-Centred","desc":"Community representation, community-defined priorities, community benefit"},{"id":"ts_technical","label":"Technical AI Transformation","desc":"Actively reworking AI systems, architectures, data pipelines"},{"id":"ts_governance","label":"Data Sovereignty & Governance","desc":"Data sovereignty, governance frameworks, community-controlled AI"},{"id":"ts_network","label":"Network & Cross-Project","desc":"Building the network, bridging projects, cross-community collaboration"},{"id":"ts_imaginaries","label":"Imaginaries & Speculative","   var id = AREA_NAME_TO_ID[name] || 'other';
  return AREA_COLOR[id] || '#64748b';
}
function areaId(name) { return AREA_NAME_TO_ID[name] || 'other'; }

// ── Display name: last name for people, short title for projects ──────────
function displayName(p) {
  var s = (p.short || '').trim();
  // "Title: subtitle..." → first 1-2 words before colon
  if (s.indexOf(':') > -1) {
    return s.split(':')[0].trim().split(' ').slice(0, 2).join(' ');
  }
  // "Project Name - Person Name" (space-dash-space = separator) → first 2 words
  if (s.indexOf(' - ') > -1) {
    return s.split(' - ')[0].trim().split(' ').slice(0, 2).join(' ');
  }
  // "Name, Institution" → last name from name segment
  if (s.indexOf(',') > -1) {
    var np = s.split(',')[0].trim().split(' ');
    return np[np.length - 1];
  }
  // "Name1 and Name2" → last names joined
  if (s.toLowerCase().indexOf(' and ') > -1) {
    return s.split(/\s+and\s+/i).map(function(n) {
      var parts = n.trim().split(' ');
      return parts[parts.length - 1];
    }).join(' & ');
  }
  // Simple person name → last word (handles hyphenated: Bellemare-Pepin)
  var parts = s.split(' ');
  return parts[parts.length - 1];
}

// ── Tooltip helpers ───────────────────────────────────────────────────────
var ttEl = document.getElementById('tooltip');
function showTT(html, x, y) {
  if (html !== null) ttEl.innerHTML = html;
  ttEl.style.display = 'block';
  var bw = document.documentElement.clientWidth;
  var bh = document.documentElement.clientHeight;
  var tw = ttEl.offsetWidth  || 300;
  var th = ttEl.offsetHeight || 180;
  var lx = x + 14;
  var ly = y - 10;
  if (lx + tw > bw - 10) lx = x - tw - 14;
  if (ly + th > bh - 10) ly = bh - th - 10;
  ttEl.style.left = lx + 'px';
  ttEl.style.top  = ly + 'px';
}
function hideTT() { ttEl.style.display = 'none'; }

// ── VIEW 1: Polarity Landscape ────────────────────────────────────────────
function renderLandscape() {
  var el = document.getElementById('view-landscape');
  var projects = DATA.projects;

  // Compute adaptive midpoints
  var alignVals = projects.map(function(p) { return p.alignment_avg; });
  var riskVals  = projects.map(function(p) { return p.risk_score; });
  var midAlign  = (Math.min.apply(null,alignVals) + Math.max.apply(null,alignVals)) / 2;
  var midRisk   = (Math.min.apply(null,riskVals)  + Math.max.apply(null,riskVals))  / 2;

  var W = el.clientWidth || 860;
  var H = 500;
  var margin = { top: 40, right: 180, bottom: 60, left: 55 };
  var iw = W - margin.left - margin.right;
  var ih = H - margin.top  - margin.bottom;

  var xScale = d3.scaleLinear().domain([0, Math.max.apply(null,riskVals) * 1.15 + 0.02]).range([0, iw]);
  var yScale = d3.scaleLinear().domain([Math.min.apply(null,alignVals) - 0.5, 10.5]).range([ih, 0]);

  var svg = d3.select(el).append('svg')
    .attr('id', 'landscape-svg')
    .attr('viewBox', [0, 0, W, H].join(' '))
    .attr('preserveAspectRatio', 'xMidYMid meet');

  var g = svg.append('g').attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

  // Quadrant backgrounds
  var cx = xScale(midRisk);
  var cy = yScale(midAlign);
  var quads = [
    {x:0,    y:0,    w:cx,    h:cy,    label:'Ready to Build On',       color:'rgba(74,222,128,.04)'},
    {x:cx,   y:0,    w:iw-cx, h:cy,    label:'High Potential\u2014Address Concerns',color:'rgba(251,191,36,.04)'},
    {x:0,    y:cy,   w:cx,    h:ih-cy, label:'Monitor Closely',         color:'rgba(129,140,248,.03)'},
    {x:cx,   y:cy,   w:iw-cx, h:ih-cy, label:'Significant Concerns',    color:'rgba(248,113,113,.04)'},
  ];
  quads.forEach(function(q) {
    g.append('rect').attr('x',q.x).attr('y',q.y).attr('width',q.w).attr('height',q.h)
      .attr('fill',q.color);
    g.append('text').attr('class','quadrant-label')
      .attr('x', q.x + q.w/2).attr('y', q.y + q.h/2)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .text(q.label);
  });

  // Divider lines
  g.append('line').attr('x1',cx).attr('x2',cx).attr('y1',0).attr('y2',ih)
    .attr('stroke','rgba(255,255,255,.08)').attr('stroke-dasharray','4,4');
  g.append('line').attr('x1',0).attr('x2',iw).attr('y1',cy).attr('y2',cy)
    .attr('stroke','rgba(255,255,255,.08)').attr('stroke-dasharray','4,4');

  // Axes
  g.append('g').attr('transform','translate(0,' + ih + ')')
    .call(d3.axisBottom(xScale).ticks(5).tickFormat(d3.format('.2f')))
    .call(function(a) {
      a.selectAll('path,line').attr('stroke','#2a3050');
      a.selectAll('text').attr('fill','#64748b').attr('font-size','11');
    });
  g.append('g')
    .call(d3.axisLeft(yScale).ticks(5))
    .call(function(a) {
      a.selectAll('path,line').attr('stroke','#2a3050');
      a.selectAll('text').attr('fill','#64748b').attr('font-size','11');
    });

  // Axis labels
  g.append('text').attr('class','axis-label')
    .attr('x', iw/2).attr('y', ih + 46).attr('text-anchor','middle')
    .text('Risk Signal \u2192 (from Risk column language)');
  g.append('text').attr('class','axis-label')
    .attr('transform','rotate(-90)').attr('x',-ih/2).attr('y',-42)
    .attr('text-anchor','middle').text('Alignment Score (1\u201310)');

  // AI depth radius scale
  var rScale = d3.scaleOrdinal()
    .domain(['None','Low','Mid','High'])
    .range([9, 12, 16, 20]);

  // Build node objects with target positions for force de-overlap
  var nodeData = projects.map(function(d) {
    return Object.assign({}, d, {
      tx: xScale(d.risk_score),
      ty: yScale(d.alignment_avg),
      x:  xScale(d.risk_score),
      y:  yScale(d.alignment_avg),
      r:  rScale(d.ai_depth),
    });
  });

  // Run force simulation synchronously to resolve overlaps
  var sim = d3.forceSimulation(nodeData)
    .force('x', d3.forceX(function(d) { return d.tx; }).strength(0.85))
    .force('y', d3.forceY(function(d) { return d.ty; }).strength(0.85))
    .force('collision', d3.forceCollide(function(d) { return d.r + 6; }).strength(1.0))
    .stop();
  for (var i = 0; i < 400; i++) sim.tick();

  var nodes = g.selectAll('.bubble')
    .data(nodeData).enter().append('g').attr('class','bubble')
    .attr('transform', function(d) {
      return 'translate(' + d.x + ',' + d.y + ')';
    });

  nodes.append('circle')
    .attr('r', function(d) { return d.r; })
    .attr('fill', function(d) { return areaColor(d.primary_area); })
    .attr('fill-opacity', .75)
    .attr('stroke', function(d) { return areaColor(d.primary_area); })
    .attr('stroke-width', 1.5);

  nodes.append('text').attr('class','node-label')
    .attr('y', function(d) { return -(d.r + 4); })
    .attr('text-anchor','middle')
    .text(function(d) { return displayName(d); });

  nodes.on('mousemove', function(event, d) {
    var phrases = (d.top_phrases || []).slice(0,5)
      .map(function(p) { return '<span class="ph-chip">' + p + '</span>'; }).join('');
    var pos0 = d.positives && d.positives[0]
      ? '<div style="margin-top:6px;font-size:11px;color:#4ade80">\u2713 ' + d.positives[0].text.slice(0,90) + '\u2026</div>'
      : '';
    var neg0 = d.concerns && d.concerns[0]
      ? '<div style="font-size:11px;color:#f87171">\u25B3 ' + d.concerns[0].text.slice(0,90) + '\u2026</div>'
      : '';
    var html = '<h4>' + d.short + (d.code ? ' <span style="color:#64748b;font-weight:400;font-size:11px">' + d.code + '</span>' : '') + '</h4>'
      + '<div style="font-size:11px;color:#a78bfa;margin-bottom:4px">' + d.title.slice(0,80) + '</div>'
      + '<div class="tt-row"><span class="tt-label">Area</span> <span>' + d.primary_area + '</span></div>'
      + '<div class="tt-row"><span class="tt-label">Status</span> <span>' + d.status + '</span></div>'
      + '<div class="tt-row"><span class="tt-label">AI Depth</span> <span>' + d.ai_depth + '</span></div>'
      + '<div class="tt-row"><span class="tt-label">Alignment</span> <strong style="color:#4ade80">' + d.alignment_avg + '/10</strong></div>'
      + '<div class="tt-row"><span class="tt-label">Risk</span> <strong style="color:#fbbf24">' + d.risk_score + '</strong></div>'
      + (phrases ? '<div class="phrases">' + phrases + '</div>' : '')
      + pos0 + neg0;
    showTT(html, event.clientX, event.clientY);
  }).on('mouseleave', hideTT);

  // Legend
  var legG = svg.append('g').attr('transform','translate(' + (W - margin.right + 14) + ',' + margin.top + ')');
  legG.append('text').attr('y',-4).attr('fill','#64748b').attr('font-size','11').text('Research Area');

  var legData = DATA.research_areas.concat(
    ALL_AREAS.filter(function(a) {
      return !DATA.research_areas.find(function(ra) { return ra.id === a.id; });
    }).map(function(a) { return {id: a.id, title: a.title, color: a.color, _gap: true}; })
  );
  legData.forEach(function(a, i) {
    var ly = 12 + i * 22;
    legG.append('circle').attr('cx', 7).attr('cy', ly).attr('r', 7)
      .attr('fill', a.color).attr('fill-opacity', a._gap ? 0.2 : 0.75);
    legG.append('text').attr('x', 18).attr('y', ly + 4)
      .attr('fill', a._gap ? '#f87171' : '#e2e8f0').attr('font-size', '11')
      .text(a.title + (a._gap ? ' (not reviewed)' : ''));
  });

  var ly2 = 12 + legData.length * 22 + 14;
  legG.append('text').attr('y', ly2 - 4).attr('fill','#64748b').attr('font-size','11').text('AI Depth');
  [['None',9],['Low',12],['Mid',16],['High',20]].forEach(function(pair, i) {
    var lly = ly2 + 12 + i * 22;
    legG.append('circle').attr('cx', pair[1]).attr('cy', lly).attr('r', pair[1])
      .attr('fill','#64748b').attr('fill-opacity', .4);
    legG.append('text').attr('x', 26).attr('y', lly + 4)
      .attr('fill','#64748b').attr('font-size','11').text(pair[0]);
  });
}
