in - CfP04","Ma'ema'eolehua Matsumoto - CfP02-05","Digital Archive Project with Rick Hill - Jackson Twobears","Fenwick McKelvey - CfP04"],"doc_freq":6}],"research_themes":[{"id":"language_ai","label":"Language Consortium","color":"#facc15","desc":"A cluster of language projects across 4 pods \u2014 Hawaiian, M\u0101ori, Niitsitapi, Haudenosaunee \u2014 that reviewers explicitly propose bringing together as a consortium","n_reviewers":3,"reviewers":["Jackson","Sara","Suzanne"],"n_projects":8,"projects":["Antoine Bellemare-Pepin - CfP04","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Darby Herman - CfP02-11","Jackie Rice - CfP01-07","Laurie Lloyd Jones - CfP02-04","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16"],"phrases":["language models","language revitalization","small language"],"sentences":[{"text":"There is very strong potential for collaboration with other projects across the AbInt network, particularly those working with language models, community data governance, virtual environments, and Indigenous-centred AI design.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"This project contributes to AbInt\u2019s Transformation Statement through its focus on community-led language work, collaborative curriculum development, and attention to data sovereignty in the context of language revitalization.","reviewer":"Jackson","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"positive"},{"text":"There is strong potential for collaboration with other projects across the AbInt network, particularly those working with language revitalization, digital storytelling, community-based AI, and Indigenous data governance.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"The work demonstrates a relational approach to knowledge creation, with teachers and community members directly shaping the learning materials and guiding how language data are generated and used.","reviewer":"Jackson","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"positive"},{"text":"As the project develops its planned AI components, it could connect with other PODs exploring language models, community-based data practices, or culturally grounded interface design.","reviewer":"Jackson","project":"Darby Herman","code":"CfP02-11","polarity":"positive"},{"text":"While the AI component is still at an early, exploratory stage, the project reflects the broader transformation goals by emphasizing community control, culturally grounded pedagogy, and careful consideration of how future language-learning tools could be developed in ways that align with local priorities rather than external technical models The project could advance into the Imaginaries phase by further developing its approach to community-driven language pedagogy as a framework for thinking about how AI tools might be designed in ways that follow local knowledge systems rather than external models.","reviewer":"Jackson","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"neutral"}],"interpretation":"Reviewers across 3 pods independently point to language revitalisation as a site where AI can serve Indigenous communities directly \u2014 not as an abstract research question but as tools for teaching, learning, and preserving endangered languages. The cluster includes both low-tech pedagogical projects (Clark, Matsumoto) and high-tech model-building (Bellemare-Pepin, Muller). One reviewer explicitly proposes a language consortium connecting Hawaiian, M\u0101ori, Niitsitapi, and potentially Haudenosaunee projects.","network_question":"Should AbInt formalise a cross-pod Language AI consortium, and if so, should it be organised around shared datasets, shared models, or shared pedagogical methods?","phase2":"Phase 2 opportunity: a shared small language model infrastructure that multiple language projects can fine-tune locally. This avoids each project building from scratch while preserving community data sovereignty.","tension":"The gap between pedagogical projects (low AI depth) and technical projects (high AI depth) is wide \u2014 the consortium would need to bridge both."},{"id":"data_governance","label":"Sovereign Infrastructure","color":"#818cf8","desc":"More than data governance \u2014 reviewers describe the outline of a sovereign technology stack: community-controlled data, locally governed infrastructure, and culturally grounded interfaces forming across pods","n_reviewers":5,"reviewers":["Hemi","Jackson","Jason","Sara","Suzanne"],"n_projects":23,"projects":["AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","Antoine Bellemare-Pepin - CfP04","Ashley Cordes - CfP01-01","Bobi-Rose Leatherby - CfP02-01","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Copper Bowls: Gift-Giving and AI - Ostoro Petahtegoose","Darby Herman - CfP02-11","Digital Archive Project with Rick Hill - Jackson Twobears","Eilif Muller, Mila Quebec AI Institute - CfP04","Fenwick McKelvey - CfP04","Hawaiian Language Physical Reasoning Dataset - Cade Kane","Jackie Rice - CfP01-07","Kaiya Healy - CfP02-10","Keolu Fox, University of California San Diego","Laurie Lloyd Jones - CfP02-04","Ma'ema'eolehua Matsumoto - CfP02-05","Maurice Jones - CfP01-06","Mohawk LLM - Jackson Twobears","Sacred Code: Indigenous Protocols and the Future of Artificial Intelligence (book chapter) - Petera Hudson","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16","Suzanne Kite - CfP01-09"],"phrases":["data sovereignty","data governance","community-based","governance frameworks","sovereignty methodologies"],"sentences":[{"text":"Having a leading Indigenous thought leaders and scholars is a great strength and we would all benefit from sharing time with leaders such as Leroy and learning from from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space The network would greatly benefit from working closer with this Pod and learning from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space I see no identifiable risks with this project.","reviewer":"Hemi","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"infrastructure, policy engagement, and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities, Canada Imaginaries: need whole series of FIIAI projects that take a Sovereign Stack as their starting point, and imagine out from there.","reviewer":"Jason","project":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","code":"","polarity":"positive"},{"text":"Although there is not a lot of evidence of formal data sovereignty processes or core AI system development, there is a strong emphasis on protocol and relational approaches to AI, advancing relational/educational approaches to AI, co-creating programs (artist fellowship, workshops) and building reusable processes (cookbook), while also cultivating student/community capacity.","reviewer":"Hemi","project":"Brian Kuwada","code":"CfP01-02","polarity":"positive"},{"text":"The risk with not pursuing this project lies in the opportunities and benefits that are gained from working closely with and drawing from Leroy Little Bear\u2019s teachings and knowledge to ensure that our work is grounded in Indigenous methodologies, community-informed practices, and the co-creation of a sovereign digital space","reviewer":"Hemi","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"transforming how artificial intelligence is conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Suzanne Kite","code":"CfP01-09","polarity":"positive"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement by demonstrating how Indigenous knowledge systems, particularly Blackfoot metaphysics and teachings, can inform the creation of sovereign digital environments that challenge Western assumptions about space, time, and intelligence.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"}],"interpretation":"This is the single most cross-cutting theme in the network: 5 reviewers, 16 projects, 11 independent mentions of \"data sovereignty.\" But the underlying conversation is bigger than governance protocols. What reviewers describe \u2014 community-controlled data repositories, locally governed infrastructure, culturally grounded interfaces \u2014 is the outline of a sovereign technology stack. Sara explicitly calls for \"local processing, sovereign stacks\" as an emerging direction. This is not one project's goal; it is a network-level architecture forming across pods.","network_question":"Is AbInt ready to invest in shared data governance frameworks and sovereign infrastructure before deepening individual AI development \u2014 or should these develop in parallel?","phase2":"Phase 2 priority: define a shared data governance protocol that all projects can adopt, and pilot at least one sovereign data repository that multiple projects can contribute to and draw from.","tension":"Suzanne flags that some projects claim data sovereignty without demonstrating community control. The standard needs teeth, not just language."},{"id":"community_led","label":"Community Accountability","color":"#f59e0b","desc":"Community-led practice as an accountability standard \u2014 reviewers affirm it where genuine and question it where the evidence is thin. The gap between stated and demonstrated community leadership is a live tension.","n_reviewers":5,"reviewers":["Hemi","Jackson","Jason","Sara","Suzanne"],"n_projects":15,"projects":["AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","Abundant Soils - Mele Moniz","Antoine Bellemare-Pepin - CfP04","Ashley Cordes - CfP01-01","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Darby Herman - CfP02-11","Fenwick McKelvey - CfP04","Hawaiian Language Physical Reasoning Dataset - Cade Kane","Jackie Rice - CfP01-07","Ma'ema'eolehua Matsumoto - CfP02-05","Mohawk LLM - Jackson Twobears","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16","Suzanne Kite - CfP01-09"],"phrases":["community-led","community-driven","community-defined priorities","community-defined","systems community-defined","decision-making","community-based"],"sentences":[{"text":"transforming how artificial intelligence is conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Suzanne Kite","code":"CfP01-09","polarity":"positive"},{"text":"Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"The risk of not pursuing the project would be significant, as it supports the relational and community-driven foundations necessary for Indigenous-centred AI, while also building capacity through residencies, mentorship, and shared learning across the AbInt network.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"It could serve as a point of dialogue with projects focused on Indigenous data sovereignty, relational methodologies, and community-led infrastructure, especially where there is interest in language, pedagogy, or small-data approaches.","reviewer":"Suzanne","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"positive"},{"text":"The HIFI Lab project demonstrates strong alignment with AbInt's Transformation statement and strategic direction through its grounding in cultural protocols, Indigenous-centred and community-led imaginaries and educational engagement.","reviewer":"Hemi","project":"Brian Kuwada","code":"CfP01-02","polarity":"positive"},{"text":"By supporting artist residencies, community conversations, and the creation of digital and performative works, the project shifts AI inquiry away from purely technical development toward culturally grounded, community-led processes.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"}],"interpretation":"Community-led practice appears in 11 projects across all 5 reviewers, but the depth varies. Some projects demonstrate genuine community co-design (Cordes, Diamond & Pechawis, Rice); others use community-led language without evidence of community decision-making in practice. Reviewers are increasingly applying this as an accountability standard, not just a descriptor. Suzanne's questions about FLAIR (Srikanth) and Sara's about Ubalijoro reveal the gap between stated and demonstrated community leadership.","network_question":"How does AbInt distinguish between projects that are community-led in practice versus in rhetoric \u2014 and what support structures help projects deepen genuine community engagement?","phase2":"Phase 2 action: develop an internal rubric or shared reflection tool for community-led practice that projects can use for self-assessment, with examples drawn from the strongest projects in Phase 1.","tension":"Holding projects accountable to community-led standards without creating extractive evaluation processes is itself a community-centred design challenge."},{"id":"relational","label":"Relational Practices","color":"#22d3ee","desc":"Ubiquitous in AbInt vocabulary but diagnostically flat \u2014 the word \"relational\" appears everywhere. The real signal is in specific practices: ceremony-informed design, Elder advisory, place-based partnerships, reciprocal governance.","n_reviewers":5,"reviewers":["Hemi","Jackson","Jason","Sara","Suzanne"],"n_projects":17,"projects":["Antoine Bellemare-Pepin - CfP04","Ashley Cordes - CfP01-01","Bobi-Rose Leatherby - CfP02-01","Brian Kuwada - CfP01-02","Darby Herman - CfP02-11","Digital Archive Project with Rick Hill - Jackson Twobears","Eilif Muller, Mila Quebec AI Institute - CfP04","Fenwick McKelvey - CfP04","Jackie Rice - CfP01-07","Kaiya Healy - CfP02-10","Keolu Fox, University of California San Diego","Ma'ema'eolehua Matsumoto - CfP02-05","Maurice Jones - CfP01-06","Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","Sacred Code: Indigenous Protocols and the Future of Artificial Intelligence (book chapter) - Petera Hudson","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16"],"phrases":["co-creation methodologies"],"sentences":[{"text":"Although there is not a lot of evidence of formal data sovereignty processes or core AI system development, there is a strong emphasis on protocol and relational approaches to AI, advancing relational/educational approaches to AI, co-creating programs (artist fellowship, workshops) and building reusable processes (cookbook), while also cultivating student/community capacity.","reviewer":"Hemi","project":"Brian Kuwada","code":"CfP01-02","polarity":"positive"},{"text":"The risk with not pursuing this project lies in the opportunities and benefits that are gained from working closely with and drawing from Leroy Little Bear\u2019s teachings and knowledge to ensure that our work is grounded in Indigenous methodologies, community-informed practices, and the co-creation of a sovereign digital space","reviewer":"Hemi","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"The HIFI Lab project demonstrates strong alignment with AbInt's Transformation statement and strategic direction through its grounding in cultural protocols, Indigenous-centred and community-led imaginaries and educational engagement.","reviewer":"Hemi","project":"Brian Kuwada","code":"CfP01-02","polarity":"positive"},{"text":"Through the co-creation of methodologies, infrastructure, policy engagement, and Indigenous-centred AI systems; towards relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"Co-creation of methodologies policy engagement towards relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Fenwick McKelvey","code":"CfP04","polarity":"positive"}],"interpretation":"\"Relational\" appears across 18 projects and 5 reviewers, but produces zero specific cross-project phrases. This signals that relational language has become ubiquitous in AbInt's vocabulary \u2014 a shared value rather than a diagnostic indicator. Everyone is relational; the word no longer differentiates. The real relational signal lives in specific practices: ceremony-informed design (Diamond & Pechawis), Elder advisory processes (Rice), place-based partnerships (Cordes), and reciprocal governance (Fox).","network_question":"Can AbInt move beyond \"relational\" as a general descriptor and name the specific relational practices that distinguish its approach \u2014 ceremony-informed, Elder-guided, reciprocal, place-based?","phase2":"Phase 2 reframe: retire \"Relational Approaches\" as a standalone theme and instead embed specific relational practices as quality indicators within other themes.","tension":"Removing a valued term from the framework may feel like devaluing it. The alternative framing needs to honour the concept while making it more analytically useful."},{"id":"capacity","label":"Technical Translation Gap","color":"#fb923c","desc":"The network has visionary PIs and community partners at one end, and technical ambitions at the other. The connective tissue \u2014 people who can translate between IK holders and AI system builders \u2014 is thin. Reviewers explicitly call for technical mentors.","n_reviewers":4,"reviewers":["Hemi","Jackson","Sara","Suzanne"],"n_projects":13,"projects":["AI Drum -  Jackson Twobears","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Darby Herman - CfP02-11","Digital Archive Project with Rick Hill - Jackson Twobears","Eilif Muller, Mila Quebec AI Institute - CfP04","Jackie Rice - CfP01-07","Kaiya Healy - CfP02-10","Maurice Jones - CfP01-06","Melanie Cheung - CfP01-06","Michelle Sylvestre - CfP02-13","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16"],"phrases":["capacity building"],"sentences":[{"text":"Its emphasis on collaboration with community partners, development of culturally grounded curriculum materials, and experimentation with technology as a supportive rather than dominant framework aligns with the program\u2019s goal of shifting AI research toward relational, ethical, and locally defined practices.","reviewer":"Jackson","project":"Christine Clark","code":"CfP04","polarity":"positive"},{"text":"The strong mentorship structure and focus on learning also make this a good candidate for collaboration through workshops, shared development sessions, or student exchanges, which could help expand the work beyond its current scope while contributing to broader network capacity building.","reviewer":"Jackson","project":"Darby Herman","code":"CfP02-11","polarity":"positive"},{"text":"Its combination of technical prototyping, governance design, and capacity building through workshops, student leadership, and partnerships supports AbInt\u2019s goal of transforming AI by aligning computation with Indigenous knowledge systems, sovereignty, and shared responsibility.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"The risk of not pursuing the project would be significant, as it supports the relational and community-driven foundations necessary for Indigenous-centred AI, while also building capacity through residencies, mentorship, and shared learning across the AbInt network.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"Through the development of an interactive Unity-based world, the work explores alternative ways of understanding relationality, energy, and place within digital media, while grounding the process in mentorship, community learning, and POD-based practices.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"It could serve as a point of dialogue with projects focused on Indigenous data sovereignty, relational methodologies, and community-led infrastructure, especially where there is interest in language, pedagogy, or small-data approaches.","reviewer":"Suzanne","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"positive"}],"interpretation":"The capacity theme reveals a specific structural gap in the network. Hemi uses the exact phrase \"technical mentor/advisor/developer\" three times across different projects. Jackson flags that student-led projects risk losing continuity. Sara points to the need for AI researchers who can prototype. The network has visionary PIs and community partners at one end, and ambitious technical goals at the other, but the connective tissue \u2014 people who can translate between Indigenous knowledge holders and AI system builders \u2014 is thin.","network_question":"Does AbInt need a dedicated technical translation layer \u2014 embedded technologists who work across projects, not within them \u2014 to bridge the IK-to-AI gap?","phase2":"Phase 2 investment: recruit 2-3 rotating technical mentors who are shared across pods, not assigned to individual projects. Their role: help projects move from concept to prototype.","tension":"External technical mentors risk introducing non-Indigenous design assumptions. They would need to work within the relational and governance frameworks already established."},{"id":"ik_systems","label":"IK-AI Integration Challenge","color":"#4ade80","desc":"IK methods are rated Core in 19/29 projects \u2014 the network is deeply grounded. The open question is how to translate IK into forms that AI can learn from without extracting or flattening. This is the foundational intellectual challenge of AbInt.","n_reviewers":5,"reviewers":["Hemi","Jackson","Jason","Sara","Suzanne"],"n_projects":25,"projects":["AI Drum -  Jackson Twobears","AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","Abundant Soils - Mele Moniz","Antoine Bellemare-Pepin - CfP04","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Darby Herman - CfP02-11","Data Visualizations Catalogue - Orus Mateo Casta\u00f1o-Su\u00e1rez","Digital Archive Project with Rick Hill - Jackson Twobears","Eilif Muller, Mila Quebec AI Institute - CfP04","Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow","Fenwick McKelvey - CfP04","Hawaiian Language Physical Reasoning Dataset - Cade Kane","Hiringa Te Mahara (DEEP KIN) research platform - Kevin Shedlock","Jackie Rice - CfP01-07","Kaiya Healy - CfP02-10","Keolu Fox, University of California San Diego","Ma'ema'eolehua Matsumoto - CfP02-05","Maurice Jones - CfP01-06","Michelle Sylvestre - CfP02-13","Mohawk LLM - Jackson Twobears","Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16","Suzanne Kite - CfP01-09"],"phrases":["indigenous-centred","cultural knowledge","knowledge systems","indigenous-centred systems","land-based"],"sentences":[{"text":"infrastructure, policy engagement, and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities, Canada Imaginaries: need whole series of FIIAI projects that take a Sovereign Stack as their starting point, and imagine out from there.","reviewer":"Jason","project":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","code":"","polarity":"positive"},{"text":"transforming how artificial intelligence is conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Suzanne Kite","code":"CfP01-09","polarity":"positive"},{"text":"The project is well positioned to advance into the Imaginaries phase by further developing its dialogue-based and land-based methodologies as frameworks for imagining Indigenous-centred approaches to AI, particularly through language, storytelling, and relational understandings of knowledge and memory.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement by demonstrating how Indigenous knowledge systems, particularly Blackfoot metaphysics and teachings, can inform the creation of sovereign digital environments that challenge Western assumptions about space, time, and intelligence.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Its focus on relational methodologies and Elder-guided processes also positions it well to contribute to network-wide conversations about ethics, data sovereignty, and Indigenous-centred design, making it a useful hub for collaboration as other projects move further into technical development.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"Its combination of technical prototyping, governance design, and capacity building through workshops, student leadership, and partnerships supports AbInt\u2019s goal of transforming AI by aligning computation with Indigenous knowledge systems, sovereignty, and shared responsibility.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"}],"interpretation":"Indigenous knowledge integration appears across 17 projects and all 5 reviewers. The strongest signal is that IK methods are rated \"Core\" in 19 of 29 projects \u2014 the network is already deeply grounded. What reviewers flag is not a lack of IK integration but the challenge of translating IK into forms that AI systems can learn from without extracting or flattening. The \"indigenous-centred\" phrase (9 projects) signals commitment; the \"knowledge systems\" phrase (13 projects) signals the structural challenge of encoding.","network_question":"What does it mean for an AI system to \"learn from\" Indigenous knowledge without extracting it? Can AbInt articulate a shared position on this that guides technical development across all projects?","phase2":"Phase 2 intellectual contribution: produce a position paper or protocol on IK-AI integration that the network can publish and that becomes a reference point for the broader field.","tension":"The diversity of IK systems across pods (M\u0101ori, Hawaiian, Niitsitapi, Haudenosaunee, etc.) means a single protocol cannot be prescriptive \u2014 it must be a framework for local adaptation."},{"id":"network","label":"Network Architecture","color":"#60a5fa","desc":"Reviewers are not just noting cross-project synergies \u2014 they are proposing specific structural moves: a language consortium, a website-building intensive, an AR/VR stream, sovereign stack pilots. These are bottom-up signals for Phase 2 design.","n_reviewers":5,"reviewers":["Hemi","Jackson","Jason","Sara","Suzanne"],"n_projects":28,"projects":["AI Drum -  Jackson Twobears","AI Glossary of Terms: Definitions with New Zealand Examples - Petera Hudson","AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","Abundant Soils - Mele Moniz","Antoine Bellemare-Pepin - CfP04","Ashley Cordes - CfP01-01","Bobi-Rose Leatherby - CfP02-01","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Copper Bowls: Gift-Giving and AI - Ostoro Petahtegoose","Darby Herman - CfP02-11","Data Visualizations Catalogue - Orus Mateo Casta\u00f1o-Su\u00e1rez","Digital Archive Project with Rick Hill - Jackson Twobears","Eilif Muller, Mila Quebec AI Institute - CfP04","Eliane Ubalijoro - CfP01-03","Hiringa Te Mahara (DEEP KIN) research platform - Kevin Shedlock","Jackie Rice - CfP01-07","Kaiya Healy - CfP02-10","Keolu Fox, University of California San Diego","Laurie Lloyd Jones - CfP02-04","Maurice Jones - CfP01-06","Melanie Cheung - CfP01-06","Michelle Sylvestre - CfP02-13","Mohawk LLM - Jackson Twobears","Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","Sacred Code: Indigenous Protocols and the Future of Artificial Intelligence (book chapter) - Petera Hudson","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16"],"phrases":["decision-making"],"sentences":[{"text":"Having a leading Indigenous thought leaders and scholars is a great strength and we would all benefit from sharing time with leaders such as Leroy and learning from from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space The network would greatly benefit from working closer with this Pod and learning from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space I see no identifiable risks with this project.","reviewer":"Hemi","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"The project also aligns well with network activities focused on relational AI, digital territories, and culturally grounded interface design, and could benefit from further collaboration through shared builds, workshops, and cross-POD development sessions that expand the work beyond its original context.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Continued collaboration within the network, along with clearer pathways for sharing builds, workflows, and community-informed design methods, would help the project move from a single environment toward a more scalable and relational digital infrastructure aligned with the goals of these later phases.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Its focus on relational methodologies and Elder-guided processes also positions it well to contribute to network-wide conversations about ethics, data sovereignty, and Indigenous-centred design, making it a useful hub for collaboration as other projects move further into technical development.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"The strong mentorship structure and focus on learning also make this a good candidate for collaboration through workshops, shared development sessions, or student exchanges, which could help expand the work beyond its current scope while contributing to broader network capacity building.","reviewer":"Jackson","project":"Darby Herman","code":"CfP02-11","polarity":"positive"}],"interpretation":"Network and cross-project connection is the most active theme by project count (21 projects), reflecting the review framework itself \u2014 reviewers are asked to consider cross-project synergies. The meaningful signal underneath is a set of specific structural proposals: Jason recommends a language consortium, Suzanne proposes a website-building intensive, Sara calls for a focused AR/VR stream, and multiple reviewers identify shared infrastructure needs. These are not vague recommendations \u2014 they are concrete network-architecture proposals.","network_question":"Which of the reviewer-proposed structural actions (language consortium, website intensive, AR/VR stream, sovereign stack pilots) should AbInt prioritise in Phase 2 planning?","phase2":"Phase 2 structural moves: act on the top 3 most-supported cross-project proposals. The reviewer data provides a mandate for these; they are not top-down decisions but bottom-up signals.","tension":"Cross-project activity competes with in-project depth for time and attention. Projects at early stages may not be ready to connect meaningfully."},{"id":"technical_ai","label":"Technical Frontier","color":"#f472b6","desc":"5 projects at High AI Depth form the network's technical frontier. Reviewers consistently recommend they document methods, share tools, and create reusable components \u2014 the network needs them as infrastructure providers, not just individual researchers.","n_reviewers":5,"reviewers":["Hemi","Jackson","Jason","Sara","Suzanne"],"n_projects":25,"projects":["AI Drum -  Jackson Twobears","AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","Antoine Bellemare-Pepin - CfP04","Ashley Cordes - CfP01-01","Brian Kuwada - CfP01-02","Christine Clark - CfP04","Darby Herman - CfP02-11","Data Visualizations Catalogue - Orus Mateo Casta\u00f1o-Su\u00e1rez","Digital Archive Project with Rick Hill - Jackson Twobears","Eilif Muller, Mila Quebec AI Institute - CfP04","Eliane Ubalijoro - CfP01-03","Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow","Hiringa Te Mahara (DEEP KIN) research platform - Kevin Shedlock","Jackie Rice - CfP01-07","Kaiya Healy - CfP02-10","Keolu Fox, University of California San Diego","Laurie Lloyd Jones - CfP02-04","Ma'ema'eolehua Matsumoto - CfP02-05","Maurice Jones - CfP01-06","Melanie Cheung - CfP01-06","Michelle Sylvestre - CfP02-13","Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","Sara Diamond & Archer Pechawis - CfP01-08","Shankhalika Srikanth - CfP02-16"],"phrases":["language models"],"sentences":[{"text":"Huk addresses this transformation goal, \"the Partnership shifts AI from extractive models imposed on Indigenous communities towards relational and accountable approaches co-developed with those communities\" in the context of an international collaboration between MILA researchers and El Martadero, a 3 000 m\u00b2 community lab in Cochabamba at the mARTadero, a cultural and tech hub in Cochabamba that offers a hacklab, dance collectives, and \"a myriad of artists\".","reviewer":"Sara","project":"Eilif Muller, Mila Quebec AI Institute","code":"CfP04","polarity":"positive"},{"text":"Although there is not a lot of evidence of formal data sovereignty processes or core AI system development, there is a strong emphasis on protocol and relational approaches to AI, advancing relational/educational approaches to AI, co-creating programs (artist fellowship, workshops) and building reusable processes (cookbook), while also cultivating student/community capacity.","reviewer":"Hemi","project":"Brian Kuwada","code":"CfP01-02","polarity":"positive"},{"text":"Continued collaboration within the network, along with clearer pathways for sharing builds, workflows, and community-informed design methods, would help the project move from a single environment toward a more scalable and relational digital infrastructure aligned with the goals of these later phases.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Its focus on relational methodologies and Elder-guided processes also positions it well to contribute to network-wide conversations about ethics, data sovereignty, and Indigenous-centred design, making it a useful hub for collaboration as other projects move further into technical development.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"positive"},{"text":"By supporting artist residencies, community conversations, and the creation of digital and performative works, the project shifts AI inquiry away from purely technical development toward culturally grounded, community-led processes.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"}],"interpretation":"Technical AI development scores highest in the TS dimensions (avg 0.694) but this is partly inflated by generic keywords like \"system\" and \"model.\" The real technical signal is more specific: 5 projects are at High AI depth (Cheung, Leatherby, Bellemare-Pepin, Ubalijoro, Little Bear), and these form the network's technical frontier. Reviewers consistently recommend that these frontier projects document their methods, share their tools, and create reusable components \u2014 the network needs them to be infrastructure providers, not just individual researchers.","network_question":"Are the 5 High AI Depth projects willing and able to serve as technical anchors for the network \u2014 and what support would they need to take on that role?","phase2":"Phase 2 structure: designate frontier projects as \"technical anchor\" nodes and resource them to produce shared tools, documented methods, and reusable components.","tension":"Asking individual researchers to serve the network's infrastructure needs adds labour that may not align with their own research goals or funding structures."},{"id":"emerging_lasting_capacity","label":"Emerging: Lasting Capacity","color":"#94a3b8","desc":"Pattern surfaced automatically from reviewer language \u2014 not yet in a named theme","n_reviewers":5,"reviewers":["Hemi","Jackson","Jason","Sara","Suzanne"],"n_projects":11,"projects":[],"phrases":["lasting capacity","builds lasting","capacity among","indigenous-led","impact goals","case study"],"sentences":[{"text":"It is somewhat unclear how these interactions extend beyond those internal conversations or how they connect more directly to the broader Transformations framework.","reviewer":"Jackson","project":"Michelle Sylvestre","code":"CfP02-13","polarity":"neutral"},{"text":"With continued mentorship, stronger connections to the network, and a shift from planning toward implementation, the project could grow in ways that align well with the goals of these later phases.","reviewer":"Jackson","project":"Darby Herman","code":"CfP02-11","polarity":"neutral"},{"text":"Continued collaboration within the network, along with clearer pathways for sharing builds, workflows, and community-informed design methods, would help the project move from a single environment toward a more scalable and relational digital infrastructure aligned with the goals of these later phases.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"Strengthening connections with other AbInt projects and sharing methods, protocols, and technical experiments across PODs would help the work evolve from residency-based exploration into broader network infrastructure aligned with these later phases.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"neutral"}],"emerging":true,"interpretation":"","network_question":"","phase2":"","tension":""}],"network_signals":{"recommendations":[{"text":"The project also aligns well with network activities focused on relational AI, digital territories, and culturally grounded interface design, and could benefit from further collaboration through shared builds, workshops, and cross-POD development sessions that expand the work beyond its original context.","type":"recommendation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Continued collaboration within the network, along with clearer pathways for sharing builds, workflows, and community-informed design methods, would help the project move from a single environment toward a more scalable and relational digital infrastructure aligned with the goals of these later phases.","type":"recommendation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"For the Indigenous Methodologies book portion of their research, \"The next phase of the project will largely focus on the digital component of the book, making a compelling and useful resource and methods toolbox repository for Indigenous AI scholars and practitioners.\" It is my recommendation that we have an website building intensive for all our related projects, and focus a lot of our RA power over a month period to getting websites up for all these amazing projects, especially one like this.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"There is also risk that the project prioritizes artistic exploration over clearly defined research outputs, which is great, because it is led by an artist, but it will make it difficult to evaluate impact or reuse outcomes beyond the immediate installation, since the proposal does nto suggest they will produce tools or AI besides training their custom AI personality.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, advancement would likely involve deepening the technical side of the work, including more fully developed SLM/LLM adaptations, community-controlled data repositories, and locally governed infrastructure, while maintaining the collective, ceremony-informed, and advisory-guided processes that shape the project.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"To advance into the Intelligences phase, the work would likely need to move beyond curriculum development toward more clearly defined technical experimentation, such as prototyping language-learning tools, working with small language models, or collaborating with other projects building shared infrastructure for language data.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"Greater attention to reproducibility, clearer integration with existing AbInt infrastructure efforts, and more explicit plans for how the neuro-AI and symbolic modeling components could support other Pods would help the research extend beyond a single case study into something that can inform later-phase network development.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"The work in developing future imaginaries and speculative designs of Indigenous AI to guide the conceptualisation of novel AI systems in the future imaginaries are areas that others in the network would benefit from hearing and sharing the various approaches developed in HIFI Lab project to future AI, art and storytelling.","type":"recommendation","polarity":"neutral","reviewer":"Hemi","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"There is also a risk of extractive dynamics, where language knowledge is structured for technical use without sufficient community control or benefit, which could be mitigated through direct evaluation from participating Indigenous community members and clearer documentation of agreements, protocols, and outcomes.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"One potential risk is that the work is closely tied to a specific community context and small working group, which may limit how easily the outcomes extend beyond the immediate collaborators; this can be mitigated through clearer documentation of methods and continued dialogue with other projects in the network.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"Given the goals of Abundant Intelligences, it would be helpful to see more clearly how Indigenous members were involved in shaping the direction of the work, and how responsibility, authorship, and decision-making were shared, rather than the project being led primarily by one non-Indigenous collaborator.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"One potential risk is that the work depends on ongoing relationships with Elders, students, and community partners, so continuity and care are important to maintain as the project develops; this is already being addressed through advisory guidance, mentorship structures, and collective decision-making.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Progress into Imaginaries and Intelligences phases would require integration into an established research structure such as the Cosmologyscape work on Black and Indigenous AI with the University of Manitoba team, along with clearer methodology, defined collaborators, and grounded community engagement.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"A potential risk is that, as a primarily student-led initiative, the work may lack continuity or long-term impact without ongoing mentorship and stronger integration with the POD or broader network; this can be mitigated through continued guidance, collaboration, and clearer next-stage planning.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"To support both phases, the project would benefit from identifying a smaller set of core technical contributions, documenting its processes in a way that others can build from, and clarifying how its systems extend beyond a single installation into transferable approaches within the network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, the work could deepen by moving some of these concepts into more concrete systems, such as language learning tools, local models, or interactive digital environments, while continuing to be guided by Elder advisory processes and community priorities.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"An exciting aspect of this project that needs to be supported separately is the development of a \"deep-learning framework that simultaneously learns a time varying sensor footprint and a pixel level model of carbon flux applicable to biomes measured by the AmeriFlux network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"It may be helpful to clarify the extent of the community engagement described here, and to more explicitly articulate how these relationships and discussions contributed to the development of the project and how they relate to the wider objectives of Abundant Intelligences.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"This could be mitigated by more explicitly linking the pedagogical work to future language technologies, tool development, or collaboration with projects building data or compute infrastructure, and by documenting processes so they can be reused across the network.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"Collaboration could deepen through shared workshops or co-developed case studies, especially with teams working on low-power or localized AI systems, where bio-circular design principles can be tested in parallel at smaller scales within our current network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"If that is the case, it would be helpful to clarify what phase the project is actually in, and whether the intention here is documentation, reflection, or further development, rather than new work that would unfold as part of the Transformations activities.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"The project could move into the Imaginaries phase by further developing its community-driven pedagogical approach as a basis for thinking about how language technologies should be designed in ways that follow local knowledge systems and teaching practices.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"To advance into the Intelligences phase, the work would need to move from exploratory prototypes toward more clearly defined technical outputs, such as stable platforms, documented modeling methods, or tools that can be tested or adapted by other projects.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, advancement would likely require more concrete technical development, such as prototyping language or learning tools, along with clearer articulation of governance, data stewardship, and collaboration with other AbInt projects.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Greater documentation of methods, clearer connections to other network activities, and a more defined technical pathway would help the work extend from its current, locally focused stage into forms that can contribute more directly to the later phases.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"This is one of the most connected projects because of the depth of its engagement through chapters, we should invite each chapter to present on their writing at a filmed, interview each chapter writer for a video, and host a celebration of its launch.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"It would be important to aggregate the researchers across pods who are interested in socio-neuro, including thinking through neuroscience implications, practices that are emerging in other national and linguistic contexts (see note on collaboration).","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"The research needs to deepen into applying AI both in production support but more importantly in graphics development and automation, data analysis and outputs (relevant to graphics) and possible work with body and environmental sensor data.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow","project_id":"Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow","code":"","area":"Storytelling"},{"text":"Stronger documentation, clearer technical goals, and closer integration with other AbInt projects would help the research extend from its current localized focus into forms that contribute more directly to later-phase network development.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"In the Intelligences phase, the work could deepen by adding more interactive or adaptive systems, integrating language, narrative, or agent-based behaviours, and connecting the virtual environment to other AbInt projects or datasets.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Stronger collaboration would likely require clearer alignment with existing technical initiatives in the network and more explicit plans for how the project\u2019s models or platforms could be adapted or used by other teams.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In the Intelligences phase, the project would need to deepen its technical clarity by specifying how movement, plant signals, and interaction data are modeled, learned from, and translated into system behavior.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"This is a starting point toward fine scale monitoring of carbon fluxes on Indigenous Lands beyond Coquille lands.\" This should be proposed in another project and linked with projects using similar technology.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"Imaginaries: deepen through use the book as background reading to prep for the FIIAI Workshops; review book and extract out concrete IIAI that might be found; deepen and support by doing a second volume.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"Builds lasting capacity among researchers, learners, and communities Unfortunately have pivoted away from building a technical prototype (to a proof-of-concept for protocol-driven information access).","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"},{"text":"Stronger connection to the network would likely require more intentional sharing of methods and clearer alignment with projects developing technical frameworks that could support or extend this work.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"The project would benefit greatly by aligning the artistic/ creative component with a technical mentor/advisor/developer to advance and realise the AI conceptualisation and development of a Napi AI.","type":"recommendation","polarity":"neutral","reviewer":"Hemi","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"This risk can be mitigated by requiring clearer alignment between proposed activities and outcomes, along with basic documentation such as workshop materials, recordings, or written reflections.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"In the Imaginaries phase, the work could deepen its conceptual framework by further developing the role of community knowledge, narrative, and language as foundations for alternative AI design.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"The work already proposes new conceptual models\u2014such as Dish With One Spoon as a protocol for data sharing and reciprocity\u2014that could be expanded into shared frameworks across the network.","type":"recommendation","polarity":"neutral","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"Would need further context but it has the potential to grow and advance the work in visuospatial representations of epistemologies in the Imaginaries and Intelligences Phases of AbInt","type":"recommendation","polarity":"neutral","reviewer":"Hemi","project":"Data Visualizations Catalogue - Orus Mateo Casta\u00f1o-Su\u00e1rez","project_id":"Data Visualizations Catalogue - Orus Mateo Casta\u00f1o-Su\u00e1rez","code":"","area":"Storytelling"},{"text":"It will need to ensure Indigenous co-leadership, create a link to AbInt in the Canadian context, define that AI tools that are being built and how these are driven by Indigenous IKS.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"It has had relatively small audiences and engagement but this is also due to administrative challenges (funding flowing from the centre) but most importantly the need to build trust.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"Imaginaries: need to run a FIIAI workshop using this as a starting point Intelligences: not sure if counts as Transformative but certainly an advancement for Indigenous AI","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Hawaiian Language Physical Reasoning Dataset - Cade Kane","project_id":"Hawaiian Language Physical Reasoning Dataset - Cade Kane","code":"","area":"Language"},{"text":"Any collaboration would need to begin with transparency and alignment on ethics, governance, and community accountability before deeper integration across the network.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"It suggests that they will combine XR systems, motion capture, plant sensing, and AI modeling, which may result in integration challenges in terms of system building.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"This project should be part of the strategic work on local processing, sovereign stacks which is an emerging direction across AbInt and as part of a larger coalition.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Laurie Lloyd Jones","project_id":"Laurie Lloyd Jones - CfP02-04","code":"CfP02-04","area":"Storytelling"},{"text":"I think all the Hawaiian language projects could be brought together, and a consortium made with the other language projects (Maori, Niitsitapi, maybe Haudenosaunee)","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"},{"text":"To support both phases, the project should narrow its scope, define clear outputs, and strengthen community co-design so the work is both grounded and transferable.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"I have in other places suggested we pull together a research stream on embodied data as this is music based, language based and physical interaction based.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"AI Drum -  Jackson Twobears","project_id":"AI Drum -  Jackson Twobears","code":"","area":"Multi-Agent Systems"},{"text":"Our pod hopes to deepen relationships with Daniels for AbInt as the Visual Analytics Lab (Diamond) has strong collaborations on complete community design.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","project_id":"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","code":"","area":"Storytelling"},{"text":"Risk - need to sustain talent that are associated with this project as it is fundamental to the ongoing development of a fundamental area of research.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"To advance this project through the Imaginaries and Intelligences phases would require the assistance of a technical mentor/advisor/developer.","type":"recommendation","polarity":"neutral","reviewer":"Hemi","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Other: Imaginaries: deepen with case study of how she is consulting with her community to help other communities imagine similar engagements.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"There needs to be a strategy to not only imagine Indigenous-led and IKS AI systems but to partner with AI researchers to prototype these.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"As noted above the project would benefit greatly by aligning the artistic/ creative component with a technical mentor/advisor/developer.","type":"recommendation","polarity":"neutral","reviewer":"Hemi","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Risk: cannot only be a technical project with strong demonstration of community co-design, needs to have clear value in the community.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Laurie Lloyd Jones","project_id":"Laurie Lloyd Jones - CfP02-04","code":"CfP02-04","area":"Storytelling"},{"text":"There are a set of performance and voice artists in AbInt who would benefit from collaboration with the researcher and the toolset.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"This is a good example of the type of pivot that was required following the discontinuation of funding in the larger soils project.","type":"recommendation","polarity":"neutral","reviewer":"Hemi","project":"Abundant Soils - Mele Moniz","project_id":"Abundant Soils - Mele Moniz","code":"","area":"Env Stewardship"},{"text":"Next stages need to articulate why use AI, for what purposes, and then how a system respecting data sovereignty would be built.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"Culturally ambitious as well--will they get the community engagement they need to ensure this is community-grounded?","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Suzanne Kite","project_id":"Suzanne Kite - CfP01-09","code":"CfP01-09","area":"Other"},{"text":"If it is integrated into AbInt we should find ways that this project could connect with the Pit Fire AI/ML Project.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Copper Bowls: Gift-Giving and AI - Ostoro Petahtegoose","project_id":"Copper Bowls: Gift-Giving and AI - Ostoro Petahtegoose","code":"","area":"Storytelling"},{"text":"RAD offers a strong partnership that could and should be empowered through this research project and process.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"Needs to have continuation with clear application goals beyond the technical, or well managed exit strategy.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Laurie Lloyd Jones","project_id":"Laurie Lloyd Jones - CfP02-04","code":"CfP02-04","area":"Storytelling"},{"text":"This project would benefit greatly from further development in the Imaginaries and Intelligences Phases.","type":"recommendation","polarity":"neutral","reviewer":"Hemi","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Imaginaries: deepen its questioning of the kind of data we can use in these systems, and to what effect.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Suzanne Kite","project_id":"Suzanne Kite - CfP01-09","code":"CfP01-09","area":"Other"},{"text":"Should connect with other sensor/performance art projects, especially TouchDesigner based projects.","type":"recommendation","polarity":"neutral","reviewer":"Suzanne","project":"AI Drum -  Jackson Twobears","project_id":"AI Drum -  Jackson Twobears","code":"","area":"Multi-Agent Systems"},{"text":"It would need to be part of a focused AI/AR/VR stream which I think would benefit the next stage.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Laurie Lloyd Jones","project_id":"Laurie Lloyd Jones - CfP02-04","code":"CfP02-04","area":"Storytelling"},{"text":"Risk - need to document computational methods as well as the creative and philosophical outputs.","type":"recommendation","polarity":"neutral","reviewer":"Sara","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"TASK: Ashley need to send us a TOC, and an update on where she is on the publication timeline.","type":"recommendation","polarity":"neutral","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"tex ons of the Blackfoot language.","type":"action","polarity":"neutral","reviewer":"Sara","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"If we can combine various initiatives into a Language Methodology blob, which will define methodologies for doing the post-tech work properly...","type":"action","polarity":"neutral","reviewer":"Jason","project":"Fenwick McKelvey","project_id":"Fenwick McKelvey - CfP04","code":"CfP04","area":"Language"},{"text":"As the project considers future AI language tools, maintaining strong community control over data and decision-making will remain important.","type":"action","polarity":"neutral","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"1) Work with embodied data and datasets which Kite is engaged with, Peter Morin and Archer Pechawis and SJ Okemow (and others) T'karonto.","type":"action","polarity":"neutral","reviewer":"Sara","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"For impact goals it includes networks as Shak is engaged with the AI Tech network, and with urban planning and Indigenous urban networks.","type":"action","polarity":"neutral","reviewer":"Sara","project":"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","project_id":"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","code":"","area":"Storytelling"},{"text":"There has been multiple conversations with a wide range of stakeholders, technical and archival experts over the past few months.","type":"action","polarity":"neutral","reviewer":"Hemi","project":"Digital Archive Project with Rick Hill - Jackson Twobears","project_id":"Digital Archive Project with Rick Hill - Jackson Twobears","code":"","area":"Storytelling"},{"text":"Strengthen collaboration with projects in Hawaii pod - there is already a
