\u00e1rez","code":"","area":"Storytelling"}],"observations":[{"text":"Huk addresses this transformation goal, \"the Partnership shifts AI from extractive models imposed on Indigenous communities towards relational and accountable approaches co-developed with those communities\" in the context of an international collaboration between MILA researchers and El Martadero, a 3 000 m\u00b2 community lab in Cochabamba at the mARTadero, a cultural and tech hub in Cochabamba that offers a hacklab, dance collectives, and \"a myriad of artists\".","type":"observation","polarity":"positive","reviewer":"Sara","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"AI developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies, infrastructure...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities..","type":"observation","polarity":"positive","reviewer":"Jason","project":"Hawaiian Language Physical Reasoning Dataset - Cade Kane","project_id":"Hawaiian Language Physical Reasoning Dataset - Cade Kane","code":"","area":"Language"},{"text":"Although there is not a lot of evidence of formal data sovereignty processes or core AI system development, there is a strong emphasis on protocol and relational approaches to AI, advancing relational/educational approaches to AI, co-creating programs (artist fellowship, workshops) and building reusable processes (cookbook), while also cultivating student/community capacity.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"infrastructure, policy engagement, and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities, Canada","type":"observation","polarity":"positive","reviewer":"Jason","project":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","project_id":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","code":"","area":"Multi-Agent Systems"},{"text":"Having a leading Indigenous thought leaders and scholars is a great strength and we would all benefit from sharing time with leaders such as Leroy and learning from from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"The risk with not pursuing this project lies in the opportunities and benefits that are gained from working closely with and drawing from Leroy Little Bear\u2019s teachings and knowledge to ensure that our work is grounded in Indigenous methodologies, community-informed practices, and the co-creation of a sovereign digital space","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"transforming how artificial intelligence is conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Suzanne Kite","project_id":"Suzanne Kite - CfP01-09","code":"CfP01-09","area":"Other"},{"text":"Its emphasis on collaboration with community partners, development of culturally grounded curriculum materials, and experimentation with technology as a supportive rather than dominant framework aligns with the program\u2019s goal of shifting AI research toward relational, ethical, and locally defined practices.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"The project is well positioned to advance into the Imaginaries phase by further developing its dialogue-based and land-based methodologies as frameworks for imagining Indigenous-centred approaches to AI, particularly through language, storytelling, and relational understandings of knowledge and memory.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement by demonstrating how Indigenous knowledge systems, particularly Blackfoot metaphysics and teachings, can inform the creation of sovereign digital environments that challenge Western assumptions about space, time, and intelligence.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Its focus on relational methodologies and Elder-guided processes also positions it well to contribute to network-wide conversations about ethics, data sovereignty, and Indigenous-centred design, making it a useful hub for collaboration as other projects move further into technical development.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Through experiments with adapting LLMs and SLMs, developing community-guided data practices, and embedding storytelling, ceremony, and collective decision-making into technical workflows, the project shifts AI development away from extractive models toward reciprocal, community-led approaches.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"The strong mentorship structure and focus on learning also make this a good candidate for collaboration through workshops, shared development sessions, or student exchanges, which could help expand the work beyond its current scope while contributing to broader network capacity building.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"The project fits naturally within the Imaginaries phase through its speculative exploration of symbolic language, dreaming, and human\u2013AI interaction, and could contribute to that phase by further developing its conceptual and methodological framework for culturally grounded AI design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"Its combination of technical prototyping, governance design, and capacity building through workshops, student leadership, and partnerships supports AbInt\u2019s goal of transforming AI by aligning computation with Indigenous knowledge systems, sovereignty, and shared responsibility.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"The risk of not pursuing the project would be the loss of a strong example of Indigenous-centred digital environment design, which contributes to AbInt\u2019s goals by expanding how virtual space, storytelling, and relational worldviews can shape future AI and interactive systems.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"The risk of not pursuing the project would be significant, as it supports the relational and community-driven foundations necessary for Indigenous-centred AI, while also building capacity through residencies, mentorship, and shared learning across the AbInt network.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"The project has strong potential to advance into the Imaginaries phase through further development of its conceptual framework around Indigenous metaphysics, relational space, and alternative understandings of time, energy, and environment within digital worlds.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"Through the development of an interactive Unity-based world, the work explores alternative ways of understanding relationality, energy, and place within digital media, while grounding the process in mentorship, community learning, and POD-based practices.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"The network would greatly benefit from working closer with this Pod and learning from their culturally grounded Indigenous methodologies, community-informed practices, and how they are building towards the creation of a sovereign digital space","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"It could serve as a point of dialogue with projects focused on Indigenous data sovereignty, relational methodologies, and community-led infrastructure, especially where there is interest in language, pedagogy, or small-data approaches.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"The work demonstrates capacity building, student training, and public knowledge mobilization through exhibition and artist talks, and shows an effort to situate AI development within community relationships and storytelling practices.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"The HIFI Lab project demonstrates strong alignment with AbInt's Transformation statement and strategic direction through its grounding in cultural protocols, Indigenous-centred and community-led imaginaries and educational engagement.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"By supporting artist residencies, community conversations, and the creation of digital and performative works, the project shifts AI inquiry away from purely technical development toward culturally grounded, community-led processes.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"There is very strong potential for collaboration with other projects across the AbInt network, particularly those working with language models, community data governance, virtual environments, and Indigenous-centred AI design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"This project contributes to AbInt\u2019s Transformation Statement through its focus on community-led language work, collaborative curriculum development, and attention to data sovereignty in the context of language revitalization.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"Its emphasis on collaboration with Lakota knowledge holders and on grounding technical work in community interpretation reflects the program\u2019s goal of shifting AI research toward relational and culturally informed approaches.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"At this stage the HIFI Lab project is at its foundational stages and is well positioned as a culturally grounded, capacity-building initiative that advances relational approaches to AI within its community context in Hawai'i.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Brian Kuwada","project_id":"Brian Kuwada - CfP01-02","code":"CfP01-02","area":"Storytelling"},{"text":"There is strong potential for collaboration with other projects in the AbInt network, particularly those working with virtual environments, storytelling, language, and Indigenous-centred approaches to digital and AI systems.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"There is strong potential for collaboration with other projects across the AbInt network, particularly those working with language revitalization, digital storytelling, community-based AI, and Indigenous data governance.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"This research is well positioned to advance into the Imaginaries phase by further developing its governance frameworks, storytelling logics, and treaty-based ethics as foundations for alternative approaches to AI design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"Although not evident in the project description provided the project \"shifts AI from extractive models imposed on Indigenous communities towards relational and accountable approaches co-developed with those communities\".","type":"observation","polarity":"positive","reviewer":"Sara","project":"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","project_id":"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","code":"","area":"Storytelling"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement by actively reworking AI systems through Indigenous governance, methodologies, and relational ethics grounded in the Dish With One Spoon covenant.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"This project contributes strongly to AbInt\u2019s Transformation Statement through its relational, Indigenous-centred approach to AI research grounded in Blackfoot knowledge, Elder guidance, and land-based dialogue.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Risk appears relatively low, as the project is exploratory and limited in scope, with most activities focused on mentorship, learning, and early-stage development rather than complex AI deployment.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Risk appears relatively low, as the project focuses primarily on curriculum development, collaboration with language teachers, and exploratory planning rather than complex technical implementation.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"The work demonstrates a relational approach to knowledge creation, with teachers and community members directly shaping the learning materials and guiding how language data are generated and used.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"This project has strong potential to connect with other AbInt projects exploring embodied interaction, performance, and alternative forms of data such as movement, sound, and sensor-based systems.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","project_id":"Eilif Muller, Mila Quebec AI Institute - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"There is evidence demonstrating the development of an Indigenous\u2011centred direction and capacity building via mentorship and community\u2011facing dissemination through an exhibition and artist visits.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Through the co-creation of methodologies, infrastructure, policy engagement, and Indigenous-centred AI systems; towards relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"It touches on multiple points in the transformation statement and includes close collaboration with communities - \"relational and accountable approaches co-developed with those communities\".","type":"observation","polarity":"positive","reviewer":"Sara","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"The Digital preservation of Rick Hill's archive of Haudenosaunee cultural knowledge project demonstrates strong alignment with AbInt's Transformation statement and strategic direction.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Digital Archive Project with Rick Hill - Jackson Twobears","project_id":"Digital Archive Project with Rick Hill - Jackson Twobears","code":"","area":"Storytelling"},{"text":"As the project develops its planned AI components, it could connect with other PODs exploring language models, community-based data practices, or culturally grounded interface design.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Darby Herman","project_id":"Darby Herman - CfP02-11","code":"CfP02-11","area":"Storytelling"},{"text":"Risk appears relatively low, as the project is grounded in research-creation, dialogue, and community-led processes rather than high-risk technical deployment.","type":"observation","polarity":"positive","reviewer":"Jackson","project":"Jackie Rice","project_id":"Jackie Rice - CfP01-07","code":"CfP01-07","area":"Language"},{"text":"Alignment with an Indigenous\u2011centred, relational AI paradigm is clearly articulated; concrete AI tooling is early\u2011stage with limited technical detail reported.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"This project has strong potential to connect with other AbInt projects focused on infrastructure, Indigenous data sovereignty, and land-based methodologies.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"I agree with the assessment that there is clear articulation of \" an Indigenous\u2011centred, relational AI paradigm\", but there is little technical design.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Eliane Ubalijoro","project_id":"Eliane Ubalijoro - CfP01-03","code":"CfP01-03","area":"Env Stewardship"},{"text":"It integrates data sovereignty via on\u2011device design, and prototypes multi\u2011agent systems oriented toward relational, culturally sensitive AI practice.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"It has potential to cultivate ground breaking factual AI systems grounded in care, abundance, and cultural relevance for Indigenous communities.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Abundant Soils - Mele Moniz","project_id":"Abundant Soils - Mele Moniz","code":"","area":"Env Stewardship"},{"text":"methodologies, infrastructure, and Indigenous-centred AI systems, trelational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Suzanne Kite","project_id":"Suzanne Kite - CfP01-09","code":"CfP01-09","area":"Other"},{"text":"The Hiringa Te Mahara (DEEP KIN) project demonstrates strong alignment with AbInt's Transformation statement and strategic direction.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Hiringa Te Mahara (DEEP KIN) research platform - Kevin Shedlock","project_id":"Hiringa Te Mahara (DEEP KIN) research platform - Kevin Shedlock","code":"","area":"Multi-Agent Systems"},{"text":"Co-creation of methodologies policy engagement towards relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Fenwick McKelvey","project_id":"Fenwick McKelvey - CfP04","code":"CfP04","area":"Language"},{"text":"data sovereignty and land- relational learning, the project seeks to enhance adaptation of Blackfoot Indigenous knowledge.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"It aligns with Transformation goals of centering Indigenous knowledge systems, and relational and accountable approaches.","type":"observation","polarity":"positive","reviewer":"Sara","project":"Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow","project_id":"Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow","code":"","area":"Storytelling"},{"text":"Strong alignment with storytelling, systems design, and Indigenous computation work.","type":"observation","polarity":"positive","reviewer":"Suzanne","project":"Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","project_id":"Mythos: I turned JSON into a Ceremony and all I got was this Decolonized Operating System: Story-Code as Anti-Colonial Infrastructure - Maya Chacaby","code":"","area":"Storytelling"},{"text":"towards relational and accountable approaches co-developed with those communities.","type":"observation","polarity":"positive","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"},{"text":"relational and accountable approaches co-developed with those communities...","type":"observation","polarity":"positive","reviewer":"Jason","project":"Mohawk LLM - Jackson Twobears","project_id":"Mohawk LLM - Jackson Twobears","code":"","area":"Language"},{"text":"They have also a well documented capacity building and community co\u2011design.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Sara Diamond and Archer Pechawis","project_id":"Sara Diamond & Archer Pechawis - CfP01-08","code":"CfP01-08","area":"Storytelling"},{"text":"Strong potential to share and collaborate with the AbInt Network.","type":"observation","polarity":"positive","reviewer":"Hemi","project":"Melanie Cheung","project_id":"Melanie Cheung - CfP01-06","code":"CfP01-06","area":"Socio-Neuro AI"},{"text":"Although the project does not focus on core AI model development, it advances the transformation goals by building Indigenous-centred approaches to virtual space, storytelling, and digital world-making that can inform future AI and interactive system design within the network.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"While the work itself seems thoughtful and well situated in its specific context, the proposal does not clearly indicate how it would move forward in a meaningful way, or what new directions, outcomes, or research questions would emerge through this next phase.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"A risk is that the project remains primarily focused on curriculum development without clearly extending into technical, infrastructural, or network-level outcomes, which could limit its relevance to AbInt\u2019s broader goals around AI and shared research methods.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"One risk is that the project relies on highly experimental methods combining neuroscience, symbolic analysis, and AI, which may make outcomes difficult to realize within the project timeframe or limit their usefulness to the wider network.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","project_id":"Antoine Bellemare-Pepin - CfP04","code":"CfP04","area":"Socio-Neuro AI"},{"text":"In this case, the project seems to have been led primarily by a single non-Indigenous member, and it may have been stronger if the work had been co-led with an Indigenous POD member rather than centered on one individual.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"Risk appears relatively low, as the project is primarily focused on creative development, learning, and community-informed digital world-building rather than high-risk technical or data-driven AI systems.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Kaiya Healy","project_id":"Kaiya Healy - CfP02-10","code":"CfP02-10","area":"Storytelling"},{"text":"The project references Indigenous knowledge systems and data sovereignty, but does not demonstrate meaningful co-creation with Indigenous communities or implementation of Indigenous-led methodologies.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"This project shows a limited contribution to the Transformation Statement, as it centers collaboration and community engagement but does not substantially reshape how AI is developed or governed.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"Risk: That it stays at the data gathering stage and does not evolve into an engagement with AI research in adoption and systems development.","type":"observation","polarity":"concern","reviewer":"Sara","project":"Christine Clark","project_id":"Christine Clark - CfP04","code":"CfP04","area":"Language"},{"text":"I do not see strong potential for this project to advance into the Imaginaries or Intelligences phases in its current form.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Shankhalika Srikanth","project_id":"Shankhalika Srikanth - CfP02-16","code":"CfP02-16","area":"Language"},{"text":"In its current form, this project does not demonstrate advancement into either the Imaginaries or Intelligences phases.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"No significant risks identified at this stage given the limited scope and exploratory nature of the work.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Maurice Jones","project_id":"Maurice Jones - CfP01-06","code":"CfP01-06","area":"Multi-Agent Systems"},{"text":"This project is challenging, because so much of what was reported is not tied to the CfP project.","type":"observation","polarity":"concern","reviewer":"Jason","project":"Ashley Cordes","project_id":"Ashley Cordes - CfP01-01","code":"CfP01-01","area":"Env Stewardship"},{"text":"I am not entirely certain how this aligns with the AbINT Transformations statement.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"This is an extremely important but highly experimental project.","type":"observation","polarity":"concern","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","project_id":"Keolu Fox, University of California San Diego","code":"","area":"Env Stewardship"},{"text":"I do not see a strong potential for advancement here.","type":"observation","polarity":"concern","reviewer":"Jackson","project":"Michelle Sylvestre","project_id":"Michelle Sylvestre - CfP02-13","code":"CfP02-13","area":"Storytelling"},{"text":"Hard to asses since so late getting started.","type":"observation","polarity":"concern","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","project_id":"Ma'ema'eolehua Matsumoto - CfP02-05","code":"CfP02-05","area":"Language"}]},"network_actions":[{"text":"For the Indigenous Methodologies book portion of their research, \"The next phase of the project will largely focus on the digital component of the book, making a compelling and useful resource and methods toolbox repository for Indigenous AI scholars and practitioners.\" It is my recommendation that we have an website building intensive for all our related projects, and focus a lot of our RA power over a month period to getting websites up for all these amazing projects, especially one like this.","reviewer":"Suzanne","project":"Ashley Cordes","code":"CfP01-01","polarity":"neutral"},{"text":"infrastructure, policy engagement, and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities, Canada Imaginaries: need whole series of FIIAI projects that take a Sovereign Stack as their starting point, and imagine out from there.","reviewer":"Jason","project":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","code":"","polarity":"positive"},{"text":"Huk addresses this transformation goal, \"the Partnership shifts AI from extractive models imposed on Indigenous communities towards relational and accountable approaches co-developed with those communities\" in the context of an international collaboration between MILA researchers and El Martadero, a 3 000 m\u00b2 community lab in Cochabamba at the mARTadero, a cultural and tech hub in Cochabamba that offers a hacklab, dance collectives, and \"a myriad of artists\".","reviewer":"Sara","project":"Eilif Muller, Mila Quebec AI Institute","code":"CfP04","polarity":"positive"},{"text":"AI developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies, infrastructure...relational and accountable approaches co-developed with those communities...builds lasting capacity among researchers, learners, and communities to shape AI futures that are ethical, culturally grounded, and responsive to the needs of Indigenous communities..","reviewer":"Jason","project":"Hawaiian Language Physical Reasoning Dataset - Cade Kane","code":"","polarity":"positive"},{"text":"How can this project connect with other environmental projects and how can some of the tool and AI development be shared, \"environmental DNA sampling strategies, as well as lab experience working with geoarchaeological methods like sediment core sampling and XRF analysis, and biological methods including metagenomic analysis and the development of biocomputing skills\".","reviewer":"Sara","project":"Keolu Fox, University of California San Diego","code":"","polarity":"neutral"},{"text":"Strong focus on data sovereignty (keeping data in Aotearoa; community control of models), as summary states, \"moves practice away from third\u2011party/extractive pipelines, co\u2011creates VR/NeRF reconstructions informed by interviews and ongoing marae engagement\", undertakes a shift to \"local processing\" and documents student leadership growth.","reviewer":"Sara","project":"Laurie Lloyd Jones","code":"CfP02-04","polarity":"neutral"},{"text":"To advance into the Intelligences phase, the work would likely need to move beyond curriculum development toward more clearly defined technical experimentation, such as prototyping language-learning tools, working with small language models, or collaborating with other projects building shared infrastructure for language data.","reviewer":"Jackson","project":"Christine Clark","code":"CfP04","polarity":"neutral"},{"text":"transforming how artificial intelligence is conceived, developed, and governed by centring Indigenous knowledge systems, community-defined priorities, and principles of data sovereignty...methodologies and Indigenous-centred AI systems...relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Suzanne Kite","code":"CfP01-09","polarity":"positive"},{"text":"At the same time, the project\u2019s primary contribution is at the level of experimental methodology and speculative design rather than shared infrastructure or broadly reusable tools, so its transformative impact would depend on how its methods and results are documented and made accessible to the wider network.","reviewer":"Jackson","project":"Antoine Bellemare-Pepin","code":"CfP04","polarity":"neutral"},{"text":"The project also aligns well with network activities focused on relational AI, digital territories, and culturally grounded interface design, and could benefit from further collaboration through shared builds, workshops, and cross-POD development sessions that expand the work beyond its original context.","reviewer":"Jackson","project":"Kaiya Healy","code":"CfP02-10","polarity":"positive"},{"text":"In the Intelligences phase, this would likely require moving beyond curriculum development toward more clearly defined technical experiments, such as prototyping language-learning tools, working with small language models, or collaborating with other projects that are building shared infrastructure.","reviewer":"Jackson","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"neutral"},{"text":"The project\u2019s work on LLM guardrails, SLM repositories, and Dish With One Spoon governance protocols could provide shared frameworks that other PODs adapt to their own contexts, while its workshop and \u201ctinker time\u201d model offers a format for cross-POD experimentation.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"neutral"},{"text":"There is potential for this project to connect with other AbInt projects working on language revitalization, small language models, data governance, and community-based AI infrastructure, particularly where pedagogical materials could inform future tool development.","reviewer":"Jackson","project":"Christine Clark","code":"CfP04","polarity":"neutral"},{"text":"This could be mitigated by more explicitly linking the pedagogical work to future language technologies, tool development, or collaboration with projects building data or compute infrastructure, and by documenting processes so they can be reused across the network.","reviewer":"Jackson","project":"Christine Clark","code":"CfP04","polarity":"neutral"},{"text":"Collaboration could deepen through shared workshops or co-developed case studies, especially with teams working on low-power or localized AI systems, where bio-circular design principles can be tested in parallel at smaller scales within our current network.","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","code":"","polarity":"neutral"},{"text":"This is one of the most connected projects because of the depth of its engagement through chapters, we should invite each chapter to present on their writing at a filmed, interview each chapter writer for a video, and host a celebration of its launch.","reviewer":"Suzanne","project":"Ashley Cordes","code":"CfP01-01","polarity":"neutral"},{"text":"The project\u2019s dialogue-based and residency-driven structure creates opportunities to connect with other PODs through shared workshops, student exchanges, and collaborative development of language tools, digital environments, or governance frameworks.","reviewer":"Jackson","project":"Jackie Rice","code":"CfP01-07","polarity":"neutral"},{"text":"Centres indigenous methodologies and governance in their Dish With One Spoon work, adapts and experiments with Indigenous\u2011led AI systems in JSON guardrails and SLMs, and have developed a shareable method/tools that could be used across the network.","reviewer":"Hemi","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"neutral"},{"text":"This is application based AI research and it would be good to test the application across the network - in particular Pechawis consistently updates his work with responsible wearables - could this be an opportunity to work with his Cree repertoire.","reviewer":"Sara","project":"AI Drum -  Jackson Twobears","code":"","polarity":"neutral"},{"text":"It could also connect with projects developing language tools, local AI systems, or community archives, helping to build more coordinated approaches to Indigenous data sovereignty, infrastructure, and ethical AI development across the network.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"neutral"},{"text":"Although not evident in the project description provided the project \"shifts AI from extractive models imposed on Indigenous communities towards relational and accountable approaches co-developed with those communities\".","reviewer":"Sara","project":"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert","code":"","polarity":"positive"},{"text":"However, the goal of \"new lexical orientation to describe AI related technologies\" fits squarely into work across the network the sees language as the gateway to Indigenous centric forms of intelligence and computation.","reviewer":"Sara","project":"Brian Kuwada","code":"CfP01-02","polarity":"neutral"},{"text":"The main risk is that the project remains at the level of exploratory research without producing documented activities or deliverables, making it difficult to assess impact or share outcomes across the network.","reviewer":"Suzanne","project":"Michelle Sylvestre","code":"CfP02-13","polarity":"neutral"},{"text":"I think all the Hawaiian language projects could be brought together, and a consortium made with the other language projects (Maori, Niitsitapi, maybe Haudenosaunee) Usual risk regarding community alignment.","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","code":"CfP02-05","polarity":"neutral"},{"text":"Through the co-creation of methodologies, infrastructure, policy engagement, and Indigenous-centred AI systems; towards relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Jackie Rice","code":"CfP01-07","polarity":"positive"},{"text":"It touches on multiple points in the transformation statement and includes close collaboration with communities - \"relational and accountable approaches co-developed with those communities\".","reviewer":"Sara","project":"Keolu Fox, University of California San Diego","code":"","polarity":"positive"},{"text":"This project has potential to connect with other AbInt work as a way to more clearly understand and assess FLAIR\u2019s current research methods, assumptions, and community engagement practices.","reviewer":"Suzanne","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"neutral"},{"text":"The work already proposes new conceptual models\u2014such as Dish With One Spoon as a protocol for data sharing and reciprocity\u2014that could be expanded into shared frameworks across the network.","reviewer":"Jackson","project":"Sara Diamond and Archer Pechawis","code":"CfP01-08","polarity":"neutral"},{"text":"As the project develops its planned AI components, it could connect with other PODs exploring language models, community-based data practices, or culturally grounded interface design.","reviewer":"Jackson","project":"Darby Herman","code":"CfP02-11","polarity":"positive"},{"text":"Workshops, shared datasets, or co-developed prototypes could support exchange across projects while helping translate its artistic system into forms that other teams can build from.","reviewer":"Suzanne","project":"Eilif Muller, Mila Quebec AI Institute","code":"CfP04","polarity":"neutral"},{"text":"This project could connect with others focused on pedagogy, storytelling, and community engagement, particularly as a workshop or performance-based approach to exploring AI.","reviewer":"Suzanne","project":"Michelle Sylvestre","code":"CfP02-13","polarity":"neutral"},{"text":"Any collaboration would need to begin with transparency and alignment on ethics, governance, and community accountability before deeper integration across the network.","reviewer":"Suzanne","project":"Shankhalika Srikanth","code":"CfP02-16","polarity":"neutral"},{"text":"This project should be part of the strategic work on local processing, sovereign stacks which is an emerging direction across AbInt and as part of a larger coalition.","reviewer":"Sara","project":"Laurie Lloyd Jones","code":"CfP02-04","polarity":"neutral"},{"text":"This project has strong potential to connect with other AbInt projects focused on infrastructure, Indigenous data sovereignty, and land-based methodologies.","reviewer":"Suzanne","project":"Keolu Fox, University of California San Diego","code":"","polarity":"positive"},{"text":"I have in other places suggested we pull together a research stream on embodied data as this is music based, language based and physical interaction based.","reviewer":"Sara","project":"AI Drum -  Jackson Twobears","code":"","polarity":"neutral"},{"text":"methodologies, infrastructure, and Indigenous-centred AI systems, trelational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Suzanne Kite","code":"CfP01-09","polarity":"positive"},{"text":"Co-creation of methodologies policy engagement towards relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Fenwick McKelvey","code":"CfP04","polarity":"positive"},{"text":"Every Pod who has community momentum behind the Sovereign Stack idea; any project that needs a safe place to prototype.","reviewer":"Jason","project":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","code":"","polarity":"neutral"},{"text":"It also relates to Peter Morin's intensive practices with dreaming from a Tahltan language and world view.","reviewer":"Sara","project":"Antoine Bellemare-Pepin","code":"CfP04","polarity":"neutral"},{"text":"Should connect with other sensor/performance art projects, especially TouchDesigner based projects.","reviewer":"Suzanne","project":"AI Drum -  Jackson Twobears","code":"","polarity":"neutral"},{"text":"It would need to be part of a focused AI/AR/VR stream which I think would benefit the next stage.","reviewer":"Sara","project":"Laurie Lloyd Jones","code":"CfP02-04","polarity":"neutral"},{"text":"This could be in collaboration with other story focused researchers across the network.","reviewer":"Sara","project":"Brian Kuwada","code":"CfP01-02","polarity":"neutral"},{"text":"towards relational and accountable approaches co-developed with those communities.","reviewer":"Jason","project":"Ma'ema'eolehua Matsumoto","code":"CfP02-05","polarity":"positive"},{"text":"All Pods should be sent copies, and encourage local discussion sessions about it.","reviewer":"Jason","project":"Ashley Cordes","code":"CfP01-01","polarity":"neutral"},{"text":"Has great potential to develop out a strong work stream with Thru the Red Door.","reviewer":"Hemi","project":"Digital Archive Project with Rick Hill - Jackson Twobears","code":"","polarity":"neutral"},{"text":"relational and accountable approaches co-developed with those communities...","reviewer":"Jason","project":"Mohawk LLM - Jackson Twobears","code":"","polarity":"positive"},{"text":"This research is occurring across the network.","reviewer":"Sara","project":"Brian Kuwada","code":"CfP01-02","polarity":"neutral"},{"text":"Can we make the Sovereign Stack happen?","reviewer":"Jason","project":"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears","code":"","polarity":"neutral"}],"ts_dimensions":[{"id":"ts_ik","label":"Indigenous Knowledge Integration","desc":"IK holders, knowledge systems, and ways of knowing brought into AI"},{"id":"ts_relational","label":"Relational Practice","desc":"Relational approaches to knowledge creation and collaboration"},{"id":"ts_community","label":"Community-Centred","desc":"Community representation, community-defined priorities, community benefit"},{"id":"ts_technical","label":"Technical AI Transformation","desc":"Actively reworking AI systems, architectures, data pipelines"},{"id":"ts_governance","label":"Data Sovereignty & Governance","desc":"Data sovereignty, governance frameworks, community-controlled AI"},{"id":"ts_network","label":"Network & Cross-Project","desc":"Building the network, bridging projects, cross-community collaboration"},{"id":"ts_imaginaries","label":"Imaginaries & Speculative","desc":"Future imaginaries, speculative design, visioning for Phase 2+"}],"ts_project_scores":{"Melanie Cheung - CfP01-06":{"ts_ik":0.56,"ts_relational":0.49,"ts_community":0.671,"ts_technical":0.718,"ts_governance":0.42,"ts_network":0.62,"ts_imaginaries":0.707},"Ashley Cordes - CfP01-01":{"ts_ik":0.576,"ts_relational":0.678,"ts_community":0.823,"ts_technical":0.499,"ts_governance":0.723,"ts_network":0.704,"ts_imaginaries":0.705},"Michel nity":0.56,"ts_technical":0.7,"ts_governance":0.63,"ts_network":0.619,"ts_imaginaries":0.528},"AI Glossary of Terms: Definitions with New Zealand Examples - Petera Hudson":{"ts_ik":0.49,"ts_relational":0.42,"ts_community":0.42,"ts_technical":0.21,"ts_governance":0.28,"ts_network":0.572,"ts_imaginaries":0.595},"Abundant Soils - Mele Moniz":{"ts_ik":0.725,"ts_relational":0.657,"ts_community":0.565,"ts_technical":0.56,"ts_governance":0.42,"ts_network":0.647,"ts_imaginaries":0.674},"Data Visualizations Catalogue - Orus Mateo Casta\u00f1o-Su\u00e1rez":{"ts_ik":0.37,"ts_relational":0.323,"ts_community":0.14,"ts_technical":0.545,"ts_governance":0.14,"ts_network":0.368,"ts_imaginaries":0.394},"Blackfoot Dictionary - Leroy Little Bear":{"ts_ik":0.49,"ts_relational":0.28,"ts_community":0.28,"ts_technical":0.14,"ts_governance":0.14,"ts_network":0.14,"ts_imaginaries":0.14},"Laurie Lloyd Jones - CfP02-04":{"ts_ik":0.42,"ts_relational":0.49,"ts_community":0.728,"ts_technical":0.716,"ts_governance":0.7,"ts_network":0.35,"ts_imaginaries":0.388},"Peyak: Indigenous Augmented Reality Prototypes and Projects - Shak Gobert":{"ts_ik":0.522,"ts_relational":0.58,"ts_community":0.658,"ts_technical":0.541,"ts_governance":0.35,"ts_network":0.728,"ts_imaginaries":0.544},"Emergence, Non-Linearity, and Interconnection in 3D Generative Animation - SJ Okemow":{"ts_ik":0.615,"ts_relational":0.443,"ts_community":0.409,"ts_technical":0.448,"ts_governance":0.14,"ts_network":0.269,"ts_imaginaries":0.58},"Copper Bowls: Gift-Giving and AI - Ostoro Petahtegoose":{"ts_ik":0.49,"ts_relational":0.647,"ts_community":0.577,"ts_technical":0.14,"ts_governance":0.35,"ts_network":0.518,"ts_imaginaries":0.507},"Fenwick McKelvey - CfP04":{"ts_ik":0.572,"ts_relational":0.549,"ts_community":0.598,"ts_technical":0.173,"ts_governance":0.532,"ts_network":0.35,"ts_imaginaries":0.413},"Mohawk LLM - Jackson Twobears":{"ts_ik":0.806,"ts_relational":0.72,"ts_community":0.673,"ts_technical":0.595,"ts_governance":0.758,"ts_network":0.49,"ts_imaginaries":0.84},"AI Server on Six Nations - Preliminary Discussions - Jackson Twobears":{"ts_ik":0.711,"ts_relational":0.66,"ts_community":0.744,"ts_technical":0.665,"ts_governance":0.746,"ts_network":0.56,"ts_imaginaries":0.7},"Hawaiian Language Physical Reasoning Dataset - Cade Kane":{"ts_ik":0.567,"ts_relational":0.438,"ts_community":0.471,"ts_technical":0.41,"ts_governance":0.382,"ts_network":0.21,"ts_imaginaries":0.424}},"ts_dim_summaries":{"ts_ik":{"label":"Indigenous Knowledge Integration","signal_strength":"Strong","summary":"IK integration is the network's deepest signal \u2014 almost every project claims it, but the quality varies significantly. The Haudenosaunee Pod leads with three projects (Digital Archive, Mohawk LLM, AI Drum) where reviewers describe specific IK practices being brought into AI: Haudenosaunee cultural archives, Mohawk language systems, and drumming as embodied knowledge. The Wih\u00e1nble S'a Pod's work (Kite, Bellemare-Pepin) pushes further into IK-as-system-logic \u2014 ceremony as computation, Lakota metaphysics informing neural architectures. By contrast, several projects use IK language in their framing but reviewers note the actual integration remains aspirational.","what_reviewers_flag":"Sara questions whether some projects are genuinely Indigenous-led or using IK framing without substantive community partnership. Jason's reviews consistently use the transformation statement language verbatim, making it harder to distinguish genuine IK depth from template responses. Suzanne provides the sharpest project-specific reads \u2014 identifying where IK is structurally embedded vs. mentioned in passing.","strongest_projects":["Digital Archive Project with Rick Hill","Mohawk LLM","Mythos","Sara Diamond & Archer Pechawis","Suzanne Kite"],"gap":"Projects like Maurice Jones and Michelle Sylvestre show minimal IK engagement. The Blackfoot Dictionary \u2014 despite being explicitly about Indigenous language \u2014 received a reviewer comment of 'difficult to assess' suggesting insufficient reporting rather than absence of IK work.","phase2_question":"The network needs to distinguish between IK-as-framing and IK-as-practice. Phase 2 could require projects to document specific IK holders, protocols, and decision-making processes rather than claiming alignment in general terms.","strong_count":14,"moderate_count":15,"weak_count":7,"pod_leaders":["Haudenosaunee Pod","Wih\u00e1nble S'a Pod"]},"ts_relational":{"label":"Relational Practice","signal_strength":"Moderate","summary":"Relational practice shows up in two distinct forms across the network. The first is grounded, place-based relationship work \u2014 Jackie Rice's Blackfoot Elder guidance and land-based dialogue, Copper Bowls' Dish With One Spoon philosophy, Bobi-Rose Leatherby's marae- and w\u0101nanga-based engagement with Huntington's disease families. These are projects where the reviewer language describes specific relational protocols and accountability structures. The second form is more conceptual \u2014 projects that reference 'relational approaches' or 'reciprocity' without describing concrete relational practices.","what_reviewers_flag":"Jackson's reviews of Jackie Rice and Sara Diamond provide the strongest relational evidence \u2014 describing 'relational ethics grounded in the Dish With One Spoon covenant' and 'Elder guidance and land-based dialogue.' Hemi's review of Bobi-Rose names specific M\u0101ori relational forms: marae, w\u0101nanga, face-to-face engagement. The gap is visible when reviewers use the word 'relational' without describing what that looks like in practice.","strongest_projects":["Jackie Rice","Sara Diamond & Archer Pechawis","Bobi-Rose Leatherby","Copper Bowls","Christine Clark"],"gap":"Only about 8 projects demonstrate relational practice as a concrete methodology rather than a descriptor. The Podless projects are notably weaker here \u2014 without pod-level relational infrastructure, individual projects struggle to demonstrate relational accountability.","phase2_question":"Can the network articulate what relational practice looks like structurally \u2014 not just in principle but in documented governance, review, and accountability protocols that projects follow?","strong_count":8,"moderate_count":17,"weak_count":11,"pod_leaders":["Niitsitapi Pod","T'karonto Pod"]},"ts_community":{"label":"Community-Centred","signal_strength":"Strong","summary":"Community-centred work is the second strongest signal across the network after IK. Ashley Cordes and Bobi-Rose Leatherby score highest \u2014 reviewers describe genuine community-defined priorities, not researcher-defined agendas labelled as community work. Sara Diamond's Dish With One Spoon project demonstrates community governance embedded in the AI development process itself. Christine Clark's Niitsi'powahsin Soundscapes shows community engagement through 2,800+ hours of language recordings with community speakers. The Hiringa pod projects (Bobi-Rose, DEEP KIN, Laurie Lloyd Jones) consistently centre M\u0101ori community structures.","what_reviewers_flag":"Suzanne's review of Ashley Cordes emphasises 'groundbreaking' community-centred methodology. Hemi consistently identifies community governance structures in Aotearoa projects \u2014 marae-based engagement, iwi/hap\u016b consultation. Sara flags where community engagement is claimed but evidence is thin: 'it is not clear that the project is Indigenous-led' (used for at least two projects). Jason notes community benefit but sometimes in generic transformation-statement language.","strongest_projects":["Ashley Cordes","Bobi-Rose Leatherby","Sara Diamond & Archer Pechawis","Christine Clark","Jackie Rice","DEEP KIN"],"gap":"Data Visualizations Catalogue, Michelle Sylvestre, and Maurice Jones show minimal community-centred signal. Some technically strong projects (Pit Fire, AI Drum) are weak on community engagement \u2014 reviewer language focuses on the technical experimentation rather than community benefit.","phase2_question":"How does the network measure the difference between community involvement and community governance? Several projects involve community members but the decision-making authority isn't clearly documented.","strong_count":12,"moderate_count":16,"weak_count":8,"pod_leaders":["Niitsitapi Pod","Hiringa Te Mara"]},"ts_technical":{"label":"Technical AI Transformation","signal_strength":"Moderate","summary":"Technical AI transformation is where the network shows its widest spread. A cluster of projects are doing genuine technical work \u2014 AI Server on Six Nations (sovereign infrastructure), Sara Diamond (JSON guardrails and SLMs), Melanie Cheung (neural fuzzy system with community-built AI model), Pit Fire (ML with fire-as-intelligence). But roughly half the network has minimal technical AI output. Reviewers describe many projects in terms of cultural practice, community engagement, or conceptual framing without pointing to specific AI systems, datasets, or architectures being built or modified.","what_reviewers_flag":"Hemi's review of Melanie Cheung notes 'great progress developing their AI model \u2014 they need more compute to run more variables,' indicating real technical depth. Suzanne identifies concrete technical outputs: 'maxMSP patch,' 'self-training systems,' 'JSON guardrails.' Sara flags the gap directly in multiple reviews \u2014 projects that engage the transformation statement's language but haven't produced technical outputs. The Haudenosaunee Pod has the most concentrated technical activity (AI Server, Mohawk LLM, AI Drum, Pit Fire).","strongest_projects":["AI Server on Six Nations","Sara Diamond & Archer Pechawis","Melanie Cheung","Pit Fire AI/ML Project","Suzanne Kite","Antoine Bellemare-Pepin"],"gap":"15 projects score below 0.5 on technical transformation. Michelle Sylvestre, Sacred Code, Ma'ema'eolehua Matsumoto, and Maurice Jones have essentially no technical AI output visible to reviewers. This is the dimension where the network's 'emerging' status is most visible \u2014 many projects are still in conceptual or community-engagement phases rather than building AI systems.","phase2_question":"The network needs to decide whether all projects should be expected to produce technical AI outputs, or whether some projects legitimately contribute through methodology, governance, and community infrastructure that technical projects build on. If the latter, how does Phase 2 structure that interdependence?","strong_count":8,"moderate_count":13,"weak_count":15,"pod_leaders":["Haudenosaunee Pod","Wih\u00e1nble S'a Pod"]},"ts_governance":{"label":"Data Sovereignty & Governance","signal_strength":"Strong","summary":"Governance shows the clearest institutional signal in the network. Sara Diamond's project leads with governance frameworks explicitly embedded in AI development through the Dish With One Spoon covenant. The Haudenosaunee Pod demonstrates sovereignty-in-action: AI Server on Six Nations is building physically sovereign infrastructure, Mohawk LLM centres language sovereignty, and the Digital Archive establishes governance over Haudenosaunee cultural records. The Hiringa pod contributes strongly through M\u0101ori data sovereignty frameworks \u2014 Bobi-Rose Leatherby and DEEP KIN both have explicit tikanga-based governance protocols. Laurie Lloyd Jones' project specifically keeps data in Aotearoa with community-controlled models.","what_reviewers_flag":"Hemi provides the most specific governance reads \u2014 naming marae-based engagement, iwi/hap\u016b structures, and tikanga protocols in Aotearoa projects. Sara identifies governance gaps bluntly: 'it is not clear that the project has established data governance protocols.' Jackson's reviews name the Dish With One Spoon covenant as a living governance framework. Suzanne flags projects where governance is mentioned but not structurally implemented.","strongest_projects":["Sara Diamond & Archer Pechawis","AI Server on Six Nations","Bobi-Rose Leatherby","DEEP KIN","Mohawk LLM","Digital Archive","Laurie Lloyd Jones"],"gap":"Emergence/Non-Linearity, Maurice Jones, and Michelle Sylvestre have almost no governance signal. Some Storytelling-area projects treat data as creative material without addressing sovereignty implications. The Podless projects are notably weaker on governance \u2014 without pod-level governance infrastructure, individual projects default to institutional ethics boards rather than community-controlled frameworks.","phase2_question":"The network has 7 projects with strong governance frameworks \u2014 can these become templates or reference models for the 15+ projects that don't yet have explicit governance? The Dish With One Spoon and tikanga-based models are the most developed; are they transferable across cultural contexts?","strong_count":10,"moderate_count":14,"weak_count":12,"pod_leaders":["Haudenosaunee Pod","Hiringa Te Mara","T'karonto Pod"]},"ts_network":{"label":"Network & Cross-Project","signal_strength":"Moderate","summary":"Network connectivity is concentrated in a few highly connected projects rather than distributed across the network. Sara Diamond's project is the most cited for cross-project potential \u2014 reviewers describe shareable methods, SLM tools that could be used across the network, and explicit collaboration pathways. Peyak (Shankhalika Srikanth) is described by Sara as 'strongly networked.' Ashley Cordes' book project is positioned as a network-level resource. AI Drum and Abundant Soils are mentioned for cross-pod connection potential. But the majority of projects operate within their pod or in isolation.","what_reviewers_flag":"Suzanne consistently identifies connection opportunities: 'should connect with other sensor/performance art projects,' 'could connect with projects on environmental sensing.' Sara identifies structural network roles: Ashley Cordes as 'most connected project.' Hemi describes the AI Glossary as a network-wide resource being developed with blog and sharing mechanisms. But many reviews discuss collaboration as potential rather than existing practice.","strongest_projects":["Sara Diamond & Archer Pechawis","Ashley Cordes","AI Server on Six Nations","Peyak","AI Drum","Abundant Soils"],"gap":"Blackfoot Dictionary, Maurice Jones, and Michelle Sylvestre have almost no network signal. The 'Podless' projects \u2014 which might benefit most from network connections \u2014 are actually the least connected according to reviewer assessments. Cross-pod collaboration is mostly aspirational; reviewers describe it as something that 'should' or 'could' happen rather than something that is happening.","phase2_question":"The network has identified potential connections but hasn't yet built the infrastructure for them. Phase 2 needs to decide: does it fund network-building activities directly (consortium models, shared workshops, cross-pod residencies), or does it rely on organic connections between projects?","strong_count":6,"moderate_count":18,"weak_count":12,"pod_leaders":["T'karonto Pod","Haudenosaunee Pod"]},"ts_imaginaries":{"label":"Imaginaries & Speculative","signal_strength":"Moderate","summary":"The Imaginaries dimension reveals a fascinating split. A cluster of projects are genuinely speculative \u2014 Mythos (ceremony as system logic), Suzanne Kite (Lakota metaphysics informing AI dreaming), Mohawk LLM (sovereign language AI as future vision), Antoine Bellemare-Pepin (neuroscience + Indigenous symbolic language), Brian Kuwada (HIFI Lab convening artists to imagine Indigenous-driven AI). These projects aren't just building for Phase 2 \u2014 they're articulating what Indigenous AI could become. But the majority of projects reference 'future phases' or 'next steps' without genuine speculative work.","what_reviewers_flag":"Suzanne provides the strongest imaginaries reads \u2014 identifying where projects genuinely reimagine AI ('reframes computation through Indigenous story var AI_DOMAIN_LIST = [
  {id:'applied',   label:'Applied Systems',        color:'#60a5fa'},
  {id:'data',      label:'Data Systems',            color:'#4ade80'},
  {id:'model',     label:'Model Architecture',      color:'#f59e0b'},
  {id:'symbolic',  label:'Symbolic / Hybrid',       color:'#a78bfa'},
  {id:'rl',        label:'Reinforcement Learning',  color:'#f87171'},
  {id:'unknown',   label:'Not Yet Specified',       color:'#475569'},
];
function aiDomainId(raw) {
  var s = (raw || '').split(',')[0].trim().toLowerCase();
  if (s.indexOf('applied')       > -1) return 'applied';
  if (s.indexOf('data')          > -1) return 'data';
  if (s.indexOf('model')         > -1) return 'model';
  if (s.indexOf('symbolic')      > -1) return 'symbolic';
  if (s.indexOf('reinforcement') > -1) return 'rl';
  return 'unknown';
}
function aiDomainColor(raw) {
  var id  = aiDomainId(raw);
  var dom = AI_DOMAIN_LIST.find(function(d) { return d.id === id; });
  return dom ? dom.color : '#475569';
}

// ── Display name: last name for people, short title for projects ──────────
function displayName(p) {
  var s = (p.short || '').trim();
  // "Title: subtitle..." → first 1-2 words before colon
  if (s.indexOf(':') > -1) {
    return s.split(':')[0].trim().split(' ').slice(0, 2).join(' ');
  }
  // "Project Name - Person Name" (space-dash-space = separator) → first 2 words
  if (s.indexOf(' - ') > -1) {
    return s.split(' - ')[0].trim().split(' ').slice(0, 2).join(' ');
  }
  // "Name, Institution" → last name from name segment
  if (s.indexOf(',') > -1) {
    var np = s.split(',')[0].trim().split(' ');
    return np[np.length - 1];
  }
  // "Name1 and Name2" → last names joined
  if (s.toLowerCase().indexOf(' and ') > -1) {
    return s.split(/\s+and\s+/i).map(function(n) {
      var parts = n.trim().split(' ');
      return parts[parts.length - 1];
    }).join(' & ');
  }
  // Simple person name → last word (handles hyphenated: Bellemare-Pepin)
  var parts = s.split(' ');
  return parts[parts.length - 1];
}

var ttEl = document.getElementById('tooltip');
function showTT(html, x, y) {
  if (html !== null) ttEl.innerHTML = html;
  ttEl.style.display = 'block';
  var bw = document.documentElement.clientWidth;
  var bh = document.documentElement.clientHeight;
  var tw = ttEl.offsetWidth  || 300;
  var th = ttEl.offsetHeight || 180;
  var lx = x + 14;
  var ly = y - 10;
  if (lx + tw > bw - 10) lx = x - tw - 14;
  if (ly + th > bh - 10) ly = bh - th - 10;
  ttEl.style.left = lx + 'px';
  ttEl.style.top  = ly + 'px';
}
function hideTT() { ttEl.style.display = 'none'; }

var landscapeColorMode = 'area'; // 'area' | 'domain'
function renderLandscape() {
  var el = document.getElementById('view-landscape');
  var projects = DATA.projects;

  // Compute adaptive midpoints
  var alignVals = projects.map(function(p) { return p.alignment_avg; });

  var midAlign  = (Math.min.apply(null,alignVals) + Math.max.apply(null,alignVals)) / 2;

  var W = el.clientWidth || 860;
  var H = 500;
  var margin = { top: 40, right: 180, bottom: 60, left: 55 };
  var iw = W - margin.left - margin.right;
  var ih = H - margin.top  - margin.bottom;

  var xScale = d3.scaleLinear().domain([0, Math.max.apply(null,riskVals) * 1.15 + 0.02]).range([0, iw]);
  var yScale = d3.scaleLinear().domain([Math.min.apply(null,alignVals) - 0.5, 10.5]).range([ih, 0]);

  // ── Colour-by toggle ────────────────────────────────────────────────────
  var ctrl = document.createElement('div');
  ctrl.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:#64748b';
  ctrl.innerHTML = '<span>Colour by</span>'
    + '<button id="ls-btn-area"   style="padding:3px 10px;border-radius:6px;border:1px solid #3b4a6b;background:#1c2235;color:#e2e8f0;cursor:pointer;font-size:11px">Research Area</button>'
    + '<button id="ls-btn-domain" style="padding:3px 10px;border-radius:6px;border:1px solid #3b4a6b;background:transparent;color:#64748b;cursor:pointer;font-size:11px">AI Domain</button>';
  el.appendChild(ctrl);

  function setActiveBtn(mode) {
    document.getElementById('ls-btn-area').style.background   = mode === 'area'   ? '#1c2235' : 'transparent';
    document.getElementById('ls-btn-area').style.color        = mode === 'area'   ? '#e2e8f0' : '#64748b';
    document.getElementById('ls-btn-domain').style.background = mode === 'domain' ? '#1c2235' : 'transparent';
    document.getElementById('ls-btn-domain').style.color      = mode === 'domain' ? '#e2e8f0' : '#64748b';
  }

  var svg = d3.select(el).append('svg')
    .attr('id', 'landscape-svg')
    .attr('viewBox', [0, 0, W, H].join(' '))
    .attr('preserveAspectRatio', 'xMidYMid meet');

  var g = svg.append('g').attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

  // Quadrant backgrounds
  var cx = xScale(midRisk);
  var cy = yScale(midAlign);
  var quads = [
    {x:0,    y:0,    w:cx,    h:cy,    label:'Ready to Build On',       color:'rgba(74,222,128,.04)'},
    {x:cx,   y:0,    w:iw-cx, h:cy,    label:'High Potential\u2014Address Concerns',color:'rgba(251,191,36,.04)'},
    {x:0,    y:cy,   w:cx,    h:ih-cy, label:'Monitor Closely',         color:'rgba(129,140,248,.03)'},
    {x:cx,   y:cy,   w:iw-cx, h:ih-cy, label:'Significant Concerns',    color:'rgba(248,113,113,.04)'},
  ];
  quads.forEach(function(q) {
    g.append('rect').attr('x',q.x).attr('y',q.y).attr('width',q.w).attr('height',q.h)
      .attr('fill',q.color);
    g.append('text').attr('class','quadrant-label')
      .attr('x', q.x + q.w/2).attr('y', q.y + q.h/2)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .text(q.label);
  });

  // Divider lines
  g.append('line').attr('x1',cx).attr('x2',cx).attr('y1',0).attr('y2',ih)
    .attr('stroke','rgba(255,255,255,.08)').attr('stroke-dasharray','4,4');
  g.append('line').attr('x1',0).attr('x2',iw).attr('y1',cy).attr('y2',cy)
    .attr('stroke','rgba(255,255,255,.08)').attr('stroke-dasharray','4,4');

  // Axes
  g.append('g').attr('transform','translate(0,' + ih + ')')
    .call(d3.axisBottom(xScale).ticks(5).tickFormat(d3.format('.2f')))
    .call(function(a) {
      a.selectAll('path,line').attr('stroke','#2a3050');
      a.selectAll('text').attr('fill','#64748b').attr('font-size','11');
    });
  g.append('g')
    .call(d3.axisLeft(yScale).ticks(5))
    .call(function(a) {
      a.selectAll('path,line').attr('stroke','#2a3050');
      a.selectAll('text').attr('fill','#64748b').attr('font-size','11');
    });

  // Axis labels
  g.append('text').attr('class','axis-label')
    .attr('x', iw/2).attr('y', ih + 46).attr('text-anchor','middle')
    .text('Risk Signal \u2192 (from Risk column language)');
  g.append('text').attr('class','axis-label')
    .attr('transform','rotate(-90)').attr('x',-ih/2).attr('y',-42)
    .attr('text-anchor','middle').text('Alignment Score (1\u201310)');

  // AI depth radius scale
  var rScale = d3.scaleOrdinal()
    .domain(['None','Low','Mid','High'])
    .range([9, 12, 16, 20]);

  // Build node objects with target positions for force de-overlap
  var nodeData = projects.map(function(d) {
    return Object.assign({}, d, {
      tx: xScale(d.risk_score),
      ty: yScale(d.alignment_avg),
      x:  xScale(d.risk_score),
      y:  yScale(d.alignment_avg),
      r:  rScale(d.ai_depth),
    });
  });

  // Run force simulation synchronously to resolve overlaps
  var sim = d3.forceSimulation(nodeData)
    .force('x', d3.forceX(function(d) { return d.tx; }).strength(0.85))
    .force('y', d3.forceY(function(d) { return d.ty; }).strength(0.85))
    .force('collision', d3.forceCollide(function(d) { return d.r + 6; }).strength(1.0))
    .stop();
  for (var i = 0; i < 400; i++) sim.tick();

  var nodes = g.selectAll('.bubble')
    .data(nodeData).enter().append('g').attr('class','bubble')
    .attr('transform', function(d) {
      return 'translate(' + d.x + ',' + d.y + ')';
    });

  function nodeColor(d) {
    return landscapeColorMode === 'domain'
      ? aiDomainColor(d.ai_domain)
      : areaColor(d.primary_area);
  }

  nodes.append('circle')
    .attr('r', function(d) { return d.r; })
    .attr('fill',   function(d) { return nodeColor(d); })
    .attr('fill-opacity', .75)
    .attr('stroke', function(d) { return nodeColor(d); })
    .attr('stroke-width', function(d) { return (d.reviewers||[]).length < 2 ? 1.5 : 1.5; })

  nodes.append('text').attr('class','node-label')

  nodes.on('mousemove', function(event, d) {

      + '<div class="tt-row"><span class="tt-label">Area</span> <span>' + d.primary_area + '</span></div>'
      + '<div class="tt-row"><span class="tt-label">Status</span> <span>' + d.status + '</span></div>'
      + '<div class="tt-row"><span class="tt-label">AI Depth</span> <span>' + d.ai_depth + '</span></div>'
      + '<div class="tt-row"><span class="tt-label">Alignment</span> <strong style="color:#4ade80">' + d.alignment_avg + '/10</strong></div>'
      + '<div class="tt-row"><span class="tt-label">Risk</span> <strong style="color:#fbbf24">' + d.risk_score + '</strong></div>'
      + (phrases ? '<div class="phrases">' + phrases + '</div>' : '')
      + pos0 + neg0;
    showTT(html, event.clientX, event.clientY);
  }).on('mouseleave', hideTT);

  // ── Legend panel ─────────────────────────────────────────────────────────
  var legX = W - margin.right + 14;
  var legG  = svg.append('g').attr('transform','translate(' + legX + ',' + margin.top + ')');

  // — Research Area legend —
  var legArea = legG.append('g').attr('id','leg-area');
  legArea.append('text').attr('y',-4).attr('fill','#64748b').attr('font-size','11').text('Research Area');
  var legData = DATA.research_areas.concat(
    ALL_AREAS.filter(function(a) {
      return !DATA.research_areas.find(function(ra) { return ra.id === a.id; });
    }).map(function(a) { return {id: a.id, title: a.title, color: a.color, _gap: true}; })
  );
  legData.forEach(function(a, i) {
    var ly = 12 + i * 22;

}
