var INFRA_COLORS = {
  'Public':       '#4ade80',
  'AbInt Network':'#818cf8',
  'Pod':          '#fbbf24',
  'None':         '#1e293b',
};
var INFRA_DESC = {
  'Public':       'Shareable publicly',
  'AbInt Network':'Shareable across AbInt Network',
  'Pod':          'Shareable within pod',
  'None':         'Not yet designated',
};
function infraColor(v) { return INFRA_COLORS[v] || '#1e293b'; }

// ── VIEW 2: Coverage Map ──────────────────────────────────────────────────
function renderCoverage() {
  var el = document.getElementById('view-coverage');
  var projects = DATA.projects.slice().sort(function(a,b) { return b.alignment_avg - a.alignment_avg; });

  var areaDataMap = {};
  DATA.research_areas.forEach(function(a) { areaDataMap[a.id] = a; });

  function projectAreaType(proj, areaId) {
    if (areaId === AREA_NAME_TO_ID[proj.primary_area])   return 'primary';
    if (areaId === AREA_NAME_TO_ID[proj.secondary_area]) return 'secondary';
    return 'none';
  }

  // ── Legend row 1: Coverage symbols ────────────────────────────
  var legendHTML = '<div style="display:flex;flex-wrap:wrap;gap:24px;margin-bottom:14px;align-items:flex-start">';

  // Coverage circles
  legendHTML += '<div><div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Circle type</div>'
    + '<div style="display:flex;flex-direction:column;gap:6px">'
    + '<span style="display:flex;align-items:center;gap:7px;font-size:12px">'
    + '<svg width="22" height="22"><circle cx="11" cy="11" r="9" fill="#a78bfa" fill-opacity=".7"/><text x="11" y="15" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">9</text></svg>'
    + 'Primary research area (score inside)</span>'
    + '<span style="display:flex;align-items:center;gap:7px;font-size:12px">'
    + '<svg width="22" height="22"><circle cx="11" cy="11" r="8" fill="none" stroke="#a78bfa" stroke-width="2" stroke-opacity=".7"/><text x="11" y="15" text-anchor="middle" fill="#a78bfa" font-size="9">9</text></svg>'
    + 'Secondary area</span>'
    + '<span style="display:flex;align-items:center;gap:7px;font-size:12px">'
    + '<svg width="22" height="22"><circle cx="11" cy="11" r="4" fill="#2a3050"/></svg>'
    + 'Not in area</span>'
    + '</div></div>';

  // Pod legend
  var usedPods = [];
  var seenPods = {};
  projects.forEach(function(p) {
    var pod = p.pod || 'Podless';
    if (!seenPods[pod]) { seenPods[pod] = true; usedPods.push(pod); }
  });

  legendHTML += '<div><div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Pod (column top strip)</div>'
    + '<div style="display:flex;flex-direction:column;gap:5px">';
  usedPods.forEach(function(pod) {
    var count = projects.filter(function(p) { return p.pod === pod; }).length;
    if (!count) return;
    legendHTML += '<span style="display:flex;align-items:center;gap:7px;font-size:12px">'
      + '<span style="display:inline-block;width:28px;height:6px;background:' + podColor(pod) + ';border-radius:3px"></span>'
      + pod + ' <span style="color:#64748b">(' + count + ')</span></span>';
  });
  legendHTML += '</div></div>';

  // Infra sharability legend
  legendHTML += '<div><div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Infrastructure sharability (coloured dot)</div>'
    + '<div style="display:flex;flex-direction:column;gap:5px">';
  ['Public','AbInt Network','Pod','None'].forEach(function(v) {
    var border = v === 'None' ? 'border:1.5px solid #334155;' : '';
    legendHTML += '<span style="display:flex;align-items:center;gap:7px;font-size:12px">'
      + '<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:' + infraColor(v) + ';' + border + '"></span>'
      + '<strong>' + v + '</strong> \u2014 ' + INFRA_DESC[v] + '</span>';
  });
  legendHTML += '</div></div>';

  legendHTML += '</div>';

  // ── Column headers: pod strip + infra dot + code + name ───────
  var tableHTML = '<div id="coverage-wrap" style="overflow-x:auto"><table class="coverage-table"><thead><tr>'
    + '<th class="ct-row-header" style="border:none;min-width:160px"></th>';

  projects.forEach(function(p) {
    var pc = podColor(p.pod || 'Podless');
    var ic = infraColor(p.infra_share || 'None');
    var infraBorder = (p.infra_share === 'None') ? 'border:1.5px solid #334155;' : '';
    tableHTML += '<th class="ct-col-header" data-pid="' + p.id.replace(/"/g, '') + '" style="cursor:pointer;vertical-align:bottom;padding:0 2px 6px;width:72px">'
      // Pod strip — full width coloured bar
      + '<div style="height:6px;background:' + pc + ';border-radius:3px 3px 0 0;margin-bottom:5px;opacity:.9"></div>'
      // Infra dot
      + '<div style="display:flex;justify-content:center;margin-bottom:4px">'
      + '<span title="' + (p.infra_share || 'None') + '" style="display:inline-block;width:11px;height:11px;border-radius:50%;background:' + ic + ';' + infraBorder + '"></span>'
      + '</div>'
      // Code + first name (not rotated — compact)
      + '<div style="font-size:10px;font-weight:700;text-align:center;color:#e2e8f0;line-height:1.2">' + displayName(p) + '</div>'
      + '</th>';
  });

  tableHTML += '<th style="width:36px;font-size:11px;color:#64748b;padding:4px 6px;text-align:left;vertical-align:bottom">n</th>'
    + '<th style="width:76px;font-size:11px;color:#64748b;padding:4px 6px;text-align:left;vertical-align:bottom">Avg&nbsp;Align</th>'
    + '</tr></thead><tbody>';

  // ── Area rows ──────────────────────────────────────────────────
  ALL_AREAS.forEach(function(area) {
    var hasData = !!areaDataMap[area.id];
    var rowClass = hasData ? '' : ' ct-gap-row';
    tableHTML += '<tr class="' + rowClass + '">';
    tableHTML += '<td class="ct-row-header" style="color:' + area.color + '">' + area.title + '</td>';

    projects.forEach(function(proj) {
      var type = projectAreaType(proj, area.id);
      var alignOpacity = (proj.alignment_avg - 4) / 6;
      var cellBg = type !== 'none'
        ? 'background:rgba(' + hexToRgb(area.color) + ',' + (alignOpacity * 0.18).toFixed(2) + ')'
        : '';

      tableHTML += '<td class="ct-cell' + (type === 'none' ? ' ct-no-data' : '') + '" style="' + cellBg + '">';
      if (type === 'primary') {
        tableHTML += '<svg width="46" height="50">'
          + '<circle cx="23" cy="26" r="17" fill="' + area.color + '" fill-opacity=".7"/>'
          + '<text x="23" y="30" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">'
          + proj.alignment_avg + '</text>'
          + '</svg>';
      } else if (type === 'secondary') {
        tableHTML += '<svg width="46" height="50">'
          + '<circle cx="23" cy="26" r="13" fill="none" stroke="' + area.color + '" stroke-width="2" stroke-opacity=".7"/>'
          + '<text x="23" y="30" text-anchor="middle" fill="' + area.color + '" font-size="10" fill-opacity=".8">'
          + proj.alignment_avg + '</text>'
          + '</svg>';
      } else {
        tableHTML += '<svg width="46" height="50">'
          + '<circle cx="23" cy="26" r="4" fill="#2a3050"/>'
          + '</svg>';
      }
      tableHTML += '</td>';
    });

    var aData = areaDataMap[area.id];
    if (aData) {
      var barW = Math.round((aData.alignment_avg / 10) * 60);
      tableHTML += '<td style="padding:4px 6px;font-size:12px;color:#64748b">' + aData.n_projects + '</td>'
        + '<td style="padding:4px 6px"><div style="font-size:13px;font-weight:700;color:' + area.color + '">'
        + aData.alignment_avg + '</div>'
        + '<div style="width:' + barW + 'px;height:3px;background:' + area.color + ';border-radius:2px;opacity:.5;margin-top:3px"></div>'
        + '</td>';
    } else {
      tableHTML += '<td colspan="2" style="padding:4px 8px;font-size:11px;color:#f87171">Not yet reviewed</td>';
    }
    tableHTML += '</tr>';
  });

  // Alignment score footer row
  tableHTML += '<tr><td class="ct-row-header" style="color:#64748b;font-size:11px">Alignment</td>';
  projects.forEach(function(p) {
    var sc = p.alignment_avg >= 8.5 ? '#4ade80' : (p.alignment_avg >= 7 ? '#fbbf24' : '#f87171');
    tableHTML += '<td style="text-align:center;padding:5px 0">'
      + '<span style="font-size:13px;font-weight:800;color:' + sc + '">' + p.alignment_avg + '</span>'
      + '</td>';
  });
  tableHTML += '<td></td><td></td></tr>';
  tableHTML += '</tbody></table></div>';

  // ── TS Dimensions table ────────────────────────────────────────
  var dimHTML = '<div style="margin-top:28px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px;color:#818cf8">'
    + 'Transformation Statement Coverage</h3>'
    + '<p style="font-size:11px;color:#64748b;margin-bottom:12px">Bar width = how strongly reviewer language maps onto each TS dimension.</p>'
    + '<div style="overflow-x:auto"><table class="coverage-table"><thead><tr>'
    + '<th class="ct-row-header" style="border:none;min-width:160px"></th>';

  projects.forEach(function(p) {
    dimHTML += '<th style="font-size:10px;color:#64748b;padding:4px 2px;text-align:center;width:72px">' + displayName(p) + '</th>';
  });
  dimHTML += '</tr></thead><tbody>';

  DATA.ts_dimensions.forEach(function(dim) {
    dimHTML += '<tr><td class="ct-row-header" style="font-size:11px;color:#94a3b8">' + dim.label + '</td>';
    projects.forEach(function(p) {
      var score = (DATA.ts_project_scores[p.id] || {})[dim.id] || 0;
      var opacity = Math.max(0.07, score * 2);
      var barW = Math.round(score * 52);
      dimHTML += '<td style="padding:6px 2px;text-align:center">';
      if (score > 0.05) {
        dimHTML += '<div style="background:#818cf8;opacity:' + opacity.toFixed(2)
          + ';height:7px;border-radius:4px;width:' + barW + 'px;margin:0 auto"></div>';
      } else {
        dimHTML += '<div style="background:#1c2235;height:7px;border-radius:4px;width:22px;margin:0 auto"></div>';
      }
      dimHTML += '</td>';
    });
    dimHTML += '</tr>';
  });
  dimHTML += '</tbody></table></div></div>';

  // ── Area summary cards (sorted: most projects first) ───────────
  var cardHTML = '<div class="area-summary-bar" style="margin-top:24px">';
  var sortedAreas = ALL_AREAS.slice().sort(function(a, b) {
    var na = areaDataMap[a.id] ? areaDataMap[a.id].n_projects : 0;
    var nb = areaDataMap[b.id] ? areaDataMap[b.id].n_projects : 0;
    return nb - na;
  });
  sortedAreas.forEach(function(area) {
    var aData = areaDataMap[area.id];
    var isGap = !aData;
    if (isGap) {
      cardHTML += '<div class="area-summary-card asc-gap" style="border-color:' + area.color + '40">'
        + '<div class="asc-name" style="color:' + area.color + '">' + area.title + '</div>'
        + '<div class="asc-count" style="color:#334155">0</div>'
        + '<div class="asc-split" style="color:#475569">Not yet reviewed</div>'
        + '</div>';
      return;
    }

    var projects  = aData.projects || [];
    var primary   = projects.filter(function(p){ return p.is_primary; });
    var secondary = projects.filter(function(p){ return !p.is_primary; });
    var total     = projects.length;
    var alignSc   = aData.alignment_avg;
    var alignCol  = alignSc >= 8.5 ? '#4ade80' : (alignSc >= 7 ? '#fbbf24' : '#f87171');

    // Split pills
    var splitHTML = '';
    if (primary.length)
      splitHTML += '<span class="asc-split-pill" style="background:' + area.color + '25;color:' + area.color + '">'
        + primary.length + ' primary</span>';
    if (secondary.length)
      splitHTML += '<span class="asc-split-pill" style="background:#1e2535;color:#64748b">'
        + secondary.length + ' secondary</span>';

    // Project list (primary first, then secondary, cap at 6)
    var projRows = '';
    var shown = primary.concat(secondary).slice(0, 6);
    shown.forEach(function(p) {
      var badgeColor = p.is_primary ? area.color : '#475569';
      var badgeBg    = p.is_primary ? area.color + '22' : '#1e2535';
      projRows += '<div class="asc-proj-row">'
        + '<span class="asc-proj-badge" style="background:' + badgeBg + ';color:' + badgeColor + '">'
        + (p.is_primary ? '1°' : '2°') + '</span>'
        + '<span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (p.short || p.id.split(' - ')[0]) + '</span>'
        + '</div>';
    });
    if (projects.length > 6) {
      projRows += '<div style="font-size:9px;color:#475569;margin-top:1px">+' + (projects.length - 6) + ' more</div>';
    }

    cardHTML += '<div class="area-summary-card" style="border-color:' + area.color + '40">'
      + '<div class="asc-name" style="color:' + area.color + '">' + area.title + '</div>'
      + '<div class="asc-count" style="color:' + area.color + '">' + total + '</div>'
      + '<div class="asc-split">' + splitHTML + '</div>'
      + '<div class="asc-proj-list">' + projRows + '</div>'
      + '<div class="asc-align-row">'
      + '<span class="asc-align-num" style="color:' + alignCol + '">' + alignSc + '</span>'
      + '<span class="asc-align-label">/ 10 avg alignment</span>'
      + '</div>'
      + '</div>';
  });
  cardHTML += '</div>';

  el.innerHTML = legendHTML + tableHTML + dimHTML + cardHTML;

  // ── Attach hover tooltips to column headers (after innerHTML set) ──
  el.querySelectorAll('[data-pid]').forEach(function(th) {
    var pid = th.dataset.pid;
    // Match pid loosely (the id has special chars that may be partially trimmed)
    var proj = DATA.projects.find(function(p) {
      return p.id.replace(/"/g,'') === pid || p.code === pid;
    });
    if (!proj) return;

    th.addEventListener('mouseenter', function(event) {
      var pc = podColor(proj.pod);
      var ic = infraColor(proj.infra_share || 'None');
      var infraBorder = (proj.infra_share === 'None') ? 'border:1.5px solid #334155;' : '';
      var phraseChips = (proj.top_phrases || []).slice(0,4)
        .map(function(ph) { return '<span class="ph-chip">' + ph + '</span>'; }).join('');

      var html = '<h4 style="line-height:1.35">' + proj.title + '</h4>'
        + '<div style="font-size:11px;color:#64748b;margin-bottom:8px">' + proj.short + ' &middot; ' + proj.code + '</div>'
        + '<div class="tt-row"><span class="tt-label">Pod</span>'
        + '<span style="display:inline-flex;align-items:center;gap:5px">'
        + '<span style="width:10px;height:10px;border-radius:50%;background:' + pc + ';display:inline-block"></span>'
        + proj.pod + '</span></div>'
        + '<div class="tt-row"><span class="tt-label">Type</span><span>' + (proj.type || 'CfP') + '</span></div>'
        + '<div class="tt-row"><span class="tt-label">Status</span><span>' + proj.status + '</span></div>'
        + '<div class="tt-row"><span class="tt-label">AI Depth</span><span>' + proj.ai_depth + '</span></div>'
        + '<div class="tt-row"><span class="tt-label">Infra share</span>'
        + '<span style="display:inline-flex;align-items:center;gap:5px">'
        + '<span style="width:10px;height:10px;border-radius:50%;background:' + ic + ';' + infraBorder + ';display:inline-block"></span>'
        + (proj.infra_share || 'None') + '</span></div>';
      if (proj.sharable_method && proj.sharable_method !== 'None') {
        html += '<div class="tt-row"><span class="tt-label">Meth. share</span><span>' + proj.sharable_method + '</span></div>';
      }
      html += '<div class="tt-row"><span class="tt-label">Alignment</span>'
        + '<strong style="color:#4ade80">' + proj.alignment_avg + '/10</strong></div>';
      if (phraseChips) html += '<div class="phrases" style="margin-top:7px">' + phraseChips + '</div>';

      showTT(html, event.clientX, event.clientY);
    });
    th.addEventListener('mousemove', function(event) {
      showTT(null, event.clientX, event.clientY);
    });
    th.addEventListener('mouseleave', hideTT);
  });

  // Update showTT to support position-only calls
  var _origShowTT = showTT;
  showTT = function(html, x, y) {
    if (html !== null) ttEl.innerHTML = html;
    ttEl.style.display = 'block';
    var bw = document.documentElement.clientWidth;
    var bh = document.documentElement.clientHeight;
    var tw = ttEl.offsetWidth  || 300;
    var th2 = ttEl.offsetHeight || 180;
    var lx = x + 14;
    var ly = y - 10;
    if (lx + tw > bw - 10) lx = x - tw - 14;
    if (ly + th2 > bh - 10) ly = bh - th2 - 10;
    ttEl.style.left = lx + 'px';
    ttEl.style.top  = ly + 'px';
  };
}

// ── VIEW 3: Emergent Voice ────────────────────────────────────────────────
function renderVoice() {
  var el = document.getElementById('view-voice');
  var themes = DATA.research_themes || [];
  var actions = DATA.network_actions || [];

  el.innerHTML =
    '<div style="margin-bottom:10px">'
    + '<h3 style="font-size:13px;font-weight:700;color:#64748b;margin-bottom:3px">'
    + 'Emergent Voice &mdash; what the network is saying, interpreted for Phase 2 strategy'
    + '</h3>'
    + '<p style="font-size:11px;color:#475569;line-height:1.5">'
    + 'Themes interpreted from reviewer language across all projects. Each bubble includes an analytical read, '
    + 'a strategic question for planning, and Phase 2 implications. Bubble size = unique reviewers. Click to explore.'
    + '</p></div>'
    + '<div id="voice-wrap">'
    + '<div id="voice-svg-wrap"></div>'
    + '<div id="voice-detail">'
    + '<div style="font-size:12px;color:#64748b;line-height:1.7;padding-top:8px">'
    + 'Select a theme to see the full analytical read, network question, Phase 2 implications, and evidence.'
    + '</div></div></div>'
    + '<div id="voice-actions" style="margin-top:18px"></div>';

  var svgWrap = document.getElementById('voice-svg-wrap');
  var W = svgWrap.clientWidth || 560;
  var H = 460;

  var maxRev = d3.max(themes, function(t) { return t.n_reviewers; }) || 1;
  var minRev = d3.min(themes, function(t) { return t.n_reviewers; }) || 1;
  var rScale = d3.scaleSqrt().domain([minRev, maxRev]).range([32, 72]);

  var nodes = themes.map(function(t, i) {
    var angle = (i / themes.length) * 2 * Math.PI;
    return Object.assign({}, t, {
      r: rScale(t.n_reviewers),
      x: W/2 + Math.cos(angle) * 120,
      y: H/2 + Math.sin(angle) * 120,
    });
  });

  var svg = d3.select(svgWrap).append('svg').attr('width', W).attr('height', H);

  var sim = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(6))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide(function(d) { return d.r + 8; }).strength(0.92))
    .force('x', d3.forceX(W/2).strength(0.03))
    .force('y', d3.forceY(H/2).strength(0.04));

  var bubb = svg.selectAll('.voice-bubble')
    .data(nodes).enter().append('g').attr('class','voice-bubble')
    .style('cursor','pointer');

  bubb.append('circle')
    .attr('r', function(d) { return d.r; })
    .attr('fill', function(d) { return d.color; })
    .attr('fill-opacity', .15)
    .attr('stroke', function(d) { return d.color; })
    .attr('stroke-width', function(d) { return d.emerging ? 1.5 : 2; })
    .attr('stroke-dasharray', function(d) { return d.emerging ? '5,3' : 'none'; })
    .attr('stroke-opacity', .8);

  bubb.each(function(d) {
    var g = d3.select(this);
    var words = d.label.split(' ');
    var mid = Math.ceil(words.length / 2);
    var line1 = words.slice(0, mid).join(' ');
    var line2 = words.slice(mid).join(' ');
    var fs = Math.max(8, Math.min(12, d.r * 0.28));
    if (line2) {
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y', -fs * 0.7).attr('fill', d.color).attr('font-size', fs)
        .attr('font-weight','700').attr('pointer-events','none').text(line1);
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('y', fs * 0.7).attr('fill', d.color).attr('font-size', fs)
        .attr('font-weight','700').attr('pointer-events','none').text(line2);
    } else {
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('fill', d.color).attr('font-size', fs)
        .attr('font-weight','700').attr('pointer-events','none').text(line1);
    }
    g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('y', d.r - 13).attr('fill', d.color).attr('font-size', 9)
      .attr('opacity', .75).attr('pointer-events','none')
      .text(d.n_reviewers + (d.n_reviewers === 1 ? ' reviewer' : ' reviewers'));
  });

  sim.on('tick', function() {
    bubb.attr('transform', function(d) {
      d.x = Math.max(d.r + 6, Math.min(W - d.r - 6, d.x));
      d.y = Math.max(d.r + 6, Math.min(H - d.r - 6, d.y));
      return 'translate(' + d.x + ',' + d.y + ')';
    });
  });

  bubb.on('click', function(event, d) {
    bubb.selectAll('circle').attr('fill-opacity', .07).attr('stroke-opacity', .3);
    d3.select(this).select('circle').attr('fill-opacity', .28).attr('stroke-opacity', 1);

    var detail = document.getElementById('voice-detail');

    var phraseTags = (d.phrases || []).map(function(ph) {
      return '<span style="display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;'
        + 'background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);'
        + 'margin:2px;color:#94a3b8">' + ph + '</span>';
    }).join('');

    var revList = (d.reviewers || []).map(function(rv) {
      return '<span style="display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;'
        + 'background:' + d.color + '22;color:' + d.color + ';margin:2px">' + rv + '</span>';
    }).join('');

    var sentHTML = (d.sentences || []).slice(0, 4).map(function(s) {
      var polColor = s.polarity === 'positive' ? '#4ade80' : s.polarity === 'concern' ? '#f87171' : '#94a3b8';
      var polIcon  = s.polarity === 'positive' ? '\u25B2' : s.polarity === 'concern' ? '\u25BC' : '\u25CF';
      return '<div style="padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.04);'
        + 'border-left:3px solid ' + d.color + ';margin-bottom:6px;font-size:11px;line-height:1.5;">'
        + '<div style="color:var(--text)">' + s.text + '</div>'
        + '<div style="font-size:10px;color:#64748b;margin-top:4px">'

// ── VIEW 4: Signal Cards ──────────────────────────────────────────────────
function renderCards() {

      ? '<span class="chip chip-muted">AI: ' + p.ai_depth + '</span>' : '';

    var neg0 = p.concerns && p.concerns[0]
      ? '<div class="sc-signal neg"><div class="src-tag">'

    var singleBadge = singleRev ? '<span style="font-size:9px;color:#64748b;background:#1c2235;padding:1px 6px;border-radius:4px;margin-left:6px">single reviewer</span>' : '';

    html += '<div class="signal-card" style="border-top:3px solid ' + acolor + singleStyle + '">'

      + '<div class="sc-scores">'
      + '<div class="sc-score-block"><div class="sc-score-num" style="color:' + alignColor + '">'
      + p.alignment_avg + '</div><div class="sc-score-label">Align</div></div>'
      + '<div class="sc-score-block"><div class="sc-score-num" style="color:' + riskColor + ';font-size:15px">'
      + p.risk_score.toFixed(2) + '</div><div class="sc-score-label">Risk</div></div>'
      + '</div></div>'
      + '<div class="sc-title" title="' + p.title + '">' + p.title.slice(0, 65) + (p.title.length > 65 ? '\u2026' : '') + '</div>'
      + '<div class="sc-meta">' + areaChip + statusChip + aiChip + ikChip + '</div>'
      + (phrases ? '<div class="sc-phrases">' + phrases + '</div>' : '')

      + pos0 + neg0

  });
  html += '</div>';
  el.innerHTML = html;

// ── Util: hex color to RGB string ─────────────────────────────────────────
function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r = parseInt(hex.substring(0,2),16);
  var g = parseInt(hex.substring(2,4),16);
  var b = parseInt(hex.substring(4,6),16);
  return r + ',' + g + ',' + b;
}

// ── VIEW 5: Reviewer Intelligence ─────────────────────────────────────────
var intelState = { reviewer: 'all', bucket: 'all', groupBy: 'type' };

function renderIntelligence() {
  var el = document.getElementById('view-intel');
  var sig = DATA.network_signals;
  var phrases = DATA.emergent_phrases.filter(function(p) {
    return (p.phrase.indexOf(' ') > -1 || p.phrase.indexOf('-') > -1) && p.n_projects >= 2;
  }).slice(0, 30);

  // Area colour lookup
  var AREA_COL = {
    'Language': '#facc15', 'Storytelling': '#a78bfa',
    'Environmental Stewardship': '#4ade80', 'Env Stewardship': '#4ade80',
    'Socio-Neuro AI': '#f97316', 'Multi-Agent Systems': '#60a5fa',
    'Other': '#64748b'
  };

  var TYPE_COLOR = {recommendation:'#f59e0b', question:'#22d3ee', action:'#4ade80', observation:'#a78bfa'};
  var TYPE_LABEL = {recommendation:'Recommendations', question:'Questions', action:'Actions', observation:'Observations'};
  var TYPE_KEYS  = ['recommendation','question','action','observation'];

  // ── Gather all sentences + compute per-reviewer stats ──
  var allSents = [];
  ['recommendations','questions','actions','observations'].forEach(function(k) {
    (sig[k] || []).forEach(function(s) { allSents.push(s); });
  });

  var reviewerNames = [];
  var seen = {};
  allSents.forEach(function(s) { if (!seen[s.reviewer]) { seen[s.reviewer]=1; reviewerNames.push(s.reviewer); }});
  reviewerNames.sort();

  // Global average alignment
  var globalAligns = DATA.projects.map(function(p) { return p.alignment_avg; });
  var globalAvg = globalAligns.reduce(function(a,b){return a+b;},0) / globalAligns.length;

  // Per-reviewer stats
  var revStats = {};
  reviewerNames.forEach(function(rev) {
    var sents = allSents.filter(function(s) { return s.reviewer === rev; });
    var typeCounts = {};
    TYPE_KEYS.forEach(function(t) { typeCounts[t] = 0; });
    sents.forEach(function(s) { typeCounts[s.type] = (typeCounts[s.type]||0) + 1; });
    var projects = DATA.projects.filter(function(p) { return (p.reviewers||[]).indexOf(rev) > -1; });
    var aligns = projects.map(function(p) { return p.alignment_avg; });
    var avgAlign = aligns.length ? aligns.reduce(function(a,b){return a+b;},0)/aligns.length : 0;
    // Polarity lean
    var posCount = sents.filter(function(s){ return s.polarity==='positive'; }).length;
    var negCount = sents.filter(function(s){ return s.polarity==='concern'; }).length;
    revStats[rev] = {
      total: sents.length, typeCounts: typeCounts,
      nProjects: projects.length, avgAlign: avgAlign,
      posCount: posCount, negCount: negCount, neutralCount: sents.length - posCount - negCount,
    };
  });

  // ── Reviewer profile chart (SVG) ──
  function buildProfileChart(rev) {
    if (!rev || rev === 'all') return buildOverviewChart();
    var st = revStats[rev];
    if (!st) return '';
    var cW = 560, cH = 160;
    var svg = '<svg width="' + cW + '" height="' + cH + '" style="display:block;margin-bottom:12px">';

    // ── Stacked bar: sentence type distribution ──
    var barY = 14, barH = 22, barX = 140, barW = 280;
    svg += '<text x="8" y="' + (barY+15) + '" fill="#64748b" font-size="10" font-weight="700">REVIEW STYLE</text>';
    var bx = barX;
    TYPE_KEYS.forEach(function(t) {
      var w = st.total > 0 ? (st.typeCounts[t] / st.total) * barW : 0;
      if (w > 0) {
        svg += '<rect x="' + bx + '" y="' + barY + '" width="' + w + '" height="' + barH + '" rx="3" fill="' + TYPE_COLOR[t] + '" fill-opacity=".75"/>';
        if (w > 28) {
          svg += '<text x="' + (bx + w/2) + '" y="' + (barY + barH/2 + 4) + '" text-anchor="middle" fill="#0c0e17" font-size="10" font-weight="600">' + st.typeCounts[t] + '</text>';
        }
        bx += w;
      }
    });
    // Legend dots next to bar
    var legX = barX + barW + 14;
    TYPE_KEYS.forEach(function(t, i) {
      var ly = barY + i * 14;
      svg += '<circle cx="' + (legX+5) + '" cy="' + (ly+5) + '" r="4" fill="' + TYPE_COLOR[t] + '" fill-opacity=".75"/>';
      svg += '<text x="' + (legX+14) + '" y="' + (ly+9) + '" fill="#94a3b8" font-size="9">' + TYPE_LABEL[t] + '</text>';
    });

    // ── Alignment dot vs global average ──
    var dotY = 62, dotBarX = barX, dotBarW = barW;
    svg += '<text x="8" y="' + (dotY+12) + '" fill="#64748b" font-size="10" font-weight="700">ALIGNMENT</text>';
    var alignMin = 4, alignMax = 10;
    var scaleX = function(v) { return dotBarX + ((v - alignMin) / (alignMax - alignMin)) * dotBarW; };
    // track line
    svg += '<line x1="' + dotBarX + '" x2="' + (dotBarX+dotBarW) + '" y1="' + (dotY+8) + '" y2="' + (dotY+8) + '" stroke="#2a3050" stroke-width="2"/>';
    // global avg marker
    var gx = scaleX(globalAvg);
    svg += '<line x1="' + gx + '" x2="' + gx + '" y1="' + (dotY) + '" y2="' + (dotY+16) + '" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2"/>';
    svg += '<text x="' + gx + '" y="' + (dotY+28) + '" text-anchor="middle" fill="#64748b" font-size="9">avg ' + globalAvg.toFixed(1) + '</text>';
    // reviewer dot
    var rx = scaleX(st.avgAlign);
    var dotCol = st.avgAlign >= globalAvg ? '#4ade80' : '#fbbf24';
    svg += '<circle cx="' + rx + '" cy="' + (dotY+8) + '" r="7" fill="' + dotCol + '" stroke="#0c0e17" stroke-width="2"/>';
    svg += '<text x="' + rx + '" y="' + (dotY-4) + '" text-anchor="middle" fill="' + dotCol + '" font-size="11" font-weight="700">' + st.avgAlign.toFixed(1) + '</text>';
    // scale labels
    svg += '<text x="' + dotBarX + '" y="' + (dotY+28) + '" fill="#475569" font-size="9">' + alignMin + '</text>';
    svg += '<text x="' + (dotBarX+dotBarW) + '" y="' + (dotY+28) + '" text-anchor="end" fill="#475569" font-size="9">' + alignMax + '</text>';

    // ── Polarity lean: pos / neutral / concern ──
    var polY = 100, polBarW = barW;
    svg += '<text x="8" y="' + (polY+12) + '" fill="#64748b" font-size="10" font-weight="700">POLARITY LEAN</text>';
    var px = barX;
    var polData = [
      {label:'Positive', count:st.posCount, color:'#4ade80'},
      {label:'Neutral',  count:st.neutralCount, color:'#64748b'},
      {label:'Concern',  count:st.negCount, color:'#f87171'},
    ];
    polData.forEach(function(pd) {
      var w = st.total > 0 ? (pd.count / st.total) * polBarW : 0;
      if (w > 0) {
        svg += '<rect x="' + px + '" y="' + polY + '" width="' + w + '" height="' + barH + '" rx="3" fill="' + pd.color + '" fill-opacity=".6"/>';
        if (w > 28) {
          svg += '<text x="' + (px + w/2) + '" y="' + (polY + barH/2 + 4) + '" text-anchor="middle" fill="#0c0e17" font-size="10" font-weight="600">' + pd.count + '</text>';
        }
        px += w;
      }
    });
    // Polarity legend
    polData.forEach(function(pd, i) {
      var ly = polY + i * 14;
      svg += '<circle cx="' + (legX+5) + '" cy="' + (ly+5) + '" r="4" fill="' + pd.color + '" fill-opacity=".6"/>';
      svg += '<text x="' + (legX+14) + '" y="' + (ly+9) + '" fill="#94a3b8" font-size="9">' + pd.label + '</text>';
    });

    // ── Summary stats ──
    svg += '<text x="8" y="' + (polY+barH+18) + '" fill="#475569" font-size="10">'
      + st.nProjects + ' projects reviewed &middot; ' + st.total + ' sentences</text>';

    svg += '</svg>';
    return svg;
  }

  // ── Overview comparison chart: all reviewers side by side ──
  function buildOverviewChart() {
    var cW = 560, rowH = 36, headH = 30;

    svg += '<text x="' + barX + '" y="16" fill="#64748b" font-size="10" font-weight="700">SENTENCE TYPE MIX</text>';

      + '<span style="color:#94a3b8">' + s.reviewer + '</span>'
      + '<span class="intel-card-type-chip" style="background:' + (TYPE_COLOR[s.type]||'#64748b') + ';color:#0c0e17;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:600;margin-left:6px">' + s.type + '</span>'
      + '<span style="color:' + polColor + ';margin-left:auto">' + polIcon + ' ' + s.polarity + '</span>'
      + '</div></div>';
  }

  // ── Bucket sections ──
  var buckets = [
    { key: 'recommendations', label: 'Recommendations', icon: '\uD83D\uDCA1', cls: 'f-rec',
      desc: 'What reviewers think should happen — suggestions, pivots, improvements' },
    { key: 'questions',       label: 'Open Questions',   icon: '\u2753',      cls: 'f-qst',
      desc: 'What remains unclear, hard to assess, or unresolved across the network' },
    { key: 'actions',         label: 'Action Signals',   icon: '\uD83D\uDD04', cls: 'f-act',
      desc: 'What is already in motion — active work, partnerships, commitments' },
    { key: 'observations',    label: 'Key Observations', icon: '\uD83D\uDCCC', cls: 'f-obs',
      desc: 'Substantive insights from reviewers — strong reads on projects' },
  ];

  // ── Project lookup helper for displayName ──
  var projLookup = {};
  DATA.projects.forEach(function(p) {
    var key = (p.short || p.id || '').trim();
    projLookup[key] = p;
    // Also index by just the project field value in sentences (first name / lead)
    if (p.code) projLookup[p.code] = p;
  });
  function projDisplayName(projStr) {
    // Try direct match
    if (projLookup[projStr]) return displayName(projLookup[projStr]);
    // Try matching by checking if any project short starts with this string
    for (var k in projLookup) {
      if (k.indexOf(projStr) === 0 || projStr.indexOf(k) === 0) return displayName(projLookup[k]);
    }
    // Fallback: last name logic on raw string
    var parts = projStr.trim().split(' ');
    return parts[parts.length - 1] || projStr;
  }

  // Polarity sort order for within-project grouping
  var POL_ORDER = {positive: 0, neutral: 1, concern: 2};

  // ── Reviewer dropdown + Group-by toggle ──
  var controlHTML = '<div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap">'
    + '<div style="display:flex;align-items:center;gap:8px">'
    + '<label style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Reviewer</label>'
    + '<select id="intel-rev-select" style="background:#141826;color:#e2e8f0;border:1px solid #2a3050;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer">'
    + '<option value="all">All Reviewers</option>';
  reviewerNames.forEach(function(r) {
    var st = revStats[r];
    controlHTML += '<option value="' + r + '">' + r + ' (' + st.nProjects + ' projects, ' + st.total + ' sentences)</option>';
  });
  controlHTML += '</select></div>'
    + '<div style="display:flex;align-items:center;gap:8px">'
    + '<label style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Group by</label>'
    + '<button id="intel-grp-type" class="intel-filter-btn" style="padding:3px 10px;font-size:11px;background:#1c2235;color:#e2e8f0;border:1px solid #3b4a6b;border-radius:6px;cursor:pointer">Type</button>'
    + '<button id="intel-grp-proj" class="intel-filter-btn" style="padding:3px 10px;font-size:11px;background:transparent;color:#64748b;border:1px solid #3b4a6b;border-radius:6px;cursor:pointer">Project</button>'
    + '</div>'
    + '</div>';

  // Filter bar
  var filterHTML = '<div class="intel-filter-bar" id="intel-filter-bar">'
    + '<button class="intel-filter-btn f-all active" data-fbucket="all">All</button>';
  buckets.forEach(function(b) {
    var n = (sig[b.key] || []).length;
    filterHTML += '<button class="intel-filter-btn ' + b.cls + '" data-fbucket="' + b.key + '">'
      + b.icon + ' ' + b.label + ' <span class="intel-type-count" style="opacity:.6">(' + n + ')</span></button>';
  });
  filterHTML += '</div>';

  // ── Build bucket HTML for "Group by Type" ──
  function buildTypeGroupHTML() {
    return buckets.map(function(b) {
      var items = sig[b.key] || [];
      if (!items.length) return '';
      var cards = items.map(makeCard).join('');
      return '<div class="intel-bucket" data-bucket="' + b.key + '">'
        + '<div class="intel-bucket-header">'
        + '<span class="intel-bucket-icon">' + b.icon + '</span>'
        + '<div><div class="intel-bucket-title">' + b.label + '</div>'
        + '<div style="font-size:11px;color:#64748b;margin-top:2px">' + b.desc + '</div></div>'
        + '<span class="intel-bucket-count">' + items.length + ' signals</span>'
        + '</div>'
        + '<div class="intel-cards">' + cards + '</div>'
        + '</div>';
    }).join('');
  }

  // ── Build bucket HTML for "Group by Project" ──
  function buildProjectGroupHTML() {
    // Collect all sentences, group by project
    var projGroups = {};
    var projOrder = [];
    allSents.forEach(function(s) {
      var key = s.project || 'Unknown';
      if (!projGroups[key]) { projGroups[key] = []; projOrder.push(key); }
      projGroups[key].push(s);
    });
    // Sort within each project: positive → neutral → concern
    projOrder.forEach(function(key) {
      projGroups[key].sort(function(a,b) {
        return (POL_ORDER[a.polarity]||1) - (POL_ORDER[b.polarity]||1);
      });
    });
    // Sort projects by name
    projOrder.sort(function(a,b) { return projDisplayName(a).localeCompare(projDisplayName(b)); });

    return projOrder.map(function(projKey) {
      var items = projGroups[projKey];
      var pObj = DATA.projects.find(function(p) { return p.short === projKey || p.id.indexOf(projKey) > -1; });
      var dName = projDisplayName(projKey);
      var aColor = pObj ? areaColor(pObj.primary_area) : '#64748b';
      var code = pObj ? pObj.code : '';
      var alignStr = pObj ? ' · Align: ' + pObj.alignment_avg.toFixed(1) : '';
      var cards = items.map(makeCard).join('');
      return '<div class="intel-bucket" data-bucket="project" data-project-group="' + projKey + '">'
        + '<div class="intel-bucket-header">'
        + '<span style="width:6px;height:28px;border-radius:3px;background:' + aColor + ';flex-shrink:0"></span>'
        + '<div><div class="intel-bucket-title">' + dName + (code ? ' <span style="font-weight:400;color:#64748b;font-size:11px">' + code + '</span>' : '') + '</div>'
        + '<div style="font-size:11px;color:#64748b;margin-top:2px">'
        + items.length + ' sentences' + alignStr
        + '</div></div>'
        + '</div>'
        + '<div class="intel-cards">' + cards + '</div>'
        + '</div>';
    }).join('');
  }

  el.innerHTML =
    '<div style="margin-bottom:16px">'
    + '<h3 style="font-size:13px;font-weight:700;color:#64748b;margin-bottom:4px">'
    + 'Reviewer Intelligence &mdash; what the reviewers are actually saying, in their own words.'
    + '</h3>'
    + '<p style="font-size:11px;color:#475569;line-height:1.5">'
    + 'Full sentences from evaluation forms, classified by type. Select a reviewer to see their profile and bias lean. Group by project to read per-project, sorted positive to concern.'
    + '</p></div>'
    + controlHTML
    + '<div id="intel-profile-chart">' + buildOverviewChart() + '</div>'
    + filterHTML
    + '<div id="intel-layout">'
    + '<div id="intel-phrases-panel"><h4>Cross-Project Phrases</h4>' + tagHTML + '</div>'
    + '<div id="intel-main">' + buildTypeGroupHTML() + '</div>'
    + '</div>';

  // ── Rebuild main panel based on group mode ──
  function rebuildMain() {
    var mainEl = document.getElementById('intel-main');
    if (intelState.groupBy === 'project') {
      mainEl.innerHTML = buildProjectGroupHTML();
    } else {
      mainEl.innerHTML = buildTypeGroupHTML();
    }
    applyIntelFilters();
  }

  // ── Wire up group-by toggle ──
  function setGroupBtn(mode) {
    document.getElementById('intel-grp-type').style.background = mode === 'type' ? '#1c2235' : 'transparent';
    document.getElementById('intel-grp-type').style.color      = mode === 'type' ? '#e2e8f0' : '#64748b';
    document.getElementById('intel-grp-proj').style.background = mode === 'project' ? '#1c2235' : 'transparent';
    document.getElementById('intel-grp-proj').style.color      = mode === 'project' ? '#e2e8f0' : '#64748b';
    // In project mode, hide the type filter bar (grouping replaces it), or keep it for sub-filtering
    var filterBar = document.getElementById('intel-filter-bar');
    if (mode === 'project') {
      filterBar.style.opacity = '0.4';
    } else {
      filterBar.style.opacity = '1';
    }
  }
  document.getElementById('intel-grp-type').addEventListener('click', function() {
    intelState.groupBy = 'type';
    intelState.bucket = 'all';
    setGroupBtn('type');
    // Reset type filter buttons
    el.querySelectorAll('.intel-filter-btn').forEach(function(b) { b.classList.remove('active'); });
    el.querySelector('.intel-filter-btn.f-all').classList.add('active');
    rebuildMain();
  });
  document.getElementById('intel-grp-proj').addEventListener('click', function() {
    intelState.groupBy = 'project';
    setGroupBtn('project');
    rebuildMain();
  });

  // ── Wire up dropdown ──
  document.getElementById('intel-rev-select').addEventListener('change', function() {
    var rev = this.value;
    intelState.reviewer = rev;
    document.getElementById('intel-profile-chart').innerHTML = buildProfileChart(rev);
    rebuildMain();
  });

  // ── Wire up filter buttons ──
  el.querySelectorAll('.intel-filter-btn[data-fbucket]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      el.querySelectorAll('.intel-filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      intelState.bucket = btn.dataset.fbucket;
      applyIntelFilters();
    });
  });

  function applyIntelFilters() {
    var rev = intelState.reviewer;
    var bucket = intelState.bucket;
    var groupBy = intelState.groupBy;

    // Show/hide buckets (only applies in type mode)
    el.querySelectorAll('.intel-bucket').forEach(function(b) {
      if (groupBy === 'project' || bucket === 'all' || b.dataset.bucket === bucket) {
        b.style.display = '';
      } else {
        b.style.display = 'none';
      }
    });

    // Show/hide cards by reviewer + type filter
    el.querySelectorAll('.intel-card').forEach(function(card) {
      var revMatch = (rev === 'all' || card.dataset.reviewer === rev);
      var typeMatch = true;
      if (groupBy === 'project' && bucket !== 'all') {
        // In project mode, the type filter acts as a sub-filter
        var singularMap = {recommendations:'recommendation', questions:'question', actions:'action', observations:'observation'};
        typeMatch = card.dataset.type === (singularMap[bucket] || bucket);
      }
      card.style.display = (revMatch && typeMatch) ? '' : 'none';
    });

    // Update bucket signal counts
    el.querySelectorAll('.intel-bucket').forEach(function(b) {
      var allCards = b.querySelectorAll('.intel-card');
      var vis = 0;
      allCards.forEach(function(c) { if (c.style.display !== 'none') vis++; });
      var countEl = b.querySelector('.intel-bucket-count');
      if (countEl) countEl.textContent = vis + ' signals';
      // Hide empty project groups
      if (groupBy === 'project' && vis === 0) b.style.display = 'none';
    });

    // Update type filter counts
    var visibleCounts = {};
    el.querySelectorAll('.intel-card').forEach(function(card) {
      if (card.style.display !== 'none') {
        var t = card.dataset.type + 's'; // recommendation → recommendations
        visibleCounts[t] = (visibleCounts[t]||0) + 1;
      }
    });
    el.querySelectorAll('.intel-filter-btn[data-fbucket]').forEach(function(btn) {
      var bk = btn.dataset.fbucket;
      if (bk && bk !== 'all') {
        var countEl = btn.querySelector('.intel-type-count');
        if (countEl) countEl.textContent = '(' + (visibleCounts[bk]||0) + ')';
      }
    });
  }
}

function intelFilter(bucket, btn) {
  // Legacy compat — now handled by inline event listeners
  document.querySelectorAll('.intel-filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.intel-bucket').forEach(function(b) {
    if (bucket === 'all' || b.dataset.bucket === bucket) {
      b.style.display = '';
    } else {
      b.style.display = 'none';
    }
  });
}

// ── VIEW 6: AI Domain ─────────────────────────────────────────────────────
function renderAIDomain() {
  var el = document.getElementById('view-aidomain');
  el.innerHTML = '';

  var AI_DOMAINS = [
    {id:'applied',   label:'Applied Systems',        color:'#60a5fa'},
    {id:'data',      label:'Data Systems',            color:'#4ade80'},
    {id:'model',     label:'Model Architecture',      color:'#f59e0b'},
    {id:'symbolic',  label:'Symbolic / Hybrid',       color:'#a78bfa'},
    {id:'rl',        label:'Reinforcement Learning',  color:'#f87171'},
    {id:'unknown',   label:'Not Yet Specified',       color:'#475569'},
  ];

  var DEPTH_COLOR = {'None':'#334155','Low':'#facc15','Mid':'#f97316','High':'#ef4444'};
  var DEPTH_ORDER = ['High','Mid','Low','None'];

  function primaryDomain(p) {
    var raw = (p.ai_domain || '').trim();
    if (!raw) return 'unknown';
    var first = raw.split(',')[0].trim().toLowerCase();
    if (first.indexOf('applied')       > -1) return 'applied';
    if (first.indexOf('data')          > -1) return 'data';
    if (first.indexOf('model')         > -1) return 'model';
    if (first.indexOf('symbolic')      > -1) return 'symbolic';
    if (first.indexOf('reinforcement') > -1) return 'rl';
    return 'unknown';
  }

  var W = el.offsetWidth || 960;
  var H = 560;
  var cols = 3, rows = 2;
  var zW = W / cols, zH = (H - 80) / rows;  // 80px reserved for legend

  AI_DOMAINS.forEach(function(d, i) {
    d.cx = (i % cols + 0.5) * zW;
    d.cy = 40 + (Math.floor(i / cols) + 0.5) * zH;
  });

  var nodes = DATA.projects.map(function(p) {
    var domId = primaryDomain(p);
    var zone  = AI_DOMAINS.find(function(d) { return d.id === domId; });
    var r     = 7 + Math.max(0, (p.alignment_avg - 3) / 7) * 12;
    return {
      p: p, domId: domId, zone: zone,
      x: zone.cx + (Math.random() - 0.5) * 30,
      y: zone.cy + (Math.random() - 0.5) * 30,
      r: r,
    };
  });

  // Force to cluster within zones
  var sim = d3.forceSimulation(nodes)
    .force('x', d3.forceX(function(d) { return d.zone.cx; }).strength(0.45))
    .force('y', d3.forceY(function(d) { return d.zone.cy; }).strength(0.45))
    .force('collision', d3.forceCollide(function(d) { return d.r + 4; }).strength(0.95))
    .stop();
  for (var i = 0; i < 400; i++) sim.tick();

  var svg = d3.select(el).append('svg')
    .attr('width', W).attr('height', H)
    .style('display','block');

  // Zone backgrounds
  AI_DOMAINS.forEach(function(d) {
    svg.append('rect')
      .attr('x', d.cx - zW/2 + 6).attr('y', d.cy - zH/2 + 6)
      .attr('width', zW - 12).attr('height', zH - 12)
      .attr('rx', 14)
      .attr('fill', d.color).attr('fill-opacity', 0.04)
      .attr('stroke', d.color)
      .attr('stroke-opacity', d.id === 'unknown' ? 0.15 : 0.25)
      .attr('stroke-dasharray', d.id === 'unknown' ? '5,4' : 'none');
    svg.append('text')
      .attr('x', d.cx - zW/2 + 18).attr('y', d.cy - zH/2 + 26)
      .attr('fill', d.color).attr('font-size', 12).attr('font-weight', 700)
      .attr('opacity', d.id === 'unknown' ? 0.5 : 1)
      .text(d.label);
    // Project count badge
    var cnt = nodes.filter(function(n) { return n.domId === d.id; }).length;
    svg.append('text')
      .attr('x', d.cx - zW/2 + 18).attr('y', d.cy - zH/2 + 42)
      .attr('fill', d.color).attr('font-size', 10).attr('opacity', 0.6)
      .text(cnt + ' project' + (cnt !== 1 ? 's' : ''));
  });

  // Nodes
  var tip = document.getElementById('tooltip');
  nodes.forEach(function(nd) {
    var dc = DEPTH_COLOR[nd.p.ai_depth] || '#475569';
    var allDomains = (nd.p.ai_domain || 'Not specified');
    svg.append('circle')
      .attr('cx', nd.x).attr('cy', nd.y).attr('r', nd.r)
      .attr('fill', dc).attr('fill-opacity', 0.78)
      .attr('stroke', dc).attr('stroke-width', 1.5).attr('stroke-opacity', 0.9)
      .style('cursor', 'pointer')
      .on('mouseover', function(event) {
        tip.style.display = 'block';
        tip.innerHTML = '<div class="tt-title">' + (nd.p.short || nd.p.id) + '</div>'
          + '<div class="tt-row"><span class="tt-label">AI Domain</span><span>' + allDomains + '</span></div>'
          + '<div class="tt-row"><span class="tt-label">AI Depth</span><span>' + nd.p.ai_depth + '</span></div>'
          + '<div class="tt-row"><span class="tt-label">Alignment</span><span>' + nd.p.alignment_avg.toFixed(1) + '/10</span></div>'
          + '<div class="tt-row"><span class="tt-label">Pod</span><span>' + (nd.p.pod || 'Podless') + '</span></div>'
          + '<div class="tt-row"><span class="tt-label">Reviewers</span><span>' + (nd.p.reviewers||[]).length + '</span></div>';
        tip.style.left = (event.pageX + 14) + 'px';
        tip.style.top  = (event.pageY - 10) + 'px';
      })
      .on('mousemove', function(event) {
        tip.style.left = (event.pageX + 14) + 'px';
        tip.style.top  = (event.pageY - 10) + 'px';
      })
      .on('mouseout', function() { tip.style.display = 'none'; });

    // Labels for larger bubbles
    if (nd.r >= 10) {
      svg.append('text')
        .attr('x', nd.x).attr('y', nd.y + nd.r + 11)
        .attr('text-anchor', 'middle').attr('font-size', 9)
        .attr('fill', '#94a3b8').attr('pointer-events', 'none')
        .text(displayName(nd.p));
    }
  });

  // ── Legend row: AI Depth ──────────────────────────────────────────────────
  var legendY = H - 32;
  svg.append('text').attr('x', 16).attr('y', legendY - 4)
    .attr('fill','#64748b').attr('font-size', 10).attr('font-weight', 700)
    .attr('text-transform','uppercase').text('AI Depth →');
  var lx = 90;
  DEPTH_ORDER.forEach(function(dep) {
    svg.append('circle').attr('cx', lx).attr('cy', legendY - 5).attr('r', 7)
      .attr('fill', DEPTH_COLOR[dep]).attr('fill-opacity', 0.78);
    svg.append('text').attr('x', lx + 11).attr('y', legendY - 1)
      .attr('fill','#94a3b8').attr('font-size', 11).text(dep);
    lx += 72;
  });
  svg.append('text').attr('x', lx + 12).attr('y', legendY - 1)
    .attr('fill','#64748b').attr('font-size', 10)
    .text('  Bubble size = reviewer alignment score');
}

// ── VIEW 7: Project Overview ──────────────────────────────────────────────
var overviewState = { reviewer: 'all', sort: 'alignment' };

function renderOverview() {
  var el = document.getElementById('view-overview');
  el.innerHTML = '<div id="ov-root" style="padding:20px 24px"></div>';
  buildOverview();
}

function buildOverview() {
  var el = document.getElementById('ov-root');
  if (!el) return;

  // ── Filter projects by reviewer ──────────────────────────────────
  var allProjects = DATA.projects.slice();
  var projects = overviewState.reviewer === 'all'
    ? allProjects
    : allProjects.filter(function(p) {
        return (p.reviewers || []).indexOf(overviewState.reviewer) >= 0;
      });

  // ── Sort ─────────────────────────────────────────────────────────
  projects = projects.slice().sort(function(a, b) {
    if (overviewState.sort === 'alignment') return b.alignment_avg - a.alignment_avg;
    if (overviewState.sort === 'pod') return (a.pod||'').localeCompare(b.pod||'');
    if (overviewState.sort === 'area') return (a.primary_area||'').localeCompare(b.primary_area||'');
    return 0;
  });

  // ── All unique reviewers ─────────────────────────────────────────
  var allReviewers = [];
  DATA.projects.forEach(function(p) {
    (p.reviewers||[]).forEach(function(r) {
      if (allReviewers.indexOf(r) < 0) allReviewers.push(r);
    });
  });
  allReviewers.sort();

  // ── Stat pills ───────────────────────────────────────────────────
  var visCount  = projects.length;
  var visEvals  = projects.reduce(function(s,p){ return s + (p.reviewers||[]).length; }, 0);
  var visAlign  = projects.length
    ? (projects.reduce(function(s,p){ return s + p.alignment_avg; }, 0) / projects.length).toFixed(1)
    : '—';

  var statsHTML = '<div style="display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap">'
    + pill(visCount + ' projects', '#818cf8')
    + pill(visEvals + ' evaluations', '#38bdf8')
    + pill('avg alignment ' + visAlign, '#4ade80')
    + '</div>';

  function pill(txt, col) {
    return '<span style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;background:' + col + '22;color:' + col + ';letter-spacing:.03em">' + txt + '</span>';
  }

  // ── Reviewer toggle row ──────────────────────────────────────────
  function revBtn(val, label) {
    var active = overviewState.reviewer === val;
    return '<button onclick="overviewState.reviewer=\'' + val + '\';buildOverview()" style="'
      + 'padding:5px 14px;border-radius:6px;border:1.5px solid '
      + (active ? '#818cf8' : '#1e2535') + ';background:'
      + (active ? '#818cf822' : 'transparent') + ';color:'
      + (active ? '#818cf8' : '#94a3b8') + ';font-size:12px;font-weight:' + (active ? '700' : '500') + ';cursor:pointer;margin-right:6px">'
      + label + '</button>';
  }

  function sortBtn(val, label) {
    var active = overviewState.sort === val;
    return '<button onclick="overviewState.sort=\'' + val + '\';buildOverview()" style="'
      + 'padding:4px 11px;border-radius:6px;border:1.5px solid '
      + (active ? '#fbbf24' : '#1e2535') + ';background:'
      + (active ? '#fbbf2422' : 'transparent') + ';color:'
      + (active ? '#fbbf24' : '#64748b') + ';font-size:11px;cursor:pointer;margin-right:4px">'
      + label + '</button>';
  }

  var controlsHTML = '<div style="display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:18px">'
    + '<div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-right:4px">Reviewer</div>'
    + revBtn('all', 'All')
    + allReviewers.map(function(r) { return revBtn(r, r); }).join('')
    + '<div style="flex:1"></div>'
    + '<div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-right:4px">Sort by</div>'
    + sortBtn('alignment', 'Alignment ↓')
    + sortBtn('pod', 'Pod')
    + sortBtn('area', 'Research Area')
    + '</div>';

  // ── TS dimension labels ─────────────────────────────────────────
  var dims = DATA.ts_dimensions || [];

  // ── Main table ──────────────────────────────────────────────────
  var tableHTML = '<div style="overflow-x:auto"><table class="coverage-table"><thead>';

  // Row 1: pod colour strip + project name

// ── VIEW 8: Network Transformation Map ───────────────────────────────────
var TS_DIM_COLORS = {
  ts_ik:          '#4ade80',
  ts_relational:  '#22d3ee',
  ts_community:   '#f59e0b',
  ts_technical:   '#f87171',
  ts_governance:  '#818cf8',
  ts_network:     '#60a5fa',
  ts_imaginaries: '#c084fc'
};

function renderTransform() {
  var el = document.getElementById('view-transform');
  var dims    = DATA.ts_dimensions || [];
  var scores  = DATA.ts_project_scores || {};
  var projects = DATA.projects;

  // ── Compute network aggregate per dimension ──────────────────────
  // Average score across all projects for each dim (only projects with score > 0)
  var netAvg = {};
  dims.forEach(function(dim) {
    var vals = projects.map(function(p) {
      return (scores[p.id] || {})[dim.id] || 0;
    }).filter(function(v) { return v > 0; });
    netAvg[dim.id] = vals.length ? vals.reduce(function(a,b){return a+b;},0) / vals.length : 0;
  });

  // ── Summary strip — 7 dimension pills at top ─────────────────────
  var summaryHTML = '<div style="padding:20px 24px 0">'
    + '<h2 style="font-size:15px;font-weight:800;color:#e2e8f0;margin-bottom:4px">Network Transformation Map</h2>'
    + '<p style="font-size:12px;color:#64748b;margin-bottom:16px">How strongly does the AbInt network advance each dimension of the transformation statement? Each section shows every project\'s contribution, ranked by signal strength.</p>'
    + '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px">';

  // Sort dims by network average descending for the summary pills
  var dimsSorted = dims.slice().sort(function(a,b){ return netAvg[b.id] - netAvg[a.id]; });
  dimsSorted.forEach(function(dim) {
    var col  = TS_DIM_COLORS[dim.id] || '#818cf8';
    var avg  = netAvg[dim.id];
    var pct  = Math.round(avg * 100);
    var rank = avg > 0.5 ? 'Strong' : avg > 0.25 ? 'Moderate' : 'Emerging';
    summaryHTML += '<div style="padding:10px 16px;border-radius:10px;background:' + col + '15;border:1.5px solid ' + col + '44;min-width:160px;flex:1">'
      + '<div style="font-size:11px;font-weight:800;color:' + col + ';margin-bottom:4px">' + dim.label + '</div>'
      + '<div style="background:#0d1520;border-radius:4px;height:6px;margin-bottom:6px">'
      + '<div style="background:' + col + ';height:6px;border-radius:4px;width:' + Math.round(avg * 200) + 'px;max-width:100%"></div>'
      + '</div>'
      + '<div style="display:flex;justify-content:space-between;align-items:center">'
      + '<span style="font-size:10px;color:#64748b">' + rank + '</span>'
      + '<span style="font-size:11px;font-weight:700;color:' + col + '">' + pct + '%</span>'
      + '</div>'
      + '</div>';
  });
  summaryHTML += '</div></div>';

  // ── One full section per dimension ───────────────────────────────
  var sectionsHTML = '<div style="padding:0 24px 40px">';

  dims.forEach(function(dim) {
    var col = TS_DIM_COLORS[dim.id] || '#818cf8';
    var avg = netAvg[dim.id];

    // Projects with score > 0.04, sorted desc
    var dimProjects = projects.map(function(p) {
      return { proj: p, score: (scores[p.id] || {})[dim.id] || 0 };
    }).filter(function(x) { return x.score > 0.04; })
      .sort(function(a,b) { return b.score - a.score; });

    // Count projects with meaningful signal (>0.2)
    var strongCount = dimProjects.filter(function(x){ return x.score >= 0.2; }).length;
    var totalCount  = dimProjects.length;

    sectionsHTML += '<div style="margin-bottom:36px;padding:20px;border-radius:12px;background:#0d1520;border:1px solid ' + col + '33">';

    // Section header
    sectionsHTML += '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">'
      + '<div>'
      + '<div style="font-size:14px;font-weight:800;color:' + col + ';margin-bottom:2px">' + dim.label + '</div>'
      + '<div style="font-size:11px;color:#64748b">' + dim.desc + '</div>'
      + '</div>'
      + '<div style="display:flex;gap:8px;align-items:center">'
      + '<span style="font-size:10px;padding:3px 10px;border-radius:99px;background:' + col + '22;color:' + col + '">'
      + strongCount + ' strong signal' + (strongCount !== 1 ? 's' : '') + '</span>'
      + '<span style="font-size:10px;padding:3px 10px;border-radius:99px;background:#1e2535;color:#94a3b8">'
      + totalCount + ' projects contributing</span>'
      + '</div>'
      + '</div>';

    // Network aggregate bar
    sectionsHTML += '<div style="margin-bottom:16px">'
      + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">'
      + '<span style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;min-width:120px">Network Average</span>'
      + '<div style="flex:1;background:#0a0f1a;border-radius:4px;height:10px">'
      + '<div style="background:' + col + ';height:10px;border-radius:4px;width:' + Math.min(100, Math.round(avg * 200)) + '%;opacity:0.85"></div>'
      + '</div>'
      + '<span style="font-size:12px;font-weight:800;color:' + col + ';min-width:36px;text-align:right">' + Math.round(avg*100) + '%</span>'
      + '</div>'
      + '</div>';

    if (dimProjects.length === 0) {
      sectionsHTML += '<div style="font-size:12px;color:#475569;padding:12px 0">No significant signal detected across the network for this dimension.</div>';
    } else {
      // Max score for relative bar scaling
      var maxScore = dimProjects[0].score;

      dimProjects.forEach(function(x) {
        var p   = x.proj;
        var sc  = x.score;
        var pc  = podColor(p.pod || 'Podless');
        var area = AREA_NAME_TO_ID[p.primary_area] || 'other';
        var ac  = AREA_COLOR[area] || '#475569';
        var barPct = Math.min(100, Math.round((sc / Math.max(maxScore, 0.01)) * 100));
        var sigLevel = sc >= 0.5 ? 'high' : sc >= 0.25 ? 'mid' : 'low';
        var sigCol   = sigLevel === 'high' ? col : sigLevel === 'mid' ? col + 'aa' : '#334155';
        var singleRev = (p.reviewers||[]).length < 2;

        sectionsHTML += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">'
          // Pod strip
          + '<div style="width:4px;height:32px;border-radius:2px;background:' + pc + ';flex-shrink:0"></div>'
          // Project name
          + '<div style="min-width:140px;max-width:140px">'
          + '<div style="font-size:11px;font-weight:600;color:#cbd5e1;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + displayName(p) + '</div>'
          + '<div style="display:flex;align-items:center;gap:4px;margin-top:1px">'
          + '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:' + ac + '"></span>'
          + '<span style="font-size:9px;color:#475569">' + (p.primary_area||'Other') + '</span>'
          + (singleRev ? '<span style="font-size:9px;color:#f59e0b;margin-left:2px">⚠</span>' : '')
          + '</div>'
          + '</div>'
          // Bar
          + '<div style="flex:1;background:#0a0f1a;border-radius:4px;height:10px">'
          + '<div style="background:' + col + ';height:10px;border-radius:4px;width:' + barPct + '%;opacity:' + (0.4 + sc * 0.8).toFixed(2) + '"></div>'
          + '</div>'
          // Score label
          + '<div style="min-width:36px;text-align:right;font-size:11px;font-weight:700;color:' + (sc >= 0.25 ? col : '#475569') + '">'
          + Math.round(sc * 100) + '%</div>'
          // Reviewer chips
          + '<div style="min-width:80px">'
          + (p.reviewers||[]).map(function(r){
              return '<span style="font-size:9px;padding:1px 5px;border-radius:99px;background:#1e2535;color:#64748b;margin:1px;display:inline-block">' + r + '</span>';
            }).join('')
          + '</div>'
          + '</div>';
      });
    }

    sectionsHTML += '</div>';
  });

  sectionsHTML += '</div>';

  el.innerHTML = summaryHTML + sectionsHTML;
}

    // Phase 2 question
    if (s.phase2_question) {
      html += '<div style="padding:12px 14px;background:#0a0f1a;border-radius:8px;border-left:3px solid #4ade8044">'
        + '<div style="font-size:10px;font-weight:700;color:#4ade80;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Phase 2 Question</div>'
        + '<div style="font-size:11px;color:#94a3b8;line-height:1.6;font-style:italic">' + s.phase2_question + '</div>'
        + '</div>';
    }

    html += '</div>';

    // ── Right column: visual support ──────────────────────────────
    html += '<div style="min-width:280px;max-width:360px;padding:18px 20px">';

    // Pod strength mini-bars
    html += '<div style="margin-bottom:16px">'
      + '<div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Pod Strength</div>';

    var POD_ORDER = ['Niitsitapi Pod',"Ka Hawai\u2019i Pae \u2018\u0100ina Pod","T'karonto Pod","Wih\u00e1\u014bble S\u2019a Pod",'Hiringa Te Mara','Haudenosaunee Pod','Podless'];
    POD_ORDER.forEach(function(pod) {
      if (!podScores[pod]) return;
      var sc = (podScores[pod]||{})[dim.id]||0;
      var pc = podColor(pod);
      var shortName = pod.replace(' Pod','').replace("Ka Hawai\u2019i Pae \u2018\u0100ina",'Hawai\u02BBi').replace('Hiringa Te Mara','Hiringa');
      var isLeader = podLeaders.indexOf(pod) >= 0;
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'
        + '<div style="width:70px;font-size:10px;color:' + (isLeader ? pc : '#64748b') + ';font-weight:' + (isLeader ? '700':'400') + ';text-align:right">' + shortName + '</div>'
        + '<div style="flex:1;background:#0a0f1a;border-radius:3px;height:8px">'
        + '<div style="background:' + pc + ';height:8px;border-radius:3px;width:' + Math.round(sc*100) + '%;opacity:' + Math.max(0.3, sc*1.5).toFixed(2) + '"></div>'
        + '</div>'
        + '<div style="width:28px;font-size:10px;font-weight:700;color:' + (sc >= 0.4 ? pc : '#334155') + ';text-align:right">' + Math.round(sc*100) + '</div>'
        + '</div>';
    });
    html += '</div>';

    // Top projects list
    html += '<div style="margin-bottom:12px">'
      + '<div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Strongest Projects</div>';

    topProjects.slice(0, 6).forEach(function(p) {
      var sc = (DATA.ts_project_scores[p.id]||{})[dim.id]||0;
      var pc = podColor(p.pod||'Podless');
      var singleRev = (p.reviewers||[]).length < 2;
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
        + '<div style="width:3px;height:18px;border-radius:2px;background:' + pc + '"></div>'
        + '<div style="flex:1;font-size:11px;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + displayName(p)
        + (singleRev ? ' <span style="color:#f59e0b;font-size:9px">⚠</span>' : '')
        + '</div>'
        + '<div style="font-size:10px;font-weight:700;color:' + col + '">' + Math.round(sc*100) + '</div>'
        + '</div>';
    });

    // Weakest
    var weakProjects = ranked.filter(function(p) { return ((DATA.ts_project_scores[p.id]||{})[dim.id]||0) < 0.2; });
    if (weakProjects.length > 0) {
      html += '<div style="margin-top:10px;font-size:10px;color:#475569">'
        + '<span style="font-weight:700;color:#f87171">Gap projects:</span> '
        + weakProjects.slice(0, 4).map(function(p) { return displayName(p); }).join(', ')
        + (weakProjects.length > 4 ? ' + ' + (weakProjects.length - 4) + ' more' : '')
        + '</div>';
    }

    html += '</div>';
    html += '</div>'; // end right column
    html += '</div>'; // end two-column body
    html += '</div>'; // end section
  });

  html += '</div>';

  // ── Method note ─────────────────────────────────────────────────
  html += '<div style="padding:0 24px 32px">'
    + '<div style="font-size:10px;color:#475569;padding:10px 14px;background:#0d1520;border-radius:8px;border-left:3px solid #818cf844;max-width:700px">'
    + '<strong style="color:#64748b">Method:</strong> Each dimension summary is based on LLM semantic analysis of all reviewer text across all projects. '
    + 'Scores blend 70% LLM reading (what reviewers actually mean) with 30% keyword-hybrid analysis (density + sentence peaks + phrase matching). '
    + 'Summaries, gaps, and Phase 2 questions are written by the LLM after reading every reviewer sentence organised by dimension.'
    + '</div></div>';

  el.innerHTML = html;
}

// ── Init ──────────────────────────────────────────────────────────────────
rendered['landscape'] = true;
renderLandscape();
</script>
</body>
</html>
